<script type="module">
import { state as profileState, addCoins } from '/src/core/state.js';

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const el={puzzle:document.getElementById('puzzleLabel'),covered:document.getElementById('coveredLabel'),moves:document.getElementById('movesLabel'),permits:document.getElementById('permitsLabel'),score:document.getElementById('scoreLabel'),coins:document.getElementById('coinsLabel'),start:document.getElementById('startBtn'),check:document.getElementById('checkBtn'),hint:document.getElementById('hintBtn'),undo:document.getElementById('undoBtn'),pause:document.getElementById('pauseBtn'),restart:document.getElementById('restartBtn'),full:document.getElementById('fullBtn'),draw:document.getElementById('drawTool'),erase:document.getElementById('eraseTool')};
const SIZE=5;
const COLORS=['#f4b860','#70c1b3','#8aaee0','#ef8f8c','#b59bdf','#86c36b','#f5cf69','#6fc1d8'];
const RAW=[
 {name:'Garden Lots',rects:[[0,0,2,2,0,0],[0,2,3,1,0,3],[1,2,1,4,2,2],[1,3,2,2,1,4],[2,0,2,3,3,0],[3,3,2,2,4,4]]},
 {name:'Market Rows',rects:[[0,0,1,3,1,0],[0,1,2,2,0,2],[0,3,2,1,0,3],[1,3,2,3,2,4],[2,1,2,1,2,1],[3,0,3,2,4,1],[4,3,2,1,4,4]]},
 {name:'River Bend',rects:[[0,0,3,1,0,1],[0,3,2,2,1,4],[1,0,1,3,2,0],[1,1,2,2,1,1],[2,3,2,1,2,3],[3,1,4,2,3,2],[4,0,1,1,4,0]]},
 {name:'Orchard Grid',rects:[[0,0,2,3,1,1],[0,2,1,2,0,2],[0,3,2,1,0,4],[1,3,2,2,2,3],[2,2,1,3,3,2],[3,0,2,2,4,0],[3,3,2,2,4,4]]},
 {name:'Festival Blocks',rects:[[0,0,1,2,1,0],[0,1,3,1,0,2],[0,4,1,3,1,4],[1,1,2,2,2,1],[1,3,1,4,2,3],[2,0,1,3,3,0],[3,1,2,2,4,2],[3,4,1,2,4,4]]}
];
const PUZZLES=RAW.map((source,pi)=>{const solution=source.rects.map((v,i)=>{const[r,c,w,h,clueR,clueC]=v;return{r,c,w,h,clueR,clueC,id:`${pi}-${i}`}});return{name:source.name,solution,clues:solution.map(x=>({r:x.clueR,c:x.clueC,value:x.w*x.h}))}});
for(const p of PUZZLES){const cells=Array.from({length:SIZE},()=>Array(SIZE).fill(0));for(const x of p.solution){if(x.clueR<x.r||x.clueR>=x.r+x.h||x.clueC<x.c||x.clueC>=x.c+x.w)throw new Error(`Invalid clue in ${p.name}`);for(let r=x.r;r<x.r+x.h;r++)for(let c=x.c;c<x.c+x.w;c++)cells[r][c]++}if(cells.some(row=>row.some(n=>n!==1)))throw new Error(`Invalid tiling in ${p.name}`)}

const game={mode:'menu',puzzleIndex:0,rectangles:[],history:[],cursor:{r:0,c:0},anchor:null,draft:null,pointerStart:null,tool:'draw',moves:0,hints:0,permits:3,elapsedMs:0,score:0,solvedCount:0,rewarded:new Set(),coinsEarned:0,lastCoins:0,status:'Divide every patch into numbered parcels.',lastAction:{type:'ready'},pulse:0};

let manualUntil=0,lastFrame=performance.now();
const puzzle=()=>PUZZLES[game.puzzleIndex];
const cloneRects=(xs=game.rectangles)=>xs.map(x=>({...x}));
const rectKey=x=>`${x.r},${x.c},${x.w},${x.h}`;
const sameRect=(a,b)=>a.r===b.r&&a.c===b.c&&a.w===b.w&&a.h===b.h;
const contains=(x,r,c)=>r>=x.r&&r<x.r+x.h&&c>=x.c&&c<x.c+x.w;
const overlaps=(a,b)=>a.r<b.r+b.h&&a.r+a.h>b.r&&a.c<b.c+b.w&&a.c+a.w>b.c;
const normalize=(a,b)=>({r:Math.min(a.r,b.r),c:Math.min(a.c,b.c),w:Math.abs(a.c-b.c)+1,h:Math.abs(a.r-b.r)+1});
const covered=()=>game.rectangles.reduce((sum,x)=>sum+x.w*x.h,0);
const liveScore=()=>Math.max(0,1250-game.moves*18-game.hints*140-Math.floor(game.elapsedMs/1000)*2+game.solvedCount*500);

function snapshot(){game.history.push({rectangles:cloneRects(),moves:game.moves,permits:game.permits});if(game.history.length>60)game.history.shift()}
function setTool(tool){game.tool=tool;game.anchor=null;game.draft=null;el.draw.classList.toggle('active',tool==='draw');el.erase.classList.toggle('active',tool==='erase');render()}
function resetBoard(){game.rectangles=[];game.history=[];game.cursor={r:0,c:0};game.anchor=null;game.draft=null;game.pointerStart=null;game.moves=0;game.hints=0;game.permits=3;game.elapsedMs=0;game.score=0;game.lastCoins=0;game.status=`Patch ${game.puzzleIndex+1}: drag a rectangle around each numbered parcel.`;game.lastAction={type:'reset',puzzle:puzzle().name};setTool('draw')}
function startCampaign(){game.puzzleIndex=0;game.solvedCount=0;game.rewarded=new Set();game.coinsEarned=0;resetBoard();game.mode='playing';game.status='Drag from one grid cell to another to claim a parcel.';game.lastAction={type:'start',puzzle:puzzle().name};render()}
function nextPuzzle(){if(game.mode!=='solved')return;game.puzzleIndex++;resetBoard();game.mode='playing';game.status=`New patch: ${puzzle().name}.`;game.lastAction={type:'next',puzzle:puzzle().name};render()}
function restartPuzzle(){const menu=game.mode==='menu';resetBoard();game.mode=menu?'menu':'playing';game.status=menu?'Divide every patch into numbered parcels.':`Restarted ${puzzle().name}.`;game.lastAction={type:'restart',puzzle:puzzle().name};render()}
function placementError(x){if(x.r<0||x.c<0||x.r+x.h>SIZE||x.c+x.w>SIZE)return'That parcel leaves the patch.';if(game.rectangles.some(y=>overlaps(y,x)))return'Parcels cannot overlap.';const clues=puzzle().clues.filter(q=>contains(x,q.r,q.c));if(clues.length!==1)return clues.length===0?'Each parcel needs one number.':'A parcel can contain only one number.';if(clues[0].value!==x.w*x.h)return`That number needs ${clues[0].value} squares.`;return''}
function placeRect(x,source='draw'){if(game.mode!=='playing')return false;const error=placementError(x);if(error){game.status=error;game.lastAction={type:'rejected',reason:error,rectangle:{...x}};game.anchor=null;game.draft=null;render();return false}snapshot();game.rectangles.push({...x,color:COLORS[game.rectangles.length%COLORS.length]});game.moves++;game.anchor=null;game.draft=null;game.status=`${x.w} x ${x.h} parcel placed. ${SIZE*SIZE-covered()} squares remain.`;game.lastAction={type:source,rectangle:{...x},covered:covered()};render();return true}
function eraseAt(r,c,source='erase'){if(game.mode!=='playing')return false;const i=game.rectangles.findIndex(x=>contains(x,r,c));if(i<0){game.status='No parcel covers that square.';game.lastAction={type:'erase-miss',cell:{r,c}};render();return false}snapshot();const[removed]=game.rectangles.splice(i,1);game.moves++;game.status='Parcel erased.';game.lastAction={type:source,rectangle:{...removed}};render();return true}
function undo(){if(game.mode!=='playing'||!game.history.length){game.status='Nothing to undo.';render();return}const old=game.history.pop();game.rectangles=cloneRects(old.rectangles);game.moves=old.moves;game.permits=old.permits;game.status='Last move undone.';game.lastAction={type:'undo'};game.anchor=null;game.draft=null;render()}
function solutionMatches(){const actual=new Set(game.rectangles.map(rectKey));return actual.size===puzzle().solution.length&&puzzle().solution.every(x=>actual.has(rectKey(x)))}
function reward(n){n=Math.max(0,Math.floor(n));if(n){addCoins(n);game.coinsEarned+=n}}
function completePuzzle(){if(!solutionMatches())return false;const key=String(game.puzzleIndex);const score=liveScore()+900;let coins=0;if(!game.rewarded.has(key)){coins=8+game.puzzleIndex*2+Math.max(0,game.permits-1)+(game.hints===0?2:0);if(game.puzzleIndex===PUZZLES.length-1)coins+=20;game.rewarded.add(key);reward(coins)}game.score=score;game.lastCoins=coins;game.solvedCount=Math.max(game.solvedCount,game.puzzleIndex+1);if(game.puzzleIndex===PUZZLES.length-1){game.mode='won';game.status=`All five patches approved. Campaign complete! Earned ${coins} coins.`;game.lastAction={type:'campaign-win',score,coins}}else{game.mode='solved';game.status=`${puzzle().name} approved. Earned ${coins} coins.`;game.lastAction={type:'solve',puzzle:puzzle().name,score,coins}}render();return true}
function checkBoard(){if(game.mode!=='playing')return;if(solutionMatches()){completePuzzle();return}snapshot();game.permits--;if(game.permits<=0){game.permits=0;game.mode='failed';game.status='Inspection failed. Restart this patch and try again.';game.lastAction={type:'failed',covered:covered()}}else{const remaining=SIZE*SIZE-covered();game.status=remaining?`Inspection found ${remaining} uncovered squares. Permit used.`:'The parcel shapes do not match this patch. Permit used.';game.lastAction={type:'check-failed',permits:game.permits,covered:covered()}}render()}
function hint(){if(game.mode!=='playing')return;const target=puzzle().solution.find(s=>!game.rectangles.some(x=>sameRect(x,s)));if(!target){checkBoard();return}snapshot();game.rectangles=game.rectangles.filter(x=>!overlaps(x,target));game.rectangles.push({r:target.r,c:target.c,w:target.w,h:target.h,color:COLORS[game.rectangles.length%COLORS.length]});game.moves++;game.hints++;game.status=`Hint placed a ${target.w} x ${target.h} parcel.`;game.lastAction={type:'hint',rectangle:{...target}};render()}
function togglePause(){if(game.mode==='playing'){game.mode='paused';game.status='Paused. The patch is hidden.';game.lastAction={type:'pause'}}else if(game.mode==='paused'){game.mode='playing';game.status='Back to work.';game.lastAction={type:'resume'}}render()}
async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen?.();else await document.exitFullscreen?.()}catch(error){game.status='Fullscreen is unavailable in this browser.';game.lastAction={type:'fullscreen-error',message:String(error?.message||error)}}resizeCanvas()}
function update(ms){const safe=Math.max(0,Math.min(5000,Number(ms)||0));game.pulse=(game.pulse+safe/1000)%(Math.PI*2);if(game.mode==='playing')game.elapsedMs+=safe}
function resizeCanvas(){const rect=canvas.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1),w=Math.max(320,Math.round(rect.width*dpr)),h=Math.max(280,Math.round(rect.height*dpr));if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h}render()}
function computeView(){const width=canvas.width,height=canvas.height,margin=Math.max(22,Math.min(width,height)*.055),header=Math.max(92,height*.18),boardPx=Math.min(width-margin*2,height-header-margin*1.25),cell=boardPx/SIZE;view={width,height,boardPx,cell,boardX:(width-boardPx)/2,boardY:header};return view}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,Math.min(r,w/2,h/2))}
function background(v){const g=ctx.createLinearGradient(0,0,v.width,v.height);g.addColorStop(0,'#f9fff9');g.addColorStop(.48,'#d9f0e5');g.addColorStop(1,'#f9ddae');ctx.fillStyle=g;ctx.fillRect(0,0,v.width,v.height);ctx.globalAlpha=.14;ctx.fillStyle='#1b6b62';for(let i=-2;i<11;i++){ctx.beginPath();ctx.arc((i*137+game.pulse*18)%(v.width+180),60+(i%3)*73,42+(i%4)*9,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function header(v){const size=Math.max(25,Math.min(48,v.width*.045));ctx.fillStyle='#183247';ctx.font=`900 ${size}px Inter,Segoe UI,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('PARCEL PATCH',v.width/2,size*.72);ctx.fillStyle='#3f665f';ctx.font=`800 ${Math.max(14,size*.38)}px Inter,Segoe UI,sans-serif`;ctx.fillText(`${puzzle().name}  -  ${game.status}`,v.width/2,size*1.48,v.width*.88)}
function board(v){const{boardX:x,boardY:y,boardPx:p,cell}=v;ctx.save();ctx.shadowColor='#1832472f';ctx.shadowBlur=Math.max(12,cell*.12);ctx.shadowOffsetY=Math.max(5,cell*.06);rr(x-7,y-7,p+14,p+14,14);ctx.fillStyle='#fffdf7';ctx.fill();ctx.restore();for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){ctx.fillStyle=(r+c)%2?'#f7f1df':'#fffbef';ctx.fillRect(x+c*cell,y+r*cell,cell,cell)}game.rectangles.forEach((z,i)=>{const zx=x+z.c*cell,zy=y+z.r*cell,zw=z.w*cell,zh=z.h*cell;ctx.globalAlpha=.38;ctx.fillStyle=z.color||COLORS[i%COLORS.length];ctx.fillRect(zx+3,zy+3,zw-6,zh-6);ctx.globalAlpha=1;ctx.strokeStyle='#183247';ctx.lineWidth=Math.max(4,cell*.055);ctx.strokeRect(zx+2,zy+2,zw-4,zh-4)});if(game.draft){const z=game.draft;ctx.save();ctx.setLineDash([Math.max(8,cell*.12),Math.max(5,cell*.07)]);ctx.strokeStyle=placementError(z)?'#c94747':'#16775f';ctx.lineWidth=Math.max(4,cell*.05);ctx.strokeRect(x+z.c*cell+4,y+z.r*cell+4,z.w*cell-8,z.h*cell-8);ctx.restore()}ctx.strokeStyle='#8aa69e';ctx.lineWidth=Math.max(1,cell*.016);for(let i=0;i<=SIZE;i++){ctx.beginPath();ctx.moveTo(x+i*cell,y);ctx.lineTo(x+i*cell,y+p);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+i*cell);ctx.lineTo(x+p,y+i*cell);ctx.stroke()}ctx.strokeStyle='#183247';ctx.lineWidth=Math.max(5,cell*.065);ctx.strokeRect(x,y,p,p);for(const clue of puzzle().clues){const cx=x+(clue.c+.5)*cell,cy=y+(clue.r+.5)*cell;ctx.beginPath();ctx.arc(cx,cy,cell*.25,0,Math.PI*2);ctx.fillStyle='#fffdf7';ctx.fill();ctx.strokeStyle='#183247';ctx.lineWidth=Math.max(3,cell*.035);ctx.stroke();ctx.fillStyle='#183247';ctx.font=`900 ${Math.max(18,cell*.31)}px Inter,Segoe UI,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(clue.value),cx,cy+cell*.01)}if(game.mode==='playing'){ctx.strokeStyle='#ef7d48';ctx.lineWidth=Math.max(4,cell*.05);ctx.strokeRect(x+game.cursor.c*cell+7,y+game.cursor.r*cell+7,cell-14,cell-14);if(game.anchor){ctx.fillStyle='#ef7d48';ctx.beginPath();ctx.arc(x+(game.anchor.c+.5)*cell,y+(game.anchor.r+.5)*cell,cell*.09,0,Math.PI*2);ctx.fill()}}}
function overlay(v){if(game.mode==='playing')return;ctx.fillStyle='#183247d9';ctx.fillRect(0,0,v.width,v.height);const cards={menu:['Parcel Patch','Drag rectangles so each contains one number and covers exactly that many squares.','Start'],paused:['Patch paused','Your parcel plan is safely hidden.','Resume'],solved:['Patch approved!',`${puzzle().name} is perfectly divided.`,'Next patch'],failed:['Inspection failed','You used all three permits. Restart for a clean plan.','Restart'],won:['All patches approved!',`Campaign score ${game.score}. You earned ${game.coinsEarned} coins.`,'Play again']};const[t,s,a]=cards[game.mode]||cards.menu,w=Math.min(v.width*.82,760),h=Math.min(v.height*.48,300),x=(v.width-w)/2,y=(v.height-h)/2;rr(x,y,w,h,24);ctx.fillStyle='#fffdf7';ctx.fill();ctx.strokeStyle='#f3bd4b';ctx.lineWidth=6;ctx.stroke();ctx.fillStyle='#183247';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`900 ${Math.max(27,Math.min(54,w*.072))}px Inter,Segoe UI,sans-serif`;ctx.fillText(t,v.width/2,y+h*.28,w*.88);ctx.fillStyle='#496d68';ctx.font=`700 ${Math.max(14,Math.min(23,w*.032))}px Inter,Segoe UI,sans-serif`;ctx.fillText(s,v.width/2,y+h*.53,w*.84);ctx.fillStyle='#16775f';ctx.font=`900 ${Math.max(16,Math.min(25,w*.035))}px Inter,Segoe UI,sans-serif`;ctx.fillText(`${a}: Enter / Space`,v.width/2,y+h*.78)}
function hud(){const active=game.mode==='playing'||game.mode==='paused';el.puzzle.textContent=`${game.puzzleIndex+1} / ${PUZZLES.length}`;el.covered.textContent=`${covered()} / ${SIZE*SIZE}`;el.moves.textContent=String(game.moves);el.permits.textContent=String(game.permits);el.score.textContent=String(game.mode==='solved'||game.mode==='won'?game.score:liveScore());el.coins.textContent=String(Number(profileState.coins||0));el.permits.parentElement.classList.toggle('danger',game.permits<=1);el.start.textContent=game.mode==='solved'?'Next':game.mode==='won'?'Again':game.mode==='failed'?'Retry':game.mode==='paused'?'Resume':game.mode==='menu'?'Start':'Playing';el.start.disabled=game.mode==='playing';el.check.disabled=!active||game.mode==='paused';el.hint.disabled=!active||game.mode==='paused';el.undo.disabled=!active||game.mode==='paused'||!game.history.length;el.pause.disabled=!active;el.pause.textContent=game.mode==='paused'?'Resume':'Pause';el.restart.disabled=game.mode==='menu';el.draw.disabled=game.mode!=='playing';el.erase.disabled=game.mode!=='playing'}
function render(){const v=computeView();ctx.clearRect(0,0,v.width,v.height);background(v);header(v);board(v);overlay(v);hud()}
function cellAt(event){const rect=canvas.getBoundingClientRect(),x=(event.clientX-rect.left)*canvas.width/rect.width,y=(event.clientY-rect.top)*canvas.height/rect.height,c=Math.floor((x-view.boardX)/view.cell),r=Math.floor((y-view.boardY)/view.cell);return r<0||c<0||r>=SIZE||c>=SIZE?null:{r,c}}
canvas.addEventListener('pointerdown',event=>{if(game.mode!=='playing')return;const cell=cellAt(event);if(!cell)return;canvas.setPointerCapture?.(event.pointerId);game.cursor=cell;if(game.tool==='erase')eraseAt(cell.r,cell.c,'pointer-erase');else{game.pointerStart=cell;game.draft=normalize(cell,cell);render()}});
canvas.addEventListener('pointermove',event=>{if(!game.pointerStart||game.mode!=='playing')return;const cell=cellAt(event);if(!cell)return;game.cursor=cell;game.draft=normalize(game.pointerStart,cell);render()});
canvas.addEventListener('pointerup',event=>{if(!game.pointerStart)return;const end=cellAt(event)||game.cursor,start=game.pointerStart;game.pointerStart=null;placeRect(normalize(start,end),'pointer-draw')});
canvas.addEventListener('pointercancel',()=>{game.pointerStart=null;game.draft=null;render()});
function moveCursor(dr,dc){game.cursor.r=Math.max(0,Math.min(SIZE-1,game.cursor.r+dr));game.cursor.c=Math.max(0,Math.min(SIZE-1,game.cursor.c+dc));if(game.anchor)game.draft=normalize(game.anchor,game.cursor);game.lastAction={type:'cursor',cell:{...game.cursor}};render()}
function keyboardDraw(){if(!game.anchor){game.anchor={...game.cursor};game.draft=normalize(game.anchor,game.cursor);game.status='Anchor set. Move, then press Space or Enter to place.';game.lastAction={type:'anchor',cell:{...game.anchor}};render()}else placeRect(normalize(game.anchor,game.cursor),'keyboard-draw')}
document.addEventListener('keydown',event=>{const key=event.key.toLowerCase();if(key==='f'){event.preventDefault();toggleFullscreen();return}if(key==='escape'&&document.fullscreenElement){event.preventDefault();document.exitFullscreen?.();return}if(key==='p'){event.preventDefault();togglePause();return}if(key==='r'){event.preventDefault();restartPuzzle();return}if((key==='enter'||key===' ')&&game.mode!=='playing'){event.preventDefault();if(game.mode==='menu'||game.mode==='won')startCampaign();else if(game.mode==='paused')togglePause();else if(game.mode==='solved')nextPuzzle();else if(game.mode==='failed')restartPuzzle();return}if(game.mode!=='playing')return;if(key==='arrowup'||key==='w'){event.preventDefault();moveCursor(-1,0)}else if(key==='arrowdown'||key==='s'){event.preventDefault();moveCursor(1,0)}else if(key==='arrowleft'||key==='a'){event.preventDefault();moveCursor(0,-1)}else if(key==='arrowright'||key==='d'){event.preventDefault();moveCursor(0,1)}else if(key===' '||key==='enter'){event.preventDefault();keyboardDraw()}else if(key==='backspace'||key==='delete'||key==='x'){event.preventDefault();eraseAt(game.cursor.r,game.cursor.c,'keyboard-erase')}else if(key==='u'){event.preventDefault();undo()}else if(key==='h'){event.preventDefault();hint()}else if(key==='c'){event.preventDefault();checkBoard()}});
el.start.addEventListener('click',()=>{if(game.mode==='menu'||game.mode==='won')startCampaign();else if(game.mode==='paused')togglePause();else if(game.mode==='solved')nextPuzzle();else if(game.mode==='failed')restartPuzzle()});el.check.addEventListener('click',checkBoard);el.hint.addEventListener('click',hint);el.undo.addEventListener('click',undo);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restartPuzzle);el.full.addEventListener('click',toggleFullscreen);el.draw.addEventListener('click',()=>setTool('draw'));el.erase.addEventListener('click',()=>setTool('erase'));
function renderGameToText(){return JSON.stringify({game:'Parcel Patch',coordinate_system:'5x5 grid; origin is top-left; rows increase downward and columns increase rightward',mode:game.mode,puzzle:{index:game.puzzleIndex+1,total:PUZZLES.length,name:puzzle().name},objective:'Cover all 25 cells with non-overlapping rectangles; each rectangle contains exactly one clue and its area equals that clue.',clues:puzzle().clues.map(x=>({...x})),rectangles:game.rectangles.map(x=>({r:x.r,c:x.c,w:x.w,h:x.h})),covered_cells:covered(),cursor:{...game.cursor},anchor:game.anchor?{...game.anchor}:null,draft:game.draft?{...game.draft}:null,tool:game.tool,moves:game.moves,hints:game.hints,permits:game.permits,elapsed_ms:Math.round(game.elapsedMs),score:game.mode==='solved'||game.mode==='won'?game.score:liveScore(),solved_count:game.solvedCount,coins:Number(profileState.coins||0),coins_earned_this_session:game.coinsEarned,last_coins:game.lastCoins,status:game.status,last_action:game.lastAction,controls:{pointer:'Drag across cells to draw; switch to Erase and tap a parcel to remove it.',keyboard:'Arrows/WASD move; Space/Enter anchors and places; X/Delete erases; C checks; H hints; U undoes; P pauses; R restarts; F fullscreen.'}})}
window.render_game_to_text=renderGameToText;
window.advanceTime=(ms=16.67)=>{manualUntil=performance.now()+250;const total=Math.max(0,Number(ms)||0),steps=Math.max(1,Math.ceil(total/(1000/60))),step=total/steps;for(let i=0;i<steps;i++)update(step);render()};
const qa={start:startCampaign,restart:restartPuzzle,check:checkBoard,hint,undo,pause:togglePause,place:(r,c,w,h)=>placeRect({r,c,w,h},'qa-place'),erase:eraseAt,applySolution:()=>{if(game.mode!=='playing')return false;game.rectangles=puzzle().solution.map((x,i)=>({r:x.r,c:x.c,w:x.w,h:x.h,color:COLORS[i%COLORS.length]}));game.moves+=puzzle().solution.length;game.lastAction={type:'qa-solution'};render();return true},solve:()=>{qa.applySolution();return completePuzzle()},state:()=>JSON.parse(renderGameToText())};
window.__PARCEL_PATCH_GAME__=Object.freeze(qa);
function loop(now){const delta=Math.min(50,Math.max(0,now-lastFrame));lastFrame=now;if(now>=manualUntil)update(delta);render();requestAnimationFrame(loop)}
window.addEventListener('resize',resizeCanvas);document.addEventListener('fullscreenchange',resizeCanvas);mountGameFeedback({gameSlug:'parcelpatch',gameName:'Parcel Patch'});resizeCanvas();requestAnimationFrame(loop);
</script>
