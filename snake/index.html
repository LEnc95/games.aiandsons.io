    <script type="module">
      import { addCoins as addCoinsFn, rememberRecent } from '../src/core/state.js';
      import { maybeUnlock } from '../src/prog/achievements.js';
      import { snakeSkinStyle } from '../src/prog/cosmetics.js';

      window.maybeUnlock = maybeUnlock;

    </script>
  <script>
    // --- Config ---
    // URL Parameters: ?difficulty=1|2|3&speed=0.5-2.0&seed=<number>
    const cfg = {
      gridSize: 20,
      cellSize: 30, // 600 / 20
      initialSpeed: 150, // milliseconds per move
      speedIncrement: 5, // speed up per food
      minSpeed: 80, // minimum milliseconds
      initialLength: 3,
      difficulty: 2, // 1=Easy 2=Medium 3=Hard
    };

    // Parse URL params
    const params = new URLSearchParams(location.search);
    if (params.get("difficulty")) cfg.difficulty = Math.max(1, Math.min(3, +params.get("difficulty")||2));
    const globalSpeedScale = Math.max(0.5, Math.min(2, +(params.get("speed")||1)));
    const seedParam = params.get("seed");

    // --- Seeded PRNG ---
    let rngState = null;
    let useSeededRNG = false;
    let initialSeed = null;

    if (seedParam !== null && seedParam !== "") {
      const seed = +seedParam || 0;
      initialSeed = Math.abs(seed) % 2147483647;
      rngState = initialSeed;
      useSeededRNG = true;
    }

    function random() {
      if (useSeededRNG) {
        rngState = (rngState * 1664525 + 1013904223) % 2147483647;
        return rngState / 2147483647;
      } else {
        return Math.random();
      }
    }

    function resetRNG() {
      if (useSeededRNG && initialSeed !== null) {
        rngState = initialSeed;
      }
    }

    // --- Detect touch device ---
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // --- Responsive canvas setup ---
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const canvasContainer = document.getElementById("canvas-container");
    const wrap = document.querySelector(".wrap");
    const hudContainer = document.querySelector(".hud");

    function toNumber(value) {
      const parsed = parseFloat(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function getViewportHeight() {
      return window.visualViewport?.height ?? window.innerHeight;
    }

    function resizeCanvas() {
      const viewportHeight = getViewportHeight();
      const wrapStyles = wrap ? getComputedStyle(wrap) : null;
      const paddingTop = wrapStyles ? toNumber(wrapStyles.paddingTop) : 0;
      const paddingBottom = wrapStyles ? toNumber(wrapStyles.paddingBottom) : 0;
      const gapValue = wrapStyles ? toNumber(wrapStyles.rowGap || wrapStyles.gap) : 0;
      const hudHeight = hudContainer ? hudContainer.offsetHeight : 0;

      const rawWidthLimit = canvasContainer.clientWidth || canvasContainer.offsetWidth || viewportHeight || 600;
      const widthLimit = Math.min(rawWidthLimit, 800);

      let availableHeight = viewportHeight - paddingTop - paddingBottom - gapValue - hudHeight;
      if (!Number.isFinite(availableHeight)) {
        availableHeight = widthLimit;
      }

      const containerStyles = getComputedStyle(canvasContainer);
      const containerPadding = toNumber(containerStyles.paddingTop) + toNumber(containerStyles.paddingBottom);
      const availableForBoard = availableHeight - containerPadding;

      let boardSize;
      if (availableForBoard > 0) {
        boardSize = Math.min(widthLimit, availableForBoard);
        const comfortableSize = Math.min(widthLimit, 320);
        const minimumComfortSize = Math.min(widthLimit, 200);
        if (availableForBoard >= comfortableSize) {
          boardSize = Math.max(boardSize, comfortableSize);
        } else if (availableForBoard >= minimumComfortSize) {
          boardSize = Math.max(boardSize, minimumComfortSize);
        }
      } else {
        boardSize = Math.min(widthLimit, 260);
      }

      boardSize = Math.min(boardSize, widthLimit);
      if (availableForBoard > 0) {
        boardSize = Math.min(boardSize, availableForBoard);
      }

      const minimumSize = Math.min(widthLimit, 120);
      if (availableForBoard > 0 && availableForBoard < minimumSize) {
        boardSize = availableForBoard;
      } else {
        boardSize = Math.max(boardSize, minimumSize);
      }

      const totalBoardHeight = boardSize + containerPadding;

      canvasContainer.style.maxWidth = `${boardSize}px`;
      canvasContainer.style.maxHeight = `${boardSize}px`;
      canvasContainer.style.height = `${boardSize}px`;
      canvas.style.width = `${boardSize}px`;
      canvas.style.height = `${boardSize}px`;

      if (wrap) {
        if (availableHeight < totalBoardHeight + 1) {
          wrap.classList.add("scrollable");
        } else {
          wrap.classList.remove("scrollable");
        }
      }
    }

    resizeCanvas();

    let resizeRaf = 0;
    function scheduleResize() {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        resizeRaf = 0;
        resizeCanvas();
      });
    }

    window.addEventListener('resize', scheduleResize);
    window.addEventListener('orientationchange', () => setTimeout(scheduleResize, 100));
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scheduleResize);
      window.visualViewport.addEventListener('scroll', scheduleResize);
    }
    if (typeof ResizeObserver !== "undefined" && hudContainer) {
      const observer = new ResizeObserver(() => scheduleResize());
      observer.observe(hudContainer);
    }

    // --- State ---
    let lastT = 0;
    let paused = false;
    let gameOver = false;
    let gameStarted = false;
    let nextMoveTime = 0;
    let moveTimer = 0;
    
    const state = {
      snake: [],
      direction: { x: 1, y: 0 },
      nextDirection: { x: 1, y: 0 },
      food: { x: 0, y: 0 },
      score: 0,
      speed: cfg.initialSpeed,
      difficulty: cfg.difficulty
    };

    // High score (localStorage)
    function getHighScore() {
      const stored = localStorage.getItem('snake-high-score');
      return stored ? +stored : 0;
    }

    function setHighScore(score) {
      const current = getHighScore();
      if (score > current) {
        localStorage.setItem('snake-high-score', score.toString());
        return true;
      }
      return false;
    }

    // UI Elements
    const hintEl = document.getElementById("hint");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("high-score");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const restartBtn = document.getElementById("restart-btn");
    const difficultyBtns = document.querySelectorAll(".btn.difficulty");
    const controlBtns = document.querySelectorAll(".control-btn");

    function setHint(msg) { hintEl.textContent = msg; }
    function updateScore() { 
      scoreEl.textContent = state.score;
      const high = getHighScore();
      highScoreEl.textContent = high;
    }
    function updateDifficultyUI() {
      difficultyBtns.forEach(btn => {
        const diff = +btn.dataset.diff;
        btn.classList.toggle('active', diff === state.difficulty);
      });
    }
    function updateStartButton() {
      if (gameOver) {
        startBtn.textContent = "PLAY AGAIN";
        startBtn.disabled = false;
      } else if (!gameStarted) {
        startBtn.textContent = "START";
        startBtn.disabled = false;
      } else if (paused) {
        startBtn.textContent = "RESUME";
        startBtn.disabled = false;
      } else {
        startBtn.textContent = "START";
        startBtn.disabled = true;
      }
    }

    // Initialize
    updateScore();
    updateDifficultyUI();
    setHint(isTouchDevice ? "Tap START to begin. Swipe or use buttons to control." : "Press SPACE to start. Use WASD or Arrow keys.");
    updateStartButton();

    // --- Game Logic ---
    function initGame() {
      resetRNG();
      gameStarted = false;
      gameOver = false;
      paused = false;
      state.score = 0;
      state.speed = cfg.initialSpeed / globalSpeedScale;
      
      // Calculate base speed by difficulty
      const baseSpeed = cfg.initialSpeed;
      const speedMultiplier = cfg.difficulty === 1 ? 1.3 : (cfg.difficulty === 2 ? 1.0 : 0.7);
      state.speed = (baseSpeed * speedMultiplier) / globalSpeedScale;
      
      // Initialize snake in center
      const center = Math.floor(cfg.gridSize / 2);
      state.snake = [
        { x: center, y: center },
        { x: center - 1, y: center },
        { x: center - 2, y: center }
      ];
      
      state.direction = { x: 1, y: 0 };
      state.nextDirection = { x: 1, y: 0 };
      
      spawnFood();
      updateScore();
      updateStartButton();
      setHint(isTouchDevice ? "Tap START to begin." : "Press SPACE to start.");
    }

    function spawnFood() {
      let attempts = 0;
      do {
        state.food = {
          x: Math.floor(random() * cfg.gridSize),
          y: Math.floor(random() * cfg.gridSize)
        };
        attempts++;
      } while (
        state.snake.some(segment => segment.x === state.food.x && segment.y === state.food.y) &&
        attempts < 100
      );
    }

    function changeDirection(newDir) {
      // Prevent reverse direction
      if (state.direction.x === -newDir.x && state.direction.y === -newDir.y) {
        return;
      }
      state.nextDirection = newDir;
    }

    function moveSnake() {
      // Update direction
      state.direction = { ...state.nextDirection };
      
      // Calculate new head
      const head = {
        x: state.snake[0].x + state.direction.x,
        y: state.snake[0].y + state.direction.y
      };

      // Check wall collision
      if (head.x < 0 || head.x >= cfg.gridSize || head.y < 0 || head.y >= cfg.gridSize) {
        endGame();
        return;
      }

      // Check self collision
      if (state.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      // Add new head
      state.snake.unshift(head);

      // Check food collision
      if (head.x === state.food.x && head.y === state.food.y) {
        state.score++;
        spawnFood();
        // Speed up slightly
        state.speed = Math.max(
          cfg.minSpeed / globalSpeedScale,
          state.speed - cfg.speedIncrement
        );
        updateScore();
      } else {
        // Remove tail if no food eaten
        state.snake.pop();
      }
    }

    function startGame() {
      if (gameOver) {
        initGame();
      }
      if (!gameStarted) {
        gameStarted = true;
        paused = false;
        nextMoveTime = performance.now() + state.speed;
        updateStartButton();
        setHint("");
      } else if (paused) {
        paused = false;
        nextMoveTime = performance.now() + state.speed;
        updateStartButton();
        setHint("");
      }
    }

    function pauseGame() {
      if (gameStarted && !gameOver) {
        paused = !paused;
        updateStartButton();
        setHint(paused ? (isTouchDevice ? "Paused. Tap RESUME to continue." : "Paused. Press SPACE to resume.") : "");
      }
    }

    function endGame() {
      gameOver = true;
      gameStarted = false;
      const isNewHigh = setHighScore(state.score);
      // Award coins: Math.floor(length / 2) where length is snake length
      const coins = Math.floor(state.snake.length / 2);
      if (coins > 0 && typeof addCoins === 'function') {
        addCoins(coins);
      }
      // Check achievements: snake-15 (length 15), first-run
      if (typeof maybeUnlock === 'function') {
        maybeUnlock({ anyPlay: true, snake: { length: state.snake.length } });
      }
      updateScore();
      updateStartButton();
      setHint(
        isNewHigh 
          ? (isTouchDevice ? `🎉 New High Score! ${state.score} Tap PLAY AGAIN.` : `🎉 New High Score! ${state.score} Press SPACE to play again.`)
          : (isTouchDevice ? `Game Over! Score: ${state.score} Tap PLAY AGAIN.` : `Game Over! Score: ${state.score} Press SPACE to play again.`)
      );
    }

    // --- Input ---
    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    // Keyboard controls
    addEventListener("keydown", e => {
      if (e.code === "KeyW" || e.code === "ArrowUp") changeDirection(directions.up);
      if (e.code === "KeyS" || e.code === "ArrowDown") changeDirection(directions.down);
      if (e.code === "KeyA" || e.code === "ArrowLeft") changeDirection(directions.left);
      if (e.code === "KeyD" || e.code === "ArrowRight") changeDirection(directions.right);
      if (e.code === "Space") {
        e.preventDefault();
        if (gameOver || !gameStarted) startGame();
        else if (gameStarted) pauseGame();
      }
      if (e.code === "KeyR") initGame();
      if (e.code === "Digit1") { state.difficulty = 1; updateDifficultyUI(); initGame(); }
      if (e.code === "Digit2") { state.difficulty = 2; updateDifficultyUI(); initGame(); }
      if (e.code === "Digit3") { state.difficulty = 3; updateDifficultyUI(); initGame(); }
    });

    // Button handlers
    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", pauseGame);
    restartBtn.addEventListener("click", () => initGame());

    difficultyBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        state.difficulty = +btn.dataset.diff;
        updateDifficultyUI();
        initGame();
      });
    });

    controlBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const dir = directions[btn.dataset.dir];
        if (dir) changeDirection(dir);
      });
    });

    // Touch swipe controls
    let touchStart = null;
    const minSwipeDistance = 30;

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
      // Start game on first touch if not started
      if (!gameStarted && !gameOver) {
        startGame();
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      if (!touchStart) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance >= minSwipeDistance) {
        if (Math.abs(dx) > Math.abs(dy)) {
          // Horizontal swipe
          changeDirection(dx > 0 ? directions.right : directions.left);
        } else {
          // Vertical swipe
          changeDirection(dy > 0 ? directions.down : directions.up);
        }
      }
      touchStart = null;
    }, { passive: false });

    // Prevent default touch behaviors
    document.addEventListener('touchstart', (e) => {
      if (e.target === canvas) e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (e.target === canvas) e.preventDefault();
    }, { passive: false });

      const DEFAULT_SNAKE_HEX = "#4ad";

      function parseHexColor(hex) {
        if (typeof hex !== "string") return null;
        let str = hex.trim();
        if (str.startsWith("#")) str = str.slice(1);
        if (str.length === 3) {
          const r = str[0];
          const g = str[1];
          const b = str[2];
          str = `${r}${r}${g}${g}${b}${b}`;
        }
        if (str.length !== 6 || /[^0-9a-f]/i.test(str)) return null;
        const num = parseInt(str, 16);
        return {
          r: (num >> 16) & 255,
          g: (num >> 8) & 255,
          b: num & 255
        };
      }

      function rgbToCss({ r, g, b }) {
        return `rgb(${r}, ${g}, ${b})`;
      }

      function scaleRgb(rgb, factor) {
        const clampComponent = (value) => Math.max(0, Math.min(255, Math.round(value)));
        return {
          r: clampComponent(rgb.r * factor),
          g: clampComponent(rgb.g * factor),
          b: clampComponent(rgb.b * factor)
        };
      }

      function getSnakePaint() {
        const fallback = parseHexColor(DEFAULT_SNAKE_HEX);
        if (typeof snakeSkinStyle !== "function") {
          return { hex: DEFAULT_SNAKE_HEX, rgb: fallback };
        }
        const raw = snakeSkinStyle();
        if (typeof raw !== "string" || raw.trim() === "") {
          return { hex: DEFAULT_SNAKE_HEX, rgb: fallback };
        }
        const named = {
          neon: "#00ff88",
          fire: "#ff6a00",
          cosmic: "#b060ff",
          default: DEFAULT_SNAKE_HEX
        };
        const normalized = raw.trim().toLowerCase();
        const resolved = raw.trim().startsWith("#") ? raw : (named[normalized] ?? raw);
        const parsed = parseHexColor(resolved) || fallback;
        return { hex: resolved, rgb: parsed };
      }

      // --- Render ---
      function draw() {
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.width;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      ctx.strokeStyle = "#1a2a4a";
      ctx.lineWidth = 1;
      for (let i = 0; i <= cfg.gridSize; i++) {
        const pos = i * cfg.cellSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }

      // Draw food
      ctx.fillStyle = "#fa4";
      ctx.beginPath();
      ctx.arc(
        state.food.x * cfg.cellSize + cfg.cellSize / 2,
        state.food.y * cfg.cellSize + cfg.cellSize / 2,
        cfg.cellSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

        // Draw snake
        const { hex: snakeHex, rgb: baseRgb } = getSnakePaint();
        const headRgb = scaleRgb(baseRgb, 1.15);
        const bodyLength = Math.max(state.snake.length, 1);
        const glowHex = typeof snakeHex === "string" ? snakeHex.trim().toLowerCase() : DEFAULT_SNAKE_HEX;

        ctx.shadowBlur = 0;
        ctx.shadowColor = "transparent";
        const useGlow = glowHex === "#00ff88";
        if (useGlow) {
          ctx.save();
          ctx.shadowColor = snakeHex;
          ctx.shadowBlur = 16;
        }

        state.snake.forEach((segment, index) => {
          const x = segment.x * cfg.cellSize;
          const y = segment.y * cfg.cellSize;
          const size = cfg.cellSize - 2;
          
          // Head is brighter
          if (index === 0) {
            ctx.fillStyle = rgbToCss(headRgb);
          } else {
            const brightness = 1 - (index / bodyLength) * 0.3;
            ctx.fillStyle = rgbToCss(scaleRgb(baseRgb, Math.max(0.4, brightness)));
          }
          
          ctx.fillRect(x + 1, y + 1, size, size);
        });

        if (useGlow) {
          ctx.restore();
        }

      // Game over overlay
      if (gameOver) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#0b1020";
        ctx.fillRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#2a3a5f";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
        ctx.fillStyle = "#e7f0ff";
        ctx.font = "28px system-ui,Segoe UI,Roboto,Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      // Paused overlay
      if (paused && gameStarted) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#0b1020";
        ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 - 30, 200, 60);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#2a3a5f";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 100, canvas.height / 2 - 30, 200, 60);
        ctx.fillStyle = "#e7f0ff";
        ctx.font = "24px system-ui,Segoe UI,Roboto,Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Paused", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }
    }

    // --- Main Loop ---
    function loop(ts) {
      const dt = (ts - lastT) / 1000 || 0;
      lastT = ts;

      if (gameStarted && !paused && !gameOver) {
        // Move snake at intervals
        if (ts >= nextMoveTime) {
          moveSnake();
          nextMoveTime = ts + state.speed;
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    initGame();
    requestAnimationFrame(loop);
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "snake", gameName: "Snake" });
  </script>
</body>
</html>
