<script type="module">
import { state as profileState, addCoins } from '/src/core/state.js';
import { mountGameFeedback } from '/src/feedback/embed.js';

const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const el={level:document.getElementById('levelLabel'),visited:document.getElementById('visitedLabel'),moves:document.getElementById('movesLabel'),time:document.getElementById('timeLabel'),hints:document.getElementById('hintLabel'),coins:document.getElementById('coinsLabel'),start:document.getElementById('startBtn'),next:document.getElementById('nextBtn'),hint:document.getElementById('hintBtn'),undo:document.getElementById('undoBtn'),pause:document.getElementById('pauseBtn'),restart:document.getElementById('restartBtn'),visit:document.getElementById('visitBtn'),full:document.getElementById('fullBtn'),live:document.getElementById('liveStatus')};
const KNIGHT_MOVES=[[2,1],[1,2],[-1,2],[-2,1],[-2,-1],[-1,-2],[1,-2],[2,-1]];
const LEVELS=[
  {name:'Courtyard',rows:5,cols:5,tour:[0,11,20,17,24,13,4,7,18,9,2,5,16,23,14,3,6,15,22,19,8,1,12,21,10]},

  {name:'Rose Keep',rows:6,cols:6,tour:[0,13,24,32,28,17,4,8,12,1,9,5,16,29,21,34,23,10,2,6,19,30,26,15,11,3,7,20,33,25,14,22,35,27,31,18]},

  {name:'Crown Court',rows:7,cols:7,tour:[0,15,2,7,22,35,44,39,48,33,20,5,10,1,14,9,4,13,18,27,12,3,8,17,26,41,46,31,40,45,36,21,30,43,28,23,38,47,34,25,16,11,6,19,32,37,24,29,42]},
];
const game={mode:'menu',resumeMode:'playing',levelIndex:0,visited:[0],visitedSet:new Set([0]),current:0,focus:11,moves:0,totalMoves:0,hints:0,undos:0,elapsedMs:0,campaignMs:0,hintCell:null,hintTimer:0,invalidCell:null,invalidTimer:0,rewardedLevels:new Set(),lastCoins:0,coinsEarned:0,status:'Visit every square exactly once using chess knight moves.',lastAction:{type:'ready'},pulse:0};
let view={width:canvas.width,height:canvas.height,boardX:170,boardY:80,cell:96,boardW:480,boardH:480};
let manualUntil=0,lastFrame=performance.now();

function level(){return LEVELS[game.levelIndex]}
function rc(id,l=level()){return{r:Math.floor(id/l.cols),c:id%l.cols}}
function idAt(r,c,l=level()){return r*l.cols+c}
function inBounds(r,c,l=level()){return r>=0&&r<l.rows&&c>=0&&c<l.cols}
function isKnightMove(a,b,l=level()){const aa=rc(a,l),bb=rc(b,l),dr=Math.abs(aa.r-bb.r),dc=Math.abs(aa.c-bb.c);return(dr===2&&dc===1)||(dr===1&&dc===2)}
function legalMoves(from=game.current){const l=level(),p=rc(from,l),out=[];for(const[dr,dc]of KNIGHT_MOVES){const r=p.r+dr,c=p.c+dc,id=idAt(r,c,l);if(inBounds(r,c,l)&&!game.visitedSet.has(id))out.push(id)}return out}
function resetBoard(message='Board restarted. Find a fresh route.'){const start=level().tour[0];game.mode='playing';game.resumeMode='playing';game.visited=[start];game.visitedSet=new Set([start]);game.current=start;game.focus=level().tour[1];game.moves=0;game.elapsedMs=0;game.hintCell=null;game.hintTimer=0;game.invalidCell=null;game.invalidTimer=0;game.lastCoins=0;game.status=message;game.lastAction={type:'board-reset',level:game.levelIndex+1};syncUi();render()}
function startCampaign(){game.levelIndex=0;game.totalMoves=0;game.hints=0;game.undos=0;game.campaignMs=0;game.coinsEarned=0;game.rewardedLevels=new Set();resetBoard('Courtyard tour started. Gold dots mark legal landings.');game.lastAction={type:'campaign-start'};syncUi();render()}
function restart(){if(game.mode==='menu'||game.mode==='won'){startCampaign();return}resetBoard()}
function moveTo(target,source='move'){if(game.mode!=='playing')return false;const l=level();target=Number(target);if(!Number.isInteger(target)||target<0||target>=l.rows*l.cols||game.visitedSet.has(target)||!isKnightMove(game.current,target,l)){game.invalidCell=Number.isInteger(target)?target:null;game.invalidTimer=650;game.status=game.visitedSet.has(target)?'That square was already visited.':'Knights move two squares, then one sideways.';game.lastAction={type:'invalid-move',target,source};syncUi();render();return false}game.visited.push(target);game.visitedSet.add(target);game.current=target;game.focus=target;game.moves++;game.totalMoves++;game.hintCell=null;game.hintTimer=0;game.status=`Square ${game.visited.length} of ${l.rows*l.cols} secured.`;game.lastAction={type:'move',source,target,step:game.visited.length};evaluateBoard();syncUi();render();return true}
function awardLevel(final=false){if(game.rewardedLevels.has(game.levelIndex))return 0;const amount=5+game.levelIndex*2+(final?15:0);addCoins(amount);game.rewardedLevels.add(game.levelIndex);game.coinsEarned+=amount;return amount}
function evaluateBoard(){const l=level(),total=l.rows*l.cols;if(game.visited.length===total){const final=game.levelIndex===LEVELS.length-1;game.mode=final?'won':'level-complete';game.lastCoins=awardLevel(final);game.status=final?`Crown Tour complete! ${game.lastCoins} coins awarded.`:`${l.name} complete! ${game.lastCoins} coins awarded.`;game.lastAction={type:final?'campaign-win':'level-complete',level:game.levelIndex+1,moves:game.moves,coins:game.lastCoins};return}const options=legalMoves();if(!options.length){game.mode='failed';game.status=`Route blocked after ${game.visited.length} squares. Undo or restart.`;game.lastAction={type:'dead-end',visited:game.visited.length,total}}}
function nextLevel(){if(game.mode!=='level-complete')return false;game.levelIndex++;resetBoard(`${level().name} opened. Visit all ${level().rows*level().cols} squares.`);game.lastAction={type:'next-level',level:game.levelIndex+1};return true}
function undo(){if(!['playing','failed'].includes(game.mode)||game.visited.length<=1)return false;const removed=game.visited.pop();game.visitedSet.delete(removed);game.current=game.visited.at(-1);game.focus=removed;game.mode='playing';game.undos++;game.hintCell=null;game.hintTimer=0;game.status=`Move undone. ${legalMoves().length} legal landings available.`;game.lastAction={type:'undo',removed,current:game.current};syncUi();render();return true}
function onwardDegree(id){const l=level(),p=rc(id,l);let count=0;for(const[dr,dc]of KNIGHT_MOVES){const r=p.r+dr,c=p.c+dc,target=idAt(r,c,l);if(inBounds(r,c,l)&&!game.visitedSet.has(target)&&target!==id)count++}return count}
function hint(){if(game.mode!=='playing')return false;const options=legalMoves();if(!options.length){evaluateBoard();syncUi();render();return false}const l=level(),isPrefix=game.visited.every((id,index)=>l.tour[index]===id);let choice=isPrefix&&options.includes(l.tour[game.visited.length])?l.tour[game.visited.length]:[...options].sort((a,b)=>onwardDegree(a)-onwardDegree(b)||a-b)[0];game.hintCell=choice;game.focus=choice;game.hintTimer=2600;game.hints++;game.status='The blue beacon marks a promising landing.';game.lastAction={type:'hint',target:choice,legal_options:options};syncUi();render();return true}
function togglePause(){if(game.mode==='playing'){game.mode='paused';game.resumeMode='playing';game.status='Tour paused. The board is waiting.';game.lastAction={type:'pause'}}else if(game.mode==='paused'){game.mode=game.resumeMode;game.status='Tour resumed.';game.lastAction={type:'resume'}}syncUi();render()}
async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen?.();else await document.exitFullscreen?.()}catch(error){game.status='Fullscreen is unavailable in this browser.';game.lastAction={type:'fullscreen-error',message:String(error?.message||error)}}resizeCanvas()}
function moveFocus(dx,dy){if(!['playing','failed'].includes(game.mode))return;const l=level(),p=rc(game.focus,l),r=Math.max(0,Math.min(l.rows-1,p.r+dy)),c=Math.max(0,Math.min(l.cols-1,p.c+dx));game.focus=idAt(r,c,l);game.lastAction={type:'focus',target:game.focus};render()}
function update(ms){const safe=Math.max(0,Math.min(5000,Number(ms)||0));game.pulse=(game.pulse+safe/700)%(Math.PI*2);if(game.mode==='playing'){game.elapsedMs+=safe;game.campaignMs+=safe}if(game.hintTimer>0){game.hintTimer=Math.max(0,game.hintTimer-safe);if(!game.hintTimer)game.hintCell=null}if(game.invalidTimer>0){game.invalidTimer=Math.max(0,game.invalidTimer-safe);if(!game.invalidTimer)game.invalidCell=null}syncUi()}
function computeView(){const l=level(),width=canvas.width,height=canvas.height,pad=Math.max(34,Math.min(width,height)*.075),top=Math.max(70,height*.11),availableW=width-pad*2,availableH=height-top-pad*.7,cell=Math.floor(Math.min(availableW/l.cols,availableH/l.rows)),boardW=cell*l.cols,boardH=cell*l.rows;view={width,height,cell,boardW,boardH,boardX:(width-boardW)/2,boardY:top+(availableH-boardH)/2};return view}
function resizeCanvas(){const rect=canvas.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1),w=Math.max(320,Math.round(rect.width*dpr)),h=Math.max(280,Math.round(rect.height*dpr));if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h}computeView();render()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,Math.min(r,w/2,h/2))}
function cellCenter(id){const p=rc(id),s=view.cell;return{x:view.boardX+(p.c+.5)*s,y:view.boardY+(p.r+.5)*s}}
function drawBackground(){const v=view,g=ctx.createLinearGradient(0,0,0,v.height);g.addColorStop(0,'#d5edf0');g.addColorStop(.55,'#e8e9c6');g.addColorStop(1,'#b8c993');ctx.fillStyle=g;ctx.fillRect(0,0,v.width,v.height);ctx.fillStyle='#ffffff78';for(let i=0;i<9;i++){const x=(i*.137+.03)*v.width,y=v.height*(.16+.025*Math.sin(i*2.1));ctx.beginPath();ctx.arc(x,y,Math.max(12,v.width*.018),0,Math.PI*2);ctx.fill()}ctx.fillStyle='#78936d';ctx.fillRect(0,v.height*.89,v.width,v.height*.11);ctx.globalAlpha=.2;ctx.fillStyle='#213349';for(let i=0;i<7;i++){const x=(i+.25)*v.width/6;ctx.beginPath();ctx.moveTo(x,v.height*.89);ctx.lineTo(x+v.width*.045,v.height*.7);ctx.lineTo(x+v.width*.09,v.height*.89);ctx.fill()}ctx.globalAlpha=1}
function drawHeader(){const v=view,w=Math.min(v.width*.72,600),x=(v.width-w)/2,y=Math.max(13,v.height*.025);ctx.save();roundRect(x,y,w,Math.max(48,v.height*.075),15);ctx.fillStyle='#fffaf0e8';ctx.fill();ctx.strokeStyle='#d39b3b';ctx.lineWidth=3;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#213349';ctx.font=`900 ${Math.max(19,Math.min(32,v.width*.034))}px Inter,system-ui`;ctx.fillText(`KNIGHT'S TOUR · ${level().name.toUpperCase()}`,v.width/2,y+Math.max(48,v.height*.075)/2);ctx.restore()}
function drawBoard(){const v=view,l=level(),s=v.cell;ctx.save();ctx.shadowColor='#21334945';ctx.shadowBlur=Math.max(14,s*.18);ctx.shadowOffsetY=Math.max(7,s*.08);roundRect(v.boardX-8,v.boardY-8,v.boardW+16,v.boardH+16,18);ctx.fillStyle='#fff5df';ctx.fill();ctx.shadowColor='transparent';for(let r=0;r<l.rows;r++)for(let c=0;c<l.cols;c++){const id=idAt(r,c,l),x=v.boardX+c*s,y=v.boardY+r*s,visited=game.visitedSet.has(id);ctx.fillStyle=visited?'#d8a945':(r+c)%2?'#b8cab0':'#edf0cf';ctx.fillRect(x,y,s,s);ctx.strokeStyle='#21334928';ctx.lineWidth=Math.max(1,s*.018);ctx.strokeRect(x,y,s,s)}ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#fff5b7b8';ctx.lineWidth=Math.max(4,s*.09);ctx.beginPath();game.visited.forEach((id,index)=>{const p=cellCenter(id);if(index)ctx.lineTo(p.x,p.y);else ctx.moveTo(p.x,p.y)});ctx.stroke();ctx.strokeStyle='#8c5b24c4';ctx.lineWidth=Math.max(2,s*.035);ctx.stroke();const options=new Set(game.mode==='playing'?legalMoves():[]);for(let r=0;r<l.rows;r++)for(let c=0;c<l.cols;c++){const id=idAt(r,c,l),p=cellCenter(id),step=game.visited.indexOf(id);if(step>=0&&id!==game.current){ctx.fillStyle='#49351f';ctx.font=`850 ${Math.max(10,s*.2)}px Inter,system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(step+1),p.x,p.y)}if(options.has(id)){ctx.beginPath();ctx.arc(p.x,p.y,Math.max(5,s*.075),0,Math.PI*2);ctx.fillStyle='#347a65';ctx.fill()}if(id===game.hintCell&&game.hintTimer>0){ctx.beginPath();ctx.arc(p.x,p.y,Math.max(13,s*(.17+.025*Math.sin(game.pulse))),0,Math.PI*2);ctx.strokeStyle='#287cc4';ctx.lineWidth=Math.max(4,s*.055);ctx.stroke()}if(id===game.focus){ctx.strokeStyle='#245b91';ctx.lineWidth=Math.max(3,s*.045);ctx.strokeRect(v.boardX+c*s+3,v.boardY+r*s+3,s-6,s-6)}if(id===game.invalidCell&&game.invalidTimer>0){ctx.fillStyle='#d74f46aa';ctx.fillRect(v.boardX+c*s,v.boardY+r*s,s,s)}}const current=cellCenter(game.current);ctx.fillStyle='#26364c';ctx.font=`900 ${Math.max(30,s*.61)}px Georgia,serif`;ctx.textAlign='center';ctx.te function overlay(title,lines,accent='#d89a31'){const v=view,w=Math.min(v.width*.76,680),h=Math.min(v.height*.54,350),x=(v.width-w)/2,y=(v.height-h)/2;ctx.save();ctx.fillStyle='#15283cba';ctx.fillRect(0,0,v.width,v.height);roundRect(x,y,w,h,24);ctx.fillStyle='#fffaf0f4';ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=5;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#213349';ctx.font=`900 ${Math.max(27,Math.min(47,w*.07))}px Inter,system-ui`;ctx.fillText(title,x+w/2,y+h*.24);ctx.font=`750 ${Math.max(14,Math.min(21,w*.032))}px Inter,system-ui`;lines.forEach((line,i)=>ctx.fillText(line,x+w/2,y+h*(.45+i*.14)));ctx.restore()}
function render(){computeView();drawBackground();drawHeader();drawBoard();if(game.mode==='menu')overlay("KNIGHT'S TOUR",['Move in an L: two squares, then one sideways.','Visit every square once without getting trapped.','Tap a gold dot or focus it and press Space.']);else if(game.mode==='paused')overlay('TOUR PAUSED',['The route is safely held.','Press P or Pause to continue.']);else if(game.mode==='failed')overlay('ROUTE BLOCKED',[`${game.visited.length} of ${level().rows*level().cols} squares visited.`,'Undo the last move or restart this board.'],'#cf5b4f');else if(game.mode==='level-complete')overlay(`${level().name.toUpperCase()} COMPLETE`,[`${game.visited.length} squares · ${game.moves} moves.`,`${game.lastCoins} coins awarded.`,'Press Enter or Next board.'],'#4b9b70');else if(game.mode==='won')overlay('CROWN TOUR COMPLETE',[`${LEVELS.length} boards conquered in ${formatTime(game.campaignMs)}.`,`${game.coinsEarned} campaign coins earned.`,'Press Restart for a new campaign.'],'#4b9b70');syncUi()}
function formatTime(ms){const total=Math.floor(ms/1000),m=Math.floor(total/60),s=String(total%60).padStart(2,'0');return`${m}:${s}`}
function syncUi(){const l=level();el.level.textContent=`${game.levelIndex+1} / ${LEVELS.length}`;el.visited.textContent=`${game.visited.length} / ${l.rows*l.cols}`;el.moves.textContent=String(game.moves);el.time.textContent=formatTime(game.elapsedMs);el.hints.textContent=String(game.hints);el.coins.textContent=String(profileState.coins||0);el.start.hidden=game.mode!=='menu';el.next.hidden=game.mode!=='level-complete';el.hint.disabled=game.mode!=='playing';el.undo.disabled=!['playing','failed'].includes(game.mode)||game.visited.length<=1;el.pause.disabled=!['playing','paused'].includes(game.mode);el.pause.textContent=game.mode==='paused'?'Resume':'Pause';el.visit.disabled=game.mode!=='playing';el.live.textContent=game.status}
function pointerCell(event){const rect=canvas.getBoundingClientRect(),x=(event.clientX-rect.left)*canvas.width/rect.width,y=(event.clientY-rect.top)*canvas.height/rect.height,c=Math.floor((x-view.boardX)/view.cell),r=Math.floor((y-view.boardY)/view.cell);return inBounds(r,c)?idAt(r,c):null}
canvas.addEventListener('pointerdown',event=>{const target=pointerCell(event);if(target===null)return;game.focus=target;if(game.mode==='playing'&&target!==game.current)moveTo(target,'pointer');else render();event.preventDefault()});
el.start.addEventListener('click',startCampaign);el.next.addEventListener('click',nextLevel);el.hint.addEventListener('click',hint);el.undo.addEventListener('click',undo);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restart);el.visit.addEventListener('click',()=>moveTo(game.focus,'visit-button'));el.full.addEventListener('click',toggleFullscreen);document.querySelectorAll('[data-dx]').forEach(button=>button.addEventListener('click',()=>moveFocus(Number(button.dataset.dx),Number(button.dataset.dy))));
document.addEventListener('keydown',event=>{const key=event.key.toLowerCase();if(['arrowleft','arrowright','arrowup','arrowdown',' ','w','a','s','d'].includes(key))event.preventDefault();if((key==='enter'||key===' ')&&game.mode==='menu'){startCampaign();return}if((key==='enter'||key==='n')&&game.mode==='level-complete'){nextLevel();return}if(key==='p'){togglePause();return}if(key==='r'){restart();return}if(key==='f'){toggleFullscreen();return}if(key==='escape'&&document.fullscreenElement){document.exitFullscreen?.();return}if(key==='h'){hint();return}if(key==='u'||key==='backspace'){undo();return}if(key==='arrowleft'||key==='a')moveFocus(-1,0);else if(key==='arrowright'||key==='d')moveFocus(1,0);else if(key==='arrowup'||key==='w')moveFocus(0,-1);else if(key==='arrowdown'||key==='s')moveFocus(0,1);else if(key===' '||key==='enter')moveTo(game.focus,'keyboard')});
document.addEventListener('fullscreenchange',resizeCanvas);window.addEventListener('resize',resizeCanvas);

window.advanceTime=ms=>{manualUntil=performance.now()+120;let left=Math.max(0,Math.min(20000,Number(ms)||0));while(left>0){const step=Math.min(1000/60,left);update(step);left-=step}render()};
window.render_game_to_text=()=>JSON.stringify({coordinate_system:'board cells; origin top-left; row increases down, column increases right',mode:game.mode,paused_from:game.mode==='paused'?game.resumeMode:null,board:{name:level().name,level:game.levelIndex+1,levels:LEVELS.length,rows:level().rows,columns:level().cols,total_squares:level().rows*level().cols},knight:{cell:game.current,...rc(game.current)},focus:{cell:game.focus,...rc(game.focus)},visited_path:game.visited.map((id,index)=>({step:index+1,cell:id,...rc(id)})),legal_moves:legalMoves().map(id=>({cell:id,...rc(id)})),hint:game.hintCell===null?null:{cell:game.hintCell,...rc(game.hintCell),remaining_ms:Math.round(game.hintTimer)},moves:game.moves,total_moves:game.totalMoves,hints_used:game.hints,undos:game.undos,elapsed_ms:Math.round(game.elapsedMs),campaign_ms:Math.round(game.campaignMs),coins_earned:game.coinsEarned,status:game.status,last_action:game.lastAction,controls:{move:'Tap/click a legal square or move focus with arrows/WASD and press Space/Enter',hint:'H',undo:'U or Backspace',pause:'P',restart:'R',fullscreen:'F'}});
window.__KNIGHTS_TOUR_GAME__={getState:()=>game,getView:()=>view,getLevel:()=>level(),moveTo,hint,undo,start:startCampaign,nextLevel,restart,legalMoves,playPath:(path)=>{for(const id of path){if(id!==game.current&&!moveTo(id,'qa-path'))break}return game.mode},solveLevel:()=>{const l=level();if(!game.visited.every((id,index)=>l.tour[index]===id))resetBoard('QA route reset.');for(let i=game.visited.length;i<l.tour.length;i++)moveTo(l.tour[i],'qa-solve');return game.mode},solveCampaign:()=>{while(game.mode!=='won'){window.__KNIGHTS_TOUR_GAME__.solveLevel();if(game.mode==='level-complete')nextLevel();else if(game.mode!=='won')break}return game.mode},deadEnd:()=>{game.levelIndex=0;resetBoard('Testing a risky route.');for(const id of [7,10,17,6,13,2,11,8,19,12,23,14,3])moveTo(id,'qa-dead-end');return game.mode}};
mountGameFeedback({gameSlug:'knightstour',gameName:"Knight's Tour"});
function frame(now){if(now>=manualUntil){const dt=Math.min(50,Math.max(0,now-lastFrame));update(dt);render()}lastFrame=now;requestAnimationFrame(frame)}
resizeCanvas();syncUi();requestAnimationFrame(frame);
</script>
</body>
