  <script type="module">
    import { addCoins as addCoinsFn, rememberRecent, state as appState } from '../src/core/state.js';
    import { maybeUnlock } from '../src/prog/achievements.js';
    rememberRecent('dino');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');

    function resize(){
      const r = container.getBoundingClientRect();
      const aspect = canvas.width / canvas.height;
      if (r.width / r.height > aspect) { canvas.style.height='100%'; canvas.style.width='auto'; }
      else { canvas.style.width='100%'; canvas.style.height='auto'; }
    }
    resize(); addEventListener('resize', resize); addEventListener('orientationchange', ()=>setTimeout(resize,100));

    const GROUND_Y = canvas.height - 90;
    const cfg = {
      speed: 360,
      speedRamp: 0.02, // per second
      gravity: 2200,
      jumpV: -760,
      duckScale: 0.6,
      spawnBase: 1.1, // seconds
      spawnMin: 0.55
    };

    const ACCESS_MODE_KEY = 'dino-access-mode';
    const AUDIO_CUES_KEY = 'dino-audio-cues';

    function readStored(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value == null ? fallback : value;
      } catch {
        return fallback;
      }
    }
    function writeStored(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }

    let lastT=0, started=false, paused=false, over=false, steppingExternally=false, obstacleSeq=0;
    const access = {
      mode: readStored(ACCESS_MODE_KEY, 'visual') === 'audio' ? 'audio' : 'visual',
      audioEnabled: readStored(AUDIO_CUES_KEY, 'on') !== 'off',
      audioAvailable: Boolean(window.AudioContext || window.webkitAudioContext),
      audioCtx: null,
      master: null,
      unlocked: false,
      unlockInFlight: false,
      liveTimer: 0,
      lastStatus: 'Visual mode ready.',
      events: []
    };
    const state = {
      dino: { x: 120, y: GROUND_Y, w: 44, h: 60, vy: 0, duck:false },
      obs: [],
      trail: [],
      score: 0,
      mult: 1.0,
      cleared: 0,
      nextSpawn: 0,
      spd: cfg.speed
    };

    const DINO_TRAIL_ITEM_ID = 'dino-trail';
    const DINO_LIGHTNING_ITEM_ID = 'dino-lightning';
    const inventory = appState.inventory instanceof Set ? appState.inventory : new Set();
    const hasMeteorTrail = inventory.has(DINO_TRAIL_ITEM_ID);
    const hasLightningTrail = inventory.has(DINO_LIGHTNING_ITEM_ID);

    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('high');
    const multEl = document.getElementById('multiplier');
    const hintEl = document.getElementById('hint');
    function getHigh(){ const s=localStorage.getItem('dino-high'); return s?+s:0; }
    function setHigh(v){ const h=getHigh(); if(v>h){ localStorage.setItem('dino-high', String(v)); return true;} return false; }
    function updateHUD(){ scoreEl.textContent = Math.floor(state.score); highEl.textContent = getHigh(); multEl.textContent = state.mult.toFixed(1); }
    const visualModeBtn = document.getElementById('visual-mode');
    const audioOnlyModeBtn = document.getElementById('audio-only-mode');
    const audioCuesBtn = document.getElementById('audio-cues');
    const accessStatusEl = document.getElementById('access-status');
    const livePoliteEl = document.getElementById('live-polite');
    const liveAssertiveEl = document.getElementById('live-assertive');

    function isAudioOnly() { return access.mode === 'audio'; }
    function pushAccessEvent(message) {
      access.events.push(String(message));
      if (access.events.length > 8) access.events.shift();
    }
    function writeLive(el, message) {
      if (!el) return;
      el.textContent = '';
      clearTimeout(access.liveTimer);
      access.liveTimer = setTimeout(() => { el.textContent = message; }, 20);
    }
    function speakText(text, { interrupt = true } = {}) {
      if (!text || !('speechSynthesis' in window)) return;
      try {
        if (interrupt) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.05;
        utterance.pitch = 1;
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
      } catch {}
    }
    function announce(message, { assertive = false, speak = false } = {}) {
      const text = String(message || '').trim();
      if (!text) return;
      access.lastStatus = text;
      accessStatusEl.textContent = text;
      writeLive(assertive ? liveAssertiveEl : livePoliteEl, text);
      pushAccessEvent(text);
      if (speak || isAudioOnly()) speakText(text, { interrupt: assertive || isAudioOnly() });
    }
    function ensureAudioContext() {
      if (!access.audioAvailable || !access.audioEnabled) return null;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!access.audioCtx && AudioCtx) {
        access.audioCtx = new AudioCtx();
        access.master = access.audioCtx.createGain();
        access.master.gain.value = 0.55;
        access.master.connect(access.audioCtx.destination);
      }
      return access.audioCtx;
    }
    function unlockAudioFromInteraction() {
      if (!access.audioEnabled) return;
      const audio = ensureAudioContext();
      if (!audio) {
        access.audioAvailable = false;
        updateAccessUI();
        return;
      }
      if (audio.state === 'running') {
        access.unlocked = true;
        updateAccessUI();
        return;
      }
      if (audio.state === 'suspended' && !access.unlockInFlight) {
        access.unlockInFlight = true;
        audio.resume()
          .then(() => { access.unlocked = audio.state === 'running'; })
          .catch(() => { access.unlocked = false; })
          .finally(() => { access.unlockInFlight = false; updateAccessUI(); });
      }
    }
    function playTone({ frequency = 440, duration = 0.09, type = 'sine', gain = 0.045, pan = 0, startDelay = 0, slideTo = null } = {}) {
      const audio = ensureAudioContext();
      if (!audio || !access.master || !access.unlocked || audio.state !== 'running') return;
      const start = audio.currentTime + Math.max(0, startDelay);
      const osc = audio.createOscillator();
      const amp = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(Math.max(40, frequency), start);
      if (typeof slideTo === 'number') osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), start + duration);
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), start + 0.012);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      if (typeof audio.createStereoPanner === 'function') {
        const panner = audio.createStereoPanner();
        panner.pan.setValueAtTime(clamp(pan, -1, 1), start);
        osc.connect(amp); amp.connect(panner); panner.connect(access.master);
      } else {
        osc.connect(amp); amp.connect(access.master);
      }
      osc.start(start);
      osc.stop(start + duration + 0.04);
    }
    function playJumpCue() {
      playTone({ frequency: 520, slideTo: 880, duration: 0.12, type: 'triangle', gain: 0.06 });
      playTone({ frequency: 980, duration: 0.08, type: 'sine', gain: 0.04, startDelay: 0.08 });
    }
    function playDuckCue() {
      playTone({ frequency: 360, slideTo: 160, duration: 0.16, type: 'sawtooth', gain: 0.055 });
      playTone({ frequency: 170, duration: 0.08, type: 'square', gain: 0.035, startDelay: 0.12 });
    }
    function playHoldCue() {
      playTone({ frequency: 300, duration: 0.08, type: 'sine', gain: 0.03 });
      playTone({ frequency: 300, duration: 0.08, type: 'sine', gain: 0.03, startDelay: 0.12 });
    }
    function playClearCue() {
      playTone({ frequency: 660, duration: 0.08, type: 'triangle', gain: 0.035 });
      playTone({ frequency: 880, duration: 0.12, type: 'triangle', gain: 0.035, startDelay: 0.07 });
    }
    function playCrashCue() {
      playTone({ frequency: 180, slideTo: 80, duration: 0.24, type: 'sawtooth', gain: 0.07 });
    }
    function getDinoBounds() {
      const w = state.dino.w * (state.dino.duck ? cfg.duckScale : 1);
      const h = state.dino.h * (state.dino.duck ? cfg.duckScale : 1);
      return { x: state.dino.x, y: state.dino.y - h, w, h, bottom: state.dino.y };
    }
    function getNextObstacle() {
      return state.obs
        .filter(o => o.x + o.w >= state.dino.x && !o.cleared)
        .sort((a, b) => a.x - b.x)[0] || null;
    }
    function getObstacleAction(obstacle) {
      if (!obstacle) return { action: 'none', label: 'clear path', command: 'Hold steady' };
      if (obstacle.type === 'cactus') return { action: 'jump', label: 'cactus', command: 'Jump' };
      const standingTop = GROUND_Y - state.dino.h;
      const lowBird = obstacle.y + obstacle.h > standingTop + 2;
      return lowBird
        ? { action: 'duck', label: 'low bird', command: 'Duck' }
        : { action: 'hold', label: 'high bird', command: 'Hold steady' };
    }
    function getObstacleDistance(obstacle) {
      if (!obstacle) return null;
      const dino = getDinoBounds();
      return Math.max(0, obstacle.x - (dino.x + dino.w));
    }
    function updateAccessUI() {
      document.body.classList.toggle('audio-only', isAudioOnly());
      visualModeBtn.classList.toggle('active', !isAudioOnly());
      visualModeBtn.setAttribute('aria-pressed', String(!isAudioOnly()));
      audioOnlyModeBtn.classList.toggle('active', isAudioOnly());
      audioOnlyModeBtn.setAttribute('aria-pressed', String(isAudioOnly()));
      audioCuesBtn.classList.toggle('active', access.audioEnabled);
      audioCuesBtn.textContent = access.audioEnabled ? 'Audio Cues On' : 'Audio Cues Off';
      audioCuesBtn.setAttribute('aria-pressed', String(access.audioEnabled));
      audioCuesBtn.disabled = !access.audioAvailable;
      canvas.setAttribute('role', 'img');
      canvas.setAttribute('aria-label', isAudioOnly() ? 'Dino Run visual canvas dimmed in audio-only mode.' : 'Dino Run visual playfield.');
    }
    function setAccessMode(mode, { announceChange = true } = {}) {
      access.mode = mode === 'audio' ? 'audio' : 'visual';
      writeStored(ACCESS_MODE_KEY, access.mode);
      if (isAudioOnly()) access.audioEnabled = true;
      writeStored(AUDIO_CUES_KEY, access.audioEnabled ? 'on' : 'off');
      updateAccessUI();
      if (isAudioOnly()) unlockAudioFromInteraction();
      if (announceChange) {
        announce(isAudioOnly()
          ? 'Audio-only mode. Space jumps. Down arrow ducks. Listen for jump, duck, and hold cues.'
          : 'Visual mode. Audio cues remain available from the cue toggle.',
          { speak: isAudioOnly() });
      }
    }
    function toggleAudioCues() {
      access.audioEnabled = !access.audioEnabled;
      writeStored(AUDIO_CUES_KEY, access.audioEnabled ? 'on' : 'off');
      if (access.audioEnabled) unlockAudioFromInteraction();
      updateAccessUI();
      announce(access.audioEnabled ? 'Audio cues on.' : 'Audio cues off.', { speak: isAudioOnly() });
    }
    function cueObstacle(obstacle, stage) {
      const action = getObstacleAction(obstacle);
      const seconds = getObstacleDistance(obstacle) / Math.max(1, state.spd);
      if (action.action === 'jump') {
        if (stage === 'now') playJumpCue();
        else playTone({ frequency: 640, duration: 0.08, type: 'triangle', gain: 0.04 });
      } else if (action.action === 'duck') {
        if (stage === 'now') playDuckCue();
        else playTone({ frequency: 260, duration: 0.1, type: 'sawtooth', gain: 0.04 });
      } else {
        playHoldCue();
      }
      const soon = seconds > 0.75 ? 'soon' : 'now';
      announce(`${action.command} ${soon}. ${action.label}.`, { assertive: stage === 'now', speak: isAudioOnly() });
    }
    function updateAccessibilityCues() {
      if (!started || paused || over) return;
      const obstacle = getNextObstacle();
      if (!obstacle) return;
      const distance = getObstacleDistance(obstacle);
      const seconds = distance / Math.max(1, state.spd);
      if (seconds <= 0.48 && obstacle.audioStage !== 'now') {
        obstacle.audioStage = 'now';
        cueObstacle(obstacle, 'now');
      } else if (seconds <= 1.2 && !obstacle.audioStage) {
        obstacle.audioStage = 'soon';
        cueObstacle(obstacle, 'soon');
      }
    }

    function start(){
      if(over) init();
      started=true; paused=false; hintEl.textContent='';
      announce('Run started.', { speak: isAudioOnly() });
    }
    function pause(){
      if(started&&!over){
        paused=!paused; hintEl.textContent = paused?'Paused. Tap RESUME to continue.':'';
        announce(paused ? 'Paused.' : 'Resumed.', { speak: isAudioOnly() });
      }
    }
    function init(){
      state.dino = { x:120, y:GROUND_Y, w:44, h:60, vy:0, duck:false };
      state.obs=[]; state.trail=[]; state.score=0; state.mult=1.0; state.cleared=0; state.spd=cfg.speed; state.nextSpawn=0; 
      obstacleSeq = 0;
      started=false; paused=false; over=false; updateHUD(); hintEl.textContent='Tap/Click/Space to jump. Hold ↓ to duck.';
      if (isAudioOnly()) announce('Ready. Space starts and jumps. Down arrow ducks.', { speak: true });
    }

    function spawnTrailParticle({ burst = false } = {}){
      if(!hasMeteorTrail && !hasLightningTrail) return;
      const isLightning = hasLightningTrail;
      const dinoW = state.dino.w * (state.dino.duck ? cfg.duckScale : 1);
      const dinoH = state.dino.h * (state.dino.duck ? cfg.duckScale : 1);
      state.trail.push({
        x: state.dino.x + 2,
        y: state.dino.y - dinoH * (0.2 + Math.random() * 0.6),
        vx: -150 - Math.random() * (isLightning ? 250 : 130) - (burst ? 80 : 0),
        vy: (Math.random() - 0.5) * (burst ? 120 : 60),
        size: isLightning ? 3 + Math.random() * 4 : 2 + Math.random() * 3,
        life: burst ? (isLightning ? 0.35 + Math.random() * 0.2 : 0.4 + Math.random() * 0.25) : (isLightning ? 0.22 + Math.random() * 0.12 : 0.28 + Math.random() * 0.15),
        maxLife: isLightning ? 0.6 : 0.75,
        stretch: burst ? 4 + Math.random() * 2 : 3 + Math.random() * 1.5,
      });
      if (state.trail.length > 120) state.trail.shift();
    }

    function addTrailBurst(){
      if(!hasMeteorTrail && !hasLightningTrail) return;
      const count = hasLightningTrail ? 12 : 8;
      for(let i=0; i<count; i++) spawnTrailParticle({ burst: true });
    }

    function emitRunningTrail(dt){
      if(!hasMeteorTrail && !hasLightningTrail) return;
      const spawnRate = hasLightningTrail ? 70 : 50;
      const particles = Math.max(1, Math.floor(spawnRate * dt));
      for(let i=0; i<particles; i++) spawnTrailParticle();
    }

    function jump(){
      if(!started||paused||over){ if(!started) start(); return; }
      if(state.dino.y>=GROUND_Y-0.5){
        state.dino.vy = cfg.jumpV;
        state.dino.y -= 1;
        addTrailBurst();
        playJumpCue();
        if (isAudioOnly()) announce('Jump.', { speak: false });
      }
    }
    function duck(on){
      if(!started||paused||over) return;
      const nextDuck = on && state.dino.y>=GROUND_Y-0.5;
      if (nextDuck && !state.dino.duck) {
        playDuckCue();
        if (isAudioOnly()) announce('Ducking.', { speak: false });
      }
      state.dino.duck = nextDuck;
    }

    function spawnObstacle(){
      // 70% cacti (small/large), 30% bird (if speed high)
      const r=Math.random();
      if(r<0.7 || state.spd<420){
        const large = Math.random()<0.4;
        const h = large? 70: 50;
        const w = large? 26: 18;
        state.obs.push({ id:++obstacleSeq, type:'cactus', x: canvas.width+40, y: GROUND_Y-h, w, h, audioStage:'' });
      } else {
        const y = GROUND_Y - (80 + Math.random()*80);
        state.obs.push({ id:++obstacleSeq, type:'bird', x: canvas.width+40, y, w: 46, h: 32, flapT:0, audioStage:'' });
      }
    }

    function update(dt){
      if(!started||paused||over) return;
      // speed ramp
      state.spd += cfg.speedRamp * state.spd * dt;
      // spawn timer shortens with speed
      state.nextSpawn -= dt;
      const spawnInterval = Math.max(cfg.spawnMin, cfg.spawnBase * (360/state.spd));
      if(state.nextSpawn<=0){ spawnObstacle(); state.nextSpawn = spawnInterval; }

      // dino physics
      state.dino.vy += cfg.gravity*dt; state.dino.y += state.dino.vy*dt; if(state.dino.y>GROUND_Y){ state.dino.y=GROUND_Y; state.dino.vy=0; }
      emitRunningTrail(dt);

      // move obstacles
      for(const o of state.obs){
        o.x -= state.spd*dt;
        if(o.type==='bird'){ o.flapT += dt*6; }
      }
      // update jump trail particles
      for(const p of state.trail){
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
      }
      state.trail = state.trail.filter(p => p.life > 0);
      // remove passed
      state.obs = state.obs.filter(o=> o.x+o.w> -60);

      // scoring: distance + cleared obstacles increases multiplier every 10
      state.score += (state.spd*dt) * 0.05 * state.mult;
      updateHUD();
      updateAccessibilityCues();

      // collisions and clear detection
      for(const o of state.obs){
        const dinoW = state.dino.w * (state.dino.duck? cfg.duckScale: 1);
        const dinoH = state.dino.h * (state.dino.duck? cfg.duckScale: 1);
        const dx1 = state.dino.x, dy1 = state.dino.y - dinoH;
        const dx2 = dx1 + dinoW, dy2 = state.dino.y;
        const ox1 = o.x, oy1 = o.y, ox2 = o.x + o.w, oy2 = o.y + o.h;
        if(dx1<ox2 && dx2>ox1 && dy1<oy2 && dy2>oy1){
          // hit
          over = true; started=false;
          playCrashCue();
          const newHigh = setHigh(Math.floor(state.score)); 
          // Award coins: Math.floor(distance / 50) where distance is state.score
          const coins = Math.floor(state.score / 50);
          if (coins > 0) addCoinsFn(coins);
          // Check achievements: dino-300 (300+ distance), first-run
          maybeUnlock({ anyPlay: true, dino: { dist: state.score } });
          updateHUD();
          hintEl.textContent = newHigh? `🎉 New High! ${Math.floor(state.score)}` : `Game Over! Score: ${Math.floor(state.score)}`;
          announce(newHigh ? `New high score ${Math.floor(state.score)}.` : `Game over. Score ${Math.floor(state.score)}.`, { assertive: true, speak: true });
          return;
        }
        if(!o.cleared && ox2 < state.dino.x){
          o.cleared=true; state.cleared++;
          playClearCue();
          if (isAudioOnly()) announce(`Cleared ${getObstacleAction(o).label}. Score ${Math.floor(state.score)}.`);
          if(state.cleared%10===0){ state.mult = Math.min(5.0, state.mult+0.1); announce(`Multiplier ${state.mult.toFixed(1)}.`, { speak: isAudioOnly() }); }
        }
      }
      // decay multiplier slowly when idle (no clears)
      state.mult = Math.max(1.0, state.mult - dt*0.005);
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // ground
      ctx.fillStyle = '#1a253f';
      ctx.fillRect(0, GROUND_Y+1, canvas.width, 3);
      // parallax dots
      ctx.globalAlpha=0.2; ctx.fillStyle='#9fb3d6';
      for(let i=0;i<60;i++){ ctx.fillRect((i*60 - (performance.now()/40)%60), 120+ (i%5)*30, 2, 2); }
      ctx.globalAlpha=1;

      // obstacles
      ctx.fillStyle = '#2a7a2a';
      for(const o of state.obs){
        if(o.type==='cactus'){
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.fillRect(o.x-6, o.y+o.h-20, 6, 20);
          ctx.fillRect(o.x+o.w, o.y+o.h-26, 6, 26);
        } else {
          // bird: body + flapping wings
          ctx.fillStyle = '#cfcf22';
          ctx.fillRect(o.x, o.y+8, o.w, 16);
          const up = Math.floor(o.flapT)%2===0; ctx.fillStyle='#e7f0ff';
          if(up){ ctx.fillRect(o.x+10, o.y, 14, 10); ctx.fillRect(o.x+22, o.y+22, 14, 10); }
          else { ctx.fillRect(o.x+10, o.y+20, 14, 10); ctx.fillRect(o.x+22, o.y, 14, 10); }
          ctx.fillStyle = '#2a7a2a';
        }
      }

      // dino
      if(state.trail.length){
        for(const p of state.trail){
          const alpha = Math.max(0, p.life / p.maxLife);
          ctx.globalAlpha = alpha;
          if(hasLightningTrail){
            ctx.fillStyle = Math.random() < 0.5 ? '#fde047' : '#ffffff';
            ctx.fillRect(p.x, p.y, p.size * 1.4, Math.max(2, p.size * 0.5));
          } else {
            const gradient = ctx.createLinearGradient(p.x, p.y, p.x + p.size * 4, p.y);
            gradient.addColorStop(0, '#22d3ee');
            gradient.addColorStop(1, '#a855f7');
            ctx.fillStyle = gradient;
            ctx.fillRect(p.x, p.y, p.size * p.stretch, Math.max(2, p.size * 0.9));
          }
        }
        ctx.globalAlpha = 1;
      }

      const w = state.dino.w * (state.dino.duck? cfg.duckScale: 1);
      const h = state.dino.h * (state.dino.duck? cfg.duckScale: 1);
      const x = state.dino.x;
      const y = state.dino.y;
      const stride = Math.max(1, Math.floor(state.spd / 300));
      const isRunning = started && !over && state.dino.y >= GROUND_Y - 0.5;
      const step = isRunning ? Math.floor(performance.now() / 95) % 2 : 0;
      const legLiftA = step ? stride : 0;
      const legLiftB = step ? 0 : stride;
      const duckOffset = state.dino.duck ? h * 0.15 : 0;

      // T-rex tail: low and thick near hips, tapering backward
      ctx.fillStyle = '#aab8cf';
      ctx.fillRect(x - w * 0.32, y - h * 0.34 + duckOffset, w * 0.24, h * 0.11);
      ctx.fillRect(x - w * 0.2, y - h * 0.42 + duckOffset, w * 0.14, h * 0.08);

      // main body (horizontal, chunky)
      ctx.fillStyle = '#e7f0ff';
      ctx.fillRect(x, y - h * 0.6 + duckOffset, w * 0.58, h * 0.42);
      ctx.fillRect(x + w * 0.1, y - h * 0.72 + duckOffset, w * 0.22, h * 0.12);

      // neck and oversized T-rex skull
      ctx.fillRect(x + w * 0.5, y - h * 0.78 + duckOffset, w * 0.14, h * 0.18);
      ctx.fillRect(x + w * 0.58, y - h * 1.0 + duckOffset, w * 0.34, h * 0.3);

      // short jaw + teeth strip
      ctx.fillStyle = '#d3deef';
      ctx.fillRect(x + w * 0.84, y - h * 0.84 + duckOffset, w * 0.14, h * 0.09);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + w * 0.86, y - h * 0.79 + duckOffset, w * 0.09, h * 0.03);

      // tiny T-rex arms (small and tucked in)
      ctx.fillStyle = '#e7f0ff';
      ctx.fillRect(x + w * 0.49, y - h * 0.52 + duckOffset, w * 0.06, h * 0.06);
      ctx.fillRect(x + w * 0.53, y - h * 0.46 + duckOffset, w * 0.05, h * 0.05);

      // powerful hind legs
      const rearLegH = h * 0.35;
      const frontLegH = h * 0.3;
      ctx.fillRect(x + w * 0.15, y - rearLegH + legLiftA + duckOffset, w * 0.16, rearLegH - legLiftA);
      ctx.fillRect(x + w * 0.36, y - frontLegH + legLiftB + duckOffset, w * 0.15, frontLegH - legLiftB);

      // broad feet
      ctx.fillRect(x + w * 0.1, y - 6 + duckOffset, w * 0.24, 6);
      ctx.fillRect(x + w * 0.32, y - 6 + duckOffset, w * 0.22, 6);

      // eye
      ctx.fillStyle = '#0b1020';
      ctx.fillRect(x + w * 0.7, y - h * 0.9 + duckOffset, w * 0.06, h * 0.06);

      // overlays
      if(over){
        ctx.save(); ctx.globalAlpha=0.85; ctx.fillStyle='#0b1020'; ctx.fillRect(canvas.width/2-160, canvas.height/2-40, 320, 80); ctx.globalAlpha=1; ctx.strokeStyle='#2a3a5f'; ctx.lineWidth=2; ctx.strokeRect(canvas.width/2-160, canvas.height/2-40, 320, 80); ctx.fillStyle='#e7f0ff'; ctx.font='24px system-ui,Segoe UI,Roboto,Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Game Over', canvas.width/2, canvas.height/2); ctx.restore();
      }
      if(paused && started){ ctx.save(); ctx.globalAlpha=0.85; ctx.fillStyle='#0b1020'; ctx.fillRect(canvas.width/2-120, canvas.height/2-30, 240, 60); ctx.globalAlpha=1; ctx.strokeStyle='#2a3a5f'; ctx.lineWidth=2; ctx.strokeRect(canvas.width/2-120, canvas.height/2-30, 240, 60); ctx.fillStyle='#e7f0ff'; ctx.font='20px system-ui,Segoe UI,Roboto,Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Paused', canvas.width/2, canvas.height/2); ctx.restore(); }
    }

    // Input
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const restartBtn = document.getElementById('restart');
    startBtn.addEventListener('click', () => { unlockAudioFromInteraction(); start(); });
    pauseBtn.addEventListener('click', () => { unlockAudioFromInteraction(); pause(); });
    restartBtn.addEventListener('click', () => { unlockAudioFromInteraction(); init(); });
    visualModeBtn.addEventListener('click', () => { unlockAudioFromInteraction(); setAccessMode('visual'); });
    audioOnlyModeBtn.addEventListener('click', () => { unlockAudioFromInteraction(); setAccessMode('audio'); });
    audioCuesBtn.addEventListener('click', () => { unlockAudioFromInteraction(); toggleAudioCues(); });
    canvas.addEventListener('click', ()=> { unlockAudioFromInteraction(); jump(); });
    document.addEventListener('touchstart', e=>{ if(e.target===canvas){ e.preventDefault(); unlockAudioFromInteraction(); jump(); } }, { passive:false });
    document.addEventListener('touchend', e=>{ if(e.target===canvas){ e.preventDefault(); duck(false); } }, { passive:false });
    addEventListener('keydown', e=>{
      unlockAudioFromInteraction();
      if(e.code==='Space' || e.code==='ArrowUp'){ e.preventDefault(); jump(); }
      if(e.code==='ArrowDown'){ e.preventDefault(); duck(true);}
      if(e.code==='KeyP'){ pause(); }
      if(e.code==='KeyR'){ init(); }
      if(e.code==='KeyA'){ setAccessMode('audio'); }
      if(e.code==='KeyV'){ setAccessMode('visual'); }
      if(e.code==='KeyM'){ toggleAudioCues(); }
    });
    addEventListener('keyup', e=>{ if(e.code==='ArrowDown'){ duck(false); } });

    function stepSimulation(ms){
      let remaining = clamp(Number(ms) || 0, 0, 5000) / 1000;
      while (remaining > 0) {
        const dt = Math.min(1 / 120, remaining);
        update(dt);
        remaining -= dt;
      }
      updateHUD();
      draw();
    }
    window.advanceTime = (ms) => {
      steppingExternally = true;
      stepSimulation(ms);
      steppingExternally = false;
    };
    window.render_game_to_text = () => {
      const next = getNextObstacle();
      const nextDistance = getObstacleDistance(next);
      const action = getObstacleAction(next);
      return JSON.stringify({
        coordinate_system: { origin: 'top-left', x_axis: 'right', y_axis: 'down', units: 'pixels', width: canvas.width, height: canvas.height, ground_y: GROUND_Y },
        game: 'dino',
        mode: over ? 'game_over' : paused ? 'paused' : started ? 'playing' : 'ready',
        score: Math.floor(state.score),
        high_score: getHigh(),
        multiplier: Number(state.mult.toFixed(2)),
        speed: Number(state.spd.toFixed(2)),
        dino: {
          x: Number(state.dino.x.toFixed(2)),
          y: Number(state.dino.y.toFixed(2)),
          vy: Number(state.dino.vy.toFixed(2)),
          ducking: state.dino.duck,
          on_ground: state.dino.y >= GROUND_Y - 0.5,
          bounds: getDinoBounds()
        },
        next_obstacle: next ? {
          id: next.id,
          type: next.type,
          x: Number(next.x.toFixed(2)),
          y: Number(next.y.toFixed(2)),
          w: next.w,
          h: next.h,
          distance_px: Number(nextDistance.toFixed(2)),
          time_to_reach_sec: Number((nextDistance / Math.max(1, state.spd)).toFixed(2)),
          recommended_action: action.action,
          label: action.label,
          audio_stage: next.audioStage || 'none'
        } : null,
        obstacles: state.obs.slice(0, 4).map(o => ({ id:o.id, type:o.type, x:Number(o.x.toFixed(2)), y:Number(o.y.toFixed(2)), w:o.w, h:o.h, cleared:!!o.cleared })),
        controls: { jump: 'Space or ArrowUp or tap', duck: 'ArrowDown', audio_only_mode: 'KeyA', visual_mode: 'KeyV', audio_cues: 'KeyM', pause: 'KeyP', restart: 'KeyR' },
        accessibility: {
          mode: access.mode,
          audio_cues_enabled: access.audioEnabled,
          audio_available: access.audioAvailable,
          audio_unlocked: access.unlocked,
          last_status: access.lastStatus,
          recent_events: access.events.slice(-6)
        }
      });
    };

    function loop(ts){
      const dt = Math.min(1/30, (ts-lastT)/1000)||0;
      lastT=ts;
      if (!steppingExternally) {
        update(dt);
        draw();
      }
      requestAnimationFrame(loop);
    }
    setAccessMode(access.mode, { announceChange: false });
    init(); updateHUD(); requestAnimationFrame(loop);
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "dino", gameName: "Dino Run" });
  </script>
</body>
