name: Automation Auto Merge

on:
  workflow_run:
    workflows: [Automation Premerge Gate]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].head.repo.full_name == github.repository &&
      startsWith(github.event.workflow_run.pull_requests[0].head.ref, 'automation/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable squash auto-merge from trusted workflow context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash

