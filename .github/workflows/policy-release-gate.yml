name: Policy Release Gate

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate policy release gate
        run: npm run test:policy-gate
