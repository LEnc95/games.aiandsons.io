name: Main QA

# The repo ships by committing straight to main (including the daily
# codex-generated game), so this is the post-push safety net: fast unit
# and integration suites plus the new-game preflight. No Playwright.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: New-Game Preflight
        run: npm run game:preflight

      - name: Shop / Billing / Entitlements Tests
        run: npm run test:shop

      - name: Social / Discovery Tests
        run: npm run test:social
