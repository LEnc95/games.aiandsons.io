<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  touch-action: none;
  font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
  color: #132231;
  background:
    linear-gradient(135deg, #eef6f0 0%, #b7e0d5 34%, #4a92a5 66%, #2c3a58 100%);
}
.back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 30;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 800;
  border-radius: 8px;
  border: 1px solid #ffffff73;
  padding: 8px 12px;
  background: #00000066;
}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 62px 10px 14px;
}
.stage {
  width: min(96vw, 1040px);
  aspect-ratio: 13 / 8;
  max-height: min(66dvh, 700px);
  position: relative;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 8px;
  border: 2px solid #ffffff88;
  background: #fbf7ea;
  box-shadow: 0 20px 52px #16223d99;
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s ease;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.panel {
  max-width: 700px;
  border-radius: 8px;
  border: 1px solid #ffffff80;
  background: #fffffff2;
  box-shadow: 0 18px 38px #1a284780;
  padding: 16px;
}
h1 { margin: 0 0 8px; font-size: clamp(30px, 4vw, 44px); color: #132231; }
p { margin: 0 0 10px; color: #425367; font-size: clamp(13px, 2vw, 15px); line-height: 1.45; }
.row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
button {
  border: 1px solid #ffffff99;
  background: #226c76;
  color: #f8feff;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 44px;
}
button:focus-visible {
  outline: 3px solid #ffffff;
  outline-offset: 2px;
}
.hud {
  width: min(96vw, 1040px);
  border-radius: 8px;
  border: 1px solid #ffffff66;
  background: #172838f2;
  color: #f7fbff;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  min-height: 48px;
  border-radius: 8px;
  border: 1px solid #ffffff30;
  background: #ffffff12;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #c9dbec;
  font-size: 11px;
  letter-spacing: .05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b { font-size: clamp(14px, 2.1vw, 18px); line-height: 1.1; }
.good b { color: #9af0bd; }
.warn b { color: #ffe091; }
.bad b { color: #ffafa2; }
.controls {
  width: min(96vw, 1040px);
  border-radius: 8px;
  border: 1px solid #ffffff66;
  background: #172838f2;
  display: grid;
  grid-template-columns: repeat(15, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.digit-btn { background: #235c78; }
.utility-btn { background: #4b586b; }
.primary-btn { background: #b75f38; }
.active-toggle {
  background: #d9ad4a;
  color: #17202a;
}
@media (max-width: 980px) {
  .app { justify-content: flex-start; }
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(5, minmax(0, 1fr)); }
}
@media (max-width: 580px) {
  .stage { width: 98vw; max-height: 48dvh; }
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; padding: 8px; }
  .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; padding: 8px; }
  button { min-height: 44px; padding: 9px 10px; }
}
@media (max-width: 580px) and (max-height: 720px) {
  .app { padding: 46px 6px 8px; gap: 6px; }
  .stage { max-height: 24dvh; }
  .controls { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  button { padding: 8px 4px; font-size: 11px; }
}

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const hud = {
  mode: document.getElementById('mode'),
  puzzle: document.getElementById('puzzle'),
  time: document.getElementById('time'),
  remaining: document.getElementById('remaining'),
  mistakes: document.getElementById('mistakes'),
  entryMode: document.getElementById('entryMode'),
  score: document.getElementById('score'),
  coins: document.getElementById('coins'),
};

const W = canvas.width;
const H = canvas.height;
const BOARD = { x: 54, y: 58, size: 522 };
const CELL = BOARD.size / 9;
const PANEL = { x: 626, y: 58, w: 354, h: 522 };
const MISTAKE_LIMIT = 5;

const rawPuzzles = [
  {
    name: 'Warm Grid',
    seconds: 420,
    givens: [
      '530070000',
      '600195000',
      '098000060',
      '800060003',
      '400803001',
      '700020006',
      '060000280',
      '000419005',
      '000080079',
    ],
    solution: [
      '534678912',
      '672195348',
      '198342567',
      '859761423',
      '426853791',
      '713924856',
      '961537284',
      '287419635',
      '345286179',
    ],
  },
  {
    name: 'Middle Run',
    seconds: 480,
    givens: [
      '003020600',
      '900305001',
      '001806400',
      '008102900',
      '700000008',
      '006708200',
      '002609500',
      '800203009',
      '005010300',
    ],
    solution: [
      '483921657',
      '967345821',
      '251876493',
      '548132976',
      '729564138',
      '136798245',
      '372689514',
      '814253769',
      '695417382',
    ],
  },
  {
    name: 'Final Dash',
    seconds: 540,
    givens: [
      '000000907',
      '000420180',
      '000705026',
      '100904000',
      '050000040',
      '000507009',
      '920108000',
      '034059000',
      '507000000',
    ],
    solution: [
      '462831957',
      '795426183',
      '381795426',
      '173984265',
      '659312748',
      '248567319',
      '926178534',
      '834259671',
      '517643892',
    ],
  },
];

const puzzles = rawPuzzles.map((puzzle) => ({
  ...puzzle,
  givensGrid: puzzle.givens.map((row) => row.split('').map(Number)),
  solutionGrid: puzzle.solution.map((row) => row.split('').map(Number)),
}));

const state = {
  mode: 'menu',
  puzzleIndex: 0,
  grid: [],
  notes: [],
  selected: { row: 0, col: 0 },
  noteMode: false,
  timeLeft: 0,
  score: 0,
  mistakes: 0,
  hintsUsed: 0,
  correctEntries: 0,
  streak: 0,
  perfectPuzzles: 0,
  coinsEarned: 0,
  result: '',
  logs: [],
  pulse: 0,
};

let raf = 0;
let lastFrame = 0;
let controlled = false;
let overlayRenderKey = '';

function currentPuzzle() {
  return puzzles[state.puzzleIndex];
}

function cloneGridFromGivens() {
  return currentPuzzle().givensGrid.map((row) => row.slice());
}

function createNotes() {
  return Array.from({ length: 9 }, () => Array.from({ length: 9 }, () => []));
}

function isGiven(row, col) {
  return currentPuzzle().givensGrid[row][col] !== 0;
}

function solutionAt(row, col) {
  return currentPuzzle().solutionGrid[row][col];
}

function cellIsCorrect(row, col) {
  return state.grid[row][col] === solutionAt(row, col);
}

function pushLog(message) {
  state.logs = [message, ...state.logs].slice(0, 7);
}

function resetPuzzle(keepScore = true) {
  const puzzle = currentPuzzle();
  state.grid = cloneGridFromGivens();
  state.notes = createNotes();
  state.selected = firstOpenCell();
  state.noteMode = false;
  state.timeLeft = puzzle.seconds;
  state.mistakes = 0;
  state.hintsUsed = 0;
  state.correctEntries = 0;
  state.streak = 0;
  state.result = '';
  state.pulse = 0;
  if (!keepScore) {
    state.score = 0;
    state.perfectPuzzles = 0;
    state.coinsEarned = 0;
  }
  pushLog(`${puzzle.name}: solve every row, column, and 3x3 box.`);
}

function resetGame(mode = 'menu') {
  state.puzzleIndex = 0;
  state.logs = [];
  resetPuzzle(false);
  state.mode = mode;
  if (mode === 'playing') {
    rememberRecent('sudokusprint');
    maybeUnlock({ anyPlay: true, sudokusprint: { started: true, score: 0 } });
  }
  updateHud();
  updateOverlay();
  draw();
}

function startGame() {
  if (state.mode === 'paused') {
    state.mode = 'playing';
    pushLog('Resumed.');
  } else {
    resetGame('playing');
  }
  updateHud();
  updateOverlay();
  draw();
}

function pauseGame() {
  if (state.mode === 'playing') {
    state.mode = 'paused';
    pushLog('Paused.');
  } else if (state.mode === 'paused') {
    state.mode = 'playing';
    pushLog('Resumed.');
  } else {
    startGame();
    return;
  }
  updateHud();
  updateOverlay();
  draw();
}

function finishGame(won, reason) {
  if (state.mode === 'won' || state.mode === 'lost') return;
  state.mode = won ? 'won' : 'lost';
  state.result = reason;
  if (won && state.coinsEarned === 0) {
    const coins = Math.max(14, Math.min(42, 14 + Math.floor(state.score / 850) + state.perfectPuzzles * 3));
    state.coinsEarned = coins;
    addCoins(coins);
    pushLog(`Sprint complete: ${coins} coins.`);
  } else if (!won) {
    pushLog(reason === 'time_expired' ? 'Timer expired.' : 'Mistake limit reached.');
  }
  maybeUnlock({
    anyPlay: true,
    sudokusprint: {
      result: won ? 'won' : 'lost',
      score: state.score,
      solved: won ? puzzles.length : state.puzzleIndex,
      perfectPuzzles: state.perfectPuzzles,
    },
  });
  updateHud();
  updateOverlay();
  draw();
}

function firstOpenCell() {
  for (let row = 0; row < 9; row += 1) {
    for (let col = 0; col < 9; col += 1) {
      if (!isGiven(row, col)) return { row, col };
    }
  }
  return { row: 0, col: 0 };
}

function selectCell(row, col) {
  state.selected = {
    row: Math.max(0, Math.min(8, row)),
    col: Math.max(0, Math.min(8, col)),
  };
  draw();
}

function moveSelection(dr, dc) {
  selectCell(state.selected.row + dr, state.selected.col + dc);
}

function remainingCells() {
  let count = 0;
  for (let row = 0; row < 9; row += 1) {
    for (let col = 0; col < 9; col += 1) {
      if (!cellIsCorrect(row, col)) count += 1;
    }
  }
  return count;
}

function completionPercent() {
  return Math.round(((81 - remainingCells()) / 81) * 100);
}

function clearCell() {
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const { row, col } = state.selected;
  if (isGiven(row, col)) {
    pushLog('Given clues cannot be cleared.');
    return;
  }
  state.grid[row][col] = 0;
  state.notes[row][col] = [];
  state.streak = 0;
  pushLog(`Cleared row ${row + 1}, col ${col + 1}.`);
  updateHud();
  draw();
}

function toggleNoteDigit(row, col, digit) {
  const notes = state.notes[row][col];
  const index = notes.indexOf(digit);
  if (index >= 0) {
    notes.splice(index, 1);
  } else {
    notes.push(digit);
    notes.sort((a, b) => a - b);
  }
  pushLog(`Note ${digit} ${index >= 0 ? 'removed' : 'added'}.`);
}

function enterDigit(digit) {
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const { row, col } = state.selected;
  if (isGiven(row, col)) {
    pushLog('Select an open cell first.');
    return;
  }
  if (state.noteMode) {
    toggleNoteDigit(row, col, digit);
    draw();
    updateHud();
    return;
  }

  state.grid[row][col] = digit;
  state.notes[row][col] = [];
  if (digit === solutionAt(row, col)) {
    state.streak += 1;
    state.correctEntries += 1;
    const points = 38 + Math.min(42, state.streak * 4);
    state.score += points;
    state.pulse = 0.4;
    pushLog(`Correct ${digit}: +${points}.`);
    if (remainingCells() === 0) {
      completePuzzle();
    }
  } else {
    state.streak = 0;
    state.mistakes += 1;
    state.score = Math.max(0, state.score - 20);
    state.pulse = 0.25;
    pushLog(`Mismatch at row ${row + 1}, col ${col + 1}.`);
    if (state.mistakes >= MISTAKE_LIMIT) {
      finishGame(false, 'mistake_limit');
    }
  }
  updateHud();
  updateOverlay();
  draw();
}

function unresolvedCell() {
  const { row, col } = state.selected;
  if (!isGiven(row, col) && !cellIsCorrect(row, col)) return { row, col };
  for (let r = 0; r < 9; r += 1) {
    for (let c = 0; c < 9; c += 1) {
      if (!isGiven(r, c) && !cellIsCorrect(r, c)) return { row: r, col: c };
    }
  }
  return null;
}

function useHint() {
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const cell = unresolvedCell();
  if (!cell) {
    completePuzzle();
    return;
  }
  state.selected = cell;
  state.grid[cell.row][cell.col] = solutionAt(cell.row, cell.col);
  state.notes[cell.row][cell.col] = [];
  state.hintsUsed += 1;
  state.streak = 0;
  state.score = Math.max(0, state.score - 60);
  pushLog(`Hint filled row ${cell.row + 1}, col ${cell.col + 1}.`);
  if (remainingCells() === 0) completePuzzle();
  updateHud();
  draw();
}

function completePuzzle() {
  const timeBonus = Math.ceil(state.timeLeft) * 2;
  const accuracyBonus = Math.max(0, 260 - state.mistakes * 42 - state.hintsUsed * 58);
  state.score += timeBonus + accuracyBonus;
  if (state.mistakes === 0 && state.hintsUsed === 0) state.perfectPuzzles += 1;
  pushLog(`Puzzle solved: +${timeBonus + accuracyBonus}.`);

  if (state.puzzleIndex < puzzles.length - 1) {
    state.puzzleIndex += 1;
    resetPuzzle(true);
  } else {
    finishGame(true, 'all_puzzles_solved');
  }
}

function update(dt) {
  state.pulse = Math.max(0, state.pulse - dt);
  if (state.mode !== 'playing') return;
  state.timeLeft = Math.max(0, state.timeLeft - dt);
  if (state.timeLeft <= 0) {
    finishGame(false, 'time_expired');
  }
}

function drawRoundRect(x, y, width, height, radius, fill, stroke = null) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#fff8e8');
  bg.addColorStop(0.44, '#d5eee5');
  bg.addColorStop(1, '#7086aa');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#ffffff45';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 36) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += 36) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawBoard() {
  drawRoundRect(BOARD.x - 12, BOARD.y - 12, BOARD.size + 24, BOARD.size + 24, 8, '#fbfcffe8', '#ffffffa8');

  const { row: sr, col: sc } = state.selected;
  const boxRow = Math.floor(sr / 3) * 3;
  const boxCol = Math.floor(sc / 3) * 3;
  ctx.fillStyle = '#dcecf07f';
  ctx.fillRect(BOARD.x + boxCol * CELL, BOARD.y + boxRow * CELL, CELL * 3, CELL * 3);
  ctx.fillStyle = '#d3e9df96';
  ctx.fillRect(BOARD.x, BOARD.y + sr * CELL, BOARD.size, CELL);
  ctx.fillRect(BOARD.x + sc * CELL, BOARD.y, CELL, BOARD.size);

  for (let row = 0; row < 9; row += 1) {
    for (let col = 0; col < 9; col += 1) {
      const x = BOARD.x + col * CELL;
      const y = BOARD.y + row * CELL;
      const value = state.grid[row][col];
      const given = isGiven(row, col);
      const wrong = value !== 0 && value !== solutionAt(row, col);
      const selected = row === sr && col === sc;

      if (given) {
        ctx.fillStyle = '#eef1f5';
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
      } else if (wrong) {
        ctx.fillStyle = '#ffe6df';
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
      } else if (value !== 0) {
        ctx.fillStyle = '#e8f7ed';
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
      }

      if (selected) {
        ctx.fillStyle = state.pulse > 0 ? '#ffd56a9c' : '#f7cd4f66';
        ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
      }

      if (value !== 0) {
        ctx.fillStyle = given ? '#18273a' : wrong ? '#c64239' : '#116250';
        ctx.font = `${given ? 900 : 800} 31px Trebuchet MS, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(value), x + CELL / 2, y + CELL / 2 + 1);
      } else {
        drawNotes(row, col, x, y);
      }
    }
  }

  for (let i = 0; i <= 9; i += 1) {
    ctx.strokeStyle = i % 3 === 0 ? '#142335' : '#8fa0ad';
    ctx.lineWidth = i % 3 === 0 ? 4 : 1;
    ctx.beginPath();
    ctx.moveTo(BOARD.x + i * CELL, BOARD.y);
    ctx.lineTo(BOARD.x + i * CELL, BOARD.y + BOARD.size);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(BOARD.x, BOARD.y + i * CELL);
    ctx.lineTo(BOARD.x + BOARD.size, BOARD.y + i * CELL);
    ctx.stroke();
  }
}

function drawNotes(row, col, x, y) {
  const notes = state.notes[row][col];
  if (!notes.length) return;
  ctx.fillStyle = '#52637a';
  ctx.font = '800 12px Trebuchet MS, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const digit of notes) {
    const index = digit - 1;
    const nx = x + CELL * (0.18 + (index % 3) * 0.32);
    const ny = y + CELL * (0.18 + Math.floor(index / 3) * 0.32);
    ctx.fillText(String(digit), nx, ny);
  }
}

function drawPanel() {
  const puzzle = currentPuzzle();
  const progress = completionPercent();
  drawRoundRect(PANEL.x, PANEL.y, PANEL.w, PANEL.h, 8, '#162536d9', '#ffffff8a');

  ctx.fillStyle = '#f8fdff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.font = '900 32px Trebuchet MS, sans-serif';
  ctx.fillText('Sudoku Sprint', PANEL.x + 24, PANEL.y + 44);

  ctx.font = '800 17px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#cfe4ec';
  ctx.fillText(`${puzzle.name} - ${state.puzzleIndex + 1} of ${puzzles.length}`, PANEL.x + 24, PANEL.y + 76);

  drawRoundRect(PANEL.x + 24, PANEL.y + 102, PANEL.w - 48, 18, 8, '#071220', '#ffffff35');
  drawRoundRect(PANEL.x + 24, PANEL.y + 102, (PANEL.w - 48) * (progress / 100), 18, 8, '#78d6a6');
  ctx.fillStyle = '#f8fdff';
  ctx.font = '900 13px Trebuchet MS, sans-serif';
  ctx.fillText(`${progress}% complete`, PANEL.x + 128, PANEL.y + 116);

  const facts = [
    ['Time', `${Math.ceil(state.timeLeft)}s`],
    ['Open cells', String(remainingCells())],
    ['Mistakes', `${state.mistakes}/${MISTAKE_LIMIT}`],
    ['Hints', String(state.hintsUsed)],
    ['Streak', String(state.streak)],
    ['Score', String(state.score)],
  ];
  for (let i = 0; i < facts.length; i += 1) {
    const x = PANEL.x + 24 + (i % 2) * 150;
    const y = PANEL.y + 152 + Math.floor(i / 2) * 58;
    drawRoundRect(x, y, 132, 42, 8, '#ffffff16', '#ffffff26');
    ctx.fillStyle = '#c9dbec';
    ctx.font = '800 11px Trebuchet MS, sans-serif';
    ctx.fillText(facts[i][0].toUpperCase(), x + 12, y + 16);
    ctx.fillStyle = '#ffffff';
    ctx.font = '900 18px Trebuchet MS, sans-serif';
    ctx.fillText(facts[i][1], x + 12, y + 34);
  }

  ctx.fillStyle = '#f8fdff';
  ctx.font = '900 18px Trebuchet MS, sans-serif';
  ctx.fillText('Controls', PANEL.x + 24, PANEL.y + 348);
  ctx.fillStyle = '#cfe4ec';
  ctx.font = '800 14px Trebuchet MS, sans-serif';
  ctx.fillText('Arrows/WASD select cells. 1-9 fill digits.', PANEL.x + 24, PANEL.y + 376);
  ctx.fillText('N toggles notes. 0/Backspace clears.', PANEL.x + 24, PANEL.y + 398);
  ctx.fillText('H hints, P pauses, R restarts, F fullscreen.', PANEL.x + 24, PANEL.y + 420);

  ctx.fillStyle = '#f8fdff';
  ctx.font = '900 18px Trebuchet MS, sans-serif';
  ctx.fillText('Recent', PANEL.x + 24, PANEL.y + 462);
  ctx.fillStyle = '#cfe4ec';
  ctx.font = '800 13px Trebuchet MS, sans-serif';
  for (let i = 0; i < Math.min(4, state.logs.length); i += 1) {
    ctx.fillText(state.logs[i], PANEL.x + 24, PANEL.y + 486 + i * 22);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawBoard();
  drawPanel();
}

function updateHud() {
  hud.mode.textContent = state.mode.toUpperCase();
  hud.puzzle.textContent = `${state.puzzleIndex + 1}/${puzzles.length}`;
  hud.time.textContent = `${Math.ceil(state.timeLeft)}s`;
  hud.remaining.textContent = String(remainingCells());
  hud.mistakes.textContent = `${state.mistakes}/${MISTAKE_LIMIT}`;
  hud.entryMode.textContent = state.noteMode ? 'Notes' : 'Digits';
  hud.score.textContent = String(state.score);
  hud.coins.textContent = String(profileState.coins || 0);
  document.getElementById('noteBtn')?.classList.toggle('active-toggle', state.noteMode);
}

function updateOverlay() {
  const show = state.mode === 'menu' || state.mode === 'paused' || state.mode === 'won' || state.mode === 'lost';
  const key = show
    ? `${state.mode}|${state.result}|${state.score}|${state.puzzleIndex}|${state.perfectPuzzles}|${state.coinsEarned}`
    : 'hidden';
  overlay.classList.toggle('show', show);
  if (key === overlayRenderKey) return;
  overlayRenderKey = key;
  if (!show) {
    overlay.innerHTML = '';
    return;
  }

  let title = 'Sudoku Sprint';
  let body = 'Solve three Sudoku boards under a timer. Use notes to track candidates, hints when stuck, and avoid five mistakes.';
  let primary = 'Start';
  if (state.mode === 'paused') {
    title = 'Paused';
    body = 'The timer is stopped. Resume the current puzzle when ready.';
    primary = 'Resume';
  } else if (state.mode === 'won') {
    title = 'Sprint Solved';
    body = `Final score ${state.score}. Perfect puzzles ${state.perfectPuzzles}. Coins earned ${state.coinsEarned}.`;
    primary = 'Play Again';
  } else if (state.mode === 'lost') {
    title = state.result === 'time_expired' ? 'Out of Time' : 'Too Many Mistakes';
    body = `You reached puzzle ${state.puzzleIndex + 1} with ${completionPercent()}% complete and ${state.score} points.`;
    primary = 'Retry';
  }

  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <p>Desktop: arrows/WASD move, 1-9 fill, N notes, H hint, 0 or Backspace clear, P pause, R restart, F fullscreen.</p>
      <div class="row">
        <button id="overlayPrimary" type="button">${primary}</button>
        <button id="overlayRestart" type="button">Restart</button>
      </div>
    </div>
  `;
  document.getElementById('overlayPrimary')?.addEventListener('click', () => {
    if (state.mode === 'paused') pauseGame();
    else startGame();
  });
  document.getElementById('overlayRestart')?.addEventListener('click', () => resetGame('playing'));
}

function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen?.();
  } else {
    canvas.parentElement?.requestFullscreen?.();
  }
}

function canvasCellFromEvent(event) {
  const rect = canvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) * (canvas.width / rect.width);
  const y = (event.clientY - rect.top) * (canvas.height / rect.height);
  if (x < BOARD.x || x > BOARD.x + BOARD.size || y < BOARD.y || y > BOARD.y + BOARD.size) return null;
  return {
    row: Math.max(0, Math.min(8, Math.floor((y - BOARD.y) / CELL))),
    col: Math.max(0, Math.min(8, Math.floor((x - BOARD.x) / CELL))),
  };
}

canvas.addEventListener('pointerdown', (event) => {
  event.preventDefault();
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const cell = canvasCellFromEvent(event);
  if (cell) selectCell(cell.row, cell.col);
});

document.querySelectorAll('[data-digit]').forEach((button) => {
  button.addEventListener('click', () => enterDigit(Number(button.dataset.digit)));
});
document.getElementById('clearBtn').addEventListener('click', clearCell);
document.getElementById('noteBtn').addEventListener('click', () => {
  if (state.mode !== 'playing') startGame();
  state.noteMode = !state.noteMode;
  pushLog(state.noteMode ? 'Notes mode on.' : 'Digit mode on.');
  updateHud();
  draw();
});
document.getElementById('hintBtn').addEventListener('click', useHint);
document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('restartBtn').addEventListener('click', () => resetGame('playing'));
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

window.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown', ' ', 'spacebar', 'backspace'].includes(key)) {
    event.preventDefault();
  }
  if (key >= '1' && key <= '9') {
    enterDigit(Number(key));
  } else if (key === '0' || key === 'backspace' || key === 'delete') {
    clearCell();
  } else if (key === 'arrowleft' || key === 'a') {
    moveSelection(0, -1);
  } else if (key === 'arrowright' || key === 'd') {
    moveSelection(0, 1);
  } else if (key === 'arrowup' || key === 'w') {
    moveSelection(-1, 0);
  } else if (key === 'arrowdown' || key === 's') {
    moveSelection(1, 0);
  } else if (key === 'n') {
    state.noteMode = !state.noteMode;
    pushLog(state.noteMode ? 'Notes mode on.' : 'Digit mode on.');
  } else if (key === 'h') {
    useHint();
  } else if (key === 'p') {
    pauseGame();
  } else if (key === 'r') {
    resetGame('playing');
  } else if (key === 'f') {
    toggleFullscreen();
  } else if (key === 'enter' && state.mode !== 'playing') {
    startGame();
  }
  updateHud();
  draw();
});

function frame(now) {
  const dt = Math.min(0.05, Math.max(0, (now - lastFrame) / 1000 || 0));
  lastFrame = now;
  if (!controlled) {
    update(dt);
    draw();
    updateHud();
    updateOverlay();
  }
  raf = requestAnimationFrame(frame);
}

function renderGameToText() {
  const cells = [];
  for (let row = 0; row < 9; row += 1) {
    for (let col = 0; col < 9; col += 1) {
      cells.push({
        row,
        col,
        value: state.grid[row][col],
        given: isGiven(row, col),
        solution: solutionAt(row, col),
        correct: cellIsCorrect(row, col),
        notes: state.notes[row][col].slice(),
      });
    }
  }

  return JSON.stringify({
    game: 'sudokusprint',
    mode: state.mode,
    coordinate_system: 'Canvas origin is top-left. X increases right and Y increases down. Sudoku grid top-left is (54,58), with 9 rows and 9 columns.',
    objective: 'fill every open Sudoku cell so each row, column, and 3x3 box contains digits 1 through 9 before time or mistake limit expires',
    puzzle: {
      index: state.puzzleIndex + 1,
      total: puzzles.length,
      name: currentPuzzle().name,
    },
    selected: {
      row: state.selected.row,
      col: state.selected.col,
      value: state.grid[state.selected.row][state.selected.col],
      given: isGiven(state.selected.row, state.selected.col),
      solution: solutionAt(state.selected.row, state.selected.col),
      notes: state.notes[state.selected.row][state.selected.col].slice(),
    },
    resources: {
      time_left: Number(state.timeLeft.toFixed(2)),
      score: state.score,
      mistakes: state.mistakes,
      mistake_limit: MISTAKE_LIMIT,
      hints_used: state.hintsUsed,
      correct_entries: state.correctEntries,
      remaining_cells: remainingCells(),
      completion_percent: completionPercent(),
      note_mode: state.noteMode,
      streak: state.streak,
      perfect_puzzles: state.perfectPuzzles,
      coins_earned: state.coinsEarned,
    },
    cells,
    recent_events: state.logs,
    result: state.result,
  });
}

window.render_game_to_text = renderGameToText;
window.advanceTime = (ms = 16.67) => {
  controlled = true;
  const steps = Math.max(1, Math.round(Number(ms || 0) / (1000 / 60)));
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  updateHud();
  updateOverlay();
  controlled = false;
  lastFrame = performance.now();
};
window.__CADE_FEEDBACK_CONTEXT__ = () => JSON.parse(renderGameToText());

resetGame('menu');
draw();
updateHud();
updateOverlay();
raf = requestAnimationFrame((now) => {
  lastFrame = now;
  frame(now);
});
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '/src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'sudokusprint', gameName: 'Sudoku Sprint' });
</script>
