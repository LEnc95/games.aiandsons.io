<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Billing Ops - Cade's Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root {
      --bg: #071125;
      --panel: #111e39;
      --panel-soft: #0c1730;
      --panel-border: #274272;
      --text: #ecf4ff;
      --muted: #9eb7dc;
      --accent: #78d4ff;
      --ok: #71ebb7;
      --warn: #ffc976;
      --danger: #ff9fb0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% 0%, #13264d 0%, var(--bg) 55%, #040a17 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 16px clamp(16px, 4vw, 30px);
      background: rgba(8, 18, 38, 0.84);
      border-bottom: 1px solid rgba(120, 212, 255, 0.22);
      backdrop-filter: blur(8px);
    }
    .topbar h1 { margin: 0; font-size: clamp(22px, 3vw, 30px); }
    .topbar-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbar a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    .shell {
      width: min(1380px, 100%);
      margin: 0 auto;
      padding: clamp(16px, 3vw, 28px);
      display: grid;
      gap: 16px;
    }
    .controls,
    .panel {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-soft) 100%);
      padding: 16px;
      box-shadow: 0 18px 36px rgba(0,0,0,0.18);
    }
    .controls { display: grid; gap: 12px; }
    .controls-grid {
      display: grid;
      grid-template-columns: 2fr repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .field { display: grid; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input,
    .field textarea,
    .field select,
    textarea {
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      padding: 10px 12px;
      font: 500 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .actions, .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, #7dd7ff 0%, #7bf0cb 100%);
      color: #071120;
    }
    .status-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .status-line.ok { color: var(--ok); }
    .status-line.error { color: var(--danger); }
    .status-line.warn { color: var(--warn); }
    .main-grid {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 16px;
    }
    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }
    .result-list {
      display: grid;
      gap: 10px;
      max-height: 72dvh;
      overflow: auto;
      padding-right: 4px;
    }
    .result-card {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      display: grid;
      gap: 8px;
    }
    .result-card.active {
      border-color: rgba(120,212,255,0.65);
      background: rgba(120,212,255,0.12);
    }
    .result-card h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }
    .meta-row, .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .meta-row {
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.good { color: #bdf7d8; border-color: rgba(113,235,183,0.45); }
    .badge.warn { color: #ffe1a8; border-color: rgba(255,201,118,0.45); }
    .badge.bad { color: #ffd5dd; border-color: rgba(255,159,176,0.45); }
    .detail-grid {
      display: grid;
      gap: 14px;
    }
    .detail-block {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .detail-block h3 {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .kv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .kv-card {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.16);
      padding: 10px;
      display: grid;
      gap: 4px;
    }
    .kv-card strong {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .kv-card span { word-break: break-word; }
    .detail-block pre,
    .detail-block textarea {
      margin: 0;
      width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      padding: 10px;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .detail-block textarea { min-height: 220px; resize: vertical; }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 12px 0;
    }
    .list-grid {
      display: grid;
      gap: 10px;
    }
    .mini-card {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.16);
      padding: 10px;
      display: grid;
      gap: 6px;
    }
    @media (max-width: 1100px) {
      .controls-grid,
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Billing Ops</h1>
      <div class="status-line" id="modeNotice">Protected billing lookup and reconcile tools.</div>
    </div>
    <div class="topbar-links">
      <a href="/ops/feedback/">Feedback Inbox</a>
      <a href="/">Back Home</a>
    </div>
  </div>

  <main class="shell">
    <section class="controls">
      <div class="controls-grid">
        <div class="field">
          <label for="adminTokenInput">Admin Token</label>
          <input id="adminTokenInput" type="password" placeholder="Required for protected billing admin APIs" />
        </div>
        <div class="field">
          <label for="userIdInput">User ID</label>
          <input id="userIdInput" type="text" placeholder="usr_..." />
        </div>
        <div class="field">
          <label for="customerIdInput">Customer ID</label>
          <input id="customerIdInput" type="text" placeholder="cus_..." />
        </div>
        <div class="field">
          <label for="customerEmailInput">Billing Email</label>
          <input id="customerEmailInput" type="email" placeholder="parent@example.com" />
        </div>
        <div class="field">
          <label for="familyAccountIdInput">Family Account ID</label>
          <input id="familyAccountIdInput" type="text" placeholder="fam_..." />
        </div>
      </div>
      <div class="actions">
        <button id="saveTokenBtn">Save Token</button>
        <button id="clearTokenBtn">Clear Token</button>
        <button id="searchBtn" class="primary">Search Billing</button>
        <button id="reconcileBtn">Force Reconcile</button>
        <button id="copyJsonBtn">Copy JSON</button>
      </div>
      <div class="status-line" id="statusLine"></div>
    </section>

    <section class="main-grid">
      <article class="panel">
        <h2>Matches</h2>
        <div class="result-list" id="resultsList"></div>
      </article>

      <article class="panel">
        <h2>Detail</h2>
        <div class="detail-grid" id="detailGrid">
          <div class="empty">Search for a billing profile, customer, or family account to inspect the current subscription and email state.</div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "cadeBillingAdminToken";
    const state = {
      token: sessionStorage.getItem(STORAGE_KEY) || "",
      results: [],
      selectedIndex: -1,
      latestPayload: null,
    };

    const els = {
      adminTokenInput: document.getElementById("adminTokenInput"),
      userIdInput: document.getElementById("userIdInput"),
      customerIdInput: document.getElementById("customerIdInput"),
      customerEmailInput: document.getElementById("customerEmailInput"),
      familyAccountIdInput: document.getElementById("familyAccountIdInput"),
      saveTokenBtn: document.getElementById("saveTokenBtn"),
      clearTokenBtn: document.getElementById("clearTokenBtn"),
      searchBtn: document.getElementById("searchBtn"),
      reconcileBtn: document.getElementById("reconcileBtn"),
      copyJsonBtn: document.getElementById("copyJsonBtn"),
      statusLine: document.getElementById("statusLine"),
      resultsList: document.getElementById("resultsList"),
      detailGrid: document.getElementById("detailGrid"),
    };

    function setStatus(message, tone = "") {
      els.statusLine.textContent = message || "";
      els.statusLine.className = `status-line${tone ? ` ${tone}` : ""}`;
    }

    function normalizeValue(value) {
      return String(value || "").trim();
    }

    function formatTime(value) {
      const numeric = Number(value || 0);
      if (!Number.isFinite(numeric) || numeric <= 0) return "Not set";
      const millis = numeric < 1e12 ? numeric * 1000 : numeric;
      return new Date(millis).toLocaleString();
    }

    function mask(text) {
      const normalized = normalizeValue(text);
      if (!normalized) return "Unknown";
      return normalized;
    }

    function badge(label, tone = "") {
      const span = document.createElement("span");
      span.className = `badge${tone ? ` ${tone}` : ""}`;
      span.textContent = label;
      return span;
    }

    function buildHeaders() {
      const headers = { Accept: "application/json" };
      const token = normalizeValue(state.token);
      if (token) headers["x-admin-token"] = token;
      return headers;
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          ...buildHeaders(),
          ...(options.headers || {}),
        },
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload && payload.error ? payload.error : `Request failed (${response.status})`);
      }
      return payload;
    }

    function getQuery() {
      return {
        userId: normalizeValue(els.userIdInput.value),
        customerId: normalizeValue(els.customerIdInput.value),
        customerEmail: normalizeValue(els.customerEmailInput.value).toLowerCase(),
        familyAccountId: normalizeValue(els.familyAccountIdInput.value),
      };
    }

    function getSelectedRecord() {
      if (state.selectedIndex < 0 || state.selectedIndex >= state.results.length) return null;
      return state.results[state.selectedIndex];
    }

    function renderResults() {
      els.resultsList.textContent = "";
      if (!state.results.length) {
        els.resultsList.innerHTML = '<div class="empty">No billing records match the current lookup.</div>';
        return;
      }
      state.results.forEach((record, index) => {
        const card = document.createElement("article");
        card.className = `result-card${index === state.selectedIndex ? " active" : ""}`;
        card.addEventListener("click", () => {
          state.selectedIndex = index;
          renderResults();
          renderDetail();
        });

        const title = document.createElement("h3");
        title.textContent = record.profile?.customerEmail || record.userId || record.family?.ownerEmail || "Billing record";
        card.appendChild(title);

        const meta = document.createElement("div");
        meta.className = "meta-row";
        meta.textContent = `User ${mask(record.userId)} Ģ Customer ${mask(record.profile?.customerId || record.billing?.customerId || "")}`;
        card.appendChild(meta);

        const badges = document.createElement("div");
        badges.className = "badge-row";
        const subscriptionStatus = normalizeValue(record.billing?.subscriptionStatus || record.profile?.subscriptionStatus || "inactive");
        badges.appendChild(badge(subscriptionStatus || "inactive", subscriptionStatus === "active" || subscriptionStatus === "trialing" ? "good" : (subscriptionStatus === "past_due" ? "warn" : "bad")));
        if (record.family) {
          badges.appendChild(badge(`family ${record.family.status || "inactive"}`, record.family.status === "active" ? "good" : "warn"));
        }
        if (record.emailDeliveries?.length) {
          badges.appendChild(badge(`${record.emailDeliveries.length} emails`, "warn"));
        }
        card.appendChild(badges);

        els.resultsList.appendChild(card);
      });
    }

    function createKvCard(label, value) {
      const card = document.createElement("div");
      card.className = "kv-card";
      const strong = document.createElement("strong");
      strong.textContent = label;
      const span = document.createElement("span");
      span.textContent = normalizeValue(value) || "Not set";
      card.append(strong, span);
      return card;
    }

    function renderDetail() {
      els.detailGrid.textContent = "";
      const record = getSelectedRecord();
      if (!record) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Select a billing record to inspect subscription, family, and email delivery details.";
        els.detailGrid.appendChild(empty);
        return;
      }

      const billingBlock = document.createElement("section");
      billingBlock.className = "detail-block";
      billingBlock.innerHTML = "<h3>Billing Summary</h3>";
      const billingGrid = document.createElement("div");
      billingGrid.className = "kv-grid";
      billingGrid.append(
        createKvCard("User ID", record.userId),
        createKvCard("Customer ID", record.profile?.customerId),
        createKvCard("Billing Email", record.profile?.customerEmail),
        createKvCard("Plan", record.billing?.activePlanId),
        createKvCard("Subscription", record.billing?.subscriptionId),
        createKvCard("Status", record.billing?.subscriptionStatus),
        createKvCard("Period End", formatTime(record.billing?.currentPeriodEnd)),
        createKvCard("Grace Until", formatTime(record.billing?.graceUntil)),
        createKvCard("Cancel At Period End", record.billing?.cancelAtPeriodEnd ? "Yes" : "No"),
        createKvCard("Last Invoice", record.billing?.latestInvoiceId || record.profile?.latestInvoiceId),
        createKvCard("Invoice Status", record.billing?.latestInvoiceStatus || record.profile?.latestInvoiceStatus),
        createKvCard("Last Source", record.profile?.lastSource)
      );
      billingBlock.appendChild(billingGrid);
      els.detailGrid.appendChild(billingBlock);

      const family = record.family;
      if (family) {
        const familyBlock = document.createElement("section");
        familyBlock.className = "detail-block";
        familyBlock.innerHTML = "<h3>Family Account</h3>";
        const familyGrid = document.createElement("div");
        familyGrid.className = "kv-grid";
        familyGrid.append(
          createKvCard("Family Account", family.id),
          createKvCard("Owner", family.ownerEmail || family.ownerUserId),
          createKvCard("Plan", family.planId),
          createKvCard("Status", family.status),
          createKvCard("Seats", `${family.seatCount}/${family.seatLimit}`),
          createKvCard("Pending Invites", family.pendingInviteCount)
        );
        familyBlock.appendChild(familyGrid);

        const members = document.createElement("div");
        members.className = "list-grid";
        const memberTitle = document.createElement("h3");
        memberTitle.textContent = "Members";
        familyBlock.appendChild(memberTitle);
        if (Array.isArray(family.members) && family.members.length) {
          family.members.forEach((member) => {
            const card = document.createElement("div");
            card.className = "mini-card";
            card.innerHTML = `<strong>${member.displayName || member.email || member.userId}</strong><span>${member.role} Ģ ${member.email || member.userId}</span>`;
            members.appendChild(card);
          });
        } else {
          members.innerHTML = '<div class="empty">No family members recorded.</div>';
        }
        familyBlock.appendChild(members);

        const invites = document.createElement("div");
        invites.className = "list-grid";
        const inviteTitle = document.createElement("h3");
        inviteTitle.textContent = "Invites";
        familyBlock.appendChild(inviteTitle);
        if (Array.isArray(family.invites) && family.invites.length) {
          family.invites.forEach((invite) => {
            const card = document.createElement("div");
            card.className = "mini-card";
            card.innerHTML = `<strong>${invite.email}</strong><span>${invite.status} Ģ expires ${formatTime(invite.expiresAt)}</span><span>${invite.lastEmailDelivery ? `email ${invite.lastEmailDelivery.status}` : "no delivery log yet"}</span>`;
            invites.appendChild(card);
          });
        } else {
          invites.innerHTML = '<div class="empty">No family invites recorded.</div>';
        }
        familyBlock.appendChild(invites);
        els.detailGrid.appendChild(familyBlock);
      }

      const emailBlock = document.createElement("section");
      emailBlock.className = "detail-block";
      emailBlock.innerHTML = "<h3>Email Deliveries</h3>";
      const emailList = document.createElement("div");
      emailList.className = "list-grid";
      if (Array.isArray(record.emailDeliveries) && record.emailDeliveries.length) {
        record.emailDeliveries.forEach((delivery) => {
          const card = document.createElement("div");
          card.className = "mini-card";
          card.innerHTML = `<strong>${delivery.templateKey || delivery.subject || "email"}</strong><span>${delivery.to} Ģ ${delivery.status}</span><span>${delivery.error || formatTime(delivery.updatedAt || delivery.createdAt)}</span>`;
          emailList.appendChild(card);
        });
      } else {
        emailList.innerHTML = '<div class="empty">No email deliveries logged for this record yet.</div>';
      }
      emailBlock.appendChild(emailList);
      els.detailGrid.appendChild(emailBlock);

      const rawBlock = document.createElement("section");
      rawBlock.className = "detail-block";
      rawBlock.innerHTML = "<h3>Raw JSON</h3>";
      const textarea = document.createElement("textarea");
      textarea.readOnly = true;
      textarea.value = JSON.stringify(record, null, 2);
      rawBlock.appendChild(textarea);
      els.detailGrid.appendChild(rawBlock);
    }

    async function searchBilling() {
      const query = getQuery();
      if (!query.userId && !query.customerId && !query.customerEmail && !query.familyAccountId) {
        setStatus("Enter at least one lookup field before searching.", "warn");
        return;
      }
      els.searchBtn.disabled = true;
      try {
        setStatus("Looking up billing records...");
        const params = new URLSearchParams();
        Object.entries(query).forEach(([key, value]) => {
          if (value) params.set(key, value);
        });
        const payload = await fetchJson(`/api/stripe/admin/lookup?${params.toString()}`);
        state.latestPayload = payload;
        state.results = Array.isArray(payload.matches) ? payload.matches : [];
        state.selectedIndex = state.results.length ? 0 : -1;
        renderResults();
        renderDetail();
        setStatus(`Loaded ${payload.resultCount || 0} billing record${payload.resultCount === 1 ? "" : "s"}.`, payload.resultCount ? "ok" : "warn");
      } catch (error) {
        state.latestPayload = null;
        state.results = [];
        state.selectedIndex = -1;
        renderResults();
        renderDetail();
        setStatus(String(error?.message || error || "Billing lookup failed."), "error");
      } finally {
        els.searchBtn.disabled = false;
      }
    }

    async function forceReconcile() {
      const record = getSelectedRecord();
      if (!record) {
        setStatus("Select a billing record before forcing a reconcile.", "warn");
        return;
      }
      els.reconcileBtn.disabled = true;
      try {
        setStatus("Running Stripe reconcile...");
        const payload = await fetchJson("/api/stripe/admin/reconcile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: record.userId || "",
            customerId: record.profile?.customerId || record.billing?.customerId || "",
            dryRun: false,
          }),
        });
        setStatus(`Reconcile completed. Changed: ${payload.changed ? "yes" : "no"}.`, "ok");
        await searchBilling();
      } catch (error) {
        setStatus(String(error?.message || error || "Stripe reconcile failed."), "error");
      } finally {
        els.reconcileBtn.disabled = false;
      }
    }

    async function copyJson() {
      const payload = state.latestPayload || getSelectedRecord();
      if (!payload) {
        setStatus("Nothing to copy yet. Search for a billing record first.", "warn");
        return;
      }
      const text = JSON.stringify(payload, null, 2);
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Copied billing JSON to the clipboard.", "ok");
      } catch {
        setStatus("Clipboard copy failed in this browser.", "error");
      }
    }

    els.adminTokenInput.value = state.token;
    els.saveTokenBtn.addEventListener("click", () => {
      state.token = normalizeValue(els.adminTokenInput.value);
      sessionStorage.setItem(STORAGE_KEY, state.token);
      setStatus(state.token ? "Admin token saved for this session." : "Admin token cleared for this session.", state.token ? "ok" : "warn");
    });
    els.clearTokenBtn.addEventListener("click", () => {
      state.token = "";
      els.adminTokenInput.value = "";
      sessionStorage.removeItem(STORAGE_KEY);
      setStatus("Admin token cleared.", "warn");
    });
    els.searchBtn.addEventListener("click", searchBilling);
    els.reconcileBtn.addEventListener("click", forceReconcile);
    els.copyJsonBtn.addEventListener("click", copyJson);

    renderResults();
    renderDetail();
  </script>
</body>
</html>
