<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
  color: #eef8ff;
  background:
    radial-gradient(64% 58% at 18% 15%, #304272 0%, transparent 62%),
    radial-gradient(52% 46% at 80% 82%, #482659 0%, transparent 64%),
    linear-gradient(180deg, #080c1f 0%, #111937 100%);
}
.back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 30;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  border-radius: 10px;
  border: 1px solid #ffffff5c;
  padding: 8px 12px;
  background: #00000068;
}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 62px 10px 10px;
}
.wrap {
  width: min(96vw, 980px);
  aspect-ratio: 16 / 10;
  max-height: min(66dvh, 740px);
  position: relative;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 14px;
  border: 2px solid #91b9ff88;
  box-shadow: 0 18px 50px #000000b0;
  background: linear-gradient(180deg, #151c3b 0%, #0f1730 60%, #131a31 100%);
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.panel {
  max-width: 700px;
  border-radius: 14px;
  border: 1px solid #abc9ff66;
  background: #0b1332ee;
  box-shadow: 0 14px 30px #00000080;
  padding: 16px;
}
h1 { margin: 0 0 8px; font-size: clamp(28px, 4.2vw, 40px); }
p { margin: 0 0 10px; color: #c6d8f8; font-size: clamp(13px, 2vw, 15px); line-height: 1.45; }
.row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
button {
  border: 1px solid #b1c6ff62;
  background: #223c7df2;
  color: #edf7ff;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 42px;
}
.hud {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #94b9ff52;
  background: #0a1330ee;
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  border-radius: 9px;
  border: 1px solid #bdd4ff35;
  background: #ffffff12;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #bdd1f4;
  font-size: 11px;
  letter-spacing: .05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b { font-size: clamp(14px, 2.1vw, 18px); line-height: 1.1; }
.warn b { color: #ffd18f; }
.bad b { color: #ffa0b5; }
.good b { color: #9cf0ca; }
.controls {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #94b9ff52;
  background: #0a1330ee;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
}
.ctrl-btn { background: #304b84; border-color: #b2c6ff4d; }
.toggle-btn { background: #2c7d5a; border-color: #b2f6d44d; }
@media (max-width: 900px) {
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>

</head>
<body>
<a class="back" href="/" aria-label="Back to Home">&larr; Back</a>
<main class="app">
  <div class="wrap">
    <canvas id="game" width="1200" height="760" aria-label="Storm Vault game canvas"></canvas>
    <div id="overlay" class="overlay show"></div>
  </div>
  <section class="hud" aria-live="polite">
    <div class="chip"><span>Mode</span><b id="mode">MENU</b></div>
    <div class="chip"><span>Score</span><b id="score">0</b></div>
    <div class="chip"><span>Charge</span><b id="charge">0/28</b></div>
    <div class="chip"><span>Shield</span><b id="shield">7</b></div>
    <div class="chip warn"><span>Time</span><b id="time">88.0s</b></div>
    <div class="chip"><span>Streak</span><b id="streak">0x</b></div>
    <div class="chip"><span>Coins</span><b id="coins">0</b></div>
  </section>
  <section class="controls" aria-label="Touch controls">
    <button id="leftBtn" type="button" class="ctrl-btn">Prev Lane</button>
    <button id="rightBtn" type="button" class="ctrl-btn">Next Lane</button>
    <button id="toggleBtn" type="button" class="toggle-btn">Toggle +/-</button>
    <button id="pauseBtn" type="button" class="ctrl-btn">Pause</button>
    <button id="restartBtn" type="button" class="ctrl-btn">Restart</button>
    <button id="fullscreenBtn" type="button" class="ctrl-btn">Fullscreen</button>
  </section>
</main>
<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const modeEl = document.getElementById('mode');
const scoreEl = document.getElementById('score');
const chargeEl = document.getElementById('charge');
const shieldEl = document.getElementById('shield');
const timeEl = document.getElementById('time');
const streakEl = document.getElementById('streak');
const coinsEl = document.getElementById('coins');

const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const toggleBtn = document.getElementById('toggleBtn');
const pauseBtn = document.getElementById('pauseBtn');
const restartBtn = document.getElementById('restartBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');

const TOTAL_SECONDS = 88;
const START_SHIELD = 7;
const TARGET_CHARGE = 28;
const LANES = 5;
const FIELD_TOP = 112;
const FIELD_BOTTOM = canvas.height - 130;
const LANE_SPACING = canvas.width / (LANES + 1);
const POLARITY_STYLE = {
  plus: { text: '+', strike: '#6ec7ff', glow: '#97dcff' },
  minus: { text: '-', strike: '#ffb087', glow: '#ffcfaf' },
};

const state = {
  mode: 'menu',
  result: null,
  elapsed: 0,
  timeLeft: TOTAL_SECONDS,
  score: 0,
  charge: 0,
  shield: START_SHIELD,
  streak: 0,
  selectedLane: 2,
  rods: Array.from({ length: LANES }, () => 'plus'),
  strikeTimer: 0.6,
  strikeEvery: 1.2,
  activeStrikes: [],
  logs: [],
};

let raf = 0;
let prev = performance.now();
let controlled = false;

function laneX(lane) {
  return LANE_SPACING * (lane + 1);
}

function addLog(line) {
  state.logs.unshift(line);
  if (state.logs.length > 4) state.logs.length = 4;
}

function showOverlay(title, body, actionLabel, actionFn) {
  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <p>Desktop: A/D or Left/Right choose lane, Space/Enter toggles polarity, P pause, R restart, F fullscreen.</p>
      <div class="row">
        <button id="overlayAction" type="button">${actionLabel}</button>
        <button id="overlayFullscreen" type="button">Fullscreen</button>
      </div>
    </div>
  `;
  overlay.classList.add('show');
  overlay.querySelector('#overlayAction')?.addEventListener('click', actionFn, { once: true });
  overlay.querySelector('#overlayFullscreen')?.addEventListener('click', toggleFullscreen);
}

function hideOverlay() {
  overlay.classList.remove('show');
}

function resetState() {
  state.mode = 'menu';
  state.result = null;
  state.elapsed = 0;
  state.timeLeft = TOTAL_SECONDS;
  state.score = 0;
  state.charge = 0;
  state.shield = START_SHIELD;
  state.streak = 0;
  state.selectedLane = 2;
  state.rods = Array.from({ length: LANES }, () => 'plus');
  state.strikeTimer = 0.6;
  state.strikeEvery = 1.2;
  state.activeStrikes = [];
  state.logs = ['Match rod polarity to absorb strikes and charge the vault.'];
}

function startGame() {
  resetState();
  state.mode = 'running';
  hideOverlay();
  try { rememberRecent('stormvault'); } catch {}
  try { maybeUnlock({ anyPlay: true, stormvault: { result: 'started', score: 0, charge: 0 } }); } catch {}
}

function finishGame(win) {
  if (state.mode === 'ended') return;
  state.mode = 'ended';
  state.result = win ? 'won' : 'lost';
  const coins = Math.max(6, Math.floor(state.score / 55) + (win ? 16 : 8));
  try {
    addCoins(coins);
    maybeUnlock({
      anyPlay: true,
      stormvault: {
        result: state.result,
        score: Math.round(state.score),
        charge: state.charge,
        streak: state.streak,
      },
    });
  } catch {}
  const msg = win
    ? `Vault sealed. Stored ${state.charge} charge and earned ${coins} coins.`
    : `Shield collapsed at ${state.charge} charge. You still earned ${coins} coins.`;
  showOverlay('Run Complete', msg, 'Play Again', startGame);
}

function selectLane(delta) {
  if (state.mode !== 'running') return;
  state.selectedLane = Math.max(0, Math.min(LANES - 1, state.selectedLane + delta));
}

function toggleSelectedPolarity() {
  if (state.mode !== 'running') return;
  const lane = state.selectedLane;
  state.rods[lane] = state.rods[lane] === 'plus' ? 'minus' : 'plus';
}

function spawnStrike() {
  const lane = Math.floor(Math.random() * LANES);
  const polarity = Math.random() < 0.5 ? 'plus' : 'minus';
  state.activeStrikes.push({
    id: Math.random().toString(36).slice(2),
    lane,
    polarity,
    y: FIELD_TOP - 40,
    speed: 340 + state.elapsed * 2.1 + Math.random() * 45,
    resolved: false,
  });
}

function togglePause() {
  if (state.mode === 'running') {
    state.mode = 'paused';
    showOverlay('Paused', 'Storm routing paused.', 'Resume', () => {
      state.mode = 'running';
      hideOverlay();
    });
  } else if (state.mode === 'paused') {
    state.mode = 'running';
    hideOverlay();
  }
}

function update(dt) {
  if (state.mode !== 'running') return;

  state.elapsed += dt;
  state.timeLeft = Math.max(0, TOTAL_SECONDS - state.elapsed);
  state.strikeEvery = Math.max(0.46, 1.2 - state.elapsed * 0.006);

  state.strikeTimer += dt;
  while (state.strikeTimer >= state.strikeEvery) {
    state.strikeTimer -= state.strikeEvery;
    spawnStrike();
    if (Math.random() < Math.min(0.38, state.elapsed / 120)) spawnStrike();
  }

  for (let i = state.activeStrikes.length - 1; i >= 0; i -= 1) {
    const strike = state.activeStrikes[i];
    strike.y += strike.speed * dt;
    if (strike.y < FIELD_BOTTOM) continue;

    state.activeStrikes.splice(i, 1);
    if (state.rods[strike.lane] === strike.polarity) {
      state.charge += 1;
      state.streak += 1;
      const gain = 14 + Math.min(22, state.streak * 2);
      state.score += gain;
      addLog(`Lane ${strike.lane + 1} absorbed (${POLARITY_STYLE[strike.polarity].text}) +${gain}`);
    } else {
      state.shield -= 1;
      state.streak = 0;
      addLog(`Lane ${strike.lane + 1} mismatch hit`);
    }
  }

  if (state.charge >= TARGET_CHARGE) {
    finishGame(true);
    return;
  }
  if (state.shield <= 0) {
    finishGame(false);
    return;
  }
  if (state.timeLeft <= 0) {
    finishGame(state.charge >= TARGET_CHARGE);
  }
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#1e2955');
  sky.addColorStop(0.55, '#172446');
  sky.addColorStop(1, '#111a36');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 48; i += 1) {
    const x = (i * 137 + Math.floor(state.elapsed * 15)) % canvas.width;
    const y = (i * 91) % (FIELD_BOTTOM - 20);
    const r = 1 + (i % 2);
    ctx.fillStyle = `rgba(183, 209, 255, ${0.1 + (i % 3) * 0.06})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawField() {
  ctx.strokeStyle = '#96b8ff50';
  ctx.lineWidth = 2;
  ctx.strokeRect(120, FIELD_TOP, canvas.width - 240, FIELD_BOTTOM - FIELD_TOP);

  for (let lane = 0; lane < LANES; lane += 1) {
    const x = laneX(lane);
    ctx.strokeStyle = lane === state.selectedLane ? '#e9f4ff' : '#90aee455';
    ctx.lineWidth = lane === state.selectedLane ? 4 : 2;
    ctx.beginPath();
    ctx.moveTo(x, FIELD_TOP);
    ctx.lineTo(x, FIELD_BOTTOM + 30);
    ctx.stroke();

    const polarity = state.rods[lane];
    const style = POLARITY_STYLE[polarity];
    ctx.fillStyle = lane === state.selectedLane ? '#2e3f74' : '#1f2d58';
    ctx.fillRect(x - 50, FIELD_BOTTOM + 18, 100, 48);
    ctx.strokeStyle = style.glow;
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 50, FIELD_BOTTOM + 18, 100, 48);
    ctx.fillStyle = style.strike;
    ctx.font = '700 34px Trebuchet MS';
    ctx.textAlign = 'center';
    ctx.fillText(style.text, x, FIELD_BOTTOM + 52);
  }
}

function drawStrikes() {
  for (const strike of state.activeStrikes) {
    const style = POLARITY_STYLE[strike.polarity];
    const x = laneX(strike.lane);
    ctx.strokeStyle = style.strike;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(x, strike.y - 26);
    ctx.lineTo(x - 10, strike.y - 4);
    ctx.lineTo(x + 10, strike.y + 10);
    ctx.lineTo(x - 6, strike.y + 28);
    ctx.stroke();

    ctx.fillStyle = style.glow;
    ctx.beginPath();
    ctx.arc(x, strike.y + 34, 9, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLabels() {
  ctx.fillStyle = '#eef6ff';
  ctx.font = '700 36px Trebuchet MS';
  ctx.textAlign = 'left';
  ctx.fillText('Storm Vault', 24, 48);

  ctx.fillStyle = '#c9dcfb';
  ctx.font = '600 16px Trebuchet MS';
  ctx.fillText(`Goal: absorb ${TARGET_CHARGE} matched strikes before shield reaches zero.`, 24, 74);

  ctx.fillStyle = '#d5e4ff';
  ctx.font = '600 14px Trebuchet MS';
  const lines = state.logs.length ? state.logs : ['Toggle rod polarity in each lane to match incoming strike signs.'];
  for (let i = 0; i < lines.length; i += 1) {
    ctx.fillText(`- ${lines[i]}`, 24, 102 + i * 20);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawField();
  drawStrikes();
  drawLabels();
}

function syncHud() {
  modeEl.textContent = state.mode.toUpperCase();
  scoreEl.textContent = String(Math.round(state.score));
  chargeEl.textContent = `${state.charge}/${TARGET_CHARGE}`;
  shieldEl.textContent = String(Math.max(0, state.shield));
  timeEl.textContent = `${Math.max(0, state.timeLeft).toFixed(1)}s`;
  streakEl.textContent = `${state.streak}x`;
  coinsEl.textContent = String(Number(profileState?.coins || 0));

  const timeChip = timeEl.parentElement;
  timeChip.classList.toggle('good', state.timeLeft >= TOTAL_SECONDS * 0.55);
  timeChip.classList.toggle('warn', state.timeLeft < TOTAL_SECONDS * 0.55 && state.timeLeft >= TOTAL_SECONDS * 0.2);
  timeChip.classList.toggle('bad', state.timeLeft < TOTAL_SECONDS * 0.2);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  else document.exitFullscreen?.().catch(() => {});
}

function keyHandler(event) {
  if (event.code === 'ArrowLeft' || event.code === 'KeyA') { event.preventDefault(); selectLane(-1); return; }
  if (event.code === 'ArrowRight' || event.code === 'KeyD') { event.preventDefault(); selectLane(1); return; }
  if (event.code === 'Space' || event.code === 'Enter') { event.preventDefault(); toggleSelectedPolarity(); return; }
  if (event.code === 'KeyP') { event.preventDefault(); togglePause(); return; }
  if (event.code === 'KeyR') { event.preventDefault(); startGame(); return; }
  if (event.code === 'KeyF') { event.preventDefault(); toggleFullscreen(); }
}

function step(ms) {
  const steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  controlled = true;
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  syncHud();
  controlled = false;
}

function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!controlled) {
    update(dt);
    draw();
    syncHud();
  }
  raf = requestAnimationFrame(frame);
}

leftBtn.addEventListener('click', () => selectLane(-1));
rightBtn.addEventListener('click', () => selectLane(1));
toggleBtn.addEventListener('click', toggleSelectedPolarity);
pauseBtn.addEventListener('click', togglePause);
restartBtn.addEventListener('click', startGame);
fullscreenBtn.addEventListener('click', toggleFullscreen);
window.addEventListener('keydown', keyHandler);

window.advanceTime = (ms) => step(ms);
window.render_game_to_text = () => JSON.stringify({
  game: 'stormvault',
  mode: state.mode,
  coordinate_system: 'Canvas origin is top-left. lane index increases left-to-right from 0 to 4. strike y increases top-to-bottom.',
  objective: {
    target_charge: TARGET_CHARGE,
    survive_seconds: TOTAL_SECONDS,
    keep_shield_above: 0,
  },
  resources: {
    elapsed_seconds: Number(state.elapsed.toFixed(3)),
    time_left_seconds: Number(state.timeLeft.toFixed(3)),
    score: Math.round(state.score),
    charge: state.charge,
    shield: state.shield,
    streak: state.streak,
    selected_lane: state.selectedLane,
  },
  rods: state.rods.map((polarity, lane) => ({
    lane,
    polarity,
    symbol: POLARITY_STYLE[polarity].text,
    x: Number(laneX(lane).toFixed(2)),
  })),
  strikes: state.activeStrikes.map((strike) => ({
    id: strike.id,
    lane: strike.lane,
    polarity: strike.polarity,
    symbol: POLARITY_STYLE[strike.polarity].text,
    x: Number(laneX(strike.lane).toFixed(2)),
    y: Number(strike.y.toFixed(2)),
    speed: Number(strike.speed.toFixed(2)),
  })),
  recent_events: state.logs,
  controls: {
    select_prev_lane: 'Left Arrow or A',
    select_next_lane: 'Right Arrow or D',
    toggle_polarity: 'Space or Enter',
    pause: 'P',
    restart: 'R',
    fullscreen: 'F',
  },
  result: state.result,
  coins: Number(profileState?.coins || 0),
});

resetState();
draw();
syncHud();
showOverlay('Storm Vault', 'Choose a lane and toggle +/- to match each incoming strike before it reaches your capacitor row.', 'Start Run', startGame);
raf = requestAnimationFrame((now) => { prev = now; frame(now); });
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '../src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'stormvault', gameName: 'Storm Vault' });
</script>
