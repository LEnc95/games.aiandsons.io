const state = {
  mode: 'intro',
  puzzleIndex: 0,
  puzzle: null,
  grid: [],
  boardRect: null,
  foundIds: new Set(),
  selection: [],
  cursor: { row: 0, col: 0 },
  keyboardAnchor: null,
  pointerAnchor: null,
  activePointerId: null,
  undoStack: [],
  moves: 0,
  mistakes: 0,
  hintsUsed: 0,
  elapsed: 0,
  best: null,
  coinsEarned: 0,
  hint: null,
  sparkles: [],
  flash: 0,
  message: 'Find every hidden word.',
  lastAction: null,
};

let lastFrame = 0;
let manualStepping = false;
let overlayKey = '';

function cleanLabel(label) {
  return String(label || '').toUpperCase().replace(/[^A-Z]/g, '');
}

function computePath(word, size) {
  const letters = cleanLabel(word.label);
  return [...letters].map((_, index) => {
    const row = word.row + word.dr * index;
    const col = word.col + word.dc * index;
    if (row < 0 || col < 0 || row >= size || col >= size) {
      throw new Error(`Word ${word.label} is outside the puzzle grid.`);
    }
    return { row, col };
  });
}

function preparePuzzle(base) {
  const grid = Array.from({ length: base.size }, () => Array.from({ length: base.size }, () => ''));
  const words = base.words.map((word, index) => ({
    ...word,
    label: cleanLabel(word.label),
    color: COLORS[index % COLORS.length],
    path: computePath(word, base.size),
  }));
  words.forEach((word) => {
    [...word.label].forEach((letter, index) => {
      const cell = word.path[index];
      const existing = grid[cell.row][cell.col];
      if (existing && existing !== letter) {
        throw new Error(`Word ${word.label} conflicts at ${cell.row},${cell.col}.`);
      }
      grid[cell.row][cell.col] = letter;
    });
  });
  const fill = cleanLabel(base.fill || FILLERS) + FILLERS;
  let fillIndex = 0;
  for (let row = 0; row < base.size; row += 1) {
    for (let col = 0; col < base.size; col += 1) {
      if (!grid[row][col]) {
        const offset = (row * 7 + col * 5 + fillIndex) % fill.length;
        grid[row][col] = fill[offset];
        fillIndex += 1;
      }
    }
  }
  return { ...base, words, grid };
}

function formatTime(seconds) {
  if (!Number.isFinite(seconds) || seconds <= 0) return '--';
  const whole = Math.floor(seconds);
  const mins = Math.floor(whole / 60);
  const secs = String(whole % 60).padStart(2, '0');
  return `${mins}:${secs}`;
}

function bestKey(puzzleId) {
  return `cade-wordsearch-best-${puzzleId}`;
}

function loadBest(puzzleId) {
  try {
    const value = Number(localStorage.getItem(bestKey(puzzleId)));
    return Number.isFinite(value) && value > 0 ? value : null;
  } catch {
    return null;
  }
}

function saveBest(puzzleId, seconds) {
  try {
    localStorage.setItem(bestKey(puzzleId), String(seconds));
  } catch {
    // Local storage can be unavailable in private contexts.
  }
}

function resetPuzzle(index, mode = 'playing') {
  const normalizedIndex = (index + PUZZLES.length) % PUZZLES.length;
  state.puzzleIndex = normalizedIndex;
  state.puzzle = preparePuzzle(PUZZLES[normalizedIndex]);
  state.grid = state.puzzle.grid;
  state.mode = mode;
  state.foundIds = new Set();
  state.selection = [];
  state.cursor = { row: 0, col: 0 };
  state.keyboardAnchor = null;
  state.pointerAnchor = null;
  state.activePointerId = null;
  state.undoStack = [];
  state.moves = 0;
  state.mistakes = 0;
  state.hintsUsed = 0;
  state.elapsed = 0;
  state.best = loadBest(state.puzzle.id);
  state.coinsEarned = 0;
  state.hint = null;
  state.sparkles = [];
  state.flash = 0;
  state.message = mode === 'intro' ? 'Find every hidden word.' : `Find ${state.puzzle.words.length} hidden words.`;
  state.lastAction = { type: 'load', puzzle: state.puzzle.id, mode };
  if (mode === 'playing') rememberRecent('wordsearch');
  updateHud();
  showOverlay();
  render();
}

function startPuzzle(index = state.puzzleIndex) {
  resetPuzzle(index, 'playing');
}

function nextPuzzle() {
  startPuzzle(state.puzzleIndex + 1);
}

function foundCount() {
  return state.foundIds.size;
}

function isComplete() {
  return state.puzzle && foundCount() === state.puzzle.words.length;
}

function wordById(id) {
  return state.puzzle.words.find(word => word.id === id) || null;
}

function cellKey(cell) {
  return `${cell.row},${cell.col}`;
}

function samePath(a, b) {
  if (!a || !b || a.length !== b.length) return false;
  return a.every((cell, index) => cell.row === b[index].row && cell.col === b[index].col);
}

function reversedPath(path) {
  return [...path].reverse();
}

function selectionLetters(selection = state.selection) {
  return selection.map(cell => state.grid[cell.row]?.[cell.col] || '').join('');
}

function matchingWord(selection = state.selection) {
  return state.puzzle.words.find((word) => {
    if (state.foundIds.has(word.id)) return false;
    return samePath(selection, word.path) || samePath(selection, reversedPath(word.path));
  }) || null;
}

function selectedWordAlreadyFound(selection = state.selection) {
  return state.puzzle.words.find((word) => {
    if (!state.foundIds.has(word.id)) return false;
    return samePath(selection, word.path) || samePath(selection, reversedPath(word.path));
  }) || null;
}

function lineSelection(start, rawEnd) {
  if (!start || !rawEnd || !state.puzzle) return [];
  const size = state.puzzle.size;
  const dr = rawEnd.row - start.row;
  const dc = rawEnd.col - start.col;
  if (dr === 0 && dc === 0) return [{ ...start }];
  const absRow = Math.abs(dr);
  const absCol = Math.abs(dc);
  let end = rawEnd;
  if (!(dr === 0 || dc === 0 || absRow === absCol)) {
    const rowSign = Math.sign(dr);
    const colSign = Math.sign(dc);
    if (absRow > absCol * 1.75) end = { row: rawEnd.row, col: start.col };
    else if (absCol > absRow * 1.75) end = { row: start.row, col: rawEnd.col };
    else {
      const steps = Math.max(absRow, absCol);
      end = {
        row: Math.max(0, Math.min(size - 1, start.row + rowSign * steps)),
        col: Math.max(0, Math.min(size - 1, start.col + colSign * steps)),
      };
    }
  }
  const stepRow = Math.sign(end.row - start.row);
  const stepCol = Math.sign(end.col - start.col);
  const steps = Math.max(Math.abs(end.row - start.row), Math.abs(end.col - start.col));
  const cells = [];
  for (let index = 0; index <= steps; index += 1) {
    const row = start.row + stepRow * index;
    const col = start.col + stepCol * index;
    if (row < 0 || col < 0 || row >= size || col >= size) break;
    cells.push({ row, col });
  }
  return cells;
}

function clearSelection() {
  state.selection = [];
  state.keyboardAnchor = null;
  state.pointerAnchor = null;
}

function addSparklesForWord(word) {
  word.path.forEach((cell, index) => {
    state.sparkles.push({
      row: cell.row,
      col: cell.col,
      color: word.color,
      age: 0,
      life: .7 + index * .035,
    });
  });
}

function submitSelection() {
  if (state.mode !== 'playing') return;
  if (state.selection.length < 2) {
    state.message = 'Select at least two letters in a straight line.';
    state.lastAction = { type: 'short-selection' };
    updateHud();
    render();
    return;
  }
  state.moves += 1;
  const word = matchingWord();
  if (word) {
    state.foundIds.add(word.id);
    state.undoStack.push(word.id);
    state.hint = null;
    state.flash = .18;
    addSparklesForWord(word);
    state.message = `Found ${word.label}.`;
    state.lastAction = { type: 'found', word: word.id, letters: word.label };
    if (isComplete()) completePuzzle();
  } else {
    const foundWord = selectedWordAlreadyFound();
    state.mistakes += foundWord ? 0 : 1;
    state.message = foundWord ? `${foundWord.label} is already found.` : `${selectionLetters()} is not on the word list.`;
    state.lastAction = { type: foundWord ? 'already-found' : 'miss', letters: selectionLetters() };
  }
  clearSelection();
  updateHud();
  showOverlay();
  render();
}

function completePuzzle() {
  if (state.mode === 'won') return;
  state.mode = 'won';
  const seconds = Math.max(1, Math.floor(state.elapsed));
  if (!state.best || seconds < state.best) {
    state.best = seconds;
    saveBest(state.puzzle.id, seconds);
  }
  const speedBonus = Math.max(0, 10 - Math.floor(seconds / 45));
  const cleanBonus = Math.max(0, 12 - state.mistakes * 2 - state.hintsUsed * 3);
  const coins = Math.max(20, 24 + speedBonus + cleanBonus + state.puzzle.words.length);
  state.coinsEarned = coins;
  state.message = `Puzzle solved in ${formatTime(seconds)}.`;
  state.lastAction = { type: 'complete', puzzle: state.puzzle.id, seconds, coins };
  addCoins(coins);
  updateHud();
}

function revealHint() {
  if (state.mode !== 'playing') return;
  const word = state.puzzle.words.find(item => !state.foundIds.has(item.id));
  if (!word) return;
  state.hintsUsed += 1;
  state.hint = {
    wordId: word.id,
    ttl: 4,
    path: word.path.map(cell => ({ ...cell })),
  };
  state.message = `Hint: trace ${word.label}.`;
  state.lastAction = { type: 'hint', word: word.id };
  updateHud();
  render();
}

function undo() {
  if (state.mode !== 'playing') return;
  const id = state.undoStack.pop();
  if (!id) {
    state.message = 'No found word to undo.';
    state.lastAction = { type: 'undo-empty' };
    render();
    return;
  }
  state.foundIds.delete(id);
  const word = wordById(id);
  state.message = word ? `Undid ${word.label}.` : 'Undid last word.';
  state.lastAction = { type: 'undo', word: id };
  updateHud();
  render();
}

function updateHud() {
  if (!state.puzzle) return;
  hud.puzzleName.textContent = state.puzzle.name;
  hud.foundText.textContent = `${foundCount()} / ${state.puzzle.words.length}`;
  hud.timeText.textContent = formatTime(state.elapsed);
  hud.hintsText.textContent = String(state.hintsUsed);
  hud.bestText.textContent = state.best ? formatTime(state.best) : '--';
  hud.coins.textContent = String(profileState.coins);
  buttons.submit.disabled = state.mode !== 'playing' || state.selection.length < 2;
  buttons.hint.disabled = state.mode !== 'playing' || isComplete();
  buttons.undo.disabled = state.mode !== 'playing' || state.undoStack.length === 0;
}

function showOverlay() {
  const key = `${state.mode}|${state.puzzle?.id}|${state.message}|${state.coinsEarned}`;
  if (key === overlayKey) return;
  overlayKey = key;
  if (state.mode === 'intro') {
    overlay.classList.add('show');
    overlayPanel.innerHTML = `
      <h1>Word Search</h1>
      <p>Find every hidden word by tracing straight lines through the letter grid.</p>
      <p class="mini">Drag across letters or use arrows, Space, and Enter. H hints, U undo, N new puzzle, F fullscreen.</p>
      <button class="primary" id="startBtn" type="button">Start Puzzle</button>
    `;
    buttons.start = document.getElementById('startBtn');
    buttons.start.addEventListener('click', () => startPuzzle(state.puzzleIndex));
  } else if (state.mode === 'won') {
    overlay.classList.add('show');
    overlayPanel.innerHTML = `
      <h1>${state.puzzle.name} Solved</h1>
      <p>${state.message} Best time: ${formatTime(state.best)}. Coins earned: ${state.coinsEarned}.</p>
      <p class="mini">Choose the next word hunt or restart this puzzle to chase a faster solve.</p>
      <button class="primary" id="startBtn" type="button">Next Puzzle</button>
    `;
    buttons.start = document.getElementById('startBtn');
    buttons.start.addEventListener('click', nextPuzzle);
  } else {
    overlay.classList.remove('show');
  }
}

function foundCellColor(row, col) {
  for (const word of state.puzzle.words) {
    if (!state.foundIds.has(word.id)) continue;
    if (word.path.some(cell => cell.row === row && cell.col === col)) return word.color;
  }
  return null;
}

function pathHasCell(path, row, col) {
  return Array.isArray(path) && path.some(cell => cell.row === row && cell.col === col);
}

function drawText(text, x, y, size, color = '#102638', align = 'left', weight = 800) {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px "Trebuchet MS", "Segoe UI", sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawBackground(w, h) {
  const gradient = ctx.createLinearGradient(0, 0, w, h);
  gradient.addColorStop(0, '#e9f7f2');
  gradient.addColorStop(.45, '#d7e9f4');
  gradient.addColorStop(1, '#f9e8c6');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#16344d10';
  for (let i = 0; i < 18; i += 1) {
    const x = (i * 97 + 41) % w;
    const y = (i * 53 + 69) % h;
    ctx.beginPath();
    ctx.arc(x, y, 18 + (i % 5) * 9, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBoard(w, h) {
  const size = state.puzzle.size;
  const boardSize = Math.min(h * .68, w * .55);
  const boardX = Math.max(36, w * .055);
  const boardY = Math.max(86, h * .13);
  const cell = boardSize / size;
  state.boardRect = { x: boardX, y: boardY, size: boardSize, cell, rows: size, cols: size };

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(boardX - 10, boardY - 10, boardSize + 20, boardSize + 20);
  ctx.strokeStyle = '#244659';
  ctx.lineWidth = 3;
  ctx.strokeRect(boardX - 10, boardY - 10, boardSize + 20, boardSize + 20);

  const selected = new Set(state.selection.map(cellKey));
  const hinted = state.hint ? new Set(state.hint.path.map(cellKey)) : new Set();
  for (let row = 0; row < size; row += 1) {
    for (let col = 0; col < size; col += 1) {
      const x = boardX + col * cell;
      const y = boardY + row * cell;
      const foundColor = foundCellColor(row, col);
      ctx.fillStyle = foundColor ? `${foundColor}66` : '#f8fbff';
      ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
      if (hinted.has(`${row},${col}`)) {
        ctx.fillStyle = '#ffd05c90';
        ctx.fillRect(x + 4, y + 4, cell - 8, cell - 8);
      }
      if (selected.has(`${row},${col}`)) {
        ctx.fillStyle = '#1f8bff59';
        ctx.fillRect(x + 4, y + 4, cell - 8, cell - 8);
      }
      if (state.cursor.row === row && state.cursor.col === col && state.mode === 'playing') {
        ctx.strokeStyle = '#102638';
        ctx.lineWidth = Math.max(2, cell * .055);
        ctx.strokeRect(x + 5, y + 5, cell - 10, cell - 10);
      }
      drawText(state.grid[row][col], x + cell / 2, y + cell / 2 + 1, Math.max(18, cell * .45), '#162d3a', 'center', 900);
    }
  }

  ctx.strokeStyle = '#8ba0a9';
  for (let i = 0; i <= size; i += 1) {
    ctx.lineWidth = i === 0 || i === size ? 3 : 1;
    ctx.beginPath();
    ctx.moveTo(boardX + i * cell, boardY);
    ctx.lineTo(boardX + i * cell, boardY + boardSize);
    ctx.moveTo(boardX, boardY + i * cell);
    ctx.lineTo(boardX + boardSize, boardY + i * cell);
    ctx.stroke();
  }
}

function drawWordList(w, h) {
  const rect = state.boardRect;
  const panelX = rect.x + rect.size + Math.max(32, w * .035);
  const panelY = rect.y - 10;
  const panelW = Math.max(280, w - panelX - 42);
  const panelH = rect.size + 20;
  ctx.fillStyle = '#102638e8';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = '#ffffff55';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, panelY, panelW, panelH);

  drawText(state.puzzle.name, panelX + 20, panelY + 36, 26, '#ffffff', 'left', 900);
  drawText(`${state.puzzle.difficulty} puzzle`, panelX + 20, panelY + 66, 15, '#b8d0d8', 'left', 800);
  const columns = panelW > 360 ? 2 : 1;
  const rowGap = Math.min(42, (panelH - 128) / Math.ceil(state.puzzle.words.length / columns));
  state.puzzle.words.forEach((word, index) => {
    const col = columns === 2 ? index % 2 : 0;
    const row = columns === 2 ? Math.floor(index / 2) : index;
    const x = panelX + 22 + col * (panelW / 2);
    const y = panelY + 112 + row * rowGap;
    const found = state.foundIds.has(word.id);
    ctx.fillStyle = found ? `${word.color}35` : '#ffffff12';
    ctx.fillRect(x - 7, y - 16, columns === 2 ? panelW / 2 - 22 : panelW - 34, 31);
    drawText(word.label, x, y, 19, found ? '#ffffff' : '#dce9ea', 'left', 900);
    if (found) {
      ctx.strokeStyle = word.color;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, y + 2);
      ctx.lineTo(x + Math.min(96, word.label.length * 14), y + 2);
      ctx.stroke();
    }
  });

  const statusY = panelY + panelH - 54;
  drawText(state.message, panelX + panelW / 2, statusY, 17, '#ffd981', 'center', 900);
  const letters = selectionLetters();
  if (state.selection.length > 1) {
    drawText(`Selected: ${letters}`, panelX + panelW / 2, statusY + 26, 15, '#c9f3ff', 'center', 800);
  } else {
    drawText('Straight lines can run forward, backward, vertical, or diagonal.', panelX + panelW / 2, statusY + 26, 14, '#b8d0d8', 'center', 800);
  }
}

function drawSparkles() {
  const rect = state.boardRect;
  if (!rect) return;
  for (const dot of state.sparkles) {
    const progress = dot.age / dot.life;
    const alpha = Math.max(0, 1 - progress);
    const x = rect.x + (dot.col + .5) * rect.cell;
    const y = rect.y + (dot.row + .5) * rect.cell - progress * rect.cell * .45;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = dot.color;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(3, rect.cell * .11) * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function render() {
  if (!state.puzzle) return;
  const w = canvas.width;
  const h = canvas.height;
  drawBackground(w, h);
  drawText('Word Search', w * .055, 46, 34, '#122c3a', 'left', 900);
  drawText(`Moves ${state.moves}  |  Misses ${state.mistakes}  |  Found ${foundCount()} of ${state.puzzle.words.length}`, w * .055, 78, 17, '#365060', 'left', 800);
  drawBoard(w, h);
  drawWordList(w, h);
  drawSparkles();
  if (state.flash > 0) {
    ctx.globalAlpha = Math.min(.25, state.flash);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.globalAlpha = 1;
  }
}

function pointFromEvent(event) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (event.clientX - rect.left) * scaleX,
    y: (event.clientY - rect.top) * scaleY,
  };
}

function cellFromPoint(point) {
  const rect = state.boardRect;
  if (!rect) return null;
  const col = Math.floor((point.x - rect.x) / rect.cell);
  const row = Math.floor((point.y - rect.y) / rect.cell);
  if (row < 0 || col < 0 || row >= rect.rows || col >= rect.cols) return null;
  return { row, col };
}

function setSelectionFromCell(cell) {
  const anchor = state.pointerAnchor || state.keyboardAnchor || cell;
  state.selection = lineSelection(anchor, cell);
  state.cursor = { ...cell };
  updateHud();
  render();
}

function handlePointerDown(event) {
  if (state.mode !== 'playing') return;
  const cell = cellFromPoint(pointFromEvent(event));
  if (!cell) return;
  event.preventDefault();
  state.activePointerId = event.pointerId;
  state.pointerAnchor = cell;
  state.keyboardAnchor = null;
  state.selection = [{ ...cell }];
  state.cursor = { ...cell };
  try {
    canvas.setPointerCapture(event.pointerId);
  } catch {
    // Pointer capture is not available in every embedded browser.
  }
  updateHud();
  render();
}

function handlePointerMove(event) {
  if (state.mode !== 'playing' || state.activePointerId !== event.pointerId) return;
  const cell = cellFromPoint(pointFromEvent(event));
  if (!cell) return;
  event.preventDefault();
  setSelectionFromCell(cell);
}

function handlePointerUp(event) {
  if (state.mode !== 'playing' || state.activePointerId !== event.pointerId) return;
  event.preventDefault();
  const cell = cellFromPoint(pointFromEvent(event));
  if (cell) setSelectionFromCell(cell);
  state.activePointerId = null;
  submitSelection();
}

function moveCursor(deltaRow, deltaCol) {
  if (state.mode !== 'playing') return;
  const size = state.puzzle.size;
  state.cursor = {
    row: (state.cursor.row + deltaRow + size) % size,
    col: (state.cursor.col + deltaCol + size) % size,
  };
  if (state.keyboardAnchor) state.selection = lineSelection(state.keyboardAnchor, state.cursor);
  updateHud();
  render();
}

function toggleKeyboardSelection() {
  if (state.mode !== 'playing') return;
  if (!state.keyboardAnchor) {
    state.keyboardAnchor = { ...state.cursor };
    state.pointerAnchor = null;
    state.selection = [{ ...state.cursor }];
    state.message = 'Move to the last letter, then press Enter.';
  } else {
    submitSelection();
    return;
  }
  updateHud();
  render();
}

async function toggleFullscreen() {
  try {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
    else await document.exitFullscreen();
  } catch {
    state.message = 'Fullscreen is unavailable in this browser.';
    render();
  }
}

function handleKey(event) {
  const key = event.key.toLowerCase();
  if ([' ', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'enter'].includes(key)) event.preventDefault();
  if (state.mode !== 'playing' && (key === 'enter' || key === ' ')) {
    if (state.mode === 'won') nextPuzzle();
    else startPuzzle(state.puzzleIndex);
    return;
  }
  if (key === 'arrowup' || key === 'w') moveCursor(-1, 0);
  else if (key === 'arrowdown' || key === 's') moveCursor(1, 0);
  else if (key === 'arrowleft' || key === 'a') moveCursor(0, -1);
  else if (key === 'arrowright' || key === 'd') moveCursor(0, 1);
  else if (key === ' ') toggleKeyboardSelection();
  else if (key === 'enter') submitSelection();
  else if (key === 'escape') {
    clearSelection();
    updateHud();
    render();
  } else if (key === 'h') revealHint();
  else if (key === 'u') undo();
  else if (key === 'n') startPuzzle(state.puzzleIndex);
  else if (key === 'f') toggleFullscreen();
}

function update(dt) {
  if (state.mode === 'playing') state.elapsed += dt;
  if (state.hint) {
    state.hint.ttl -= dt;
    if (state.hint.ttl <= 0) state.hint = null;
  }
  state.flash = Math.max(0, state.flash - dt);
  state.sparkles = state.sparkles
    .map(dot => ({ ...dot, age: dot.age + dt }))
    .filter(dot => dot.age < dot.life);
  updateHud();
  showOverlay();
}

function visibleWords() {
  return state.puzzle.words.map(word => ({
    id: word.id,
    label: word.label,
    found: state.foundIds.has(word.id),
    path: word.path.map(cell => ({ ...cell })),
  }));
}

function selectionPayload() {
  return {
    cells: state.selection.map(cell => ({ ...cell })),
    letters: selectionLetters(),
    length: state.selection.length,
  };
}

function renderGameToText() {
  const payload = {
    coordinate_system: 'Canvas coordinates use origin at top-left, x increases right, y increases down. Grid coordinates use zero-based row and column.',
    mode: state.mode,
    puzzle: {
      id: state.puzzle.id,
      name: state.puzzle.name,
      difficulty: state.puzzle.difficulty,
      size: state.puzzle.size,
    },
    grid_rows: state.grid.map(row => row.join('')),
    words: visibleWords(),
    found_count: foundCount(),
    total_words: state.puzzle.words.length,
    cursor: { ...state.cursor },
    keyboard_anchor: state.keyboardAnchor ? { ...state.keyboardAnchor } : null,
    selection: selectionPayload(),
    active_hint: state.hint ? {
      word_id: state.hint.wordId,
      path: state.hint.path.map(cell => ({ ...cell })),
      seconds_remaining: Number(state.hint.ttl.toFixed(2)),
    } : null,
    moves: state.moves,
    mistakes: state.mistakes,
    hints_used: state.hintsUsed,
    elapsed_seconds: Math.floor(state.elapsed),
    best_seconds: state.best,
    coins: profileState.coins,
    coins_earned: state.coinsEarned,
    message: state.message,
    last_action: state.lastAction,
  };
  return JSON.stringify(payload);
}

window.render_game_to_text = renderGameToText;
window.advanceTime = (ms = 16) => {
  manualStepping = true;
  const steps = Math.max(1, Math.round(Number(ms || 16) / (1000 / 60)));
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  render();
  manualStepping = false;
  return renderGameToText();
};
window.__WORDSEARCH_GAME__ = {
  startPuzzle,
  nextPuzzle,
  revealHint,
  undo,
  submitSelection,
  lineSelection,
  renderGameToText,
  selectPathForWord(wordId) {
    const word = wordById(wordId);
    if (!word) return false;
    state.selection = word.path.map(cell => ({ ...cell }));
    submitSelection();
    return true;
  },
};
window.__CADE_FEEDBACK_CONTEXT__ = () => {
  try {
    return JSON.parse(renderGameToText());
  } catch {
    return { game: 'wordsearch', mode: state.mode };
  }
};

buttons.start.addEventListener('click', () => startPuzzle(state.puzzleIndex));
buttons.submit.addEventListener('click', submitSelection);
buttons.hint.addEventListener('click', revealHint);
buttons.undo.addEventListener('click', undo);
buttons.new.addEventListener('click', () => startPuzzle(state.puzzleIndex));
buttons.next.addEventListener('click', nextPuzzle);
buttons.full.addEventListener('click', toggleFullscreen);
canvas.addEventListener('pointerdown', handlePointerDown);
canvas.addEventListener('pointermove', handlePointerMove);
canvas.addEventListener('pointerup', handlePointerUp);
canvas.addEventListener('pointercancel', handlePointerUp);
canvas.addEventListener('contextmenu', event => event.preventDefault());
window.addEventListener('keydown', handleKey);
window.addEventListener('resize', render);

function frame(timestamp = 0) {
  if (!manualStepping) {
    const dt = Math.min(.05, Math.max(0, (timestamp - lastFrame) / 1000 || 0));
    lastFrame = timestamp;
    update(dt);
    render();
  }
  requestAnimationFrame(frame);
}

mountGameFeedback({ gameSlug: 'wordsearch', gameName: 'Word Search' });
resetPuzzle(0, 'intro');
requestAnimationFrame(frame);
</script>
</body>
</html>
