<script type="module">
import { state as profileState, addCoins } from '/src/core/state.js';
import { mountGameFeedback } from '/src/feedback/embed.js';

const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const el={pond:document.getElementById('pondLabel'),score:document.getElementById('scoreLabel'),casts:document.getElementById('castsLabel'),line:document.getElementById('lineLabel'),total:document.getElementById('totalLabel'),coins:document.getElementById('coinsLabel'),start:document.getElementById('startBtn'),next:document.getElementById('nextBtn'),continue:document.getElementById('continueBtn'),pause:document.getElementById('pauseBtn'),restart:document.getElementById('restartBtn'),full:document.getElementById('fullBtn'),left:document.getElementById('leftBtn'),cast:document.getElementById('castBtn'),right:document.getElementById('rightBtn'),live:document.getElementById('liveStatus')};
const PONDS=[
  {name:'Willow Bank',target:18,casts:5,biteRadius:62,biteWindow:1500,waitLimit:6500,sky:['#f9d789','#b7dfcc'],water:['#78c8bd','#277a91'],fish:[{name:'Sunfish',x:950,depth:.29,speed:-48,value:6,color:'#f1a638',size:.82},{name:'Brook bass',x:530,depth:.56,speed:55,value:9,color:'#467f62',size:1.06},{name:'Bluegill',x:300,depth:.74,speed:42,value:7,color:'#587fb0',size:.88}]},
  {name:'Cedar Bend',target:28,casts:5,biteRadius:58,biteWindow:1300,waitLimit:6000,sky:['#f4bd75','#8fcfd0'],water:['#53b6b1','#1e6788'],fish:[{name:'River trout',x:950,depth:.34,speed:-62,value:10,color:'#cf7551',size:1.04},{name:'Crappie',x:465,depth:.58,speed:70,value:8,color:'#777fa0',size:.88},{name:'Smallmouth',x:290,depth:.76,speed:54,value:12,color:'#82744d',size:1.14}]},
  {name:'Moonrise Pool',target:38,casts:5,biteRadius:54,biteWindow:1150,waitLimit:5500,sky:['#deb784','#7899b7'],water:['#438fa1','#174d73'],fish:[{name:'Rainbow trout',x:950,depth:.3,speed:-76,value:14,color:'#d96d6d',size:1.12},{name:'Walleye',x:520,depth:.53,speed:82,value:11,color:'#9d9461',size:1.02},{name:'Night bass',x:270,depth:.76,speed:66,value:16,color:'#424f68',size:1.26}]},
];
const ACTIVE_MODES=new Set(['playing','charging','flight','waiting','bite','reeling']);
const game={mode:'menu',resumeMode:'playing',levelIndex:0,pondScore:0,totalScore:0,pondCaught:0,totalCaught:0,castsLeft:PONDS[0].casts,aim:0,chargeMs:0,flightMs:0,flightDuration:900,flightTarget:840,bobber:{x:170,y:150},waitMs:0,biteMs:0,reelTime:0,reelProgress:0,reelNeeded:5,tension:3,lastReel:null,activeFishId:null,fish:[],elapsedMs:0,campaignMs:0,pulse:0,splash:0,misses:0,lastCatch:null,lastCoins:0,coinsEarned:0,rewardedLevels:new Set(),keys:new Set(),status:'Charge a cast, watch the bobber, then hook and alternate reel strokes.',lastAction:{type:'ready'}};
let view={width:canvas.width,height:canvas.height,waterTop:190,waterBottom:570,rod:{x:150,y:168}},manualUntil=0,lastFrame=performance.now();

function pond(){return PONDS[game.levelIndex]}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function formatSeconds(ms){return `${Math.max(0,ms/1000).toFixed(1)}s`}
function cloneFish(){return pond().fish.map((fish,index)=>({...fish,id:index+1,cooldown:0}))}
function resetPond(message=`${pond().name} ready. Aim, hold Cast for power, and release.`){game.mode='playing';game.resumeMode='playing';game.pondScore=0;game.pondCaught=0;game.castsLeft=pond().casts;game.aim=0;game.chargeMs=0;game.flightMs=0;game.flightTarget=840;game.bobber={x:170,y:150};game.waitMs=0;game.biteMs=0;game.reelTime=0;game.reelProgress=0;game.reelNeeded=5+game.levelIndex;game.tension=3;game.lastReel=null;game.activeFishId=null;game.fish=cloneFish();game.elapsedMs=0;game.splash=0;game.misses=0;game.lastCatch=null;game.lastCoins=0;game.status=message;game.lastAction={type:'pond-ready',pond:game.levelIndex+1};clearInput();syncUi();render()}
function startCampaign(){game.levelIndex=0;game.totalScore=0;game.totalCaught=0;game.campaignMs=0;game.rewardedLevels=new Set();game.coinsEarned=0;resetPond('Willow Bank is open. Land 18 catch points in five casts.');game.lastAction={type:'start',pond:1};syncUi();render()}
function restart(){if(game.mode==='won'){startCampaign();game.status='Fresh campaign started at Willow Bank.';game.lastAction={type:'campaign-restart',pond:1}}else if(game.mode==='menu')startCampaign();else{game.totalScore=Math.max(0,game.totalScore-game.pondScore);game.totalCaught=Math.max(0,game.totalCaught-game.pondCaught);resetPond(`${pond().name} restarted with five fresh casts.`);game.lastAction={type:'restart',pond:game.levelIndex+1}}syncUi();render()}
function nextPond(){if(game.mode!=='level-complete')return false;game.levelIndex++;resetPond(`${pond().name} is open. Faster fish and a higher target await.`);game.lastAction={type:'next-pond',pond:game.levelIndex+1};syncUi();render();return true}
function awardPond(final=false){if(game.rewardedLevels.has(game.levelIndex))return 0;const amount=6+game.levelIndex*4+(final?12:0);addCoins(amount);game.rewardedLevels.add(game.levelIndex);game.coinsEarned+=amount;return amount}
function finishPond(){const final=game.levelIndex===PONDS.length-1,coins=awardPond(final);game.lastCoins=coins;game.mode=final?'won':'level-complete';game.status=final?`Moonrise Pool mastered. ${coins} coins landed with the final catch.`:`${pond().name} target reached. ${coins} coins added to the tackle tin.`;game.lastAction={type:final?'campaign-win':'pond-complete',pond:game.levelIndex+1,score:game.pondScore,coins};clearInput();syncUi();render()}
function losePond(reason){game.mode='lost';game.status=reason;game.lastAction={type:'pond-loss',pond:game.levelIndex+1,score:game.pondScore,target:pond().target,reason};clearInput();syncUi();render()}
function beginCharge(){if(game.mode!=='playing')return false;game.mode='charging';game.chargeMs=0;game.status='Rod loaded. Hold for distance, then release.';game.lastAction={type:'charge-start',aim:Number(game.aim.toFixed(2))};clearInput();syncUi();render();return true}
function releaseCast(){if(game.mode!=='charging')return false;const power=clamp(game.chargeMs/1200,.18,1);game.castsLeft=Math.max(0,game.castsLeft-1);game.flightMs=0;game.flightDuration=650+power*500;game.flightTarget=clamp(280+power*560+game.aim*105,250,920);game.mode='flight';game.status=`Cast ${pond().casts-game.castsLeft} airborne at ${Math.round(power*100)}% power.`;game.lastAction={type:'cast-release',power:Number(power.toFixed(2)),aim:Number(game.aim.toFixed(2)),target_x:Math.round(game.flightTarget),casts_left:game.castsLeft};syncUi();render();return true}
function activeFish(){return game.fish.find(fish=>fish.id===game.activeFishId)||null}
function splashDown(){game.mode='waiting';game.bobber={x:game.flightTarget,y:0};game.waitMs=0;game.splash=500;game.status='Bobber set. Watch for the bite flash and press Cast or Space.';game.lastAction={type:'splash',bobber_x:Math.round(game.bobber.x)};syncUi();render()}
function startBite(fish){if(game.mode!=='waiting'||!fish)return false;game.mode='bite';game.activeFishId=fish.id;game.biteMs=pond().biteWindow;game.status=`${fish.name} is biting! Hook now.`;game.lastAction={type:'bite',fish:fish.name,value:fish.value,window_ms:pond().biteWindow};syncUi();render();return true}
function hookFish(){if(game.mode!=='bite')return false;const fish=activeFish();game.mode='reeling';game.reelTime=4200-game.levelIndex*300;game.reelProgress=0;game.reelNeeded=5+game.levelIndex;game.tension=3;game.lastReel=null;game.status=`${fish?.name||'Fish'} hooked. Alternate Left and Right to reel it in.`;game.lastAction={type:'hook',fish:fish?.name||null,strokes_needed:game.reelNeeded};syncUi();render();return true}
function missCast(reason,type='miss'){const fish=activeFish();if(fish)fish.cooldown=1500;game.mode='miss';game.misses++;game.activeFishId=null;game.lastReel=null;game.status=`${reason} ${game.castsLeft?`${game.castsLeft} casts remain.`:'No casts remain.'}`;game.lastAction={type,reason,casts_left:game.castsLeft,score:game.pondScore};clearInput();syncUi();render()}
function catchFish(){const fish=activeFish();if(!fish)return false;game.pondScore+=fish.value;game.totalScore+=fish.value;game.pondCaught++;game.totalCaught++;game.lastCatch={name:fish.name,value:fish.value};fish.cooldown=1800;fish.x=fish.speed>0?245:930;game.activeFishId=null;game.mode='catch';game.status=`${fish.name} landed for ${fish.value} catch points.`;game.lastAction={type:'catch',fish:fish.name,value:fish.value,pond_score:game.pondScore,target:pond().target,casts_left:game.castsLeft};clearInput();if(game.pondScore>=pond().target)finishPond();else{syncUi();render()}return true}
function reelStroke(direction){if(game.mode!=='reeling'||!['left','right'].includes(direction))return false;if(direction===game.lastReel){game.tension=Math.max(0,game.tension-1);game.status=game.tension?`Switch sides! Line tension dropped to ${game.tension}.`:'The line went slack.';game.lastAction={type:'reel-repeat',direction,tension:game.tension};if(game.tension===0){missCast('The fish shook free from the slack line.','fish-escaped');return false}}else{game.lastReel=direction;game.tension=Math.min(3,game.tension+1);game.reelProgress++;game.status=`Reeling ${game.reelProgress} / ${game.reelNeeded}. Keep alternating.`;game.lastAction={type:'reel-stroke',direction,progress:game.reelProgress,needed:game.reelNeeded,tension:game.tension};if(game.reelProgress>=game.reelNeeded)return catchFish()}syncUi();render();return true}
function continueCast(){if(!['catch','miss'].includes(game.mode))return false;if(game.castsLeft<=0&&game.pondScore<pond().target){losePond(`The last cast is gone: ${game.pondScore} of ${pond().target} catch points landed.`);return true}game.mode='playing';game.chargeMs=0;game.waitMs=0;game.biteMs=0;game.reelTime=0;game.reelProgress=0;game.activeFishId=null;game.status=`${game.castsLeft} casts remain. Aim and hold Cast when ready.`;game.lastAction={type:'next-cast',casts_left:game.castsLeft,score:game.pondScore};syncUi();render();return true}
function adjustAim(delta,source='keyboard'){if(game.mode!=='playing')return false;const before=game.aim;game.aim=clamp(game.aim+delta,-1,1);game.status=game.aim<-.08?'Cast marker shifted left.':game.aim>.08?'Cast marker shifted right.':'Cast marker centered.';game.lastAction={type:game.aim===before?'aim-boundary':'aim',source,aim:Number(game.aim.toFixed(2))};syncUi();render();return game.aim!==before}
function clearInput(){game.keys.clear()}
function updateFish(ms){for(const fish of game.fish){fish.cooldown=Math.max(0,fish.cooldown-ms);if(fish.id===game.activeFishId&&['bite','reeling'].includes(game.mode))continue;fish.x+=fish.speed*ms/1000;if(fish.speed>0&&fish.x>950)fish.x=235;else if(fish.speed<0&&fish.x<235)fish.x=950}}
function findBiter(){let best=null,bestDistance=Infinity;for(const fish of game.fish){if(fish.cooldown>0)continue;const distance=Math.abs(fish.x-game.bobber.x);if(distance<=pond().biteRadius&&distance<bestDistance){best=fish;bestDistance=distance}}return best}
function update(ms){const safe=Math.max(0,Math.min(5000,Number(ms)||0));game.pulse=(game.pulse+safe/650)%(Math.PI*2);game.splash=Math.max(0,game.splash-safe);if(!ACTIVE_MODES.has(game.mode))return;game.elapsedMs+=safe;game.campaignMs+=safe;updateFish(safe);if(game.mode==='playing'){const direction=(game.keys.has('right')?1:0)-(game.keys.has('left')?1:0);if(direction)game.aim=clamp(game.aim+direction*safe*.00062,-1,1)}else if(game.mode==='charging')game.chargeMs=Math.min(1200,game.chargeMs+safe);else if(game.mode==='flight'){game.flightMs+=safe;if(game.flightMs>=game.flightDuration)splashDown()}else if(game.mode==='waiting'){game.waitMs+=safe;const fish=findBiter();if(fish)startBite(fish);else if(game.waitMs>=pond().waitLimit)missCast('Nothing took the lure before the bobber went still.','wait-timeout')}else if(game.mode==='bite'){game.biteMs=Math.max(0,game.biteMs-safe);if(game.biteMs<=0)missCast('The bite flashed past before you set the hook.','bite-missed')}else if(game.mode==='reeling'){game.reelTime=Math.max(0,game.reelTime-safe);if(game.reelTime<=0)missCast('The fish reached the weeds before you finished reeling.','reel-timeout')}syncUi()}
function togglePause(){if(game.mode==='paused'){game.mode=game.resumeMode;game.status='Pond resumed.';game.lastAction={type:'resume',mode:game.mode}}else if(ACTIVE_MODES.has(game.mode)){game.resumeMode=game.mode==='charging'?'playing':game.mode;game.mode='paused';game.chargeMs=game.resumeMode==='playing'?0:game.chargeMs;game.status='Paused. Fish, bite windows, and line tension are frozen.';game.lastAction={type:'pause',from:game.resumeMode};clearInput()}syncUi();render()}
async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen?.();else await document.exitFullscreen?.()}catch(error){game.status='Fullscreen is unavailable in this browser.';game.lastAction={type:'fullscreen-error',message:String(error?.message||error)}}resizeCanvas()}

function computeView(){const width=canvas.width,height=canvas.height;view={width,height,waterTop:height*.30,waterBottom:height*.93,rod:{x:width*.15,y:height*.29}};return view}
function resizeCanvas(){const rect=canvas.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1),width=Math.max(320,Math.round(rect.width*dpr)),height=Math.max(280,Math.round(rect.height*dpr));if(canvas.width!==width||canvas.height!==height){canvas.width=width;canvas.height=height}computeView();render()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,Math.min(r,w/2,h/2))}
function logicalX(value){return value/1000*view.width}
function waterY(depth){return view.waterTop+(view.waterBottom-view.waterTop)*depth}
function drawBackground(){const p=pond(),v=view,sky=ctx.createLinearGradient(0,0,0,v.waterTop);sky.addColorStop(0,p.sky[0]);sky.addColorStop(1,p.sky[1]);ctx.fillStyle=sky;ctx.fillRect(0,0,v.width,v.waterTop+2);ctx.fillStyle='#375b49';for(let i=0;i<9;i++){const x=v.width*(i/8),h=v.height*(.09+.04*Math.sin(i*2.1));ctx.beginPath();ctx.moveTo(x-v.width*.09,v.waterTop);ctx.lineTo(x,v.waterTop-h);ctx.lineTo(x+v.width*.09,v.waterTop);ctx.fill()}const water=ctx.createLinearGradient(0,v.waterTop,0,v.waterBottom);water.addColorStop(0,p.water[0]);water.addColorStop(1,p.water[1]);ctx.fillStyle=water;ctx.fillRect(0,v.waterTop,v.width,v.waterBottom-v.waterTop);ctx.strokeStyle='#fff9cf68';ctx.lineWidth=Math.max(1,v.height*.004);for(let i=0;i<7;i++){const y=v.waterTop+(i+1)*(v.waterBottom-v.waterTop)/8;ctx.beginPath();for(let x=0;x<=v.width;x+=18){const wave=Math.sin(x*.024+i+game.pulse)*4;ctx.lineTo(x,y+wave)}ctx.stroke()}ctx.fillStyle='#d2b17b';ctx.fillRect(0,v.waterBottom,v.width,v.height-v.waterBottom);ctx.fillStyle='#775536';ctx.fillRect(0,v.waterTop-8,v.width*.23,v.height*.055);for(let x=0;x<v.width*.23;x+=v.width*.045)ctx.fillRect(x,v.waterTop-8,v.width*.012,v.height*.11)}
function drawHeader(){const v=view,w=Math.min(v.width*.72,610),h=Math.max(48,v.height*.078),x=(v.width-w)/2,y=Math.max(12,v.height*.025);ctx.save();roundRect(x,y,w,h,16);ctx.fillStyle='#fff9e9e8';ctx.fill();ctx.strokeStyle='#d99635';ctx.lineWidth=3;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#183849';ctx.font=`900 ${Math.max(19,Math.min(31,v.width*.032))}px Inter,system-ui`;ctx.fillText(`LURE LINE · ${pond().name.toUpperCase()}`,v.width/2,y+h/2);ctx.restore()}
function drawAngler(){const v=view,x=v.width*.11,deck=v.waterTop-8;ctx.save();ctx.strokeStyle='#183849';ctx.lineWidth=Math.max(4,v.width*.006);ctx.lineCap='round';ctx.beginPath();ctx.arc(x,deck-v.height*.075,v.height*.026,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(x,deck-v.height*.048);ctx.lineTo(x,deck+.012*v.height);ctx.moveTo(x,deck-v.height*.035);ctx.lineTo(v.rod.x,v.rod.y);ctx.moveTo(x,deck+.01*v.height);ctx.lineTo(x-v.width*.025,deck+v.height*.055);ctx.moveTo(x,deck+.01*v.height);ctx.lineTo(x+v.width*.025,deck+v.height*.055);ctx.stroke();ctx.strokeStyle='#6f4b2d';ctx.lineWidth=Math.max(3,v.width*.004);ctx.beginPath();ctx.moveTo(v.rod.x,v.rod.y);ctx.lineTo(v.width*.205,v.height*.17);ctx.stroke();ctx.restore()}
function fishScreen(fish){return{x:logicalX(fish.x),y:waterY(fish.depth)}}
function drawFish(){for(const fish of game.fish){const p=fishScreen(fish),size=Math.max(12,view.width*.024*fish.size),dir=fish.speed>=0?1:-1,active=fish.id===game.activeFishId;ctx.save();ctx.translate(p.x,p.y);ctx.scale(dir,1);ctx.globalAlpha=fish.cooldown>0?.34:active?1:.88;ctx.shadowColor=active?'#fff09a':'transparent';ctx.shadowBlur=active?size:0;ctx.fillStyle=fish.color;ctx.beginPath();ctx.ellipse(0,0,size*1.25,size*.58,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(-size,0);ctx.lineTo(-size*1.75,-size*.7);ctx.lineTo(-size*1.62,size*.72);ctx.closePath();ctx.fill();ctx.fillStyle='#fff8d4';ctx.beginPath();ctx.arc(size*.65,-size*.12,size*.12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#183849';ctx.beginPath();ctx.arc(size*.68,-size*.12,size*.055,0,Math.PI*2);ctx.fill();ctx.restore()}}
function castPosition(){const t=clamp(game.flightMs/game.flightDuration,0,1),start={x:205,y:.27},end={x:game.flightTarget,y:0};return{x:start.x+(end.x-start.x)*t,y:view.waterTop-view.height*(.08+.25*Math.sin(Math.PI*t))}}
function drawLineAndBobber(){if(!['charging','flight','waiting','bite','reeling'].includes(game.mode)&&game.mode!=='paused')return;let p;if(game.mode==='flight')p={x:logicalX(castPosition().x),y:castPosition().y};else if(['waiting','bite','reeling'].includes(game.mode)||(game.mode==='paused'&&['flight','waiting','bite','reeling'].includes(game.resumeMode)))p={x:logicalX(game.bobber.x),y:view.waterTop+4};else p={x:logicalX(205),y:view.height*.17};ctx.save();ctx.strokeStyle='#fff9d8';ctx.lineWidth=Math.max(1.5,view.width*.002);ctx.beginPath();ctx.moveTo(view.width*.205,view.height*.17);ctx.lineTo(p.x,p.y);if(game.mode==='reeling'||(game.mode==='paused'&&game.resumeMode==='reeling')){const fish=activeFish();if(fish){const fp=fishScreen(fish);ctx.lineTo(fp.x,fp.y)}}ctx.stroke();ctx.fillStyle='#f6eee0';ctx.strokeStyle='#d54f3d';ctx.lineWidth=Math.max(2,view.width*.003);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(7,view.width*.009),0,Math.PI*2);ctx.fill();ctx.stroke();if(game.mode==='bite'){ctx.strokeStyle='#fff59d';ctx.lineWidth=4;for(let i=1;i<=2;i++){ctx.beginPath();ctx.arc(p.x,p.y,18+i*13+Math.sin(game.pulse*4)*3,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='#fff8b6';ctx.font=`900 ${Math.max(28,view.width*.045)}px Inter,system-ui`;ctx.textAlign='center';ctx.fillText('!',p.x,p.y-38)}if(game.splash>0){ctx.strokeStyle=`rgba(255,255,224,${game.splash/500})`;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(p.x,p.y+5,34*(1-game.splash/900),10*(1-game.splash/900),0,0,Math.PI*2);ctx.stroke()}ctx.restore()}
function drawAim(){if(!['playing','charging'].includes(game.mode))return;const power=game.mode==='charging'?clamp(game.chargeMs/1200,.18,1):1,target=clamp(280+power*560+game.aim*105,250,920),x=logicalX(target);ctx.save();ctx.setLineDash([8,8]);ctx.strokeStyle='#fff8b5';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,view.waterTop-35);ctx.lineTo(x,view.waterTop+28);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#183849';ctx.font=`800 ${Math.max(12,view.width*.016)}px Inter,system-ui`;ctx.textAlign='center';ctx.fillText(game.mode==='charging'?`${Math.round(power*100)}%`:'CAST',x,view.waterTop-43);ctx.restore()}
function drawMeters(){if(game.mode==='charging'){const w=Math.min(view.width*.5,460),h=Math.max(18,view.height*.032),x=(view.width-w)/2,y=view.height*.83;ctx.fillStyle='#173849c9';roundRect(x-5,y-5,w+10,h+10,12);ctx.fill();ctx.fillStyle='#fff7d4';roundRect(x,y,w,h,8);ctx.fill();ctx.fillStyle='#eca640';roundRect(x,y,w*clamp(game.chargeMs/1200,0,1),h,8);ctx.fill();ctx.fillStyle='#183849';ctx.font=`900 ${Math.max(12,view.width*.015)}px Inter,system-ui`;ctx.textAlign='center';ctx.fillText('CAST POWER',view.width/2,y-12)}if(game.mode==='reeling'){const w=Math.min(view.width*.54,500),h=Math.max(18,view.height*.031),x=(view.width-w)/2,y=view.height*.83;ctx.fillStyle='#173849d8';roundRect(x-8,y-31,w+16,h+44,12);ctx.fill();ctx.fillStyle='#fff7d4';roundRect(x,y,w,h,8);ctx.fill();ctx.fillStyle=game.tension>1?'#66bd7d':'#e46a57';roundRect(x,y,w*(game.reelProgress/game.reelNeeded),h,8);ctx.fill();ctx.fillStyle='#fffbe7';ctx.font=`850 ${Math.max(12,view.width*.016)}px Inter,system-ui`;ctx.textAlign='center';ctx.fillText(`ALTERNATE REEL · ${game.reelProgress}/${game.reelNeeded} · TENSION ${game.tension}`,view.width/2,y-12)}}
function overlay(title,lines,accent='#d99635'){const v=view,w=Math.min(v.width*.8,700),h=Math.min(v.height*.56,350),x=(v.width-w)/2,y=(v.height-h)/2;ctx.save();ctx.fillStyle='#153046a8';ctx.fillRect(0,0,v.width,v.height);roundRect(x,y,w,h,24);ctx.fillStyle='#fffaf0f5';ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=5;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#183849';ctx.font=`900 ${Math.max(25,Math.min(47,w*.069))}px Inter,system-ui`;ctx.fillText(title,x+w/2,y+h*.23);ctx.font=`750 ${Math.max(14,Math.min(20,w*.03))}px Inter,system-ui`;lines.forEach((line,index)=>ctx.fillText(line,x+w/2,y+h*(.44+index*.145)));ctx.restore()}
function render(){computeView();drawBackground();drawFish();drawAngler();drawLineAndBobber();drawAim();drawHeader();drawMeters();if(game.mode==='menu')overlay('LURE LINE',['Hold Space or Cast to charge, then release.','Hook on the bite flash; alternate Left and Right to reel.','Reach each pond target before five casts are gone.']);else if(game.mode==='paused')overlay('POND PAUSED',[`Paused during ${game.resumeMode}.`,'Fish and reaction timers are frozen.','Press P or Pause to continue.']);else if(game.mode==='catch')overlay('CATCH LANDED',[`${game.lastCatch?.name||'Fish'} · ${game.lastCatch?.value||0} catch points`,`${game.pondScore} of ${pond().target} points · ${game.castsLeft} casts left`,'Press Enter or Next cast.'],'#4b9d6b');else if(game.mode==='miss')overlay('CAST MISSED',[game.status,`${game.pondScore} of ${pond().target} catch points landed.`,'Press Enter to continue.'],'#d66a55');else if(game.mode==='level-complete')overlay('POND MASTERED',[`${pond().name}: ${game.pondScore} catch points.`,`${game.lastCoins} coins added.`,'Press Enter or Next pond.'],'#4b9d6b');else if(game.mode==='lost')overlay('TACKLE EMPTY',[game.status,'Restart this pond for five fresh casts.','Press R or Restart.'],'#d65a4c');else if(game.mode==='won')overlay('THREE PONDS MASTERED',[`${game.totalCaught} fish · ${game.totalScore} total catch points.`,`${game.coinsEarned} campaign coins earned.`,'Press Restart for a new campaign.'],'#4b9d6b');syncUi()}
function lineLabel(){if(game.mode==='paused')return'Paused';if(game.mode==='charging')return`${Math.round(clamp(game.chargeMs/1200,0,1)*100)}%`;if(game.mode==='flight')return'Flying';if(game.mode==='waiting')return'Watching';if(game.mode==='bite')return`Bite ${formatSeconds(game.biteMs)}`;if(game.mode==='reeling')return`${game.reelProgress}/${game.reelNeeded}`;if(game.mode==='catch')return'Landed';if(game.mode==='miss')return'Missed';if(game.mode==='lost')return'Empty';if(game.mode==='won')return'Mastered';return'Ready'}
function syncUi(){el.pond.textContent=`${game.levelIndex+1} / ${PONDS.length}`;el.score.textContent=`${game.pondScore} / ${pond().target}`;el.casts.textContent=String(game.castsLeft);el.line.textContent=lineLabel();el.total.textContent=String(game.totalScore);el.coins.textContent=String(profileState.coins||0);el.start.hidden=game.mode!=='menu';el.next.hidden=game.mode!=='level-complete';el.continue.hidden=!['catch','miss'].includes(game.mode);el.continue.textContent=game.castsLeft?'Next cast':'See result';el.pause.disabled=!(ACTIVE_MODES.has(game.mode)||game.mode==='paused');el.pause.textContent=game.mode==='paused'?'Resume':'Pause';const reel=game.mode==='reeling';el.left.textContent=reel?'Reel left':'Aim left';el.right.textContent=reel?'Reel right':'Aim right';el.left.disabled=!(game.mode==='playing'||reel);el.right.disabled=!(game.mode==='playing'||reel);el.cast.disabled=!['playing','charging','bite'].includes(game.mode);el.cast.textContent=game.mode==='charging'?'Release cast':game.mode==='bite'?'HOOK!':'Hold to cast';el.cast.classList.toggle('bite',game.mode==='bite');el.live.textContent=game.status}
function pressHorizontal(direction,down=true,source='button'){if(!['left','right'].includes(direction))return;if(game.mode==='reeling'){if(down)reelStroke(direction);return}if(game.mode!=='playing')return;if(down){if(!game.keys.has(direction))adjustAim(direction==='left'?-.055:.055,source);game.keys.add(direction)}else game.keys.delete(direction)}
function bindAim(button,direction){button.addEventListener('pointerdown',event=>{button.setPointerCapture?.(event.pointerId);pressHorizontal(direction,true,'touch');event.preventDefault()});for(const type of ['pointerup','pointercancel','pointerleave'])button.addEventListener(type,()=>pressHorizontal(direction,false,'touch'))}
bindAim(el.left,'left');bindAim(el.right,'right');
el.cast.addEventListener('pointerdown',event=>{el.cast.setPointerCapture?.(event.pointerId);if(game.mode==='playing')beginCharge();else if(game.mode==='bite')hookFish();event.preventDefault()});for(const type of ['pointerup','pointercancel'])el.cast.addEventListener(type,()=>{if(game.mode==='charging')releaseCast()});
canvas.addEventListener('pointerdown',event=>{const rect=canvas.getBoundingClientRect(),logical=(event.clientX-rect.left)/rect.width*1000;if(game.mode==='menu'){startCampaign();return}if(game.mode==='playing'){game.aim=clamp((logical-840)/105,-1,1);beginCharge()}else if(game.mode==='bite')hookFish();else if(game.mode==='reeling')reelStroke(logical<500?'left':'right')});canvas.addEventListener('pointerup',()=>{if(game.mode==='charging')releaseCast()});canvas.addEventListener('pointercancel',()=>{if(game.mode==='charging')releaseCast()});
el.start.addEventListener('click',startCampaign);el.next.addEventListener('click',nextPond);el.continue.addEventListener('click',continueCast);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restart);el.full.addEventListener('click',toggleFullscreen);
document.addEventListener('keydown',event=>{const raw=event.key.toLowerCase();if(['arrowleft','a','arrowright','d'].includes(raw)){event.preventDefault();const direction=raw==='arrowleft'||raw==='a'?'left':'right';if(!event.repeat)pressHorizontal(direction,true,'keyboard');return}if(raw===' '){event.preventDefault();if(event.repeat)return;if(game.mode==='playing')beginCharge();else if(game.mode==='bite')hookFish();else if(['catch','miss'].includes(game.mode))continueCast();return}if(raw==='enter'){event.preventDefault();if(game.mode==='menu')startCampaign();else if(game.mode==='level-complete')nextPond();else if(['catch','miss'].includes(game.mode))continueCast();return}if(raw==='p'){togglePause();return}if(raw==='r'){restart();return}if(raw==='f'){toggleFullscreen();return}if(raw==='escape'&&document.fullscreenElement)document.exitFullscreen?.()});
document.addEventListener('keyup',event=>{const raw=event.key.toLowerCase();if(['arrowleft','a','arrowright','d'].includes(raw)){pressHorizontal(raw==='arrowleft'||raw==='a'?'left':'right',false,'keyboard');return}if(raw===' '&&game.mode==='charging')releaseCast()});window.addEventListener('blur',clearInput);document.addEventListener('visibilitychange',()=>{if(document.hidden)clearInput()});document.addEventListener('fullscreenchange',resizeCanvas);window.addEventListener('resize',resizeCanvas);

window.advanceTime=ms=>{manualUntil=performance.now()+140;let left=Math.max(0,Math.min(30000,Number(ms)||0));while(left>0){const step=Math.min(1000/60,left);update(step);left-=step}render()};
window.render_game_to_text=()=>JSON.stringify({coordinate_system:'logical canvas 1000x620; origin top-left; x increases right, water depth increases down',perspective:'single local angler',network_state:'offline self-contained',mode:game.mode,paused_from:game.mode==='paused'?game.resumeMode:null,pond:{name:pond().name,index:game.levelIndex+1,total:PONDS.length,target:pond().target,score:game.pondScore,casts_left:game.castsLeft},cast:{aim:Number(game.aim.toFixed(2)),charge_percent:Math.round(clamp(game.chargeMs/1200,0,1)*100),flight_progress:game.mode==='flight'?Number(clamp(game.flightMs/game.flightDuration,0,1).toFixed(2)):null,bobber_x:['waiting','bite','reeling'].includes(game.mode)?Math.round(game.bobber.x):null,wait_remaining_ms:game.mode==='waiting'?Math.max(0,Math.round(pond().waitLimit-game.waitMs)):null,bite_remaining_ms:game.mode==='bite'?Math.round(game.biteMs):null},reel:game.mode==='reeling'?{fish:activeFish()?.name||null,progress:game.reelProgress,needed:game.reelNeeded,tension:game.tension,time_remaining_ms:Math.round(game.reelTime),next_stroke:game.lastReel==='left'?'right':game.lastReel==='right'?'left':'either'}:null,fish:game.fish.map(fish=>({id:fish.id,name:fish.name,x:Number(fish.x.toFixed(1)),depth:fish.depth,direction:fish.speed>0?'right':'left',value:fish.value,available:fish.cooldown<=0,active:fish.id===game.activeFishId})),campaign:{total_score:game.totalScore,total_caught:game.totalCaught,coins_earned:game.coinsEarned},status:game.status,last_catch:game.lastCatch,last_action:game.lastAction,controls:{aim:'Left/Right or A/D',cast:'Hold and release Space or Cast',hook:'Space or Cast during bite',reel:'Alternate Left and Right',pause:'P',restart:'R',fullscreen:'F',continue:'Enter'}});
window.__LURE_LINE_GAME__={getState:()=>game,getView:()=>view,start:startCampaign,restart,nextPond,beginCharge,releaseCast,adjustAim,hook:hookFish,reel:reelStroke,continueCast,pause:togglePause,forceBite:(index=0)=>{const fish=game.fish[index]||game.fish[0];if(!ACTIVE_MODES.has(game.mode)&&game.mode!=='playing')game.mode='playing';game.mode='waiting';game.bobber={x:fish.x,y:0};game.waitMs=0;fish.cooldown=0;startBite(fish);return game.mode},forceCatch:(index=0)=>{window.__LURE_LINE_GAME__.forceBite(index);hookFish();let side='left';while(game.mode==='reeling'){reelStroke(side);side=side==='left'?'right':'left'}return game.mode},solvePond:()=>{game.pondScore=Math.max(game.pondScore,pond().target);finishPond();return game.mode},failPond:()=>{game.castsLeft=0;losePond(`The last cast is gone: ${game.pondScore} of ${pond().target} catch points landed.`);return game.mode},completeCampaign:()=>{while(game.mode!=='won'){if(game.mode==='level-complete')nextPond();else{game.pondScore=Math.max(game.pondScore,pond().target);finishPond()}if(!['level-complete','won','playing'].includes(game.mode))break}return game.mode},clearInput};
mountGameFeedback({gameSlug:'lureline',gameName:'Lure Line'});
function frame(now){if(now>=manualUntil){const dt=Math.min(50,Math.max(0,now-lastFrame));update(dt);render()}lastFrame=now;requestAnimationFrame(frame)}
game.fish=cloneFish();resizeCanvas();syncUi();requestAnimationFrame(frame);
</script>
