  <style>
    :root {
      --bg: #1a0b2e;
      --fg: #ffffff;
      --muted: #a7b8df;
      --accent: #f472b6;
      --accent-hover: #fb923c;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --card-hover-bg: rgba(255, 255, 255, 0.12);
      --card-active-bg: rgba(255, 255, 255, 0.18);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
      color: var(--fg);
      font-family: 'Fredoka', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: clamp(20px, 5vh, 40px) clamp(16px, 4vw, 32px); }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px clamp(16px, 4vw, 32px);
      background: rgba(26, 11, 46, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--card-border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    .topbar h1 { margin: 0; font-size: clamp(20px, 3vw, 28px); font-weight: 700; color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

    .coin-display {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(251, 191, 36, 0.2);
      border: 2px solid rgba(251, 191, 36, 0.4);
      border-radius: 20px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .back-link {
      padding: 8px 16px;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 20px;
      color: var(--fg);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      touch-action: manipulation;
    }
    .back-link:hover { transform: scale(1.05); background: var(--card-hover-bg); border-color: var(--accent); }
    .back-link:active { transform: scale(0.95); background: var(--card-active-bg); }

    .shop-controls {
      margin-top: 10px;
      padding: 20px;
      border-radius: 24px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .shop-controls input,
    .shop-controls select {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 2px solid var(--card-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--fg);
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .shop-controls input:focus,
    .shop-controls select:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.2);
    }

    .shop-filter-summary { grid-column: 1 / -1; font-size: 14px; color: var(--muted); font-weight: 600; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-top: 24px; }

    .shop-notice {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 20px;
      border: 2px solid var(--accent);
      background: rgba(244, 114, 182, 0.15);
      font-size: 15px;
      font-weight: 700;
      color: #ffd7eb;
      animation: noticeIn 0.5s ease-out;
    }
    @keyframes noticeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .shop-notice.hidden { display: none; }
    .shop-notice.ended { border-color: #22d3ee; background: rgba(34, 211, 238, 0.15); color: #d1f7ff; }

    .shop-item {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 30px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .shop-item:hover { transform: translateY(-8px) scale(1.02); border-color: var(--accent); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); background: var(--card-hover-bg); }
    .shop-item.owned { border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
    .shop-item.equipped { border-color: #fbbf24; background: rgba(251, 191, 36, 0.08); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.2); }
    .shop-item.premium-locked { border-color: #f472b6; background: rgba(244, 114, 182, 0.05); }

    .shop-item-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .shop-item-title { font-size: 22px; font-weight: 700; margin: 0; color: #fff; }

    .shop-item-price {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
      font-weight: 800;
      font-size: 15px;
      color: #fbbf24;
      transition: all 0.3s;
    }
    .shop-item-price.owned { background: rgba(34, 211, 238, 0.2); color: #22d3ee; }
    .shop-item-price.equipped { background: #fbbf24; color: #1a0b2e; }

    .shop-item-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: -4px; }
    .shop-item-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 999px;
      border: 2px solid var(--card-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .shop-item-tag.premium { border-color: var(--accent); background: rgba(244, 114, 182, 0.15); color: #ffd7eb; }

    .shop-empty { border: 2px dashed var(--card-border); border-radius: 24px; padding: 40px; text-align: center; color: var(--muted); font-size: 18px; font-weight: 600; }
    .shop-item-desc { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0; font-weight: 500; }

    .shop-item-preview {
      padding: 24px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--card-border);
      transition: all 0.3s;
    }
    .shop-item:hover .shop-item-preview { transform: scale(1.05); border-color: rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.3); }

    .shop-item-btn {
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(244, 114, 182, 0.3);
      touch-action: manipulation;
    }
    .shop-item-btn:hover:not(:disabled) { transform: scale(1.05); background: var(--accent-hover); box-shadow: 0 6px 20px rgba(244, 114, 182, 0.5); }
    .shop-item-btn:active:not(:disabled) { transform: scale(0.95); }
    .shop-item-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .shop-item-btn.owned { background: rgba(34, 211, 238, 0.3); color: #fff; box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); border: 2px solid rgba(34, 211, 238, 0.5); }
    .shop-item-btn.owned:hover:not(:disabled) { background: rgba(34, 211, 238, 0.5); }
    .shop-item-btn.equipped { background: #fbbf24; color: #1a0b2e; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); }
    .shop-item-btn.premium-lock { background: rgba(244, 114, 182, 0.2); color: #ffd7eb; border: 2px solid var(--accent); }

    .shop-item-note { margin: 0; font-size: 13px; color: #ffdca0; line-height: 1.4; font-weight: 600; text-align: center; }

    @media (max-width: 700px) {
      .shop-controls { grid-template-columns: 1fr; }
      .wrap { padding: 20px 16px; }
      .shop-grid { gap: 16px; }
    }

      let remoteEntitlementLastSyncedAt = 0;

      async function refreshRemoteEntitlements({ forceConfig = false } = {}) {
        if (remoteEntitlementSyncInFlight) return false;
        remoteEntitlementSyncInFlight = true;
        try {
          const result = await syncEntitlementsWithBillingBackend({ forceConfig });
          remoteEntitlementLastSyncedAt = Date.now();
          return Boolean(result && result.synced);
        } catch {
          return false;
        } finally {
          remoteEntitlementSyncInFlight = false;
        }
      }

      const shopGameFilter = document.getElementById("shopGameFilter");
      const shopFilterSummary = document.getElementById("shopFilterSummary");
      const shopNotice = document.getElementById("shopNotice");
      const shopGrid = document.getElementById("shopGrid");

      let selectedShopGame = "all";

      const escapeHtml = (str) => {
        const p = document.createElement("p");
        p.textContent = str;
        return p.innerHTML;
      };
      const formatMinutes = (m) => {
        if (m < 1) return "less than a minute";
        if (m === 1) return "1 minute";
        return `${m} minutes`;
      };
      const isShopLocked = () => {
        return state.classroom.enabled && state.classroom.shopDisabledDuringClass && isClassroomSessionActive();
      };

      if (!(state.inventory instanceof Set)) {
        state.inventory = new Set(Array.isArray(state.inventory) ? state.inventory : []);
      }

      if (!state.cosmeticsOwned || typeof state.cosmeticsOwned !== "object") {
        state.cosmeticsOwned = {};
      }

      const DEFAULT_COSMETICS = { paddle: "default", snake: "default", marioShirt: "red", memoryCardBack: "default" };

      let normalizedCosmetics = false;
      for (const [category, fallback] of Object.entries(DEFAULT_COSMETICS)) {
        const current = state.cosmeticsOwned[category];
        if (!Array.isArray(current)) {
          state.cosmeticsOwned[category] = typeof fallback === "string" ? [fallback] : [];
          normalizedCosmetics = true;
        } else if (typeof fallback === "string" && !current.includes(fallback)) {
          state.cosmeticsOwned[category] = [fallback, ...current];
          normalizedCosmetics = true;
        }
      }
      if (normalizedCosmetics) {
        save();
      }

      const itemById = new Map(items.map(i => [i.id, i]));

      function getFilteredItems() {
        return items.filter(item => {
          const matchesSearch = !shopSearchQuery || 
            normalizeText(item.name).includes(shopSearchQuery) || 
            normalizeText(item.desc).includes(shopSearchQuery);
          const matchesGame = selectedShopGame === "all" || item.game === selectedShopGame;
          return matchesSearch && matchesGame;
        });
      }

      // Populate game filter
      const gamesWithItems = [...new Set(items.map(i => i.game).filter(Boolean))].sort();
      gamesWithItems.forEach(game => {
        const opt = document.createElement("option");
        opt.value = game;
        opt.textContent = game;
        shopGameFilter.appendChild(opt);
      });

      const renderShopNotice = () => {
        const prem = hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM);
        if (isShopLocked()) {
          shopNotice.classList.remove("hidden");
          shopNotice.textContent = "Classroom session is active. Shop actions are locked until the session ends.";
          return;
        }
        if (wasClassroomSessionRecentlyEnded()) {
          const endedMinutes = getClassroomMinutesSinceEnd();
          const endedMessage = endedMinutes <= 0
            ? "Classroom session ended just now."
            : `Classroom session ended ${formatMinutes(endedMinutes)} ago.`;
          shopNotice.classList.remove("hidden");
          shopNotice.classList.add("ended");
          shopNotice.textContent = `${endedMessage} Shop actions are now unlocked.`;
          return;
        }
        if (!prem) {
          shopNotice.classList.remove("hidden");
          shopNotice.textContent = "Some shop items are Family Premium. Free users can still access all core gameplay.";
          return;
        }
        shopNotice.classList.add("hidden");
        shopNotice.textContent = "";
      };

      const getOwnedList = (category) => {
        const fallback = DEFAULT_COSMETICS[category];
        let list = state.cosmeticsOwned[category];
        let mutated = false;

        if (!Array.isArray(list)) {
          list = [];
          if (typeof fallback === "string") {
            list.push(fallback);
          }
          state.cosmeticsOwned[category] = list;
          mutated = true;
        } else if (typeof fallback === "string" && !list.includes(fallback)) {
          list = [fallback, ...list];
          state.cosmeticsOwned[category] = list;
          mutated = true;
        }

        if (mutated) {
          save();
        }

        return list;
      };

      function buyItem(id) {
        const item = itemById.get(id);
        if (!item) return;
        const premiumItem = isPremiumShopItem(item);
        const isCosmetic = item.type === "cosmetic";
        trackKpiEvent("shop_purchase_attempt", {
          itemId: item.id,
          itemType: item.type,
          premium: premiumItem,
          price: item.price,
        });

        if (isShopLocked()) {
          trackKpiEvent("shop_purchase_blocked", { itemId: item.id, reason: "classroom_lock", premium: premiumItem });
          updateUI();
          return;
        }

        const entitlements = getEntitlements();
        const alreadyOwned = isCosmetic
          ? getOwnedList(item.category).includes(item.value)
          : state.inventory.has(item.id);
        if (isShopItemLockedByEntitlement(item, entitlements) && !alreadyOwned) {
          trackKpiEvent("shop_purchase_blocked", { itemId: item.id, reason: "entitlement_lock", premium: premiumItem });
          updateUI();
          return;
        }

        if (isCosmetic) {
          const ownedList = getOwnedList(item.category);
          const alreadyOwned = ownedList.includes(item.value);

          if (alreadyOwned) {
            if (state.cosmetics[item.category] !== item.value) {
              state.cosmetics[item.category] = item.value;
              trackKpiEvent("shop_item_equipped", { itemId: item.id, category: item.category });
              save();
            }
            updateUI();
            return;
          }

          if (!spendCoins(item.price)) {
            trackKpiEvent("shop_purchase_blocked", { itemId: item.id, reason: "insufficient_coins", premium: premiumItem });
            updateUI();
            return;
          }

          ownedList.push(item.value);
          state.inventory.add(item.id);
          state.cosmetics[item.category] = item.value;
          trackKpiEvent("shop_purchase_success", {
            itemId: item.id,
            itemType: item.type,
            premium: premiumItem,
            price: item.price,
          });
          save();
          updateUI();
          alert(`Purchased ${item.name}!`);
          return;
        }

        if (state.inventory.has(item.id)) {
          updateUI();
          return;
        }

        if (!spendCoins(item.price)) {
          trackKpiEvent("shop_purchase_blocked", { itemId: item.id, reason: "insufficient_coins", premium: premiumItem });
          updateUI();
          return;
        }

        state.inventory.add(item.id);
        trackKpiEvent("shop_purchase_success", {
          itemId: item.id,
          itemType: item.type,
          premium: premiumItem,
          price: item.price,
        });
        save();
        updateUI();
        alert(`Purchased ${item.name}!`);
      }

      function equipItem(id) {
        if (isShopLocked()) {
          updateUI();
          return;
        }

        const item = itemById.get(id);
        if (!item || item.type !== "cosmetic") return;

        const ownedList = getOwnedList(item.category);
        if (!ownedList.includes(item.value)) return;
        if (state.cosmetics[item.category] === item.value) return;

        state.cosmetics[item.category] = item.value;
        trackKpiEvent("shop_item_equipped", { itemId: item.id, category: item.category });
        save();
        updateUI();
      }

      function unequipItem(category) {
        if (isShopLocked()) {
          updateUI();
          return;
        }

        if (!(category in DEFAULT_COSMETICS)) return;
        const fallback = DEFAULT_COSMETICS[category];
        if (state.cosmetics[category] === fallback) return;

        state.cosmetics[category] = fallback;
        trackKpiEvent("shop_item_unequipped", { category });
        save();
        updateUI();
      }

      function updateUI() {
        const coinsEl = document.getElementById("coins");
        const shopGrid = document.getElementById("shopGrid");
        if (!coinsEl || !shopGrid) return;

        const shopLocked = isShopLocked();
        const filteredItems = getFilteredItems();
        const entitlements = getEntitlements();
        const hasFamilyPremium = hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM, entitlements);
        const premiumCount = filteredItems.filter((item) => isPremiumShopItem(item)).length;
        const premiumLockedCount = filteredItems.filter((item) => {
          const isCosmetic = item.type === "cosmetic";
          const owned = isCosmetic
            ? getOwnedList(item.category).includes(item.value)
            : state.inventory.has(item.id);
          return !owned && isShopItemLockedByEntitlement(item, entitlements);
        }).length;
        renderShopNotice();
        coinsEl.textContent = state.coins;
        if (shopFilterSummary) {
          const premiumText = premiumCount > 0
            ? ` | ${premiumCount} premium${premiumLockedCount > 0 ? ` (${premiumLockedCount} locked)` : ""}`
            : "";
          const tierText = hasFamilyPremium ? "Family Premium active" : "Free tier";
          shopFilterSummary.textContent = `Showing ${filteredItems.length} of ${items.length} items${premiumText} | ${tierText}`;
        }

        shopGrid.innerHTML = "";
        if (!filteredItems.length) {
          shopGrid.innerHTML = `
            <div class="shop-empty" style="grid-column: 1 / -1;">
              <p style="margin-top:0;">No shop items match this search/filter yet.</p>
              <button class="back-link" style="cursor:pointer; font-family:inherit;" id="clearShopFiltersBtn">Clear Filters</button>
            </div>
          `;
          document.getElementById('clearShopFiltersBtn').onclick = () => {
            shopSearchInput.value = '';
            shopGameFilter.value = 'all';
            shopSearchQuery = '';
            selectedShopGame = 'all';
            updateUI();
          };
          return;
        }

        filteredItems.forEach(item => {
          const isCosmetic = item.type === "cosmetic";
          const owned = isCosmetic ? getOwnedList(item.category).includes(item.value) : state.inventory.has(item.id);
          const equipped = isCosmetic ? state.cosmetics[item.category] === item.value : false;
          const canAfford = state.coins >= item.price;
          const premiumItem = isPremiumShopItem(item);
          const premiumLocked = premiumItem && !owned && isShopItemLockedByEntitlement(item, entitlements);

          const card = document.createElement("div");
          card.className = "shop-item";
          if (owned) card.classList.add("owned");
          if (equipped) card.classList.add("equipped");
          if (premiumLocked) card.classList.add("premium-locked");

          card.innerHTML = `
            <div class="shop-item-header">
              <h3 class="shop-item-title">${item.name}</h3>
              <span class="shop-item-price"></span>
            </div>
            ${(item.game || premiumItem) ? `<div class="shop-item-tags">
              ${item.game ? `<span class="shop-item-tag">${escapeHtml(item.game)}</span>` : ""}
              ${premiumItem ? `<span class="shop-item-tag premium">Family Premium</span>` : ""}
            </div>` : ""}
            <p class="shop-item-desc">${item.desc}</p>
            <div class="shop-item-preview">${item.preview}</div>
            <button class="shop-item-btn" type="button"></button>
          `;

          const badge = card.querySelector(".shop-item-price");
          const button = card.querySelector(".shop-item-btn");

          if (!badge || !button) return;

          if (shopLocked) {
            if (isCosmetic) {
              if (equipped) {
                badge.textContent = "Equipped";
                badge.classList.add("equipped");
              } else if (owned) {
                badge.textContent = "Owned";
                badge.classList.add("owned");
              } else {
                badge.textContent = `${item.price} coins`;
              }
            } else if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
            } else {
              badge.textContent = `${item.price} coins`;
            }

            button.textContent = "Locked during class";
            button.disabled = true;
            shopGrid.appendChild(card);
            return;
          }

          if (premiumLocked) {
            badge.textContent = "Premium";
            button.textContent = "Family Premium required";
            button.classList.add("premium-lock");
            button.disabled = true;
            const note = document.createElement("p");
            note.className = "shop-item-note";
            note.textContent = "Included with Family Premium. Free users can still play all core games.";
            card.appendChild(note);
            shopGrid.appendChild(card);
            return;
          }

          if (isCosmetic) {
            if (equipped) {
              badge.textContent = "Equipped";
              badge.classList.add("equipped");
              button.textContent = "Unequip";
              button.classList.add("equipped");
              button.addEventListener("click", () => unequipItem(item.category));
            } else if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
              button.textContent = "Equip";
              button.classList.add("owned");
              button.addEventListener("click", () => equipItem(item.id));
            } else {
              badge.textContent = `${item.price} 🪙`;
              button.textContent = canAfford ? "Buy" : "Not enough coins";
              if (!canAfford) {
                button.disabled = true;
              } else {
                button.addEventListener("click", () => buyItem(item.id));
              }
            }
          } else {
            if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
              button.textContent = "Owned";
              button.classList.add("owned");
              button.disabled = true;
            } else {
              badge.textContent = `${item.price} 🪙`;
              button.textContent = canAfford ? "Buy" : "Not enough coins";
              if (!canAfford) {
                button.disabled = true;
              } else {
                button.addEventListener("click", () => buyItem(item.id));
              }
            }
          }

          shopGrid.appendChild(card);
        });
      }

      // ⚡ Bolt: Debounce helper to prevent unnecessary rapid executions
      // Impact: Prevents updating the entire UI (and tracking KPI) on every keystroke.
      // Reduces re-renders and analytic spam significantly for fast typers.
      function debounce(func, wait) {
        let timeout;
        return function(...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }

      shopSearchInput.addEventListener("input", debounce(() => {
        shopSearchQuery = normalizeText(shopSearchInput.value.trim());
        trackKpiEvent("shop_search_changed", { queryLength: shopSearchQuery.length });
        updateUI();
      }, 300));
      window.addEventListener("keydown", (event) => {
        if (event.key !== "/") return;
        const target = event.target;
        const tagName = target && target.tagName ? target.tagName.toUpperCase() : "";
        if (tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT" || target?.isContentEditable) return;
        event.preventDefault();
        shopSearchInput.focus();
        shopSearchInput.select();
      });
      shopGameFilter.addEventListener("change", () => {
        selectedShopGame = shopGameFilter.value || "all";
        trackKpiEvent("shop_game_filter_changed", { game: selectedShopGame });
        updateUI();
      });

      trackKpiEvent("shop_view", { itemCount: items.length });
      const MIN_REMOTE_ENTITLEMENT_SYNC_MS = 60_000;
      refreshRemoteEntitlements({ forceConfig: true })
        .catch(() => false)
        .then(() => {
          updateUI();
        });
      let previousLockState = isShopLocked();
      setInterval(() => {
        const lockState = isShopLocked();
        if (lockState !== previousLockState) {
          previousLockState = lockState;
          updateUI();
          return;
        }
        if ((Date.now() - remoteEntitlementLastSyncedAt) >= MIN_REMOTE_ENTITLEMENT_SYNC_MS) {
          refreshRemoteEntitlements()
            .catch(() => false)
            .then((synced) => {
              if (synced) {
                updateUI();
              } else {
                renderShopNotice();
              }
            });
          return;
        }
        renderShopNotice();
      }, 1000);
      window.addEventListener("pageshow", () => {
        refreshRemoteEntitlements({ forceConfig: true })
          .catch(() => false)
          .then(() => {
            updateUI();
          });
      });
  </script>
</body>
</html>
