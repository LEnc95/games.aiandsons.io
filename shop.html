<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shop - Cade's Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <style>
    :root { --bg:#0b1020; --fg:#e7f0ff; --muted:#8aa0c3; --accent:#5ad; }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    
    .wrap { max-width:1200px; margin:0 auto; padding:clamp(20px, 5vh, 40px) clamp(16px, 4vw, 32px); }
    
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px clamp(16px,4vw,32px); background:rgba(12,20,46,0.6); backdrop-filter:blur(8px); border-bottom:1px solid rgba(90,173,221,0.2); }
    .topbar h1 { margin:0; font-size:clamp(20px,3vw,28px); }
    .coin-display { display:flex; align-items:center; gap:6px; padding:8px 14px; background:rgba(90,173,221,0.15); border:1px solid rgba(90,173,221,0.3); border-radius:12px; font-weight:600; font-size:14px; }
    .back-link { padding:8px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:var(--fg); text-decoration:none; font-size:14px; font-weight:600; transition:all 0.2s; }
    .back-link:hover { background:rgba(255,255,255,0.12); }
    
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px; margin-top:32px; }
    .shop-item { background:linear-gradient(180deg,#0c142e 0%, #0b1020 100%); border:2px solid #192544; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:16px; }
    .shop-item.owned { border-color:#5ad; background:rgba(90,173,221,0.1); }
    .shop-item-header { display:flex; align-items:center; justify-content:space-between; }
    .shop-item-title { font-size:20px; font-weight:600; margin:0; }
    .shop-item-price { padding:6px 12px; background:rgba(90,173,221,0.2); border-radius:8px; font-weight:600; font-size:14px; }
    .shop-item-game { margin:0; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(138,160,195,0.8); }
    .shop-item-desc { color:var(--muted); font-size:14px; line-height:1.5; margin:0; }
    .shop-item-preview { padding:16px; background:rgba(255,255,255,0.05); border-radius:12px; text-align:center; min-height:80px; display:flex; align-items:center; justify-content:center; }
    .shop-item-btn { padding:12px; background:#5ad; border:none; border-radius:8px; color:#0b1020; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .shop-item-btn:hover:not(:disabled) { background:#6be; }
    .shop-item-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .shop-item-btn.owned { background:rgba(90,173,221,0.3); }
      .back-link:hover { background:rgba(255,255,255,0.12); }
      .shop-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px; margin-top:32px; }
      .shop-item { background:linear-gradient(180deg,#0c142e 0%, #0b1020 100%); border:2px solid #192544; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:16px; transition:border-color 0.2s, box-shadow 0.2s, background 0.2s; }
      .shop-item.owned { border-color:#5ad; background:rgba(90,173,221,0.1); }
      .shop-item.equipped { border-color:#8ad7ff; background:rgba(90,173,221,0.18); box-shadow:0 0 0 2px rgba(90,173,221,0.25); }
      .shop-item-header { display:flex; align-items:center; justify-content:space-between; }
      .shop-item-title { font-size:20px; font-weight:600; margin:0; }
      .shop-item-price { padding:6px 12px; background:rgba(90,173,221,0.2); border-radius:8px; font-weight:600; font-size:14px; transition:background 0.2s, color 0.2s; }
      .shop-item-price.owned { background:rgba(90,173,221,0.25); color:var(--fg); }
      .shop-item-price.equipped { background:#5ad; color:#0b1020; }
      .shop-item-desc { color:var(--muted); font-size:14px; line-height:1.5; margin:0; }
      .shop-item-preview { padding:16px; background:rgba(255,255,255,0.05); border-radius:12px; text-align:center; min-height:80px; display:flex; align-items:center; justify-content:center; }
      .shop-item-btn { padding:12px; background:#5ad; border:none; border-radius:8px; color:#0b1020; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; }
      .shop-item-btn:hover:not(:disabled) { background:#6be; }
      .shop-item-btn:disabled { opacity:0.5; cursor:not-allowed; }
      .shop-item-btn.owned { background:rgba(90,173,221,0.25); color:var(--fg); }
      .shop-item-btn.owned:hover:not(:disabled) { background:rgba(90,173,221,0.4); }
      .shop-item-btn.equipped { background:#5ad; color:#0b1020; }
      .shop-item-btn.equipped:hover:not(:disabled) { background:#6be; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🛒 Shop</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="coin-display">
        <span>🪙</span>
        <span id="coins">0</span>
      </div>
      <a href="/" class="back-link">← Back</a>
    </div>
  </div>

  <div class="wrap">
    <div class="shop-grid" id="shopGrid"></div>
  </div>

    <script type="module">
      import { state, save, spendCoins } from './src/core/state.js';

      if (!(state.inventory instanceof Set)) {
        state.inventory = new Set(state.inventory || []);
      }

      const legacyMappings = [
        { id: 'paddle-sky', test: () => state.cosmetics.paddle === 'sky' },
        { id: 'snake-neon', test: () => state.cosmetics.snake === 'neon' },
        { id: 'mario-blue', test: () => state.cosmetics.marioShirt === 'blue' },
      ];

      let migratedLegacy = false;
      for (const legacy of legacyMappings) {
        if (legacy.test() && !state.inventory.has(legacy.id)) {
          state.inventory.add(legacy.id);
          migratedLegacy = true;
        }
      }
      if (migratedLegacy) {
      const DEFAULT_COSMETICS = { paddle: 'default', snake: 'default', marioShirt: 'red' };

      const items = [
        { id:'paddle-sky', name:'Sky Paddle', desc:'Blue paddle for Pong', price:10, category:'paddle', value:'sky', preview:'<div style="width:40px;height:120px;background:#6ae0ff;margin:0 auto;border-radius:4px;"></div>' },
        { id:'snake-neon', name:'Neon Snake', desc:'Bright green snake skin', price:15, category:'snake', value:'neon', preview:'<span style="font-size:32px;color:#00ff88;">🐍</span>' },
        { id:'mario-blue', name:'Blue Shirt', desc:'Blue shirt for Mario', price:12, category:'marioShirt', value:'blue', preview:'<span style="font-size:32px;">🍄</span><div style="width:20px;height:20px;background:#60a5fa;margin:8px auto;border-radius:4px;"></div>' },
      ];

      const itemById = new Map(items.map(item => [item.id, item]));

      const getOwnedList = (category) => {
        const fallback = DEFAULT_COSMETICS[category];
        let list = state.cosmeticsOwned[category];
        let mutated = false;

        if (!Array.isArray(list)) {
          list = [];
          if (typeof fallback === 'string') list.push(fallback);
          state.cosmeticsOwned[category] = list;
          mutated = true;
        } else if (typeof fallback === 'string' && !list.includes(fallback)) {
          list.unshift(fallback);
          mutated = true;
        }

        if (mutated) save();
        return list;
      };

      function buyItem(id) {
        const item = itemById.get(id);
        if (!item) return;

        const ownedList = getOwnedList(item.category);
        if (ownedList.includes(item.value)) {
          if (state.cosmetics[item.category] !== item.value) {
            state.cosmetics[item.category] = item.value;
            save();
          }
          updateUI();
          return;
        }

        if (!spendCoins(item.price)) {
          updateUI();
          return;
        }

        ownedList.push(item.value);
        state.cosmetics[item.category] = item.value;
        save();
      }

      const items = [
        {
          id: 'paddle-sky',
          game: 'Pong',
          name: 'Sky Paddle',
          desc: 'Skies-out blue paddle for crisp Pong rallies.',
          price: 10,
          preview: `<div style="width:40px;height:120px;background:#6ae0ff;margin:0 auto;border-radius:4px;"></div>`,
          owned: () => state.inventory.has('paddle-sky') || state.cosmetics.paddle === 'sky',
          onPurchase: () => {
            state.cosmetics.paddle = 'sky';
            state.inventory.add('paddle-sky');
          },
        },
        {
          id: 'snake-neon',
          game: 'Snake',
          name: 'Neon Snake',
          desc: 'Electrify your Snake runs with neon green scales.',
          price: 15,
          preview: `<span style="font-size:32px;color:#00ff88;">🐍</span>`,
          owned: () => state.inventory.has('snake-neon') || state.cosmetics.snake === 'neon',
          onPurchase: () => {
            state.cosmetics.snake = 'neon';
            state.inventory.add('snake-neon');
          },
        },
        {
          id: 'tictactoe-chalk',
          game: 'Tic-Tac-Toe',
          name: 'Chalkboard Grid',
          desc: 'Unlock a chalk-dusted board vibe for thoughtful plays.',
          price: 8,
          preview: `<div style="display:grid;grid-template-columns:repeat(3,20px);gap:6px;justify-content:center;font-size:18px;"><span style="color:#facc15;">⭕</span><span style="color:#f87171;">✕</span><span style="color:#facc15;">⭕</span><span style="color:#f87171;">✕</span><span style="color:#facc15;">⭕</span><span style="color:#f87171;">✕</span><span style="color:#94a3b8;">+</span><span style="color:#94a3b8;">+</span><span style="color:#94a3b8;">+</span></div>`,
          owned: () => state.inventory.has('tictactoe-chalk'),
          onPurchase: () => state.inventory.add('tictactoe-chalk'),
        },
        {
          id: 'rps-gesture-pack',
          game: 'Rock Paper Scissors',
          name: 'Gesture Pack',
          desc: 'Unlock victory poses and rival taunts for RPS showdowns.',
          price: 7,
          preview: `<div style="font-size:32px;">✊ ✋ ✌️</div>`,
          owned: () => state.inventory.has('rps-gesture-pack'),
          onPurchase: () => state.inventory.add('rps-gesture-pack'),
        },
        {
          id: 'memory-holo',
          game: 'Memory',
          name: 'Holographic Card Backs',
          desc: 'Shimmering card backs that sparkle as you flip pairs.',
          price: 9,
          preview: `<div style="display:flex;gap:8px;justify-content:center;">
            <div style="width:32px;height:48px;border-radius:8px;background:linear-gradient(135deg,#7dd3fc,#fde68a);border:2px solid rgba(255,255,255,0.4);"></div>
            <div style="width:32px;height:48px;border-radius:8px;background:linear-gradient(135deg,#c4b5fd,#f9a8d4);border:2px solid rgba(255,255,255,0.4);"></div>
          </div>`,
          owned: () => state.inventory.has('memory-holo'),
          onPurchase: () => state.inventory.add('memory-holo'),
        },
        {
          id: 'breakout-aurora',
          game: 'Breakout',
          name: 'Aurora Bricks',
          desc: 'Bricks glow with aurora gradients as you shatter them.',
          price: 12,
          preview: `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;">
            <div style="height:12px;border-radius:4px;background:linear-gradient(90deg,#60a5fa,#a855f7);"></div>
            <div style="height:12px;border-radius:4px;background:linear-gradient(90deg,#f97316,#f43f5e);"></div>
            <div style="height:12px;border-radius:4px;background:linear-gradient(90deg,#34d399,#22d3ee);"></div>
            <div style="height:12px;border-radius:4px;background:linear-gradient(90deg,#f472b6,#f97316);"></div>
          </div>`,
          owned: () => state.inventory.has('breakout-aurora'),
          onPurchase: () => state.inventory.add('breakout-aurora'),
        },
        {
          id: 'connect4-galaxy',
          game: 'Connect 4',
          name: 'Galaxy Discs',
          desc: 'Swirl galaxy discs as they fall into the Connect 4 grid.',
          price: 11,
          preview: `<div style="display:grid;grid-template-columns:repeat(3,24px);gap:8px;justify-content:center;">
            <div style="width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffffff,#0ea5e9);"></div>
            <div style="width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#f59e0b);"></div>
            <div style="width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffffff,#a855f7);"></div>
          </div>`,
          owned: () => state.inventory.has('connect4-galaxy'),
          onPurchase: () => state.inventory.add('connect4-galaxy'),
        },
        {
          id: 'minesweeper-scout',
          game: 'Minesweeper',
          name: 'Scout Kit',
          desc: 'Lucky flags and a trusty scanner for Minesweeper grids.',
          price: 10,
          preview: `<div style="display:flex;align-items:center;justify-content:center;gap:12px;">
            <div style="width:28px;height:28px;background:#111933;border:2px solid #2f3c5a;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#f43f5e;font-weight:700;">⚑</div>
            <div style="font-size:22px;color:#fcd34d;">🔍</div>
          </div>`,
          owned: () => state.inventory.has('minesweeper-scout'),
          onPurchase: () => state.inventory.add('minesweeper-scout'),
        },
        {
          id: 'flappy-sunset',
          game: 'Flappy Bird',
          name: 'Sunset Skyline',
          desc: 'Fly through golden-hour skies during Flappy Bird runs.',
          price: 14,
          preview: `<div style="display:flex;align-items:center;justify-content:center;gap:12px;">
            <span style="font-size:32px;">🐦</span>
            <div style="width:48px;height:28px;background:linear-gradient(180deg,#fb923c,#fde68a);border-radius:50%;"></div>
          </div>`,
          owned: () => state.inventory.has('flappy-sunset'),
          onPurchase: () => state.inventory.add('flappy-sunset'),
        },
        {
          id: 'dino-trail',
          game: 'Dino Run',
          name: 'Meteor Trail',
          desc: 'Leave a shimmering meteor trail with every long jump.',
          price: 13,
          preview: `<div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;">
            <span style="font-size:28px;">🦖</span>
            <div style="width:36px;height:10px;background:linear-gradient(90deg,#22d3ee,#a855f7);border-radius:999px;"></div>
          </div>`,
          owned: () => state.inventory.has('dino-trail'),
          onPurchase: () => state.inventory.add('dino-trail'),
        },
        {
          id: 'spaceinvaders-rainbow',
          game: 'Space Invaders',
          name: 'Rainbow Laser',
          desc: 'Charge your cannon with a multi-color rainbow beam.',
          price: 16,
          preview: `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <span style="font-size:32px;">👾</span>
            <div style="width:50px;height:6px;border-radius:999px;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#a855f7);"></div>
          </div>`,
          owned: () => state.inventory.has('spaceinvaders-rainbow'),
          onPurchase: () => state.inventory.add('spaceinvaders-rainbow'),
        },
        {
          id: 'mario-blue',
          game: 'Micro Mario',
          name: 'Blue Shirt',
          desc: 'Swap Mario\'s shirt for a bold blue adventure fit.',
          price: 12,
          preview: `<span style="font-size:32px;">🍄</span><div style="width:20px;height:20px;background:#60a5fa;margin:8px auto;border-radius:4px;"></div>`,
          owned: () => state.inventory.has('mario-blue') || state.cosmetics.marioShirt === 'blue',
          onPurchase: () => {
            state.cosmetics.marioShirt = 'blue';
            state.inventory.add('mario-blue');
          },
        },
      ];
      function equipItem(id) {
        const item = itemById.get(id);
        if (!item) return;

        const ownedList = getOwnedList(item.category);
        if (!ownedList.includes(item.value)) return;
        if (state.cosmetics[item.category] === item.value) return;

        state.cosmetics[item.category] = item.value;
        save();
        updateUI();
      }

      function unequipItem(category) {
        const fallback = DEFAULT_COSMETICS[category];
        if (typeof fallback !== 'string') return;
        if (state.cosmetics[category] === fallback) return;

        state.cosmetics[category] = fallback;
        save();
        updateUI();
      }

      function updateUI() {
        const coinsEl = document.getElementById('coins');
        const shopGrid = document.getElementById('shopGrid');

        coinsEl.textContent = state.coins;

        shopGrid.innerHTML = '';
        items.forEach(item => {
          const owned = item.owned();
          const canAfford = state.coins >= item.price;

          const card = document.createElement('div');
          card.className = 'shop-item' + (owned ? ' owned' : '');
          card.innerHTML = `
            <div class="shop-item-header">
              <h3 class="shop-item-title">${item.name}</h3>
              <span class="shop-item-price">${item.price} 🪙</span>
            </div>
            <p class="shop-item-game">${item.game}</p>
            <p class="shop-item-desc">${item.desc}</p>
            <div class="shop-item-preview">${item.preview}</div>
            <button class="shop-item-btn ${owned ? 'owned' : ''}" 
                    ${owned ? 'disabled' : !canAfford ? 'disabled' : ''}
                    onclick="buyItem('${item.id}')">
              ${owned ? '✓ Owned' : canAfford ? 'Buy' : 'Not enough coins'}
            </button>
          `;
          const ownedList = getOwnedList(item.category);
          const owned = ownedList.includes(item.value);
          const equipped = state.cosmetics[item.category] === item.value;
          const canAfford = state.coins >= item.price;

          const card = document.createElement('div');
          card.className = 'shop-item';
          if (owned) card.classList.add('owned');
          if (equipped) card.classList.add('equipped');

          card.innerHTML = `
            <div class="shop-item-header">
              <h3 class="shop-item-title">${item.name}</h3>
              <span class="shop-item-price"></span>
            </div>
            <p class="shop-item-desc">${item.desc}</p>
            <div class="shop-item-preview">${item.preview}</div>
            <button class="shop-item-btn" type="button"></button>
          `;

          const badge = card.querySelector('.shop-item-price');
          const button = card.querySelector('.shop-item-btn');

          if (equipped) {
            badge.textContent = 'Equipped';
            badge.classList.add('equipped');
            button.textContent = 'Unequip';
            button.classList.add('equipped');
            button.addEventListener('click', () => unequipItem(item.category));
          } else if (owned) {
            badge.textContent = 'Owned';
            badge.classList.add('owned');
            button.textContent = 'Equip';
            button.classList.add('owned');
            button.addEventListener('click', () => equipItem(item.id));
          } else {
            badge.textContent = `${item.price} 🪙`;
            button.textContent = canAfford ? 'Buy' : 'Not enough coins';
            if (!canAfford) {
              button.disabled = true;
            } else {
              button.addEventListener('click', () => buyItem(item.id));
            }
          }

          shopGrid.appendChild(card);
        });
      }

      window.buyItem = (id) => {
        const item = items.find(i => i.id === id);
        if (!item) return;
        if (item.owned()) {
          alert('You already own this item.');
          return;
        }

        if (spendCoins(item.price)) {
          if (typeof item.onPurchase === 'function') {
            item.onPurchase();
          }
          save();
          updateUI();
          alert(`Purchased ${item.name}!`);
        }
      };

      updateUI();
    </script>
</body>
</html>
