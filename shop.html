<!doctype html>

<head>

    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px clamp(16px,4vw,32px); background:rgba(12,20,46,0.6); backdrop-filter:blur(8px); border-bottom:1px solid rgba(90,173,221,0.2); }
    .topbar h1 { margin:0; font-size:clamp(20px,3vw,28px); }
    .coin-display { display:flex; align-items:center; gap:6px; padding:8px 14px; background:rgba(90,173,221,0.15); border:1px solid rgba(90,173,221,0.3); border-radius:12px; font-weight:600; font-size:14px; }
    .back-link { padding:8px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:var(--fg); text-decoration:none; font-size:14px; font-weight:600; transition:all 0.2s; }
    .back-link:hover { background:rgba(255,255,255,0.12); }

    .shop-controls { margin-top:10px; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.05); display:grid; grid-template-columns:minmax(0, 1fr) 220px; gap:10px; }
    .shop-controls input,
    .shop-controls select { width:100%; padding:11px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.08); color:var(--fg); font-size:14px; }
    .shop-filter-summary { grid-column:1 / -1; font-size:12px; color:#b4ccf0; }
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px; margin-top:24px; }
    .shop-notice { margin-top:16px; padding:12px 14px; border-radius:10px; border:1px solid rgba(90,173,221,0.45); background:rgba(90,173,221,0.15); font-size:14px; font-weight:600; }
    .shop-notice.hidden { display:none; }
    .shop-notice.ended { border-color:rgba(116,166,230,0.45); background:rgba(116,166,230,0.18); }
    .shop-item { background:linear-gradient(180deg,#0c142e 0%, #0b1020 100%); border:2px solid #192544; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:16px; transition:border-color 0.2s, box-shadow 0.2s, background 0.2s; }
    .shop-item.owned { border-color:var(--accent); background:rgba(90,173,221,0.1); }
    .shop-item.equipped { border-color:#8ad7ff; background:rgba(90,173,221,0.18); box-shadow:0 0 0 2px rgba(90,173,221,0.25); }
    .shop-item.premium-locked { border-color:rgba(244, 191, 97, 0.6); background:linear-gradient(180deg,#1a1830 0%, #121120 100%); }
    .shop-item-header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .shop-item-title { font-size:20px; font-weight:600; margin:0; }
    .shop-item-price { padding:6px 12px; background:rgba(90,173,221,0.2); border-radius:8px; font-weight:600; font-size:14px; transition:background 0.2s, color 0.2s; }
    .shop-item-price.owned { background:rgba(90,173,221,0.25); color:var(--fg); }
    .shop-item-price.equipped { background:var(--accent); color:#0b1020; }
    .shop-item-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:-6px; }
    .shop-item-tag { display:inline-flex; align-items:center; justify-content:center; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#d7e7ff; font-size:11px; font-weight:700; }
    .shop-item-tag.premium { border-color:rgba(244, 191, 97, 0.62); background:rgba(244, 191, 97, 0.2); color:#ffe9be; }
    .shop-empty { border:1px dashed rgba(255,255,255,0.2); border-radius:14px; padding:24px; text-align:center; color:#b7cdf0; font-size:15px; }
    .shop-item-desc { color:var(--muted); font-size:14px; line-height:1.5; margin:0; }
    .shop-item-preview { padding:16px; background:rgba(255,255,255,0.05); border-radius:12px; text-align:center; min-height:80px; display:flex; align-items:center; justify-content:center; }
    .shop-item-btn { padding:12px; background:var(--accent); border:none; border-radius:8px; color:#0b1020; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .shop-item-btn:hover:not(:disabled) { background:#6be; }
    .shop-item-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .shop-item-btn.owned { background:rgba(90,173,221,0.25); color:var(--fg); }
    .shop-item-btn.owned:hover:not(:disabled) { background:rgba(90,173,221,0.4); }
    .shop-item-btn.equipped { background:var(--accent); color:#0b1020; }
    .shop-item-btn.equipped:hover:not(:disabled) { background:#6be; }
    .shop-item-btn.premium-lock { background:rgba(244, 191, 97, 0.2); color:#ffe6b3; border:1px solid rgba(244, 191, 97, 0.4); }
    .shop-item-note { margin:0; font-size:12px; color:#ffdca0; line-height:1.4; }
    @media (max-width: 700px) {
      .shop-controls { grid-template-columns:1fr; }
    }

</head>

        state.inventory = new Set(Array.isArray(state.inventory) ? state.inventory : []);
      }

      if (!state.cosmeticsOwned || typeof state.cosmeticsOwned !== "object") {
        state.cosmeticsOwned = {};
      }

      const DEFAULT_COSMETICS = { paddle: "default", snake: "default", marioShirt: "red", memoryCardBack: "default" };

      let normalizedCosmetics = false;
      for (const [category, fallback] of Object.entries(DEFAULT_COSMETICS)) {
        const current = state.cosmeticsOwned[category];
        if (!Array.isArray(current)) {
          state.cosmeticsOwned[category] = typeof fallback === "string" ? [fallback] : [];
          normalizedCosmetics = true;
        } else if (typeof fallback === "string" && !current.includes(fallback)) {
          state.cosmeticsOwned[category] = [fallback, ...current];
          normalizedCosmetics = true;
        }
      }
      if (normalizedCosmetics) {
        save();
      }

        { id: "paddle-sky", test: () => state.cosmetics.paddle === "sky" },
        { id: "snake-neon", test: () => state.cosmetics.snake === "neon" },
        { id: "mario-blue", test: () => state.cosmetics.marioShirt === "blue" },
      ];

      let migratedLegacy = false;
      for (const legacy of legacyMappings) {
        if (legacy.test() && !state.inventory.has(legacy.id)) {

          migratedLegacy = true;
        }

        },
        {

          type: "inventory",
          game: "Bomberman Lite",
          name: "Ember Blast",
          desc: "Bombs explode with ember sparks and hotter blast colors across the maze.",
          price: 32,
          preview: `<div style="display:flex;align-items:center;justify-content:center;gap:8px;">

          </div>`,
        },
        {
          id: "bomberman-jade-maze",
          type: "inventory",
          game: "Bomberman Lite",
          name: "Jade Maze",
          desc: "Turn walls, crates, and floor tiles into a polished jade-and-gold arena.",
          price: 78,
          preview: `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-width:120px;margin:0 auto;">
            <div style="height:16px;background:#22c55e;"></div>
            <div style="height:16px;background:#16a34a;"></div>
            <div style="height:16px;background:#86efac;"></div>
            <div style="height:16px;background:#fbbf24;"></div>
          </div>`,
        },
      ];

      const itemById = new Map(items.map(item => [item.id, item]));
      const shopNotice = document.getElementById("shopNotice");
      const shopSearchInput = document.getElementById("shopSearchInput");
      const shopGameFilter = document.getElementById("shopGameFilter");
      const shopFilterSummary = document.getElementById("shopFilterSummary");
      const normalizeText = (value) => String(value || "").toLowerCase();
      const escapeHtml = (value) => String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
      let shopSearchQuery = "";
      let selectedShopGame = "all";

      const allShopGames = [...new Set(items
        .map((item) => typeof item.game === "string" ? item.game.trim() : "")
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));

      for (const gameName of allShopGames) {
        const option = document.createElement("option");
        option.value = gameName;
        option.textContent = gameName;
        shopGameFilter.appendChild(option);
      }

      const getFilteredItems = () => {
        return items.filter((item) => {
          const matchesGame = selectedShopGame === "all" || item.game === selectedShopGame;
          if (!matchesGame) return false;
          if (!shopSearchQuery) return true;
          const haystack = normalizeText(`${item.name} ${item.desc || ""} ${item.game || ""} ${item.id}`);
          return haystack.includes(shopSearchQuery);
        });
      };

      const isShopLocked = () => (
        isClassroomSessionActive() && state.classroom && state.classroom.shopDisabledDuringClass
      );
      const formatMinutes = (minutes) => `${minutes} minute${minutes === 1 ? "" : "s"}`;

      const renderShopNotice = () => {
        if (!shopNotice) return;
        shopNotice.classList.remove("ended");
        const entitlements = getEntitlements();
        const hasFamilyPremium = hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM, entitlements);
        if (isShopLocked()) {
          shopNotice.classList.remove("hidden");
          shopNotice.textContent = "Classroom session is active. Shop actions are locked until the session ends.";
          return;
        }
        if (wasClassroomSessionRecentlyEnded()) {
          const endedMinutes = getClassroomMinutesSinceEnd();
          const endedMessage = endedMinutes <= 0
            ? "Classroom session ended just now."
            : `Classroom session ended ${formatMinutes(endedMinutes)} ago.`;
          shopNotice.classList.remove("hidden");
          shopNotice.classList.add("ended");
          shopNotice.textContent = `${endedMessage} Shop actions are now unlocked.`;
          return;
        }
        if (!hasFamilyPremium) {
          shopNotice.classList.remove("hidden");
          shopNotice.textContent = "Some shop items are Family Premium. Free users can still access all core gameplay.";
          return;
        }
        shopNotice.classList.add("hidden");
        shopNotice.textContent = "";
      };

      const getOwnedList = (category) => {
        const fallback = DEFAULT_COSMETICS[category];
        let list = state.cosmeticsOwned[category];
        let mutated = false;

        if (!Array.isArray(list)) {
          list = [];
          if (typeof fallback === "string") {
            list.push(fallback);
          }
          state.cosmeticsOwned[category] = list;
          mutated = true;
        } else if (typeof fallback === "string" && !list.includes(fallback)) {
          list = [fallback, ...list];
          state.cosmeticsOwned[category] = list;
          mutated = true;
        }

        if (mutated) {
          save();
        }

        return list;
      };

      function buyItem(id) {
        if (isShopLocked()) {
          updateUI();
          return;
        }

        const item = itemById.get(id);
        if (!item) return;

        const entitlements = getEntitlements();
        const isCosmetic = item.type === "cosmetic";
        const alreadyOwned = isCosmetic
          ? getOwnedList(item.category).includes(item.value)
          : state.inventory.has(item.id);
        if (isShopItemLockedByEntitlement(item, entitlements) && !alreadyOwned) {
          updateUI();
          return;
        }

        if (isCosmetic) {
          const ownedList = getOwnedList(item.category);
          const alreadyOwned = ownedList.includes(item.value);

          if (alreadyOwned) {
            if (state.cosmetics[item.category] !== item.value) {
              state.cosmetics[item.category] = item.value;
              save();
            }
            updateUI();
            return;
          }

          if (!spendCoins(item.price)) {
            updateUI();
            return;
          }

          ownedList.push(item.value);
          state.inventory.add(item.id);
          state.cosmetics[item.category] = item.value;
          save();
          updateUI();
          alert(`Purchased ${item.name}!`);
          return;
        }

        if (state.inventory.has(item.id)) {
          updateUI();
          return;
        }

        if (!spendCoins(item.price)) {
          updateUI();
          return;
        }

        state.inventory.add(item.id);
        save();
        updateUI();
        alert(`Purchased ${item.name}!`);
      }

      function equipItem(id) {
        if (isShopLocked()) {
          updateUI();
          return;
        }

        const item = itemById.get(id);
        if (!item || item.type !== "cosmetic") return;

        const ownedList = getOwnedList(item.category);
        if (!ownedList.includes(item.value)) return;
        if (state.cosmetics[item.category] === item.value) return;

        state.cosmetics[item.category] = item.value;
        save();
        updateUI();
      }

      function unequipItem(category) {
        if (isShopLocked()) {
          updateUI();
          return;
        }

        if (!(category in DEFAULT_COSMETICS)) return;
        const fallback = DEFAULT_COSMETICS[category];
        if (state.cosmetics[category] === fallback) return;

        state.cosmetics[category] = fallback;
        save();
        updateUI();
      }

      function updateUI() {
        const coinsEl = document.getElementById("coins");
        const shopGrid = document.getElementById("shopGrid");
        if (!coinsEl || !shopGrid) return;

        const shopLocked = isShopLocked();
        const filteredItems = getFilteredItems();
        const entitlements = getEntitlements();
        const hasFamilyPremium = hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM, entitlements);
        const premiumCount = filteredItems.filter((item) => isPremiumShopItem(item)).length;
        const premiumLockedCount = filteredItems.filter((item) => {
          const isCosmetic = item.type === "cosmetic";
          const owned = isCosmetic
            ? getOwnedList(item.category).includes(item.value)
            : state.inventory.has(item.id);
          return !owned && isShopItemLockedByEntitlement(item, entitlements);
        }).length;
        renderShopNotice();
        coinsEl.textContent = state.coins;
        if (shopFilterSummary) {
          const premiumText = premiumCount > 0
            ? ` | ${premiumCount} premium${premiumLockedCount > 0 ? ` (${premiumLockedCount} locked)` : ""}`
            : "";
          const tierText = hasFamilyPremium ? "Family Premium active" : "Free tier";
          shopFilterSummary.textContent = `Showing ${filteredItems.length} of ${items.length} items${premiumText} | ${tierText}`;
        }

        shopGrid.innerHTML = "";
        if (!filteredItems.length) {
          shopGrid.innerHTML = '<div class="shop-empty">No shop items match this search/filter yet.</div>';
          return;
        }

        filteredItems.forEach(item => {
          const isCosmetic = item.type === "cosmetic";
          const owned = isCosmetic ? getOwnedList(item.category).includes(item.value) : state.inventory.has(item.id);
          const equipped = isCosmetic ? state.cosmetics[item.category] === item.value : false;
          const canAfford = state.coins >= item.price;
          const premiumItem = isPremiumShopItem(item);
          const premiumLocked = premiumItem && !owned && isShopItemLockedByEntitlement(item, entitlements);

          const card = document.createElement("div");
          card.className = "shop-item";
          if (owned) card.classList.add("owned");
          if (equipped) card.classList.add("equipped");
          if (premiumLocked) card.classList.add("premium-locked");

          card.innerHTML = `
            <div class="shop-item-header">
              <h3 class="shop-item-title">${item.name}</h3>
              <span class="shop-item-price"></span>
            </div>
            ${(item.game || premiumItem) ? `<div class="shop-item-tags">
              ${item.game ? `<span class="shop-item-tag">${escapeHtml(item.game)}</span>` : ""}
              ${premiumItem ? `<span class="shop-item-tag premium">Family Premium</span>` : ""}
            </div>` : ""}
            <p class="shop-item-desc">${item.desc}</p>
            <div class="shop-item-preview">${item.preview}</div>
            <button class="shop-item-btn" type="button"></button>
          `;

          const badge = card.querySelector(".shop-item-price");
          const button = card.querySelector(".shop-item-btn");

          if (!badge || !button) return;

          if (shopLocked) {
            if (isCosmetic) {
              if (equipped) {
                badge.textContent = "Equipped";
                badge.classList.add("equipped");
              } else if (owned) {
                badge.textContent = "Owned";
                badge.classList.add("owned");
              } else {
                badge.textContent = `${item.price} coins`;
              }
            } else if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
            } else {
              badge.textContent = `${item.price} coins`;
            }

            button.textContent = "Locked during class";
            button.disabled = true;
            shopGrid.appendChild(card);
            return;
          }

          if (premiumLocked) {
            badge.textContent = "Premium";
            button.textContent = "Family Premium required";
            button.classList.add("premium-lock");
            button.disabled = true;
            const note = document.createElement("p");
            note.className = "shop-item-note";
            note.textContent = "Included with Family Premium. Free users can still play all core games.";
            card.appendChild(note);
            shopGrid.appendChild(card);
            return;
          }

          if (isCosmetic) {
            if (equipped) {
              badge.textContent = "Equipped";
              badge.classList.add("equipped");
              button.textContent = "Unequip";
              button.classList.add("equipped");
              button.addEventListener("click", () => unequipItem(item.category));
            } else if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
              button.textContent = "Equip";
              button.classList.add("owned");
              button.addEventListener("click", () => equipItem(item.id));
            } else {
              badge.textContent = `${item.price} 🪙`;
              button.textContent = canAfford ? "Buy" : "Not enough coins";
              if (!canAfford) {
                button.disabled = true;
              } else {
                button.addEventListener("click", () => buyItem(item.id));
              }
            }
          } else {
            if (owned) {
              badge.textContent = "Owned";
              badge.classList.add("owned");
              button.textContent = "Owned";
              button.classList.add("owned");
              button.disabled = true;
            } else {
              badge.textContent = `${item.price} 🪙`;
              button.textContent = canAfford ? "Buy" : "Not enough coins";
              if (!canAfford) {
                button.disabled = true;
              } else {
                button.addEventListener("click", () => buyItem(item.id));
              }
            }
          }

          shopGrid.appendChild(card);
        });
      }

      shopSearchInput.addEventListener("input", () => {
        shopSearchQuery = normalizeText(shopSearchInput.value.trim());
        updateUI();
      });
      shopGameFilter.addEventListener("change", () => {
        selectedShopGame = shopGameFilter.value || "all";
        updateUI();
      });

      updateUI();
      let previousLockState = isShopLocked();
      setInterval(() => {
        const lockState = isShopLocked();
        if (lockState !== previousLockState) {
          previousLockState = lockState;
          updateUI();
          return;
        }
        renderShopNotice();
      }, 1000);
      window.addEventListener("pageshow", () => updateUI());
  </script>
