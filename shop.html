<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shop - Cade's Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <style>
    :root { --bg:#0b1020; --fg:#e7f0ff; --muted:#8aa0c3; --accent:#5ad; }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    
    .wrap { max-width:1200px; margin:0 auto; padding:clamp(20px, 5vh, 40px) clamp(16px, 4vw, 32px); }
    
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px clamp(16px,4vw,32px); background:rgba(12,20,46,0.6); backdrop-filter:blur(8px); border-bottom:1px solid rgba(90,173,221,0.2); }
    .topbar h1 { margin:0; font-size:clamp(20px,3vw,28px); }
    .coin-display { display:flex; align-items:center; gap:6px; padding:8px 14px; background:rgba(90,173,221,0.15); border:1px solid rgba(90,173,221,0.3); border-radius:12px; font-weight:600; font-size:14px; }
    .back-link { padding:8px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:var(--fg); text-decoration:none; font-size:14px; font-weight:600; transition:all 0.2s; }
    .back-link:hover { background:rgba(255,255,255,0.12); }
    
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px; margin-top:32px; }
    .shop-item { background:linear-gradient(180deg,#0c142e 0%, #0b1020 100%); border:2px solid #192544; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:16px; }
    .shop-item.owned { border-color:#5ad; background:rgba(90,173,221,0.1); }
    .shop-item-header { display:flex; align-items:center; justify-content:space-between; }
    .shop-item-title { font-size:20px; font-weight:600; margin:0; }
    .shop-item-price { padding:6px 12px; background:rgba(90,173,221,0.2); border-radius:8px; font-weight:600; font-size:14px; }
    .shop-item-desc { color:var(--muted); font-size:14px; line-height:1.5; margin:0; }
    .shop-item-preview { padding:16px; background:rgba(255,255,255,0.05); border-radius:12px; text-align:center; min-height:80px; display:flex; align-items:center; justify-content:center; }
    .shop-item-btn { padding:12px; background:#5ad; border:none; border-radius:8px; color:#0b1020; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .shop-item-btn:hover:not(:disabled) { background:#6be; }
    .shop-item-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .shop-item-btn.owned { background:rgba(90,173,221,0.3); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🛒 Shop</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="coin-display">
        <span>🪙</span>
        <span id="coins">0</span>
      </div>
      <a href="/" class="back-link">← Back</a>
    </div>
  </div>

  <div class="wrap">
    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <script type="module">
    import { state, save, spendCoins } from './src/core/state.js';

    const items = [
      { id:'paddle-sky', name:'Sky Paddle', desc:'Blue paddle for Pong', price:10, category:'paddle', preview:'<div style="width:40px;height:120px;background:#6ae0ff;margin:0 auto;border-radius:4px;"></div>' },
      { id:'snake-neon', name:'Neon Snake', desc:'Bright green snake skin', price:15, category:'snake', preview:'<span style="font-size:32px;color:#00ff88;">🐍</span>' },
      { id:'mario-blue', name:'Blue Shirt', desc:'Blue shirt for Mario', price:12, category:'marioShirt', preview:'<span style="font-size:32px;">🍄</span><div style="width:20px;height:20px;background:#60a5fa;margin:8px auto;border-radius:4px;"></div>' },
    ];

    function updateUI() {
      const coinsEl = document.getElementById('coins');
      const shopGrid = document.getElementById('shopGrid');
      
      coinsEl.textContent = state.coins;
      
      shopGrid.innerHTML = '';
      items.forEach(item => {
        const owned = state.cosmetics[item.category] === (item.category === 'paddle' ? 'sky' : item.category === 'snake' ? 'neon' : 'blue');
        const canAfford = state.coins >= item.price;
        
        const card = document.createElement('div');
        card.className = 'shop-item' + (owned ? ' owned' : '');
        card.innerHTML = `
          <div class="shop-item-header">
            <h3 class="shop-item-title">${item.name}</h3>
            <span class="shop-item-price">${item.price} 🪙</span>
          </div>
          <p class="shop-item-desc">${item.desc}</p>
          <div class="shop-item-preview">${item.preview}</div>
          <button class="shop-item-btn ${owned ? 'owned' : ''}" 
                  ${owned ? 'disabled' : !canAfford ? 'disabled' : ''}
                  onclick="buyItem('${item.id}')">
            ${owned ? '✓ Owned' : canAfford ? 'Buy' : 'Not enough coins'}
          </button>
        `;
        shopGrid.appendChild(card);
      });
    }

    window.buyItem = (id) => {
      const item = items.find(i => i.id === id);
      if (!item) return;
      
      if (spendCoins(item.price)) {
        if (item.category === 'paddle') state.cosmetics.paddle = 'sky';
        else if (item.category === 'snake') state.cosmetics.snake = 'neon';
        else if (item.category === 'marioShirt') state.cosmetics.marioShirt = 'blue';
        save();
        updateUI();
        alert(`Purchased ${item.name}!`);
      }
    };

    updateUI();
  </script>
</body>
</html>
