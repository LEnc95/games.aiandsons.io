  <div class="wrap">

  <script type="module">
    import { addCoins as addCoinsFn, rememberRecent } from '../src/core/state.js';
    import { maybeUnlock } from '../src/prog/achievements.js';
    import { pongPaddleStyle } from '../src/prog/cosmetics.js';
    window.addCoins = addCoinsFn;
    window.maybeUnlock = maybeUnlock;
    window.pongPaddleStyle = pongPaddleStyle;
    rememberRecent('pong');
  </script>
  <script>
    // --- Config ---
    // URL Parameters (for easy A/B testing with kids):
    //   ?difficulty=1|2|3  - Set difficulty (1=Easy, 2=Medium, 3=Hard), default: 2
    //   ?speed=0.5-2.0     - Global speed multiplier, default: 1.0
    //   ?seed=<number>     - Deterministic seed for reproducible gameplay (debugging), default: random
    // Example: ?difficulty=3&speed=1.5&seed=12345
    const cfg = {
      court: { w: 900, h: 600, lineW: 4 },
      paddle: { w: 14, h: 100, speed: 420 },
      ball:   { r: 9, speed: 360, speedGainOnHit: 1.035, maxSpeed: 980 },
      scoreToWin: 7,
      difficulty: 2, // 1=Easy 2=Medium 3=Hard
      cpuBaseSpeed: 360,
      cpuMistakeBase: 0.18, // higher = more "mistakes"
    };

    // Parse URL params overrides e.g. ?difficulty=3&speed=1.2&seed=12345
    const params = new URLSearchParams(location.search);
    if (params.get("difficulty")) cfg.difficulty = Math.max(1, Math.min(3, +params.get("difficulty")||2));
    const globalSpeedScale = Math.max(0.5, Math.min(2, +(params.get("speed")||1)));
    const seedParam = params.get("seed");

    // --- Seeded PRNG (for deterministic gameplay when seed provided) ---
    // Linear Congruential Generator for reproducible randomness
    let rngState = null;
    let useSeededRNG = false;
    let initialSeed = null;

    if (seedParam !== null && seedParam !== "") {
      const seed = +seedParam || 0;
      initialSeed = Math.abs(seed) % 2147483647;
      rngState = initialSeed;
      useSeededRNG = true;
    }

    function random() {
      if (useSeededRNG) {
        // LCG: (a * state + c) mod m
        // Using constants from Numerical Recipes
        rngState = (rngState * 1664525 + 1013904223) % 2147483647;
        return rngState / 2147483647; // Normalize to [0, 1)
      } else {
        return Math.random();
      }
    }

    function resetRNG() {
      if (useSeededRNG && initialSeed !== null) {
        rngState = initialSeed; // Reset to initial seed for full reproducibility
      }
    }

    // --- Detect touch device ---
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    
    // --- Responsive canvas setup ---
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const canvasContainer = document.getElementById("canvas-container");
    let canvasScale = 1;
    
    function resizeCanvas() {
      const containerRect = canvasContainer.getBoundingClientRect();
      const containerAspect = containerRect.width / containerRect.height;
      const gameAspect = cfg.court.w / cfg.court.h;
      
      if (containerAspect > gameAspect) {
        // Container is wider - fit to height
        canvas.style.width = 'auto';
        canvas.style.height = '100%';
      } else {
        // Container is taller - fit to width
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
      }
      
      const rect = canvas.getBoundingClientRect();
      canvasScale = rect.width / cfg.court.w;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
    
    // --- State ---
    const k = { up:false, down:false };
    let lastT = 0, paused = false, over = false;
    const state = {
      player: { x: 30,  y: (cfg.court.h- cfg.paddle.h)/2, vy:0, score:0 },
      cpu:    { x: cfg.court.w-30-cfg.paddle.w, y: (cfg.court.h-cfg.paddle.h)/2, vy:0, score:0 },
      ball:   { x: cfg.court.w/2, y: cfg.court.h/2, vx: 0, vy: 0, spd: cfg.ball.speed },
      serveTo: "player",
      difficulty: cfg.difficulty
    };

    const hintEl = document.getElementById("hint");
    const touchIndicator = document.getElementById("touch-indicator");
    const serveBtn = document.getElementById("serve-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const restartBtn = document.getElementById("restart-btn");
    const difficultyBtns = document.querySelectorAll(".btn.difficulty");
    const touchZone = document.getElementById("touch-zone");
    
    function setHint(msg){ hintEl.textContent = msg; }
    function updateDifficultyUI() {
      difficultyBtns.forEach(btn => {
        const diff = +btn.dataset.diff;
        btn.classList.toggle('active', diff === state.difficulty);
      });
    }
    function updateServeButton() {
      if (paused && !over) {
        serveBtn.textContent = "RESUME";
        serveBtn.disabled = false;
      } else if (awaitingSpace && !over) {
        serveBtn.textContent = "START";
        serveBtn.disabled = false;
      } else {
        serveBtn.textContent = "START";
        serveBtn.disabled = true;
      }
    }
    
    if (isTouchDevice) {
      touchIndicator.style.display = 'inline-block';
    } else {
      touchIndicator.style.display = 'none';
    }
    
    setHint(isTouchDevice ? "Tap START to serve." : "Press SPACE to serve.");

    // Serve gate: don't move ball until SPACE pressed after reset
    let awaitingSpace = true;

    function resetRound() {
      state.ball.x = cfg.court.w/2; state.ball.y = cfg.court.h/2;
      state.ball.spd = cfg.ball.speed * globalSpeedScale;
      // Freeze ball until Space/Tap is pressed
      state.ball.vx = 0;
      state.ball.vy = 0;
      awaitingSpace = true;
      over = false;
      updateServeButton();
    }

    function newGame() {
      resetRNG(); // Reset RNG state for reproducible gameplay
      state.player.score = 0; state.cpu.score = 0;
      state.serveTo = random()<0.5 ? "player":"cpu";
      state.difficulty = cfg.difficulty;
      resetRound();
      updateDifficultyUI();
      const diffText = ["Easy","Medium","Hard"][state.difficulty-1];
      setHint(isTouchDevice ? `Difficulty: ${diffText}. Tap START to serve.` : `Difficulty: ${diffText}. SPACE to serve.`);
      updateServeButton();
    }
    newGame();

    // --- Input ---
    addEventListener("keydown", e=>{
      if (e.code === "KeyW" || e.code === "ArrowUp")  k.up = true;
      if (e.code === "KeyS" || e.code === "ArrowDown") k.down = true;
      if (e.code === "KeyP") { 
        if (!over) {
          paused = !paused;
          updateServeButton();
          setHint(paused ? (isTouchDevice ? "Paused. Tap RESUME to continue." : "Paused. Press SPACE to resume.") : "");
        }
      }
      if (e.code === "KeyR") { newGame(); }
      if (e.code === "Space") {
        if (!paused && !over && awaitingSpace) {
          serveBall();
        } else if (paused) {
          paused = false;
          updateServeButton();
        }
      }
      if (e.code === "Digit1") { state.difficulty = 1; updateDifficultyUI(); setHint("Easy"); }
      if (e.code === "Digit2") { state.difficulty = 2; updateDifficultyUI(); setHint("Medium"); }
      if (e.code === "Digit3") { state.difficulty = 3; updateDifficultyUI(); setHint("Hard"); }
    });
    addEventListener("keyup", e=>{
      if (e.code === "KeyW" || e.code === "ArrowUp")  k.up = false;
      if (e.code === "KeyS" || e.code === "ArrowDown") k.down = false;
    });

    // Button event handlers
    function serveBall() {
      if (!paused && !over && awaitingSpace) {
        const dir = (state.serveTo === "player") ? 1 : -1;
        state.ball.vx = dir * state.ball.spd;
        state.ball.vy = (random()*2-1) * (state.ball.spd*0.45);
        awaitingSpace = false;
        setHint("");
        updateServeButton();
      } else if (paused) {
        paused = false;
        updateServeButton();
      }
    }
    
    serveBtn.addEventListener("click", serveBall);
    
    pauseBtn.addEventListener("click", () => {
      if (!over) {
        paused = !paused;
        updateServeButton();
        setHint(paused ? "Paused. Tap RESUME to continue." : "");
      }
    });
    
    restartBtn.addEventListener("click", () => {
      newGame();
    });
    
    difficultyBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        state.difficulty = +btn.dataset.diff;
        updateDifficultyUI();
        const diffText = ["Easy","Medium","Hard"][state.difficulty-1];
        setHint(`Difficulty: ${diffText}`);
      });
    });

    // Improved touch controls - paddle follows finger on left side
    let touchY = null;
    let isTouching = false;
    
    function getCanvasCoordinates(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = cfg.court.w / rect.width;
      const scaleY = cfg.court.h / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }
    
    // Touch zone (left half) for paddle control
    touchZone.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const coords = getCanvasCoordinates(e);
      touchY = coords.y;
      isTouching = true;
      touchZone.classList.add('active');
      
      // If awaiting serve, tap anywhere to serve
      if (awaitingSpace && !paused && !over) {
        serveBall();
      }
    });
    
    touchZone.addEventListener("pointermove", (e) => {
      if (!isTouching) return;
      e.preventDefault();
      const coords = getCanvasCoordinates(e);
      const targetY = coords.y - cfg.paddle.h / 2;
      state.player.y = clamp(targetY, 0, cfg.court.h - cfg.paddle.h);
    });
    
    touchZone.addEventListener("pointerup", (e) => {
      e.preventDefault();
      isTouching = false;
      touchZone.classList.remove('active');
    });
    
    touchZone.addEventListener("pointercancel", (e) => {
      e.preventDefault();
      isTouching = false;
      touchZone.classList.remove('active');
    });
    
    // Also support tap-to-serve anywhere on canvas when waiting
    canvas.addEventListener("pointerdown", (e) => {
      if (awaitingSpace && !paused && !over && !isTouching) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        // Only serve if not in touch zone (right side)
        if (x >= rect.width / 2) {
          serveBall();
        }
      }
    });
    
    // Prevent default touch behaviors
    document.addEventListener('touchstart', (e) => {
      if (e.target === canvas || e.target === touchZone) {
        e.preventDefault();
      }
    }, { passive: false });
    
    document.addEventListener('touchmove', (e) => {
      if (e.target === canvas || e.target === touchZone) {
        e.preventDefault();
      }
    }, { passive: false });

    // --- Utils ---
    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function sign(v){ return v<0?-1:1; }

    // --- Core update ---
    // Frame-rate independent physics using delta time (dt)
    function update(dt){
      if (paused || over || awaitingSpace) return;

      // Player move (W/S or Arrow keys)
      const pSpeed = cfg.paddle.speed * globalSpeedScale;
      const axis = (k.up? -1:0) + (k.down? +1:0);
      state.player.y = clamp(state.player.y + axis * pSpeed * dt, 0, cfg.court.h - cfg.paddle.h);

      // CPU AI - Adaptive difficulty with error factor
      // Higher difficulty = faster movement, lower mistake rate
      const diff = state.difficulty;
      const cpuTarget = state.ball.y - cfg.paddle.h/2;
      const mistakeScale = cfg.cpuMistakeBase * (diff===1?1.5:(diff===2?1.0:0.6));
      const noise = (random()*2-1) * mistakeScale * cfg.court.h; // offset target
      const adjustedTarget = clamp(cpuTarget + noise, 0, cfg.court.h - cfg.paddle.h);
      const cpuSpeed = (cfg.cpuBaseSpeed + (diff-1)*120) * globalSpeedScale;
      const dir = Math.sign(adjustedTarget - state.cpu.y);
      state.cpu.y = clamp(state.cpu.y + dir * cpuSpeed * dt, 0, cfg.court.h - cfg.paddle.h);

      // Ball physics (delta-time based)
      state.ball.x += state.ball.vx * dt;
      state.ball.y += state.ball.vy * dt;

      // Wall bounce
      if (state.ball.y - cfg.ball.r < 0 && state.ball.vy < 0) {
        state.ball.y = cfg.ball.r;
        state.ball.vy *= -1;
      }
      if (state.ball.y + cfg.ball.r > cfg.court.h && state.ball.vy > 0) {
        state.ball.y = cfg.court.h - cfg.ball.r;
        state.ball.vy *= -1;
      }

      // Paddle rects
      const pRect = { x: state.player.x, y: state.player.y, w: cfg.paddle.w, h: cfg.paddle.h };
      const cRect = { x: state.cpu.x,    y: state.cpu.y,    w: cfg.paddle.w, h: cfg.paddle.h };

      // Collision detection (circle-rectangle using closest point method)
      function ballIntersects(r){
        const cx = clamp(state.ball.x, r.x, r.x+r.w);
        const cy = clamp(state.ball.y, r.y, r.y+r.h);
        const dx = state.ball.x - cx, dy = state.ball.y - cy;
        return (dx*dx + dy*dy) <= (cfg.ball.r*cfg.ball.r);
      }
      // Paddle bounce with angle based on hit position (prevents tunneling)
      function bounceFromPaddle(rect, side){
        // side: +1 if left paddle (ball moving left to right), -1 if right
        const hitPos = (state.ball.y - rect.y) / rect.h; // 0..1
        const angle = (hitPos - 0.5) * Math.PI * 0.75;   // fan out
        state.ball.spd = Math.min(state.ball.spd * cfg.ball.speedGainOnHit, cfg.ball.maxSpeed);
        state.ball.vx = side * state.ball.spd * Math.cos(angle);
        state.ball.vy = state.ball.spd * Math.sin(angle);
        // Nudge out to prevent sticking
        state.ball.x = side>0 ? rect.x + rect.w + cfg.ball.r : rect.x - cfg.ball.r;
      }

      // Collide with player
      if (state.ball.vx < 0 && ballIntersects(pRect)) bounceFromPaddle(pRect, +1);
      // Collide with CPU
      if (state.ball.vx > 0 && ballIntersects(cRect)) bounceFromPaddle(cRect, -1);

      // Scoring
      if (state.ball.x < -cfg.ball.r) {
        state.cpu.score++;
        state.serveTo = "player";
        handleScore();
      } else if (state.ball.x > cfg.court.w + cfg.ball.r) {
        state.player.score++;
        state.serveTo = "cpu";
        handleScore();
      }
    }

    function handleScore(){
      if (state.player.score >= cfg.scoreToWin || state.cpu.score >= cfg.scoreToWin){
        over = true;
        const winner = state.player.score > state.cpu.score ? "You win!" : "CPU wins!";
        // Award coins: returns * 1 (player.score is the returns)
        const coins = state.player.score * 1;
        if (coins > 0 && typeof addCoins === 'function') {
          addCoins(coins);
        }
        // Check achievements: pong-king (win by 5+)
        if (state.player.score > state.cpu.score && typeof maybeUnlock === 'function') {
          const winMargin = state.player.score - state.cpu.score;
          maybeUnlock({ anyPlay: true, pong: { winMargin } });
        }
        setHint(isTouchDevice ? `${winner} Tap RESTART to play again.` : `${winner} Press R to restart.`);
        updateServeButton();
      } else {
        resetRound();
        setHint(isTouchDevice ? "Tap START to serve." : "SPACE to serve.");
        updateServeButton();
      }
    }

    // --- Render ---
    function draw(){
      // Clear
      ctx.clearRect(0,0,cfg.court.w,cfg.court.h);

      // Midline + center circle
      ctx.fillStyle = "#1a2a4a";
      for (let y=0; y<cfg.court.h; y+=20) {
        ctx.fillRect(cfg.court.w/2 - cfg.lineW/2, y, cfg.lineW, 12);
      }
      ctx.beginPath();
      ctx.arc(cfg.court.w/2, cfg.court.h/2, 60, 0, Math.PI*2);
      ctx.strokeStyle = "#1a2a4a"; ctx.lineWidth = 2; ctx.stroke();

      // Paddles
      ctx.fillStyle = typeof pongPaddleStyle === 'function' ? pongPaddleStyle() : "#e7f0ff";
      ctx.fillRect(state.player.x, state.player.y, cfg.paddle.w, cfg.paddle.h);
      ctx.fillStyle = "#e7f0ff"; // CPU paddle always default
      ctx.fillRect(state.cpu.x, state.cpu.y, cfg.paddle.w, cfg.paddle.h);

      // Ball
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, cfg.ball.r, 0, Math.PI*2);
      ctx.fill();

      // Score
      ctx.font = "48px system-ui,Segoe UI,Roboto,Arial";
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillText(state.player.score, cfg.court.w*0.25, 18);
      ctx.fillText(state.cpu.score,    cfg.court.w*0.75, 18);

      // Over / Paused banners
      if (paused) banner("Paused");
      if (over)   banner("Game Over");
    }

    function banner(text){
      ctx.save();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = "#0b1020";
      ctx.fillRect(cfg.court.w/2-160, cfg.court.h/2-40, 320, 80);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "#2a3a5f"; ctx.lineWidth = 2; ctx.strokeRect(cfg.court.w/2-160, cfg.court.h/2-40, 320, 80);
      ctx.fillStyle = "#e7f0ff";
      ctx.font = "28px system-ui,Segoe UI,Roboto,Arial";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(text, cfg.court.w/2, cfg.court.h/2);
      ctx.restore();
    }

    // --- Main Loop ---
    // requestAnimationFrame-based game loop with delta time
    function loop(ts){
      const dt = Math.min(1/30, (ts - lastT) / 1000) || 0; // clamp to avoid jumps on tab switch
      lastT = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "pong", gameName: "Pong" });
  </script>
</body>
</html>
