  <meta name="apple-mobile-web-app-capable" content="yes" />

  <style>
    :root {
      --bg-top: #11233d;
      --bg-mid: #1d2e5b;
      --bg-bottom: #091528;
      --panel: rgba(10, 18, 38, 0.78);
      --panel-border: rgba(170, 206, 255, 0.35);
      --text: #ebf6ff;
      --muted: #b8d5ef;
      --btn: #244d73;
      --btn-active: #2f6291;
      --btn-border: #8cc9ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(110% 90% at 20% 8%, #3c5ea6 0%, transparent 65%),
        radial-gradient(90% 120% at 80% 90%, #25427d 0%, transparent 62%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
    }

    .home-link {
      position: fixed;
      top: calc(env(safe-area-inset-top, 10px));
      left: calc(env(safe-area-inset-left, 10px));
      z-index: 30;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.2px;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(4, 12, 22, 0.48);
      backdrop-filter: blur(4px);
    }

    .layout {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 52px 12px 12px;
      padding-top: max(calc(env(safe-area-inset-top, 10px) + 48px), 58px);
      padding-bottom: calc(env(safe-area-inset-bottom, 10px) + 10px);
    }

    #canvasWrap {
      width: min(96vw, 980px);
      max-height: min(60dvh, 700px);
      aspect-ratio: 16 / 9;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 16px;
      border: 2px solid rgba(137, 197, 255, 0.65);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      background: linear-gradient(180deg, #19335f 0%, #13274e 38%, #10213f 100%);
      touch-action: none;
    }

    .hud {
      width: min(96vw, 980px);
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(5px);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border-radius: 10px;
      border: 1px solid rgba(196, 226, 255, 0.3);
      background: rgba(255, 255, 255, 0.07);
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-align: center;
      padding: 4px;
    }

    .metric-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      line-height: 1;
    }

    .metric-value {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.1;
    }

    .controls {
      width: min(96vw, 980px);
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(5px);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--btn-border);
      background: linear-gradient(180deg, var(--btn), #1b3f62);
      color: #fff;
      min-height: 48px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .btn:active,
    .btn.active {
      background: linear-gradient(180deg, var(--btn-active), #265179);
      transform: translateY(1px);
    }

    .controls-note {
      width: min(96vw, 980px);
      color: #d9ebff;
      font-size: 13px;
      text-align: center;
      opacity: 0.95;
      margin-top: -2px;
    }

    @media (max-width: 820px) {
      .hud { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .layout { gap: 8px; }
      #canvasWrap { width: min(98vw, 980px); }
      .metric-value { font-size: 15px; }
      .btn { min-height: 46px; font-size: 14px; }
      .controls-note { font-size: 12px; }
    }
  </style>

<body>
  <a class="home-link" href="/">Back Home</a>
  <div class="layout">
    <div id="canvasWrap">
      <canvas id="game" width="960" height="540" aria-label="Color Catch game canvas"></canvas>
    </div>
    <section class="hud" aria-live="polite">
      <div class="metric"><span class="metric-label">Mode</span><span id="hudMode" class="metric-value">Menu</span></div>
      <div class="metric"><span class="metric-label">Stage</span><span id="hudStage" class="metric-value">1</span></div>
      <div class="metric"><span class="metric-label">Score</span><span id="hudScore" class="metric-value">0</span></div>
      <div class="metric"><span class="metric-label">Combo</span><span id="hudCombo" class="metric-value">0</span></div>
      <div class="metric"><span class="metric-label">Lives</span><span id="hudLives" class="metric-value">3</span></div>
      <div class="metric"><span class="metric-label">Time</span><span id="hudTime" class="metric-value">45.0s</span></div>
    </section>
    <section class="controls" aria-label="Touch controls">
      <button class="btn" id="btnLeft">Left</button>
      <button class="btn" id="btnRight">Right</button>
      <button class="btn" id="btnSwap">Swap Color</button>
      <button class="btn" id="btnPause">Pause</button>
      <button class="btn" id="btnStart">Start / Restart</button>
    </section>
    <div class="controls-note">
      Keyboard: Arrow/A-D move, Space swap color, P pause, R restart, Enter start, F fullscreen
    </div>
  </div>
  <script type="module">
    import { addCoins, rememberRecent, state as profileState } from '../src/core/state.js';
    import { maybeUnlock } from '../src/prog/achievements.js';

    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const hudMode = document.getElementById('hudMode');
      const hudStage = document.getElementById('hudStage');
      const hudScore = document.getElementById('hudScore');
      const hudCombo = document.getElementById('hudCombo');
      const hudLives = document.getElementById('hudLives');
      const hudTime = document.getElementById('hudTime');

      const COLOR_SET = [
        { name: 'Coral', fill: '#ff6f61', glow: '#ffb3ab' },
        { name: 'Sky', fill: '#56b5ff', glow: '#aee0ff' },
        { name: 'Lime', fill: '#78d85f', glow: '#c7f7af' },
      ];
      const hasInventory = profileState.inventory instanceof Set;
      const COSMETICS = {
        prismTrail: hasInventory && profileState.inventory.has('colorcatch-prism-trail'),
        celestialSky: hasInventory && profileState.inventory.has('colorcatch-celestial-sky'),
      };

      const STAGES = [
        { duration: 45, target: 650, spawnEvery: 0.82, speed: 120 },
        { duration: 50, target: 1500, spawnEvery: 0.72, speed: 145 },
        { duration: 55, target: 2700, spawnEvery: 0.64, speed: 172 },
      ];

      const storageKey = 'colorcatch-best-score-v1';
      const state = {
        mode: 'menu',
        stageIndex: 0,
        stageTime: STAGES[0].duration,
        score: 0,
        lives: 3,
        combo: 0,
        bestCombo: 0,
        bestScore: Number(localStorage.getItem(storageKey) || 0),
        slowTimer: 0,
        shake: 0,
        messageTimer: 0,
        message: '',
        spawnCooldown: 0.55,
        coinsGiven: 0,
        unlocksEmitted: false,
        paddle: {
          x: canvas.width * 0.5,
          y: canvas.height - 70,
          halfW: 72,
          h: 26,
          colorIndex: 0,
          speed: 420,
        },
        droplets: [],
        particles: [],
        floaters: [],
        stars: createStars(72),
      };

      const input = {
        left: false,
        right: false,
        pointerActive: false,
        pointerX: canvas.width * 0.5,
      };

      let lastTs = 0;
      let accumulator = 0;
      let suppressRafStep = false;
      let pendingRaf = false;

      function createStars(count) {
        const arr = [];
        for (let i = 0; i < count; i++) {
          arr.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: 0.8 + Math.random() * 2.1,
            speed: 6 + Math.random() * 22,
            twinkle: Math.random() * Math.PI * 2,
          });
        }
        return arr;
      }
      function currentStage() {
        return STAGES[Math.min(state.stageIndex, STAGES.length - 1)];
      }

      function resetForNewRun() {
        state.mode = 'playing';
        state.stageIndex = 0;
        state.stageTime = STAGES[0].duration;
        state.score = 0;
        state.lives = 3;
        state.combo = 0;
        state.bestCombo = 0;
        state.slowTimer = 0;
        state.shake = 0;
        state.message = 'Stage 1 begin';
        state.messageTimer = 1.4;
        state.spawnCooldown = 0.45;
        state.coinsGiven = 0;
        state.unlocksEmitted = false;
        state.droplets.length = 0;
        state.particles.length = 0;
        state.floaters.length = 0;
        state.paddle.x = canvas.width * 0.5;
        state.paddle.colorIndex = 0;
      }

      function pauseToggle() {
        if (state.mode === 'playing') {
          state.mode = 'paused';
        } else if (state.mode === 'paused') {
          state.mode = 'playing';
        }
      }

      function restartRun() {
        rememberRecent('colorcatch');
        resetForNewRun();
      }

      function setMessage(text, seconds) {
        state.message = text;
        state.messageTimer = seconds;
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function chooseDropletType() {
        const roll = Math.random();
        if (roll < 0.07) return 'star';
        if (roll < 0.11) return 'heart';
        if (roll < 0.17) return 'slow';
        return 'normal';
      }

      function spawnDroplet() {
        const stage = currentStage();
        const kind = chooseDropletType();
        const colorIndex = Math.floor(Math.random() * COLOR_SET.length);
        const xPad = 45;
        const x = xPad + Math.random() * (canvas.width - xPad * 2);
        const speedScale = state.slowTimer > 0 ? 0.72 : 1;
        const speed = (stage.speed + Math.random() * 90) * speedScale;
        state.droplets.push({
          x,
          y: -18,
          radius: kind === 'normal' ? 14 : 16,
          vy: speed,
          colorIndex,
          kind,
          wobble: Math.random() * Math.PI * 2,
        });
      }

      function emitBurst(x, y, color, amount) {
        for (let i = 0; i < amount; i++) {
          const a = Math.random() * Math.PI * 2;
          const speed = 30 + Math.random() * 170;
          state.particles.push({
            x,
            y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            life: 0.25 + Math.random() * 0.5,
            t: 0,
            color,
            size: 2 + Math.random() * 3,
          });
        }
      }

      function addFloater(x, y, label, color) {
        state.floaters.push({ x, y, label, color, t: 0, life: 0.85 });
      }

      function onGoodCatch(drop) {
        const base = drop.kind === 'normal' ? 40 : 0;
        state.combo += 1;
        state.bestCombo = Math.max(state.bestCombo, state.combo);
        if (drop.kind === 'normal') {
          const gained = base + Math.min(120, state.combo * 6);
          state.score += gained;
          addFloater(drop.x, drop.y, `+${gained}`, '#d3f9ff');
          emitBurst(drop.x, drop.y, COLOR_SET[drop.colorIndex].glow, 10);
          return;
        }
        if (drop.kind === 'star') {
          const bonus = 180 + state.combo * 5;
          state.score += bonus;
          addFloater(drop.x, drop.y, `Star +${bonus}`, '#fff6a3');
          setMessage('Star bonus', 0.65);
          emitBurst(drop.x, drop.y, '#fff2a2', 16);
          return;
        }
        if (drop.kind === 'heart') {
          const before = state.lives;
          state.lives = Math.min(5, state.lives + 1);
          if (state.lives > before) {
            addFloater(drop.x, drop.y, '+1 life', '#b9ffcf');
          } else {
            state.score += 70;
            addFloater(drop.x, drop.y, '+70', '#b9ffcf');
          }
          emitBurst(drop.x, drop.y, '#b9ffcf', 12);
          return;
        }
        if (drop.kind === 'slow') {
          state.slowTimer = Math.min(9, state.slowTimer + 6);
          addFloater(drop.x, drop.y, 'Slow time', '#bdd2ff');
          setMessage('Slow motion active', 0.7);
          emitBurst(drop.x, drop.y, '#bdd2ff', 12);
        }
      }

      function loseLife(reason, x, y) {
        state.lives -= 1;
        state.combo = 0;
        state.shake = 0.25;
        emitBurst(x, y, '#ffb3b3', 14);
        setMessage(reason, 0.75);
        if (state.lives <= 0) {
          state.lives = 0;
          state.mode = 'gameover';
          finishRun();
        }
      }

      function finishRun() {
        if (!state.unlocksEmitted) {
          maybeUnlock({
            anyPlay: true,
            colorcatch: {
              score: state.score,
              stage: state.stageIndex + 1,
              lives: state.lives,
              combo: state.bestCombo,
            },
          });
          if (state.score > 0) {
            const runCoins = Math.max(1, Math.floor(state.score / 420) + Math.max(0, state.stageIndex));
            addCoins(runCoins);
            state.coinsGiven += runCoins;
          }
          state.unlocksEmitted = true;
        }

        if (state.score > state.bestScore) {
          state.bestScore = state.score;
          localStorage.setItem(storageKey, String(state.bestScore));
        }
      }

      function onBadCatch(drop) {
        addFloater(drop.x, drop.y, 'Wrong color', '#ffd1d1');
        loseLife('Wrong color catch', drop.x, drop.y);
      }

      function advanceStageOrWin() {
        const stage = currentStage();
        if (state.score >= stage.target) {
          if (state.stageIndex < STAGES.length - 1) {
            state.stageIndex += 1;
            state.stageTime = currentStage().duration;
            state.spawnCooldown = 0.25;
            setMessage(`Stage ${state.stageIndex + 1}`, 1.1);
            emitBurst(state.paddle.x, state.paddle.y - 8, '#fff5a8', 30);
          } else {
            state.mode = 'victory';
            finishRun();
            setMessage('Full clear', 2);
            emitBurst(state.paddle.x, state.paddle.y - 10, '#fff5a8', 42);
          }
        } else {
          state.mode = 'gameover';
          setMessage('Target missed', 1.2);
          finishRun();
        }
      }

      function updatePlaying(dt) {
        const stage = currentStage();
        if (state.messageTimer > 0) state.messageTimer = Math.max(0, state.messageTimer - dt);
        if (state.slowTimer > 0) state.slowTimer = Math.max(0, state.slowTimer - dt);
        if (state.shake > 0) state.shake = Math.max(0, state.shake - dt);

        if (input.pointerActive) {
          const target = clamp(input.pointerX, state.paddle.halfW + 10, canvas.width - state.paddle.halfW - 10);
          state.paddle.x += (target - state.paddle.x) * Math.min(1, dt * 18);
        } else {
          let move = 0;
          if (input.left) move -= 1;
          if (input.right) move += 1;
          state.paddle.x += move * state.paddle.speed * dt;
          state.paddle.x = clamp(state.paddle.x, state.paddle.halfW + 10, canvas.width - state.paddle.halfW - 10);
        }

        state.spawnCooldown -= dt;
        if (state.spawnCooldown <= 0) {
          spawnDroplet();
          const intervalTightening = Math.min(0.22, state.stageIndex * 0.05 + Math.floor(state.score / 1200) * 0.02);
          state.spawnCooldown = Math.max(0.38, stage.spawnEvery - intervalTightening) + Math.random() * 0.17;
        }

        for (let i = state.droplets.length - 1; i >= 0; i--) {
          const d = state.droplets[i];
          d.wobble += dt * 4.2;
          const sway = Math.sin(d.wobble) * 8;
          d.x += sway * dt;
          d.y += d.vy * dt;
          const top = state.paddle.y - state.paddle.h * 0.5;
          const hitX = Math.abs(d.x - state.paddle.x) <= state.paddle.halfW + d.radius * 0.55;
          const hitY = d.y + d.radius >= top && d.y - d.radius <= state.paddle.y + state.paddle.h * 0.5;

          if (hitX && hitY) {
            state.droplets.splice(i, 1);
            const matches = d.kind !== 'normal' || d.colorIndex === state.paddle.colorIndex;
            if (matches) onGoodCatch(d); else onBadCatch(d);
            continue;
          }

          if (d.y - d.radius > canvas.height + 12) {
            state.droplets.splice(i, 1);
            if (d.kind === 'normal') {
              addFloater(d.x, canvas.height - 24, 'Miss', '#ffd1d1');
              loseLife('Missed drop', d.x, canvas.height - 20);
            }
          }
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.t += dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 180 * dt;
          if (p.t >= p.life) state.particles.splice(i, 1);
        }

        for (let i = state.floaters.length - 1; i >= 0; i--) {
          const f = state.floaters[i];
          f.t += dt;
          f.y -= 36 * dt;
          if (f.t >= f.life) state.floaters.splice(i, 1);
        }

        for (const s of state.stars) {
          s.y += s.speed * dt;
          s.twinkle += dt * (1.2 + s.r * 0.5);
          if (s.y > canvas.height + 4) {
            s.y = -4;
            s.x = Math.random() * canvas.width;
          }
        }

        state.stageTime = Math.max(0, state.stageTime - dt);
        if (state.stageTime <= 0) advanceStageOrWin();
      }

      function update(dt) {
        if (state.mode === 'playing') updatePlaying(dt);
        if (state.mode !== 'playing') {
          if (state.messageTimer > 0) state.messageTimer = Math.max(0, state.messageTimer - dt);
          if (state.shake > 0) state.shake = Math.max(0, state.shake - dt);
        }
      }
      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        if (COSMETICS.celestialSky) {
          g.addColorStop(0, '#552f8f');
          g.addColorStop(0.5, '#263d8a');
          g.addColorStop(1, '#12244d');
        } else {
          g.addColorStop(0, '#254b8f');
          g.addColorStop(0.5, '#1a3669');
          g.addColorStop(1, '#102042');
        }
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (const s of state.stars) {
          const alpha = 0.28 + (Math.sin(s.twinkle) * 0.5 + 0.5) * 0.65;
          ctx.fillStyle = `rgba(210, 232, 255, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
        for (let i = 0; i < 6; i++) {
          const y = canvas.height - 36 - i * 18;
          ctx.fillRect(0, y, canvas.width, 2);
        }
      }

      function drawPaddle() {
        const p = state.paddle;
        const palette = COLOR_SET[p.colorIndex];
        ctx.save();
        ctx.shadowColor = COSMETICS.prismTrail ? '#f6d2ff' : palette.glow;
        ctx.shadowBlur = COSMETICS.prismTrail ? 30 : 22;
        ctx.fillStyle = palette.fill;
        roundRect(ctx, p.x - p.halfW, p.y - p.h * 0.5, p.halfW * 2, p.h, 12);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.34)';
        roundRect(ctx, p.x - p.halfW + 12, p.y - p.h * 0.5 + 5, p.halfW * 2 - 24, 6, 6);
        ctx.fill();
        ctx.fillStyle = '#f3fbff';
        ctx.font = 'bold 13px Trebuchet MS, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(palette.name.toUpperCase(), p.x, p.y + 1);
        ctx.restore();
      }

      function drawDroplet(d) {
        const color = COLOR_SET[d.colorIndex];
        const yNudge = Math.sin(d.wobble * 1.5) * 2;
        const x = d.x;
        const y = d.y + yNudge;
        let fill = color.fill;
        let glow = color.glow;
        if (d.kind === 'star') {
          fill = '#ffe06d';
          glow = '#fff3b7';
        } else if (d.kind === 'heart') {
          fill = '#7ef3a1';
          glow = '#c6ffd8';
        } else if (d.kind === 'slow') {
          fill = '#95b2ff';
          glow = '#d0dcff';
        }

        ctx.save();
        ctx.shadowColor = glow;
        ctx.shadowBlur = 18;
        if (d.kind === 'star') {
          drawStar(x, y, d.radius + 3, 5, 0.55);
          ctx.fillStyle = fill;
          ctx.fill();
        } else if (d.kind === 'heart') {
          ctx.fillStyle = fill;
          drawHeart(x, y, d.radius + 2);
          ctx.fill();
        } else if (d.kind === 'slow') {
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(x, y, d.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.7)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, d.radius - 4, -Math.PI * 0.35, Math.PI * 0.8);
          ctx.stroke();
        } else {
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(x, y, d.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.44)';
        ctx.beginPath();
        ctx.arc(x - d.radius * 0.3, y - d.radius * 0.32, d.radius * 0.33, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const p of state.particles) {
          const alpha = 1 - p.t / p.life;
          ctx.fillStyle = `${p.color}${Math.round(alpha * 255).toString(16).padStart(2, '0')}`;
          ctx.fillRect(p.x, p.y, p.size, p.size);
        }
      }

      function drawFloaters() {
        ctx.save();
        ctx.font = 'bold 18px Trebuchet MS, sans-serif';
        ctx.textAlign = 'center';
        for (const f of state.floaters) {
          const alpha = 1 - f.t / f.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = f.color;
          ctx.fillText(f.label, f.x, f.y);
        }
        ctx.restore();
      }

      function drawTopBanner() {
        const stage = currentStage();
        const meterW = 292;
        const meterH = 11;
        const x = 18;
        const y = 16;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
        roundRect(ctx, x, y, 420, 62, 12);
        ctx.fill();
        ctx.fillStyle = '#d8ecff';
        ctx.font = 'bold 16px Trebuchet MS, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(`Target ${stage.target}   Current ${state.score}`, x + 12, y + 20);
        ctx.fillStyle = '#c5e3ff';
        ctx.font = '13px Trebuchet MS, sans-serif';
        ctx.fillText(`Best combo ${state.bestCombo}   Best score ${state.bestScore}`, x + 12, y + 44);
        const progress = clamp(stage.duration > 0 ? state.stageTime / stage.duration : 0, 0, 1);
        const meterX = x + 115;
        const meterY = y + 50;
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        roundRect(ctx, meterX, meterY, meterW, meterH, 6);
        ctx.fill();
        ctx.fillStyle = progress > 0.33 ? '#82dcff' : '#ffc978';
        roundRect(ctx, meterX, meterY, meterW * progress, meterH, 6);
        ctx.fill();

        if (state.slowTimer > 0) {
          ctx.fillStyle = 'rgba(180, 204, 255, 0.28)';
          roundRect(ctx, x + 280, y + 12, 146, 22, 11);
          ctx.fill();
          ctx.fillStyle = '#e3ecff';
          ctx.font = 'bold 12px Trebuchet MS, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`Slow ${state.slowTimer.toFixed(1)}s`, x + 352, y + 23);
        }
      }

      function drawOverlay(modeText, subText) {
        ctx.fillStyle = 'rgba(5, 10, 19, 0.56)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(8, 17, 33, 0.85)';
        roundRect(ctx, canvas.width * 0.16, canvas.height * 0.2, canvas.width * 0.68, canvas.height * 0.6, 18);
        ctx.fill();
        ctx.strokeStyle = 'rgba(176, 216, 255, 0.45)';
        ctx.lineWidth = 2;
        roundRect(ctx, canvas.width * 0.16, canvas.height * 0.2, canvas.width * 0.68, canvas.height * 0.6, 18);
        ctx.stroke();
        ctx.fillStyle = '#f2f8ff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 42px Trebuchet MS, sans-serif';
        ctx.fillText(modeText, canvas.width * 0.5, canvas.height * 0.34);
        ctx.font = '18px Trebuchet MS, sans-serif';
        ctx.fillStyle = '#d7e8fa';
        ctx.fillText(subText, canvas.width * 0.5, canvas.height * 0.44);
        ctx.font = '16px Trebuchet MS, sans-serif';
        ctx.fillStyle = '#b8d4ef';
        ctx.fillText('Catch matching colors. Special drops always help.', canvas.width * 0.5, canvas.height * 0.54);
        ctx.fillText('Normal drop miss or wrong color costs one life.', canvas.width * 0.5, canvas.height * 0.59);
        ctx.fillText('Press Enter or tap Start to begin.', canvas.width * 0.5, canvas.height * 0.66);
      }

      function drawMessage() {
        if (state.messageTimer <= 0 || !state.message) return;
        const alpha = clamp(state.messageTimer / 0.8, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(8, 17, 32, 0.78)';
        roundRect(ctx, canvas.width * 0.33, 92, canvas.width * 0.34, 34, 10);
        ctx.fill();
        ctx.fillStyle = '#f0f8ff';
        ctx.font = 'bold 17px Trebuchet MS, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(state.message, canvas.width * 0.5, 109);
        ctx.restore();
      }

      function render() {
        ctx.save();
        if (state.shake > 0) {
          const p = state.shake / 0.25;
          ctx.translate((Math.random() - 0.5) * 8 * p, (Math.random() - 0.5) * 6 * p);
        }
        drawBackground();
        for (const d of state.droplets) drawDroplet(d);
        drawPaddle();
        drawParticles();
        drawFloaters();
        drawTopBanner();
        drawMessage();

        if (state.mode === 'menu') {
          drawOverlay('Color Catch', '3 stages, color-matching, and clean controls');
        } else if (state.mode === 'paused') {
          drawOverlay('Paused', 'Press P or Pause to resume');
        } else if (state.mode === 'gameover') {
          drawOverlay('Round Over', `Final score ${state.score} | Best ${state.bestScore}`);
        } else if (state.mode === 'victory') {
          drawOverlay('Perfect Clear', `You beat all stages with ${state.score} points`);
        }
        ctx.restore();

        hudMode.textContent = state.mode;
        hudStage.textContent = String(state.stageIndex + 1);
        hudScore.textContent = String(state.score);
        hudCombo.textContent = String(state.combo);
        hudLives.textContent = String(state.lives);
        hudTime.textContent = `${state.stageTime.toFixed(1)}s`;
      }

      function roundRect(context, x, y, w, h, r) {
        const radius = Math.min(r, w * 0.5, h * 0.5);
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + w, y, x + w, y + h, radius);
        context.arcTo(x + w, y + h, x, y + h, radius);
        context.arcTo(x, y + h, x, y, radius);
        context.arcTo(x, y, x + w, y, radius);
        context.closePath();
      }

      function drawStar(cx, cy, r, spikes, innerScale) {
        let rot = Math.PI / 2 * 3;
        const step = Math.PI / spikes;
        const innerR = r * innerScale;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        for (let i = 0; i < spikes; i++) {
          ctx.lineTo(cx + Math.cos(rot) * r, cy + Math.sin(rot) * r);
          rot += step;
          ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
          rot += step;
        }
        ctx.lineTo(cx, cy - r);
        ctx.closePath();
      }

      function drawHeart(x, y, size) {
        const s = size / 15;
        ctx.beginPath();
        ctx.moveTo(x, y + 12 * s);
        ctx.bezierCurveTo(x + 12 * s, y + 2 * s, x + 15 * s, y - 8 * s, x, y - 2 * s);
        ctx.bezierCurveTo(x - 15 * s, y - 8 * s, x - 12 * s, y + 2 * s, x, y + 12 * s);
        ctx.closePath();
      }

      function onKeyDown(event) {
        const key = event.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') input.left = true;
        if (key === 'arrowright' || key === 'd') input.right = true;
        if (key === ' ') {
          event.preventDefault();
          cycleColor();
        }
        if (key === 'p') pauseToggle();
        if (key === 'r') restartRun();
        if (key === 'enter' && (state.mode === 'menu' || state.mode === 'gameover' || state.mode === 'victory')) restartRun();
        if (key === 'f') toggleFullscreen();
      }

      function onKeyUp(event) {
        const key = event.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') input.left = false;
        if (key === 'arrowright' || key === 'd') input.right = false;
      }

      function pointerToCanvasX(clientX) {
        const rect = canvas.getBoundingClientRect();
        const rel = (clientX - rect.left) / Math.max(1, rect.width);
        return rel * canvas.width;
      }

      function cycleColor() {
        state.paddle.colorIndex = (state.paddle.colorIndex + 1) % COLOR_SET.length;
        setMessage(`Bucket ${COLOR_SET[state.paddle.colorIndex].name}`, 0.45);
      }

      function bindHoldButton(button, setFn) {
        const start = (e) => {
          e.preventDefault();
          setFn(true);
          button.classList.add('active');
        };
        const end = (e) => {
          if (e) e.preventDefault();
          setFn(false);
          button.classList.remove('active');
        };
        button.addEventListener('pointerdown', start);
        button.addEventListener('pointerup', end);
        button.addEventListener('pointercancel', end);
        button.addEventListener('pointerleave', end);
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      function wireControls() {
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        canvas.addEventListener('pointerdown', (e) => {
          input.pointerActive = true;
          input.pointerX = pointerToCanvasX(e.clientX);
        });
        canvas.addEventListener('pointermove', (e) => {
          if (!input.pointerActive) return;
          input.pointerX = pointerToCanvasX(e.clientX);
        });
        const releasePointer = () => { input.pointerActive = false; };
        canvas.addEventListener('pointerup', releasePointer);
        canvas.addEventListener('pointercancel', releasePointer);
        canvas.addEventListener('pointerleave', releasePointer);
        bindHoldButton(document.getElementById('btnLeft'), (v) => { input.left = v; });
        bindHoldButton(document.getElementById('btnRight'), (v) => { input.right = v; });
        document.getElementById('btnSwap').addEventListener('click', () => cycleColor());
        document.getElementById('btnPause').addEventListener('click', () => pauseToggle());
        document.getElementById('btnStart').addEventListener('click', () => restartRun());
      }

      function rafLoop(ts) {
        if (lastTs === 0) lastTs = ts;
        const dtSec = Math.min(0.05, (ts - lastTs) / 1000);
        lastTs = ts;
        if (!suppressRafStep) {
          accumulator += dtSec;
          while (accumulator >= 1 / 60) {
            update(1 / 60);
            accumulator -= 1 / 60;
          }
        }
        render();
        requestAnimationFrame(rafLoop);
      }

      function runDeterministic(ms) {
        const step = 1 / 60;
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        suppressRafStep = true;
        for (let i = 0; i < steps; i++) update(step);
        render();
        suppressRafStep = false;
      }

      window.advanceTime = (ms) => {
        runDeterministic(Number(ms) || 0);
      };

      window.render_game_to_text = () => {
        const payload = {
          mode: state.mode,
          coordinateSystem: 'origin=(0,0) top-left, +x right, +y down, canvas=960x540',
          stage: {
            index: state.stageIndex + 1,
            total: STAGES.length,
            target: currentStage().target,
            timeRemaining: Number(state.stageTime.toFixed(2)),
          },
          player: {
            x: Number(state.paddle.x.toFixed(2)),
            y: state.paddle.y,
            halfWidth: state.paddle.halfW,
            colorName: COLOR_SET[state.paddle.colorIndex].name,
            colorIndex: state.paddle.colorIndex,
          },
          resources: {
            score: state.score,
            lives: state.lives,
            combo: state.combo,
            bestCombo: state.bestCombo,
            slowTimer: Number(state.slowTimer.toFixed(2)),
          },
          visibleDrops: state.droplets.slice(0, 12).map((d) => ({
            x: Number(d.x.toFixed(2)),
            y: Number(d.y.toFixed(2)),
            vy: Number(d.vy.toFixed(2)),
            kind: d.kind,
            colorName: COLOR_SET[d.colorIndex].name,
            colorIndex: d.colorIndex,
          })),
        };
        return JSON.stringify(payload);
      };

      wireControls();
      render();
      if (!pendingRaf) {
        pendingRaf = true;
        requestAnimationFrame(rafLoop);
      }
    })();
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "colorcatch", gameName: "Color Catch Arcade" });
  </script>
</body>
