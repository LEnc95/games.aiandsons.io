<script type="module">
import { state as profileState, addCoins } from '/src/core/state.js';
import { mountGameFeedback } from '/src/feedback/embed.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const els = {
  puzzle: document.getElementById('puzzleLabel'),
  stars: document.getElementById('starsLabel'),
  moves: document.getElementById('movesLabel'),
  hints: document.getElementById('hintsLabel'),
  score: document.getElementById('scoreLabel'),
  coins: document.getElementById('coinsLabel'),
  start: document.getElementById('startBtn'),
  check: document.getElementById('checkBtn'),
  hint: document.getElementById('hintBtn'),
  undo: document.getElementById('undoBtn'),
  pause: document.getElementById('pauseBtn'),
  restart: document.getElementById('restartBtn'),
  full: document.getElementById('fullBtn'),
  tools: [...document.querySelectorAll('[data-tool]')],
};

const SIZE = 6;
const EMPTY = 0;
const STAR = 1;
const MARK = 2;
const STORAGE_BEST = 'starbattle:best';
const ORTHO_DIRS = [[1, 0], [-1, 0], [0, 1], [0, -1]];
const REGION_COLORS = ['#f8d27a', '#96d9c8', '#f4aaa0', '#aabfe8', '#c8df7c', '#d8bae7'];

const rawPuzzles = [
  { id: 'observatory', name: 'Observatory', seed: 1, solutionColumns: [0, 2, 4, 1, 3, 5] },
  { id: 'harbor-night', name: 'Harbor Night', seed: 2, solutionColumns: [1, 3, 5, 0, 2, 4] },
  { id: 'garden-array', name: 'Garden Array', seed: 3, solutionColumns: [2, 5, 1, 4, 0, 3] },
  { id: 'market-lights', name: 'Market Lights', seed: 4, solutionColumns: [4, 1, 5, 2, 0, 3] },
  { id: 'summit-watch', name: 'Summit Watch', seed: 5, solutionColumns: [3, 0, 4, 1, 5, 2] },
];

const blankGrid = () => Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
const cloneGrid = grid => grid.map(row => [...row]);
const cellKey = (row, col) => `${row},${col}`;
const parseCellKey = key => {
  const [row, col] = key.split(',').map(Number);
  return { row, col };
};
const inBounds = (row, col) => row >= 0 && row < SIZE && col >= 0 && col < SIZE;

function buildRegionGrid(solutionColumns, seed) {
  const regionGrid = Array.from({ length: SIZE }, () => Array(SIZE).fill(-1));
  const regions = Array.from({ length: SIZE }, () => []);
  for (let row = 0; row < SIZE; row += 1) {
    const col = solutionColumns[row];
    regionGrid[row][col] = row;
    regions[row].push({ row, col });
  }

  let remaining = SIZE * SIZE - SIZE;
  let guard = 0;
  while (remaining > 0 && guard < 1000) {
    guard += 1;
    let moved = false;
    for (let pass = 0; pass < SIZE; pass += 1) {
      const regionId = (pass + seed) % SIZE;
      const candidates = [];
      for (const cell of regions[regionId]) {
        for (const [dr, dc] of ORTHO_DIRS) {
          const row = cell.row + dr;
          const col = cell.col + dc;
          if (inBounds(row, col) && regionGrid[row][col] < 0) candidates.push({ row, col });
        }
      }
      if (!candidates.length) continue;
      candidates.sort((a, b) => (
        ((a.row * 17 + a.col * 29 + regionId * 7 + seed * 13) % 97)
        - ((b.row * 17 + b.col * 29 + regionId * 7 + seed * 13) % 97)
      ));
      const chosen = candidates[0];
      regionGrid[chosen.row][chosen.col] = regionId;
      regions[regionId].push(chosen);
      remaining -= 1;
      moved = true;
      if (!remaining) break;
    }
    if (!moved) break;
  }
  return regionGrid;
}

function buildPuzzle(raw) {
  const stars = raw.solutionColumns.map((col, row) => ({ row, col, region: row }));
  const regionGrid = buildRegionGrid(raw.solutionColumns, raw.seed);
  const regionCells = Array.from({ length: SIZE }, () => []);
  for (let row = 0; row < SIZE; row += 1) {
    for (let col = 0; col < SIZE; col += 1) {
      const region = regionGrid[row][col];
      regionCells[region].push({ row, col });
    }
  }
  return { ...raw, stars, regionGrid, regionCells };
}

const PUZZLES = rawPuzzles.map(buildPuzzle);

const game = {
  mode: 'menu',
  previousMode: 'playing',
  puzzleIndex: 0,
  grid: blankGrid(),
  selected: { row: 0, col: 0 },
  tool: 'star',
  history: [],
  moves: 0,
  hints: 0,
  checks: 0,
  score: 0,
  bestScore: Number(localStorage.getItem(STORAGE_BEST) || 0),
  coinsEarned: 0,
  lastCoins: 0,
  solvedIds: new Set(),
  message: 'Place one star in every row, column, and colored region. Stars cannot touch, even diagonally.',
  errorCells: new Set(),
  missingRows: [],
  missingCols: [],
  missingRegions: [],
  successPulse: 0,
  shake: 0,
  elapsedMs: 0,
  lastAction: { type: 'load' },
};

let view = {
  width: 1080,
  height: 700,
  board: { left: 48, top: 48, size: 520, cell: 86.67 },
  sidePanel: null,
};
let lastFrame = performance.now();
let manualStepping = false;

const currentPuzzle = () => PUZZLES[game.puzzleIndex];
const currentRegion = (row, col) => currentPuzzle().regionGrid[row][col];

function primePuzzle(index = 0) {
  game.puzzleIndex = Math.max(0, Math.min(PUZZLES.length - 1, index));
  game.grid = blankGrid();
  game.selected = { row: 0, col: 0 };
  game.tool = 'star';
  game.history = [];
  game.moves = 0;
  game.hints = 0;
  game.checks = 0;
  game.lastCoins = 0;
  clearHighlights();
  game.successPulse = 0;
  game.shake = 0;
}

function startPuzzle(index = game.puzzleIndex) {
  primePuzzle(index);
  game.mode = 'playing';
  game.message = `Puzzle ${game.puzzleIndex + 1}: ${currentPuzzle().name}. Place exactly six stars.`;
  game.lastAction = { type: 'start', puzzle: currentPuzzle().id };
  updateHud();
  draw();
}

function restartPuzzle() {
  if (game.mode === 'complete') {
    game.score = 0;
    game.coinsEarned = 0;
    game.solvedIds.clear();
    startPuzzle(0);
    return;
  }
  startPuzzle(game.puzzleIndex);
}

function nextPuzzleOrStart() {
  if (game.mode === 'menu') {
    game.score = 0;
    game.coinsEarned = 0;
    game.solvedIds.clear();
    startPuzzle(0);
  } else if (game.mode === 'solved') {
    startPuzzle(Math.min(PUZZLES.length - 1, game.puzzleIndex + 1));
  } else if (game.mode === 'complete') {
    game.score = 0;
    game.coinsEarned = 0;
    game.solvedIds.clear();
    startPuzzle(0);
  } else if (game.mode === 'paused') {
    togglePause();
  } else {
    restartPuzzle();
  }
}

function clearHighlights() {
  game.errorCells = new Set();
  game.missingRows = [];
  game.missingCols = [];
  game.missingRegions = [];
}

function pushHistory() {
  game.history.push({
    grid: cloneGrid(game.grid),
    moves: game.moves,
    hints: game.hints,
    checks: game.checks,
    selected: { ...game.selected },
    tool: game.tool,
    message: game.message,
  });
  if (game.history.length > 80) game.history.shift();
}

function undoMove() {
  if (game.mode !== 'playing' || !game.history.length) return false;
  const snapshot = game.history.pop();
  game.grid = cloneGrid(snapshot.grid);
  game.moves = snapshot.moves;
  game.hints = snapshot.hints;
  game.checks = snapshot.checks;
  game.selected = { ...snapshot.selected };
  game.tool = snapshot.tool;
  game.message = 'Undo restored the previous star map.';
  clearHighlights();
  game.lastAction = { type: 'undo' };
  updateHud();
  draw();
  return true;
}

function selectCell(row, col) {
  if (!inBounds(row, col)) return false;
  game.selected = { row, col };
  game.lastAction = { type: 'select', row, col };
  draw();
  return true;
}

function moveSelection(dr, dc) {
  const row = game.selected.row + dr;
  const col = game.selected.col + dc;
  if (!inBounds(row, col)) {
    game.message = 'Board edge reached.';
    game.shake = 1;
    game.lastAction = { type: 'boundary', attempted: { row, col } };
    updateHud();
    draw();
    return false;
  }
  return selectCell(row, col);
}

function setTool(tool) {
  game.tool = tool;
  game.lastAction = { type: 'tool', tool };
  updateHud();
  draw();
}

function markForTool(tool = game.tool) {
  if (tool === 'star') return STAR;
  if (tool === 'mark') return MARK;
  return EMPTY;
}

function setCell(row, col, mark, source = 'input') {
  if (game.mode !== 'playing' || !inBounds(row, col)) return false;
  const normalized = mark === STAR || mark === MARK ? mark : EMPTY;
  const next = game.grid[row][col] === normalized ? EMPTY : normalized;
  if (game.grid[row][col] === next) return false;
  pushHistory();
  game.grid[row][col] = next;
  game.selected = { row, col };
  game.moves += 1;
  clearHighlights();
  const label = next === STAR ? 'star' : next === MARK ? 'safe mark' : 'empty';
  game.message = `Set row ${row + 1}, column ${col + 1} to ${label}.`;
  game.lastAction = { type: 'set-cell', source, row, col, mark: next };
  const analysis = analyzeBoard(game.grid);
  if (analysis.solved) handleSolved();
  else updateHud();
  draw();
  return true;
}

function applyCurrentTool(row = game.selected.row, col = game.selected.col, source = 'tool') {
  return setCell(row, col, markForTool(), source);
}

function revealHint() {
  if (game.mode !== 'playing') return false;
  const puzzle = currentPuzzle();
  const target = puzzle.stars.find(cell => game.grid[cell.row][cell.col] !== STAR);
  if (!target) {
    checkBoard();
    return false;
  }
  pushHistory();
  game.grid[target.row][target.col] = STAR;
  game.selected = { row: target.row, col: target.col };
  game.tool = 'star';
  game.hints += 1;
  game.moves += 1;
  clearHighlights();
  game.message = `Hint placed a star in row ${target.row + 1}, column ${target.col + 1}.`;
  game.lastAction = { type: 'hint', row: target.row, col: target.col };
  const analysis = analyzeBoard(game.grid);
  if (analysis.solved) handleSolved();
  else updateHud();
  draw();
  return true;
}

function checkBoard() {
  if (game.mode !== 'playing') return false;
  const analysis = analyzeBoard(game.grid);
  game.checks += 1;
  game.errorCells = analysis.errorCells;
  game.missingRows = analysis.missingRows;
  game.missingCols = analysis.missingCols;
  game.missingRegions = analysis.missingRegions;
  game.lastAction = {
    type: 'check',
    stars: analysis.stars.length,
    errors: analysis.errorCells.size,
    missing_rows: [...analysis.missingRows],
    missing_cols: [...analysis.missingCols],
    missing_regions: [...analysis.missingRegions],
  };
  if (analysis.solved) {
    handleSolved();
    return true;
  }
  game.shake = analysis.errorCells.size ? 1 : 0;
  if (!analysis.stars.length) {
    game.message = 'Place at least one star before checking.';
  } else if (analysis.errorCells.size) {
    game.message = `${analysis.errorCells.size} star position${analysis.errorCells.size === 1 ? '' : 's'} break a row, column, region, or touch rule.`;
  } else {
    const missing = analysis.missingRows.length + analysis.missingCols.length + analysis.missingRegions.length;
    game.message = `${missing} required line or region target${missing === 1 ? '' : 's'} still need a star.`;
  }
  updateHud();
  draw();
  return false;
}

function analyzeBoard(grid) {
  const puzzle = currentPuzzle();
  const stars = [];
  const errorCells = new Set();
  const rows = Array.from({ length: SIZE }, () => []);
  const cols = Array.from({ length: SIZE }, () => []);
  const regions = Array.from({ length: SIZE }, () => []);

  for (let row = 0; row < SIZE; row += 1) {
    for (let col = 0; col < SIZE; col += 1) {
      if (grid[row][col] !== STAR) continue;
      const star = { row, col, region: puzzle.regionGrid[row][col] };
      stars.push(star);
      rows[row].push(star);
      cols[col].push(star);
      regions[star.region].push(star);
    }
  }

  const markAll = cells => {
    for (const cell of cells) errorCells.add(cellKey(cell.row, cell.col));
  };
  rows.forEach(cells => { if (cells.length > 1) markAll(cells); });
  cols.forEach(cells => { if (cells.length > 1) markAll(cells); });
  regions.forEach(cells => { if (cells.length > 1) markAll(cells); });

  for (let i = 0; i < stars.length; i += 1) {
    for (let j = i + 1; j < stars.length; j += 1) {
      if (Math.abs(stars[i].row - stars[j].row) <= 1 && Math.abs(stars[i].col - stars[j].col) <= 1) {
        errorCells.add(cellKey(stars[i].row, stars[i].col));
        errorCells.add(cellKey(stars[j].row, stars[j].col));
      }
    }
  }

  const missingRows = rows.map((cells, index) => cells.length === 0 ? index : -1).filter(index => index >= 0);
  const missingCols = cols.map((cells, index) => cells.length === 0 ? index : -1).filter(index => index >= 0);
  const missingRegions = regions.map((cells, index) => cells.length === 0 ? index : -1).filter(index => index >= 0);
  const solved = stars.length === SIZE
    && errorCells.size === 0
    && rows.every(cells => cells.length === 1)
    && cols.every(cells => cells.length === 1)
    && regions.every(cells => cells.length === 1);

  return { stars, rows, cols, regions, errorCells, missingRows, missingCols, missingRegions, solved };
}

function scoreForSolve() {
  const base = 190 + game.puzzleIndex * 38;
  const movePenalty = Math.max(0, game.moves - 8) * 4;
  const hintPenalty = game.hints * 18;
  const checkPenalty = Math.max(0, game.checks - 1) * 6;
  return Math.max(45, base - movePenalty - hintPenalty - checkPenalty);
}

function addReward(coins) {
  const amount = Math.max(0, Math.floor(coins));
  if (!amount) return;
  game.coinsEarned += amount;
  addCoins(amount);
}

function handleSolved() {
  const puzzle = currentPuzzle();
  const score = scoreForSolve();
  game.score += score;
  game.bestScore = Math.max(game.bestScore, game.score);
  localStorage.setItem(STORAGE_BEST, String(game.bestScore));
  let coins = 0;
  if (!game.solvedIds.has(puzzle.id)) {
    coins = 8 + game.puzzleIndex * 2 + Math.max(0, 3 - game.hints);
    if (game.puzzleIndex === PUZZLES.length - 1) coins += 22;
    addReward(coins);
    game.solvedIds.add(puzzle.id);
  }
  game.lastCoins = coins;
  game.successPulse = 1;
  clearHighlights();
  game.mode = game.puzzleIndex === PUZZLES.length - 1 ? 'complete' : 'solved';
  game.message = game.mode === 'complete'
    ? `Campaign complete. Earned ${coins} coins on this board.`
    : `Solved ${puzzle.name}. Earned ${coins} coins.`;
  game.lastAction = { type: 'solve', puzzle: puzzle.id, score, coins };
  updateHud();
  draw();
}

function togglePause() {
  if (game.mode === 'paused') {
    game.mode = game.previousMode || 'playing';
    game.message = 'Resumed. Keep every star separated.';
    game.lastAction = { type: 'resume' };
  } else if (game.mode === 'playing') {
    game.previousMode = game.mode;
    game.mode = 'paused';
    game.message = 'Paused.';
    game.lastAction = { type: 'pause' };
  }
  updateHud();
  draw();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

function countStars() {
  return game.grid.flat().filter(value => value === STAR).length;
}

function updateHud() {
  const analysis = analyzeBoard(game.grid);
  els.puzzle.textContent = `${game.puzzleIndex + 1} / ${PUZZLES.length}`;
  els.stars.textContent = `${analysis.stars.length} / ${SIZE}`;
  els.moves.textContent = String(game.moves);
  els.hints.textContent = String(game.hints);
  els.score.textContent = String(game.score);
  els.coins.textContent = String(Number(profileState.coins || 0));
  els.start.textContent = game.mode === 'solved' ? 'Next' : game.mode === 'complete' ? 'Replay' : game.mode === 'paused' ? 'Resume' : game.mode === 'menu' ? 'Start' : 'New';
  els.pause.textContent = game.mode === 'paused' ? 'Resume' : 'Pause';
  const playing = game.mode === 'playing';
  els.check.disabled = !playing;
  els.hint.disabled = !playing;
  els.undo.disabled = !playing || !game.history.length;
  for (const button of els.tools) {
    button.disabled = !playing;
    button.classList.toggle('active', button.dataset.tool === game.tool);
  }
}

function update(dt) {
  game.elapsedMs += dt * 1000;
  game.successPulse = Math.max(0, game.successPulse - dt * 1.6);
  game.shake = Math.max(0, game.shake - dt * 5);
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.max(320, Math.floor(rect.width * dpr));
  canvas.height = Math.max(240, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  view.width = rect.width;
  view.height = rect.height;
  draw();
}

function computeLayout() {
  const w = view.width;
  const h = view.height;
  const wide = w >= 780;
  const compact = !wide && w < 520;
  const panelMin = compact ? 96 : 74;
  const top = wide ? 34 : compact ? 24 : 36;
  const side = wide
    ? Math.min(528, h - 68, w - 342)
    : Math.min(w - 28, h - top - panelMin - 16, 404);
  const size = Math.max(compact ? 174 : 218, side);
  const left = wide ? 34 : (w - size) / 2;
  view.board = { left, top, size, cell: size / SIZE };
  view.sidePanel = wide
    ? { left: left + size + 30, top, width: Math.max(240, w - (left + size + 62)), height: size }
    : { left: 14, top: top + size + 10, width: w - 28, height: Math.max(panelMin, h - (top + size + 18)) };
}

function draw() {
  computeLayout();
  const w = view.width;
  const h = view.height;
  ctx.clearRect(0, 0, w, h);
  const gradient = ctx.createLinearGradient(0, 0, w, h);
  gradient.addColorStop(0, '#fffdf8');
  gradient.addColorStop(0.46, '#e8f5ef');
  gradient.addColorStop(1, '#f6ded7');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, w, h);
  drawAmbient(w, h);
  drawBoard();
  drawPanel();
  if (game.mode === 'menu') drawOverlay('Star Battle', 'Place one star in every row, column, and colored region. Stars never touch.');
  if (game.mode === 'paused') drawOverlay('Paused', 'Resume when you are ready.');
  if (game.mode === 'solved') drawOverlay('Solved', 'Use Next to continue the campaign.');
  if (game.mode === 'complete') drawOverlay('Campaign Complete', 'Replay to chase a cleaner star map.');
}

function drawAmbient(w, h) {
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#17212a';
  ctx.lineWidth = 1;
  for (let i = -h; i < w; i += 52) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + h, h);
    ctx.stroke();
  }
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = '#1f7a68';
  for (let y = 34; y < h; y += 86) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y + Math.sin(y / 39) * 10);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBoard() {
  const { left, top, size, cell } = view.board;
  const offset = game.shake ? Math.sin(game.elapsedMs / 24) * 4 * game.shake : 0;
  ctx.save();
  ctx.translate(offset, 0);
  roundRect(left - 8, top - 8, size + 16, size + 16, 8, '#fffaf0eb', '#ffffffca', 2);

  for (let row = 0; row < SIZE; row += 1) {
    for (let col = 0; col < SIZE; col += 1) drawCell(row, col);
  }
  drawRegionBorders();
  drawGridLines();
  ctx.restore();
}

function drawCell(row, col) {
  const { left, top, cell } = view.board;
  const x = left + col * cell;
  const y = top + row * cell;
  const region = currentRegion(row, col);
  const selected = game.selected.row === row && game.selected.col === col;
  const error = game.errorCells.has(cellKey(row, col));
  const value = game.grid[row][col];
  let fill = REGION_COLORS[region % REGION_COLORS.length];
  if (selected) fill = '#fff0bd';
  if (error) fill = '#ffd3cc';
  if (game.successPulse > 0 && game.mode !== 'playing') fill = '#dcffe9';
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, cell, cell);
  ctx.fillStyle = '#ffffff45';
  ctx.fillRect(x + 4, y + 4, Math.max(0, cell - 8), Math.max(0, cell - 8));

  if (selected) {
    ctx.strokeStyle = '#ef9060';
    ctx.lineWidth = 5;
    ctx.strokeRect(x + 5, y + 5, cell - 10, cell - 10);
  }

  if (value === STAR) drawStar(x + cell / 2, y + cell / 2, Math.max(15, cell * 0.24), error);
  if (value === MARK) drawMark(x + cell / 2, y + cell / 2, Math.max(14, cell * 0.2), error);
}

function drawRegionBorders() {
  const { left, top, cell } = view.board;
  ctx.save();
  ctx.strokeStyle = '#17212ac9';
  ctx.lineWidth = Math.max(3, cell * 0.045);
  ctx.lineCap = 'square';
  for (let row = 0; row < SIZE; row += 1) {
    for (let col = 0; col < SIZE; col += 1) {
      const region = currentRegion(row, col);
      const x = left + col * cell;
      const y = top + row * cell;
      if (row === 0 || currentRegion(row - 1, col) !== region) line(x, y, x + cell, y);
      if (col === 0 || currentRegion(row, col - 1) !== region) line(x, y, x, y + cell);
      if (row === SIZE - 1 || currentRegion(row + 1, col) !== region) line(x, y + cell, x + cell, y + cell);
      if (col === SIZE - 1 || currentRegion(row, col + 1) !== region) line(x + cell, y, x + cell, y + cell);
    }
  }
  ctx.restore();
}

function drawGridLines() {
  const { left, top, size, cell } = view.board;
  ctx.save();
  ctx.strokeStyle = '#17212a55';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= SIZE; i += 1) {
    const p = left + i * cell;
    line(p, top, p, top + size);
    const q = top + i * cell;
    line(left, q, left + size, q);
  }
  ctx.restore();
}

function drawStar(cx, cy, radius, error) {
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i < 10; i += 1) {
    const angle = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 ? radius * 0.45 : radius;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = error ? '#df3c2e' : '#17212a';
  ctx.fill();
  ctx.strokeStyle = '#fff8c6';
  ctx.lineWidth = Math.max(2, radius * 0.12);
  ctx.stroke();
  ctx.restore();
}

function drawMark(cx, cy, radius, error) {
  ctx.save();
  ctx.strokeStyle = error ? '#df3c2e' : '#42515d';
  ctx.lineWidth = Math.max(4, radius * 0.22);
  ctx.lineCap = 'round';
  line(cx - radius, cy - radius, cx + radius, cy + radius);
  line(cx + radius, cy - radius, cx - radius, cy + radius);
  ctx.restore();
}

function drawPanel() {
  const panel = view.sidePanel;
  const puzzle = currentPuzzle();
  const analysis = analyzeBoard(game.grid);
  roundRect(panel.left, panel.top, panel.width, panel.height, 8, '#17212adf', '#ffffffbd', 1.5);
  if (panel.height < 150) {
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#f8fffb';
    ctx.font = '900 17px Inter, Segoe UI, sans-serif';
    ctx.fillText('STAR BATTLE', panel.left + 14, panel.top + 11);
    ctx.fillStyle = '#ffd05d';
    ctx.font = '850 14px Inter, Segoe UI, sans-serif';
    ctx.fillText(puzzle.name, panel.left + 14, panel.top + 36);
    ctx.fillStyle = '#d7e8e5';
    ctx.font = '750 12px Inter, Segoe UI, sans-serif';
    ctx.fillText(`Stars ${analysis.stars.length}/${SIZE}  Tool ${game.tool.toUpperCase()}`, panel.left + 14, panel.top + 60);
    if (panel.height >= 104) wrapText(game.message, panel.left + 14, panel.top + 80, panel.width - 28, 15, 2);
    return;
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#f8fffb';
  ctx.font = '900 22px Inter, Segoe UI, sans-serif';
  ctx.fillText('STAR BATTLE', panel.left + 16, panel.top + 15);
  ctx.font = '800 15px Inter, Segoe UI, sans-serif';
  ctx.fillStyle = '#ffd05d';
  ctx.fillText(puzzle.name, panel.left + 16, panel.top + 45);
  ctx.font = '700 13px Inter, Segoe UI, sans-serif';
  ctx.fillStyle = '#d7e8e5';
  const lines = [
    `Stars ${analysis.stars.length}/${SIZE}`,
    `Rows missing ${analysis.missingRows.length}`,
    `Columns missing ${analysis.missingCols.length}`,
    `Regions missing ${analysis.missingRegions.length}`,
    `Best ${game.bestScore}`,
  ];
  let y = panel.top + 74;
  for (const item of lines) {
    ctx.fillText(item, panel.left + 16, y);
    y += 21;
  }
  ctx.fillStyle = '#f8fffb';
  ctx.font = '800 13px Inter, Segoe UI, sans-serif';
  wrapText(game.message, panel.left + 16, Math.min(panel.top + panel.height - 58, y + 8), panel.width - 32, 18, 3);
}

function drawOverlay(title, body) {
  const { left, top, size } = view.board;
  const width = Math.min(size - 34, 392);
  const height = 116;
  const x = left + (size - width) / 2;
  const y = top + (size - height) / 2;
  roundRect(x, y, width, height, 8, '#17212aee', '#ffffffd6', 1.5);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd05d';
  ctx.font = '900 25px Inter, Segoe UI, sans-serif';
  ctx.fillText(title, x + width / 2, y + 17);
  ctx.fillStyle = '#f8fffb';
  ctx.font = '750 13px Inter, Segoe UI, sans-serif';
  wrapText(body, x + 18, y + 55, width - 36, 17, 3, 'center');
}

function roundRect(x, y, width, height, radius, fill, stroke, lineWidth = 1) {
  const r = Math.max(0, Math.min(radius, Math.abs(width) / 2, Math.abs(height) / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + width, y, x + width, y + height, r);
  ctx.arcTo(x + width, y + height, x, y + height, r);
  ctx.arcTo(x, y + height, x, y, r);
  ctx.arcTo(x, y, x + width, y, r);
  ctx.closePath();
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lineWidth;
    ctx.stroke();
  }
}

function wrapText(text, x, y, maxWidth, lineHeight, maxLines = 4, align = 'left') {
  const words = String(text).split(/\s+/);
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
      if (lines.length >= maxLines) break;
    } else {
      line = test;
    }
  }
  if (line && lines.length < maxLines) lines.push(line);
  ctx.textAlign = align;
  const tx = align === 'center' ? x + maxWidth / 2 : x;
  for (let i = 0; i < lines.length; i += 1) ctx.fillText(lines[i], tx, y + i * lineHeight);
}

function line(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function pointerToCell(event) {
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const { left, top, size, cell } = view.board;
  if (x < left || x > left + size || y < top || y > top + size) return null;
  return {
    row: Math.max(0, Math.min(SIZE - 1, Math.floor((y - top) / cell))),
    col: Math.max(0, Math.min(SIZE - 1, Math.floor((x - left) / cell))),
  };
}

function handlePointerDown(event) {
  event.preventDefault();
  if (game.mode === 'menu') {
    nextPuzzleOrStart();
    return;
  }
  if (game.mode !== 'playing') return;
  const cell = pointerToCell(event);
  if (!cell) return;
  selectCell(cell.row, cell.col);
  applyCurrentTool(cell.row, cell.col, 'pointer');
}

function handleKey(event) {
  const keyName = event.key.toLowerCase();
  if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'enter', 'backspace'].includes(keyName)) event.preventDefault();
  if (keyName === 'f') {
    event.preventDefault();
    toggleFullscreen();
    return;
  }
  if (keyName === 'escape' && document.fullscreenElement) {
    event.preventDefault();
    document.exitFullscreen?.();
    return;
  }
  if (keyName === 'enter' || keyName === ' ') {
    if (game.mode !== 'playing') nextPuzzleOrStart();
    else checkBoard();
    return;
  }
  if (keyName === 'p') {
    togglePause();
    return;
  }
  if (keyName === 'r') {
    restartPuzzle();
    return;
  }
  if (keyName === 'h') {
    revealHint();
    return;
  }
  if (keyName === 'c') {
    checkBoard();
    return;
  }
  if (keyName === 'z') {
    undoMove();
    return;
  }
  if (event.key === 'ArrowUp') moveSelection(-1, 0);
  else if (event.key === 'ArrowDown') moveSelection(1, 0);
  else if (event.key === 'ArrowLeft') moveSelection(0, -1);
  else if (event.key === 'ArrowRight') moveSelection(0, 1);
  else if (keyName === 's' || keyName === '1') {
    setTool('star');
    setCell(game.selected.row, game.selected.col, STAR, 'keyboard');
  } else if (keyName === 'x' || keyName === '2') {
    setTool('mark');
    setCell(game.selected.row, game.selected.col, MARK, 'keyboard');
  } else if (keyName === '0' || keyName === 'delete' || keyName === 'backspace') {
    setTool('empty');
    setCell(game.selected.row, game.selected.col, EMPTY, 'keyboard');
  }
}

function renderGameToText() {
  const puzzle = currentPuzzle();
  const analysis = analyzeBoard(game.grid);
  const cells = [];
  for (let row = 0; row < SIZE; row += 1) {
    for (let col = 0; col < SIZE; col += 1) {
      cells.push({
        row,
        col,
        mark: game.grid[row][col] === STAR ? 'star' : game.grid[row][col] === MARK ? 'x' : 'empty',
        region: puzzle.regionGrid[row][col],
        selected: game.selected.row === row && game.selected.col === col,
        error: game.errorCells.has(cellKey(row, col)),
      });
    }
  }
  return JSON.stringify({
    game: 'starbattle',
    coordinate_system: 'Rows and columns are zero-based from the top-left. Canvas x increases right and y increases down. Stars occupy cells and cannot touch horizontally, vertically, or diagonally.',
    mode: game.mode,
    puzzle: {
      index: game.puzzleIndex,
      total: PUZZLES.length,
      id: puzzle.id,
      name: puzzle.name,
    },
    selected: { ...game.selected },
    tool: game.tool,
    cells,
    stars: analysis.stars.map(cell => ({ ...cell })),
    star_count: analysis.stars.length,
    target_star_count: SIZE,
    missing_rows: [...analysis.missingRows],
    missing_cols: [...analysis.missingCols],
    missing_regions: [...analysis.missingRegions],
    error_cells: [...analysis.errorCells].sort().map(parseCellKey),
    solved: analysis.solved,
    moves: game.moves,
    hints: game.hints,
    checks: game.checks,
    score: game.score,
    best_score: game.bestScore,
    coins: Number(profileState.coins || 0),
    coins_earned_this_session: game.coinsEarned,
    last_coins: game.lastCoins,
    elapsed_ms: Math.round(game.elapsedMs),
    message: game.message,
    last_action: game.lastAction,
  });
}

function setCellForTest(row, col, mark = 'star') {
  if (game.mode !== 'playing') startPuzzle(game.puzzleIndex);
  const normalized = mark === STAR || mark === 'star' ? STAR : mark === MARK || mark === 'mark' || mark === 'x' ? MARK : EMPTY;
  return setCell(row, col, normalized, 'test');
}

function solveCurrentForTest() {
  if (game.mode !== 'playing') startPuzzle(game.puzzleIndex);
  pushHistory();
  game.grid = blankGrid();
  for (const star of currentPuzzle().stars) game.grid[star.row][star.col] = STAR;
  game.moves += 1;
  clearHighlights();
  game.lastAction = { type: 'test-solve', puzzle: currentPuzzle().id };
  handleSolved();
  return renderGameToText();
}

window.render_game_to_text = renderGameToText;
window.advanceTime = (ms = 16.67) => {
  manualStepping = true;
  const steps = Math.max(1, Math.round(Number(ms || 16.67) / (1000 / 60)));
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  manualStepping = false;
  return renderGameToText();
};
window.__STAR_BATTLE_GAME__ = {
  start: startPuzzle,
  restart: restartPuzzle,
  pause: togglePause,
  check: checkBoard,
  hint: revealHint,
  undo: undoMove,
  select: selectCell,
  move: moveSelection,
  setTool,
  setCell: setCellForTest,
  solveCurrent: solveCurrentForTest,
  state: () => JSON.parse(renderGameToText()),
  puzzles: PUZZLES.map(puzzle => ({
    id: puzzle.id,
    name: puzzle.name,
    solution: puzzle.stars.map(star => ({ ...star })),
    regionGrid: cloneGrid(puzzle.regionGrid),
  })),
};

canvas.addEventListener('pointerdown', handlePointerDown);
canvas.addEventListener('contextmenu', event => event.preventDefault());
window.addEventListener('resize', resizeCanvas);
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('keydown', handleKey);
els.start.addEventListener('click', nextPuzzleOrStart);
els.check.addEventListener('click', checkBoard);
els.hint.addEventListener('click', revealHint);
els.undo.addEventListener('click', undoMove);
els.pause.addEventListener('click', togglePause);
els.restart.addEventListener('click', restartPuzzle);
els.full.addEventListener('click', toggleFullscreen);
for (const button of els.tools) {
  button.addEventListener('click', () => {
    setTool(button.dataset.tool);
    if (game.mode === 'playing') applyCurrentTool(game.selected.row, game.selected.col, `button:${button.dataset.tool}`);
  });
}

function frame(now) {
  if (!manualStepping) {
    const dt = Math.min(0.05, Math.max(0, (now - lastFrame) / 1000));
    update(dt);
  }
  lastFrame = now;
  draw();
  requestAnimationFrame(frame);
}

primePuzzle(0);
updateHud();
resizeCanvas();
mountGameFeedback({ gameSlug: 'starbattle', gameName: 'Star Battle' });
requestAnimationFrame(frame);
</script>
</body>
</html>
