<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pricing & Plans - Cade's Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="./src/styles/accessibility.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1028;
      --card-bg: rgba(23, 32, 70, 0.8);
      --card-border: rgba(34, 211, 238, 0.3);
      --fg: #f8fafc;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.5);
      --primary: #a855f7;
      --primary-glow: rgba(168, 85, 247, 0.5);
      --secondary: #f472b6;
      --success: #34d399;
      --font-main: 'Fredoka', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* --- Animated Background --- */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b1028 100%);
      overflow: hidden;
    }
    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(34, 211, 238, 0.2);
      bottom: -100px;
      border-radius: 50%;
      animation: floatUp 15s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120vh) scale(2) rotate(360deg); opacity: 0; }
    }

    /* --- Topbar --- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(11, 16, 40, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--card-border);
    }
    .topbar h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .links { display: flex; gap: 10px; }
    .link-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      color: var(--fg);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .link-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* --- Wrap & Hero --- */
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h2 {
      font-size: clamp(32px, 5vw, 48px);
      margin: 0 0 16px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .hero p {
      font-size: 18px;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* --- Plan Grid --- */
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .plan-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: cardFadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .plan-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3), 0 0 20px var(--accent-glow);
    }
    .plan-card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .plan-card h3 {
      font-size: 28px;
      margin: 0 0 8px;
      color: var(--accent);
    }
    .price {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 16px;
      color: var(--fg);
    }
    .plan-meta {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0 0 32px;
      flex-grow: 1;
    }
    .plan-features li {
      padding-left: 28px;
      position: relative;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .plan-features li::before {
      content: "⭐";
      position: absolute;
      left: 0;
      top: 0;
    }
    .select-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: #0b1028;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .select-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .select-btn:active { transform: scale(0.98); }

    /* --- Checkout Panel --- */
    .checkout-panel {
      background: rgba(34, 211, 238, 0.05);
      border: 2px dashed var(--card-border);
      border-radius: 24px;
      padding: 32px;
    }
    .checkout-panel h3 {
      font-size: 24px;
      margin: 0 0 16px;
      color: var(--accent);
    }
    #checkoutStatus { font-size: 16px; margin-bottom: 16px; }
    .billing-row { margin-bottom: 20px; }
    .billing-row label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--muted);
    }
    .billing-row input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: var(--fg);
      font-family: inherit;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .billing-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }
    .checkout-actions { display: flex; flex-wrap: wrap; gap: 12px; }
    .checkout-actions button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .checkout-actions .primary {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: #0b1028;
    }
    .checkout-actions .secondary {
      background: rgba(255,255,255,0.1);
      color: var(--fg);
      border: 2px solid rgba(255,255,255,0.1);
    }
    .checkout-actions .secondary:hover {
      background: rgba(255,255,255,0.2);
      border-color: var(--accent);
    }
    .checkout-actions button:hover { transform: scale(1.05); }
    .checkout-actions button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .success { color: var(--success); font-weight: 700; }
    .token {
      display: block;
      margin: 12px 0;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-family: monospace;
      color: var(--accent);
      word-break: break-all;
    }
    .note { margin-top: 20px; color: var(--muted); font-size: 13px; font-style: italic; }

    @media (max-width: 600px) {
      .topbar { padding: 12px; }
      .links { display: none; } /* On mobile, the hamburger menu in account widget is usually present */
      .hero h2 { font-size: 32px; }
      .plan-card { padding: 24px; }
      .checkout-actions button { width: 100%; }
    }
  </style>

<body>
  <div class="bg-animation" id="bgAnimation"></div>
  <script>
    const bg = document.getElementById('bgAnimation');
    for (let i = 0; i < 15; i++) {
        const span = document.createElement('span');
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDelay = Math.random() * 15 + 's';
        span.style.width = span.style.height = (Math.random() * 30 + 10) + 'px';
        bg.appendChild(span);
    }
  </script>

  <header class="topbar">
    <h1>Cade's Games</h1>
    <div class="links">
      <a class="link-btn" href="/">Home</a>
      <a class="link-btn" href="/shop.html">Shop</a>
      <a class="link-btn" href="/school-license.html">School</a>
      <a class="link-btn" href="/accessibility.html">Help</a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h2>Family Plans</h2>
      <p>Unlock premium features and support the mission of making games for everyone. Simple, fair, and fun!</p>
    </section>

    <section class="plan-grid" id="planGrid"></section>

    <section class="checkout-panel">
      <h3>Family Checkout</h3>
      <p id="checkoutStatus">Choose a plan above to continue.</p>
      <p class="token" id="checkoutToken" style="display:none;"></p>
      <div class="billing-row" id="billingEmailRow" style="display:none;">
        <label for="billingEmailInput">Parent email</label>
        <input id="billingEmailInput" type="email" autocomplete="email" placeholder="parent@example.com" />
      </div>
      <div class="checkout-actions">
        <button id="startCheckoutBtn" class="primary" type="button">Start Checkout</button>
        <button id="completeCheckoutBtn" class="secondary" type="button" style="display:none;">Complete Purchase</button>
        <button id="clearCheckoutBtn" class="secondary" type="button" style="display:none;">Clear Pending</button>
        <button id="manageBillingBtn" class="secondary" type="button" style="display:none;">Manage Billing</button>
      </div>
      <p class="note" id="checkoutNote">
        Secure checkout and subscription management provided for families.
      </p>
    </section>
  </main>

  <script type="module">
    import { getCachedAuthSession, onAuthSessionChanged, signInWithGoogle } from './src/auth/client.js';
    import { mountAccountWidget } from './src/auth/embed.js';
    import { loadAndApplyAccessibility } from './src/core/accessibility.js';
    import {
      ENTITLEMENT_KEYS,
      getEntitlements,
      hasEntitlement,
      getCheckoutState,
      createCheckoutIntent,
      completeCheckoutIntent,
      clearCheckoutIntent,
    } from './src/core/entitlements.js';
    import {
      fetchBillingConfig,
      isStripeBillingEnabled,
      createStripeCheckoutSession,
      createStripePortalSession,
      syncLocalEntitlementsFromStripe,
      getBillingEmail,
      setBillingEmail,
    } from './src/core/billing.js';
    import { trackKpiEvent } from './src/core/metrics.js';

    loadAndApplyAccessibility();
    mountAccountWidget();

    onAuthSessionChanged((session) => {
      if (session?.isAuthenticated && session?.email && billingEmailInput) {
        billingEmailInput.value = session.email;
        setBillingEmail(session.email);
      }
    });

    const plans = [
      {
        id: 'family-monthly',
        name: 'Family Monthly',
        price: '$4.99 / month',
        meta: 'Flexible month-to-month plan.',
        features: [
          'Access to Family Premium cosmetic packs',
          'Premium challenge tracks when available',
          'No ads and no manipulative upsells',
        ],
      },
      {
        id: 'family-annual',
        name: 'Family Annual',
        price: '$39.00 / year',
        meta: 'Best value for long-term play.',
        features: [
          'Everything in Family Monthly',
          'Lower yearly cost vs monthly billing',
          'One purchase for the full school year',
        ],
      },
    ];

    const planGrid = document.getElementById('planGrid');
    const checkoutStatus = document.getElementById('checkoutStatus');
    const checkoutToken = document.getElementById('checkoutToken');
    const checkoutNote = document.getElementById('checkoutNote');
    const billingEmailRow = document.getElementById('billingEmailRow');
    const billingEmailInput = document.getElementById('billingEmailInput');
    const startCheckoutBtn = document.getElementById('startCheckoutBtn');
    const completeCheckoutBtn = document.getElementById('completeCheckoutBtn');
    const clearCheckoutBtn = document.getElementById('clearCheckoutBtn');
    const manageBillingBtn = document.getElementById('manageBillingBtn');

    let selectedPlanId = plans[0].id;
    let billingConfig = null;
    let checkoutBusy = false;

    const isStripeMode = () => isStripeBillingEnabled(billingConfig);
    const getSupportedPlans = () => new Set(Array.isArray(billingConfig?.supportedPlans) ? billingConfig.supportedPlans : []);

    function setCheckoutBusy(nextBusy) {
      checkoutBusy = Boolean(nextBusy);
      if (checkoutBusy) {
        startCheckoutBtn.disabled = true;
        completeCheckoutBtn.disabled = true;
        clearCheckoutBtn.disabled = true;
        manageBillingBtn.disabled = true;
      }
    }

    function updateBillingEmail() {
      let email = billingEmailInput.value.trim();
      if (!email) {
        const session = getCachedAuthSession();
        if (session && session.email) {
          email = session.email;
          billingEmailInput.value = email;
        }
      }
      if (email) {
        setBillingEmail(email);
      }
      return email;
    }

    function renderPlans() {
      planGrid.innerHTML = '';
      for (const plan of plans) {
        const card = document.createElement('article');
        card.className = `plan-card${selectedPlanId === plan.id ? ' selected' : ''}`;
        card.dataset.planId = plan.id;
        const features = plan.features.map((feature) => `<li>${feature}</li>`).join('');
        card.innerHTML = `
          <h3>${plan.name}</h3>
          <p class="price">${plan.price}</p>
          <p class="plan-meta">${plan.meta}</p>
          <ul class="plan-features">${features}</ul>
          <button class="select-btn" type="button">Select ${plan.name}</button>
        `;
        const btn = card.querySelector('.select-btn');
        btn.addEventListener('click', () => {
          selectedPlanId = plan.id;
          trackKpiEvent('pricing_plan_selected', { planId: plan.id });
          renderPlans();
          renderCheckout();
        });
        planGrid.appendChild(card);
      }
    }

    function renderCheckout() {
      const entitlements = getEntitlements();
      const checkout = getCheckoutState(entitlements);
      const hasFamilyPremium = hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM, entitlements);
      const selectedPlan = plans.find((plan) => plan.id === selectedPlanId);
      const stripeMode = isStripeMode();

      if (stripeMode) {
        const supportedPlans = getSupportedPlans();
        const selectedPlanSupported = supportedPlans.has(selectedPlanId);
        startCheckoutBtn.textContent = 'Continue to Secure Checkout';
        completeCheckoutBtn.style.display = 'none';
        clearCheckoutBtn.style.display = 'none';
        billingEmailRow.style.display = 'grid';
        manageBillingBtn.style.display = 'inline-flex';
        checkoutToken.style.display = 'none';
        checkoutToken.textContent = '';
        checkoutNote.textContent = 'Secure checkout and subscription management are powered by Stripe. Use the billing email tied to your subscription.';

        if (hasFamilyPremium) {
          checkoutStatus.innerHTML = `<span class="success">Family Premium is active.</span> You can use premium items in the shop.`;
          manageBillingBtn.style.display = 'inline-flex';
          manageBillingBtn.disabled = checkoutBusy;
        } else if (!selectedPlanSupported) {
          checkoutStatus.textContent = `Selected plan is not configured on this environment. Choose a supported plan or contact support.`;
          manageBillingBtn.style.display = 'none';
        } else {
          checkoutStatus.textContent = `Selected plan: ${selectedPlan ? selectedPlan.name : selectedPlanId}. Continue to Stripe checkout to activate Family Premium.`;
          manageBillingBtn.style.display = 'none';
        }

        startCheckoutBtn.disabled = checkoutBusy || !selectedPlanId || !selectedPlanSupported;
        return;
      }

      startCheckoutBtn.textContent = 'Start Checkout';
      completeCheckoutBtn.style.display = 'inline-flex';
      clearCheckoutBtn.style.display = 'inline-flex';
      billingEmailRow.style.display = 'none';
      manageBillingBtn.style.display = hasFamilyPremium ? 'inline-flex' : 'none';
      manageBillingBtn.disabled = checkoutBusy;
      checkoutNote.textContent = 'Demo flow: checkout state is stored locally. A real payment processor can replace this intent flow later.';

      if (hasFamilyPremium) {
        checkoutStatus.innerHTML = `<span class="success">Family Premium is active.</span> You can use premium items in the shop.`;
      } else if (checkout.status === 'pending') {
        checkoutStatus.textContent = `Checkout pending for ${checkout.planId}. Complete purchase to activate Family Premium.`;
      } else {
        checkoutStatus.textContent = `Selected plan: ${selectedPlan ? selectedPlan.name : selectedPlanId}. Start checkout to create a pending token.`;
      }

      if (checkout.token) {
        checkoutToken.style.display = 'block';
        checkoutToken.textContent = `Checkout token: ${checkout.token}`;
      } else {
        checkoutToken.style.display = 'none';
        checkoutToken.textContent = '';
      }

      startCheckoutBtn.disabled = checkoutBusy || !selectedPlanId;
      completeCheckoutBtn.disabled = checkoutBusy || checkout.status !== 'pending' || !checkout.token;
      clearCheckoutBtn.disabled = checkoutBusy;
    }

    async function syncStripeCheckoutFromUrl() {
      if (!isStripeMode()) return;
      const url = new URL(window.location.href);
      const checkoutResult = url.searchParams.get('checkout');
      const sessionId = url.searchParams.get('session_id');
      if (!checkoutResult) return;

      const billingEmail = getBillingEmail();
      if (checkoutResult === 'success') {
        try {
          const syncResult = await syncLocalEntitlementsFromStripe({ sessionId, customerEmail: billingEmail });
          if (syncResult?.synced) {
            trackKpiEvent('checkout_completed', { planId: syncResult.snapshot?.activePlanId || selectedPlanId, billingProvider: 'stripe' });
          }
        } catch (error) {
          checkoutStatus.textContent = `Checkout return detected, but subscription sync failed: ${error.message}`;
        }
      } else if (checkoutResult === 'canceled') {
        checkoutStatus.textContent = 'Checkout canceled. You can try again at any time.';
        trackKpiEvent('checkout_canceled', { planId: selectedPlanId, billingProvider: 'stripe' });
      }

      url.searchParams.delete('checkout');
      url.searchParams.delete('session_id');
      const nextSearch = url.searchParams.toString();
      const nextUrl = `${url.pathname}${nextSearch ? `?${nextSearch}` : ''}${url.hash || ''}`;
      window.history.replaceState({}, '', nextUrl);
    }

    async function initializeBilling({ force = false } = {}) {
      billingConfig = await fetchBillingConfig({ force });
      const stripeMode = isStripeMode();
      billingEmailInput.value = getBillingEmail();
      if (stripeMode) {
        await syncStripeCheckoutFromUrl();
      }
    }

    startCheckoutBtn.addEventListener('click', async () => {
      if (!selectedPlanId || checkoutBusy) return;

      const session = getCachedAuthSession();
      if (!session?.isAuthenticated && !session?.stubbed) {
        checkoutStatus.textContent = 'Please sign in with Google to continue secure checkout.';
        try {
          await signInWithGoogle();
        } catch (error) {
          checkoutStatus.textContent = `Sign in required: ${error.message}`;
        }
        return;
      }

      if (isStripeMode()) {
        const billingEmail = updateBillingEmail();
        if (!billingEmail) {
          checkoutStatus.textContent = 'Enter your billing email to continue to secure checkout.';
          billingEmailInput.focus();
          return;
        }

        setCheckoutBusy(true);
        renderCheckout();
        try {
          const session = await createStripeCheckoutSession({
            planId: selectedPlanId,
            customerEmail: billingEmail,
            successUrl: `${window.location.origin}/pricing.html?checkout=success&session_id={CHECKOUT_SESSION_ID}`,
            cancelUrl: `${window.location.origin}/pricing.html?checkout=canceled`,
          });
          trackKpiEvent('checkout_started', { planId: selectedPlanId, billingProvider: 'stripe' });
          window.location.assign(session.url);
          return;
        } catch (error) {
          checkoutStatus.textContent = `Secure checkout is unavailable right now: ${error.message}`;
          setCheckoutBusy(false);
          renderCheckout();
          return;
        }
      }

      const result = createCheckoutIntent(selectedPlanId);
      if (!result) return;
      trackKpiEvent('checkout_started', { planId: selectedPlanId, billingProvider: 'local' });
      renderCheckout();
    });

    completeCheckoutBtn.addEventListener('click', () => {
      if (isStripeMode()) return;
      const checkout = getCheckoutState();
      if (!checkout.token) return;
      completeCheckoutIntent(checkout.token);
      trackKpiEvent('checkout_completed', { planId: checkout.planId || selectedPlanId, billingProvider: 'local' });
      renderCheckout();
    });

    clearCheckoutBtn.addEventListener('click', () => {
      if (isStripeMode()) return;
      clearCheckoutIntent();
      trackKpiEvent('checkout_cleared', { planId: selectedPlanId, billingProvider: 'local' });
      renderCheckout();
    });

    manageBillingBtn.addEventListener('click', async () => {
      if (!isStripeMode() || checkoutBusy) return;

      const session = getCachedAuthSession();
      if (!session?.isAuthenticated && !session?.stubbed) {
        checkoutStatus.textContent = 'Please sign in with Google to manage your subscription.';
        try {
          await signInWithGoogle();
        } catch (error) {
          checkoutStatus.textContent = `Sign in required: ${error.message}`;
        }
        return;
      }

      const billingEmail = updateBillingEmail();
      if (!billingEmail) {
        checkoutStatus.textContent = 'Enter your billing email to manage your subscription.';
        billingEmailInput.focus();
        return;
      }

      setCheckoutBusy(true);
      renderCheckout();
      try {
        const portal = await createStripePortalSession({
          customerEmail: billingEmail,
          returnUrl: `${window.location.origin}/pricing.html`,
        });
        trackKpiEvent('billing_portal_opened', { billingProvider: 'stripe' });
        window.location.assign(portal.url);
      } catch (error) {
        checkoutStatus.textContent = `Could not open billing management: ${error.message}`;
        setCheckoutBusy(false);
        renderCheckout();
      }
    });

    billingEmailInput.addEventListener('change', () => {
      updateBillingEmail();
    });

    window.render_game_to_text = () => {
      const entitlements = getEntitlements();
      const checkout = getCheckoutState(entitlements);
      return JSON.stringify({
        view: 'pricing',
        selectedPlanId,
        billingProvider: isStripeMode() ? 'stripe' : 'local',
        stripeBillingEnabled: isStripeMode(),
        familyPremium: hasEntitlement(ENTITLEMENT_KEYS.FAMILY_PREMIUM, entitlements),
        checkoutStatus: checkout.status,
        checkoutPlanId: checkout.planId,
        checkoutToken: checkout.token,
      });
    };

    window.advanceTime = async (ms = 0) => {
      const wait = Math.max(0, Number(ms) || 0);
      if (wait > 0) {
        await new Promise((resolve) => setTimeout(resolve, wait));
      }
      renderCheckout();
    };

    renderPlans();
    trackKpiEvent('pricing_view', { defaultPlanId: selectedPlanId });
    initializeBilling()
      .then(() => {
        renderCheckout();
      })
      .catch(() => {
        renderCheckout();
      });
    window.addEventListener('pageshow', () => {
      initializeBilling({ force: true })
        .then(() => {
          setCheckoutBusy(false);
          renderCheckout();
        })
        .catch(() => {
          setCheckoutBusy(false);
          renderCheckout();
        });
    });
  </script>
</body>
</html>
