<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Breakout</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --bg:#0b1020; --fg:#e7f0ff; --muted:#8aa0c3; --accent:#5ad; }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; overflow:hidden; position:fixed; width:100%; -webkit-overflow-scrolling:touch; touch-action:none; }
    .wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; gap:clamp(8px, 2vh, 16px); padding:clamp(8px, 2vh, 16px); padding-top:env(safe-area-inset-top, clamp(8px, 2vh, 16px)); padding-bottom:env(safe-area-inset-bottom, clamp(8px, 2vh, 16px)); }
    
    #canvas-container { position:relative; width:100%; max-width:min(90vw, 800px); max-height:min(70vh, 800px); aspect-ratio:1/1; }
    canvas { width:100%; height:100%; display:block; background:linear-gradient(180deg,#0c142e 0%, #0b1020 100%); border:2px solid #192544; border-radius:12px; touch-action:none; image-rendering:auto; }
    
    .touch-zone { position:absolute; left:0; top:0; width:100%; height:100%; background:transparent; z-index:1; }
    
    .hud { text-align:center; font-size:clamp(12px, 2vw, 16px); color:var(--muted); user-select:none; width:100%; max-width:min(90vw, 800px); }
    .score-display { display:flex; justify-content:space-around; margin-bottom:clamp(8px, 1.5vh, 12px); font-size:clamp(14px, 2.5vw, 18px); }
    .score-item { color:var(--fg); }
    .score-label { color:var(--muted); font-size:0.7em; margin-right:8px; }
    .hint { color:#b6c7e6; font-size:clamp(14px, 2.5vw, 18px); margin-top:clamp(4px, 1vh, 8px); min-height:1.5em; }
    
    .buttons { display:flex; gap:clamp(8px, 1.5vw, 12px); justify-content:center; flex-wrap:wrap; margin-top:clamp(8px, 1.5vh, 12px); }
    .btn { padding:clamp(12px, 2.5vw, 18px) clamp(20px, 4vw, 28px); background:#2a3a5f; border:2px solid #3a4a6f; border-radius:12px; color:var(--fg); font-size:clamp(14px, 2.5vw, 18px); font-weight:600; cursor:pointer; touch-action:manipulation; user-select:none; min-width:clamp(80px, 15vw, 120px); min-height:44px; transition:all 0.2s; }
    .btn:active:not(:disabled) { background:#3a4a7f; transform:scale(0.95); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn.primary { background:#5ad; border-color:#6be; }
    .btn.primary:active { background:#4bc; }
    
    @media (max-width: 768px) {
      .hud { font-size:clamp(10px, 3vw, 14px); }
      .hint { font-size:clamp(12px, 3.5vw, 16px); }
    }
  </style>
</head>
<body>
  <!-- Back to Home button -->
  <a href="/" class="back-home" aria-label="Back to Home">← Back</a>
    <style>
      .back-home {
        position: fixed; top: calc(env(safe-area-inset-top, 12px)); left: calc(env(safe-area-inset-left, 12px)); z-index: 9999;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: 8px;
      background: rgba(0,0,0,0.6); color: #fff; text-decoration: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px; line-height: 1; font-weight: 600;
      backdrop-filter: saturate(150%) blur(6px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .back-home:hover { background: rgba(0,0,0,0.75); }
    .back-home:focus { outline: 2px solid #fff; outline-offset: 2px; }
  </style>
  <div class="wrap">
    <div id="canvas-container">
      <canvas id="game" width="600" height="600"></canvas>
      <div class="touch-zone" id="touch-zone"></div>
    </div>
    <div class="hud">
      <div class="score-display">
        <div class="score-item"><span class="score-label">Score:</span><span id="score">0</span></div>
        <div class="score-item"><span class="score-label">Level:</span><span id="level">1</span></div>
        <div class="score-item"><span class="score-label">Lives:</span><span id="lives">3</span></div>
      </div>
      <div class="hint" id="hint"></div>
      <div class="buttons">
        <button class="btn primary" id="start-btn">START</button>
        <button class="btn" id="pause-btn">PAUSE</button>
        <button class="btn" id="restart-btn">RESTART</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { addCoins as addCoinsFn, rememberRecent } from '../src/core/state.js';
    window.addCoins = addCoinsFn;
    rememberRecent('breakout');
  </script>
  <script>
    // Config
    const cfg = {
      paddle: { w: 80, h: 12, speed: 400 },
      ball: { r: 8, speed: 280, speedGain: 1.05, maxSpeed: 600 },
      brick: { w: 60, h: 20, rows: 5, cols: 8, spacing: 4 },
      lives: 3
    };

    // Detect touch device
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // Canvas setup
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const canvasContainer = document.getElementById("canvas-container");
    
    function resizeCanvas() {
      const containerRect = canvasContainer.getBoundingClientRect();
      const size = Math.min(containerRect.width, containerRect.height);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

    // State
    let lastT = 0;
    let paused = false;
    let gameOver = false;
    let gameStarted = false;
    
    const state = {
      paddle: { x: 0, y: 0 },
      ball: { x: 0, y: 0, vx: 0, vy: 0, speed: cfg.ball.speed },
      bricks: [],
      score: 0,
      level: 1,
      lives: cfg.lives
    };

    // UI
    const hintEl = document.getElementById("hint");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const livesEl = document.getElementById("lives");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const restartBtn = document.getElementById("restart-btn");
    const touchZone = document.getElementById("touch-zone");

    function setHint(msg) { hintEl.textContent = msg; }
    function updateDisplay() {
      scoreEl.textContent = state.score;
      levelEl.textContent = state.level;
      livesEl.textContent = state.lives;
    }

    function createBricks() {
      state.bricks = [];
      const startX = (canvas.width - (cfg.brick.cols * (cfg.brick.w + cfg.brick.spacing) - cfg.brick.spacing)) / 2;
      const startY = 60;
      const colors = ['#fa4', '#5ad', '#4af', '#a5f', '#f5a'];
      
      for (let row = 0; row < cfg.brick.rows; row++) {
        for (let col = 0; col < cfg.brick.cols; col++) {
          state.bricks.push({
            x: startX + col * (cfg.brick.w + cfg.brick.spacing),
            y: startY + row * (cfg.brick.h + cfg.brick.spacing),
            w: cfg.brick.w,
            h: cfg.brick.h,
            color: colors[row % colors.length],
            alive: true
          });
        }
      }
    }

    function resetBall() {
      state.ball.x = canvas.width / 2;
      state.ball.y = canvas.height - 100;
      const angle = (Math.random() * Math.PI / 3) + (Math.PI * 2 / 3); // Up-left to up-right
      state.ball.vx = Math.cos(angle) * state.ball.speed;
      state.ball.vy = -Math.sin(angle) * state.ball.speed;
    }

    function initGame() {
      state.score = 0;
      state.level = 1;
      state.lives = cfg.lives;
      state.ball.speed = cfg.ball.speed;
      gameOver = false;
      gameStarted = false;
      paused = false;
      
      state.paddle.x = canvas.width / 2 - cfg.paddle.w / 2;
      state.paddle.y = canvas.height - 40;
      
      createBricks();
      resetBall();
      updateDisplay();
      updateStartButton();
      setHint(isTouchDevice ? "Tap START to begin. Touch to move paddle." : "Press SPACE to start. Use mouse/touch to move paddle.");
    }

    function startGame() {
      if (gameOver) {
        initGame();
      }
      if (!gameStarted) {
        gameStarted = true;
        paused = false;
        updateStartButton();
        setHint("");
      } else if (paused) {
        paused = false;
        updateStartButton();
        setHint("");
      }
    }

    function pauseGame() {
      if (gameStarted && !gameOver) {
        paused = !paused;
        updateStartButton();
        setHint(paused ? (isTouchDevice ? "Paused. Tap RESUME to continue." : "Paused. Press SPACE to resume.") : "");
      }
    }

    function updateStartButton() {
      if (gameOver) {
        startBtn.textContent = "PLAY AGAIN";
        startBtn.disabled = false;
      } else if (!gameStarted) {
        startBtn.textContent = "START";
        startBtn.disabled = false;
      } else if (paused) {
        startBtn.textContent = "RESUME";
        startBtn.disabled = false;
      } else {
        startBtn.textContent = "START";
        startBtn.disabled = true;
      }
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function update(dt) {
      if (paused || gameOver || !gameStarted) return;

      // Ball physics
      state.ball.x += state.ball.vx * dt;
      state.ball.y += state.ball.vy * dt;

      // Wall bounces
      if (state.ball.x - cfg.ball.r < 0) {
        state.ball.x = cfg.ball.r;
        state.ball.vx *= -1;
      }
      if (state.ball.x + cfg.ball.r > canvas.width) {
        state.ball.x = canvas.width - cfg.ball.r;
        state.ball.vx *= -1;
      }
      if (state.ball.y - cfg.ball.r < 0) {
        state.ball.y = cfg.ball.r;
        state.ball.vy *= -1;
      }

      // Paddle collision
      if (state.ball.vy > 0 && 
          state.ball.y + cfg.ball.r > state.paddle.y &&
          state.ball.y - cfg.ball.r < state.paddle.y + cfg.paddle.h &&
          state.ball.x + cfg.ball.r > state.paddle.x &&
          state.ball.x - cfg.ball.r < state.paddle.x + cfg.paddle.w) {
        const hitPos = (state.ball.x - state.paddle.x) / cfg.paddle.w;
        const angle = (hitPos - 0.5) * Math.PI * 0.6;
        state.ball.speed = Math.min(state.ball.speed * cfg.ball.speedGain, cfg.ball.maxSpeed);
        state.ball.vx = Math.sin(angle) * state.ball.speed;
        state.ball.vy = -Math.cos(angle) * state.ball.speed;
        state.ball.y = state.paddle.y - cfg.ball.r;
      }

      // Ball lost
      if (state.ball.y > canvas.height) {
        state.lives--;
        updateDisplay();
        if (state.lives <= 0) {
          gameOver = true;
          gameStarted = false;
          // Award coins: Math.floor(bricksDestroyed / 2) + level * 5
          const bricksDestroyed = state.bricks.filter(b => !b.alive).length;
          const coins = Math.floor(bricksDestroyed / 2) + state.level * 5;
          if (coins > 0 && typeof addCoins === 'function') addCoins(coins);
          updateStartButton();
          setHint(isTouchDevice ? `Game Over! Score: ${state.score} Tap PLAY AGAIN.` : `Game Over! Score: ${state.score} Press SPACE to play again.`);
        } else {
          resetBall();
          setHint(isTouchDevice ? `Ball lost! ${state.lives} lives left. Tap START.` : `Ball lost! ${state.lives} lives left. Press SPACE.`);
          gameStarted = false;
          updateStartButton();
        }
        return;
      }

      // Brick collisions
      for (const brick of state.bricks) {
        if (!brick.alive) continue;
        
        if (state.ball.x + cfg.ball.r > brick.x &&
            state.ball.x - cfg.ball.r < brick.x + brick.w &&
            state.ball.y + cfg.ball.r > brick.y &&
            state.ball.y - cfg.ball.r < brick.y + brick.h) {
          
          brick.alive = false;
          state.score += 10;
          
          // Determine bounce direction
          const ballCenterX = state.ball.x;
          const ballCenterY = state.ball.y;
          const brickCenterX = brick.x + brick.w / 2;
          const brickCenterY = brick.y + brick.h / 2;
          
          const dx = ballCenterX - brickCenterX;
          const dy = ballCenterY - brickCenterY;
          
          if (Math.abs(dx / brick.w) > Math.abs(dy / brick.h)) {
            state.ball.vx *= -1;
          } else {
            state.ball.vy *= -1;
          }
          
          state.ball.speed = Math.min(state.ball.speed * cfg.ball.speedGain, cfg.ball.maxSpeed);
          updateDisplay();
          
          // Check win
          if (state.bricks.every(b => !b.alive)) {
            state.level++;
            state.ball.speed = cfg.ball.speed * (1 + state.level * 0.1);
            createBricks();
            resetBall();
            updateDisplay();
            setHint(isTouchDevice ? `Level ${state.level}! Tap START to continue.` : `Level ${state.level}! Press SPACE to continue.`);
            gameStarted = false;
            updateStartButton();
          }
          break;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw bricks
      state.bricks.forEach(brick => {
        if (brick.alive) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
          ctx.strokeStyle = '#192544';
          ctx.lineWidth = 2;
          ctx.strokeRect(brick.x, brick.y, brick.w, brick.h);
        }
      });

      // Draw paddle
      ctx.fillStyle = "#e7f0ff";
      ctx.fillRect(state.paddle.x, state.paddle.y, cfg.paddle.w, cfg.paddle.h);

      // Draw ball
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, cfg.ball.r, 0, Math.PI * 2);
      ctx.fillStyle = "#fa4";
      ctx.fill();

      // Game over overlay
      if (gameOver) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#0b1020";
        ctx.fillRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#2a3a5f";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
        ctx.fillStyle = "#e7f0ff";
        ctx.font = "28px system-ui,Segoe UI,Roboto,Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      // Paused overlay
      if (paused && gameStarted) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#0b1020";
        ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 - 30, 200, 60);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#2a3a5f";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 100, canvas.height / 2 - 30, 200, 60);
        ctx.fillStyle = "#e7f0ff";
        ctx.font = "24px system-ui,Segoe UI,Roboto,Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Paused", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }
    }

    // Touch controls
    let touchX = null;
    
    touchZone.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      touchX = (e.clientX - rect.left) * scale;
      state.paddle.x = clamp(touchX - cfg.paddle.w / 2, 0, canvas.width - cfg.paddle.w);
      
      if (!gameStarted && !gameOver) {
        startGame();
      }
    });

    touchZone.addEventListener("pointermove", (e) => {
      if (touchX === null) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      const x = (e.clientX - rect.left) * scale;
      state.paddle.x = clamp(x - cfg.paddle.w / 2, 0, canvas.width - cfg.paddle.w);
    });

    touchZone.addEventListener("pointerup", (e) => {
      e.preventDefault();
      touchX = null;
    });

    // Mouse controls
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      const x = (e.clientX - rect.left) * scale;
      state.paddle.x = clamp(x - cfg.paddle.w / 2, 0, canvas.width - cfg.paddle.w);
    });

    canvas.addEventListener("click", (e) => {
      if (!gameStarted && !gameOver) {
        startGame();
      }
    });

    // Keyboard
    addEventListener("keydown", e => {
      if (e.code === "Space") {
        e.preventDefault();
        if (gameOver || !gameStarted) startGame();
        else if (gameStarted) pauseGame();
      }
      if (e.code === "KeyR") initGame();
      if (e.code === "KeyP") pauseGame();
      if (e.code === "ArrowLeft") state.paddle.x = clamp(state.paddle.x - 20, 0, canvas.width - cfg.paddle.w);
      if (e.code === "ArrowRight") state.paddle.x = clamp(state.paddle.x + 20, 0, canvas.width - cfg.paddle.w);
    });

    // Buttons
    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", pauseGame);
    restartBtn.addEventListener("click", () => initGame());

    // Prevent touch scroll
    document.addEventListener('touchstart', (e) => {
      if (e.target === canvas || e.target === touchZone) e.preventDefault();
    }, { passive: false });
    
    document.addEventListener('touchmove', (e) => {
      if (e.target === canvas || e.target === touchZone) e.preventDefault();
    }, { passive: false });

    // Main loop
    function loop(ts) {
      const dt = Math.min(1/30, (ts - lastT) / 1000) || 0;
      lastT = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    initGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
