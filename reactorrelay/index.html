<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
  color: #ecf8ff;

}
.back {

  z-index: 20;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  border-radius: 10px;
  border: 1px solid #ffffff45;
  padding: 8px 12px;

}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;

  justify-content: center;

}
.wrap {
  width: min(96vw, 980px);
  aspect-ratio: 16 / 10;
  max-height: min(66dvh, 740px);
  position: relative;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 14px;
  border: 2px solid #ffc5888a;
  box-shadow: 0 18px 50px #000000af;
  background: linear-gradient(180deg, #2b1a13 0%, #222a45 100%);
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.16s;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.panel {
  max-width: 700px;
  border-radius: 14px;
  border: 1px solid #ffd1a452;
  background: #211829ef;
  box-shadow: 0 14px 32px #00000080;
  padding: 16px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 4.2vw, 40px);
}
p {
  margin: 0 0 10px;
  color: #c8d8ff;
  font-size: clamp(13px, 2vw, 15px);
  line-height: 1.45;
}
.row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
button {
  border: 1px solid #ffc68b66;
  background: #8e4f29f5;
  color: #fff4e8;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 42px;
}
.hud {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #ffc7904f;
  background: #201a30eb;
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  border-radius: 9px;
  border: 1px solid #ffd0a747;
  background: #ffd5aa12;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #bbc6ef;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b {
  font-size: clamp(14px, 2.1vw, 18px);
  line-height: 1.1;
}
.controls {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #ffc7904f;
  background: #201a30eb;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
}
.ctrl-btn { background: #4f5a86; border-color: #ffc79a5c; }
@media (max-width: 900px) {
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}

<body>
<a class="back" href="/" aria-label="Back to Home">&larr; Back</a>
<main class="app">
  <div class="wrap">
    <canvas id="game" width="1280" height="800" aria-label="Reactor Relay game canvas"></canvas>
    <div id="overlay" class="overlay show"></div>
  </div>
  <section class="hud" aria-live="polite">
    <div class="chip"><span>Mode</span><b id="mode">MENU</b></div>
    <div class="chip"><span>Score</span><b id="score">0</b></div>
    <div class="chip"><span>Stabilized</span><b id="stabilized">0</b></div>
    <div class="chip"><span>Shield</span><b id="shield">4</b></div>
    <div class="chip"><span>Time</span><b id="time">95.0s</b></div>
    <div class="chip"><span>Coolant</span><b id="coolant">100</b></div>
    <div class="chip"><span>Coins</span><b id="coins">0</b></div>
  </section>
  <section class="controls" aria-label="Touch controls">
    <button id="upBtn" type="button" class="ctrl-btn">Up</button>
    <button id="leftBtn" type="button" class="ctrl-btn">Left</button>
    <button id="downBtn" type="button" class="ctrl-btn">Down</button>
    <button id="rightBtn" type="button" class="ctrl-btn">Right</button>
    <button id="stabilizeBtn" type="button">Stabilize</button>
    <button id="pauseBtn" type="button" class="ctrl-btn">Pause</button>
    <button id="restartBtn" type="button" class="ctrl-btn">Restart</button>
    <button id="fullscreenBtn" type="button" class="ctrl-btn">Fullscreen</button>
  </section>
</main>

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const modeEl = document.getElementById('mode');
const scoreEl = document.getElementById('score');
const stabilizedEl = document.getElementById('stabilized');
const shieldEl = document.getElementById('shield');
const timeEl = document.getElementById('time');
const coolantEl = document.getElementById('coolant');
const coinsEl = document.getElementById('coins');

const COLS = 10;
const ROWS = 6;
const CELL = 86;
const GRID_LEFT = 70;
const GRID_TOP = 140;
const TOTAL_SECONDS = 95;
const START_SHIELD = 4;
const MAX_COOLANT = 100;

const state = {
  mode: 'menu',
  result: null,
  elapsed: 0,
  timeLeft: TOTAL_SECONDS,
  score: 0,
  stabilized: 0,
  shield: START_SHIELD,
  coolant: MAX_COOLANT,
  cursorX: 4,
  cursorY: 2,
  grid: [],
  logs: [],
  surgeTimer: 0,
  passiveTimer: 0,
};

let raf = 0;
let prev = performance.now();
let controlled = false;

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function showOverlay(title, body, buttonLabel, buttonAction) {
  overlay.classList.add('show');
  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <div class="row">
        <button id="overlayAction" type="button">${buttonLabel}</button>
      </div>
    </div>
  `;
  overlay.querySelector('#overlayAction')?.addEventListener('click', () => {
    overlay.classList.remove('show');
    buttonAction();
  }, { once: true });
}

function resetState() {
  state.mode = 'menu';
  state.result = null;
  state.elapsed = 0;
  state.timeLeft = TOTAL_SECONDS;
  state.score = 0;
  state.stabilized = 0;
  state.shield = START_SHIELD;
  state.coolant = MAX_COOLANT;
  state.cursorX = Math.floor(COLS / 2);
  state.cursorY = Math.floor(ROWS / 2);
  state.logs = ['Keep total heat below meltdown threshold.'];
  state.surgeTimer = 0;
  state.passiveTimer = 0;
  state.grid = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => 18 + Math.floor(Math.random() * 18))
  );
}

function pushLog(line) {
  state.logs.unshift(line);
  if (state.logs.length > 4) state.logs.length = 4;
}

function startGame() {
  resetState();
  state.mode = 'running';
  try { rememberRecent('reactorrelay'); } catch {}
  try { maybeUnlock({ anyPlay: true, reactorrelay: { result: 'started', score: 0, stabilized: 0 } }); } catch {}
}

function finishGame(result) {
  if (state.mode === 'ended') return;
  state.mode = 'ended';
  state.result = result;
  const reward = Math.max(4, Math.floor(state.score / 220) + (result === 'won' ? 14 : 6));
  try {
    addCoins(reward);
    maybeUnlock({
      anyPlay: true,
      reactorrelay: {
        result,
        score: Math.round(state.score),
        stabilized: state.stabilized,
        survivedSeconds: Number(state.elapsed.toFixed(2)),
      },
    });
  } catch {}

  const message = result === 'won'
    ? `Relay storm survived. Stabilized ${state.stabilized} nodes and earned ${reward} coins.`
    : `Core breach. Stabilized ${state.stabilized} nodes and still earned ${reward} coins.`;
  showOverlay('Run Complete', message, 'Play Again', startGame);
}

function colorForHeat(v) {
  const t = clamp(v / 100, 0, 1);
  const r = Math.floor(55 + 200 * t);
  const g = Math.floor(180 - 110 * t);
  const b = Math.floor(255 - 220 * t);
  return `rgb(${r},${g},${b})`;
}

function forNeighbors(x, y, cb) {
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (let i = 0; i < dirs.length; i += 1) {
    const nx = x + dirs[i][0];
    const ny = y + dirs[i][1];
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) cb(nx, ny);
  }
}

function applySurge() {
  for (let i = 0; i < 2; i += 1) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    state.grid[y][x] = clamp(state.grid[y][x] + 7 + Math.random() * 12, 0, 140);
  }

  const pending = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  for (let y = 0; y < ROWS; y += 1) {
    for (let x = 0; x < COLS; x += 1) {
      const heat = state.grid[y][x];
      if (heat >= 72) {
        forNeighbors(x, y, (nx, ny) => { pending[ny][nx] += 1.8; });
      }
    }
  }

  for (let y = 0; y < ROWS; y += 1) {
    for (let x = 0; x < COLS; x += 1) {
      state.grid[y][x] = clamp(state.grid[y][x] + pending[y][x], 0, 160);
    }
  }

  let meltdowns = 0;
  for (let y = 0; y < ROWS; y += 1) {
    for (let x = 0; x < COLS; x += 1) {
      if (state.grid[y][x] >= 100) {
        meltdowns += 1;
        state.grid[y][x] = 64;
      }
    }
  }

  if (meltdowns > 0) {
    state.shield -= meltdowns;
    pushLog(`Meltdown x${meltdowns}. Shield -${meltdowns}.`);
  }
}

function passiveCooling() {
  for (let y = 0; y < ROWS; y += 1) {
    for (let x = 0; x < COLS; x += 1) {
      state.grid[y][x] = clamp(state.grid[y][x] - 0.9, 0, 160);
    }
  }
}

function stabilizeNode() {
  if (state.mode !== 'running') return;
  if (state.coolant < 25) {
    pushLog('Coolant too low.');
    return;
  }
  state.coolant = clamp(state.coolant - 25, 0, MAX_COOLANT);
  let cooled = 0;

  const x = state.cursorX;
  const y = state.cursorY;
  const before = state.grid[y][x];
  state.grid[y][x] = clamp(state.grid[y][x] - 34, 0, 160);
  cooled += Math.max(0, before - state.grid[y][x]);

  forNeighbors(x, y, (nx, ny) => {
    const b = state.grid[ny][nx];
    state.grid[ny][nx] = clamp(state.grid[ny][nx] - 14, 0, 160);
    cooled += Math.max(0, b - state.grid[ny][nx]);
  });

  state.stabilized += 1;
  state.score += cooled * 2;
  pushLog(`Node stabilized. Heat reduced ${Math.round(cooled)}.`);
}

function moveCursor(dx, dy) {
  state.cursorX = clamp(state.cursorX + dx, 0, COLS - 1);
  state.cursorY = clamp(state.cursorY + dy, 0, ROWS - 1);
}

function togglePause() {
  if (state.mode === 'running') state.mode = 'paused';
  else if (state.mode === 'paused') state.mode = 'running';
}

function update(dt) {
  if (state.mode !== 'running') return;

  state.elapsed += dt;
  state.timeLeft = Math.max(0, TOTAL_SECONDS - state.elapsed);
  state.coolant = clamp(state.coolant + dt * 18, 0, MAX_COOLANT);

  state.surgeTimer += dt;
  while (state.surgeTimer >= 0.72) {
    state.surgeTimer -= 0.72;
    applySurge();
  }

  state.passiveTimer += dt;
  while (state.passiveTimer >= 1) {
    state.passiveTimer -= 1;
    passiveCooling();
  }

  if (state.shield <= 0) {
    finishGame('lost');
    return;
  }
  if (state.timeLeft <= 0) {
    finishGame('won');
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#3b2317');
  grad.addColorStop(1, '#1f2742');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 24; i += 1) {
    const y = 40 + i * 30;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255, 174, 92, 0.06)' : 'rgba(47, 72, 110, 0.05)';
    ctx.fillRect(0, y, canvas.width, 16);
  }
}

function drawGrid() {
  for (let y = 0; y < ROWS; y += 1) {
    for (let x = 0; x < COLS; x += 1) {
      const px = GRID_LEFT + x * CELL;
      const py = GRID_TOP + y * CELL;
      const heat = state.grid[y][x];
      ctx.fillStyle = colorForHeat(heat);
      ctx.globalAlpha = 0.25 + clamp(heat / 120, 0, 0.65);
      ctx.fillRect(px + 3, py + 3, CELL - 6, CELL - 6);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#a9c2f460';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 3, py + 3, CELL - 6, CELL - 6);
      ctx.fillStyle = '#eef4ff';
      ctx.font = '700 16px Trebuchet MS';
      ctx.textAlign = 'center';
      ctx.fillText(`${Math.round(heat)}`, px + CELL / 2, py + CELL / 2 + 6);
    }
  }

  const cx = GRID_LEFT + state.cursorX * CELL;
  const cy = GRID_TOP + state.cursorY * CELL;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  ctx.strokeRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
}

function drawSidebar() {
  const x = 954;
  const y = 120;
  ctx.fillStyle = 'rgba(34, 25, 36, 0.86)';
  ctx.fillRect(x, y, 286, 500);
  ctx.strokeStyle = 'rgba(255, 205, 155, 0.54)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 286, 500);

  ctx.fillStyle = '#fff1e2';
  ctx.font = '700 30px Trebuchet MS';
  ctx.textAlign = 'left';
  ctx.fillText('Reactor Relay', x + 18, y + 42);

  ctx.fillStyle = '#ffd9bb';
  ctx.font = '600 16px Trebuchet MS';
  ctx.fillText('Cool overheated nodes before they breach.', x + 18, y + 72);
  ctx.fillText('Survive the full storm timer.', x + 18, y + 94);

  ctx.fillStyle = '#ffe6cf';
  ctx.font = '700 14px Trebuchet MS';
  for (let i = 0; i < state.logs.length; i += 1) {
    ctx.fillText(`- ${state.logs[i]}`, x + 18, y + 138 + i * 24);
  }

  ctx.fillStyle = '#ffd4a8';
  ctx.font = '600 13px Trebuchet MS';
  ctx.fillText('Space/Enter: Stabilize selected node', x + 18, y + 446);
  ctx.fillText('Arrows/WASD: Move cursor', x + 18, y + 468);
  ctx.fillText('P pause, R restart, F fullscreen', x + 18, y + 490);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawGrid();
  drawSidebar();
}

function syncHud() {
  modeEl.textContent = state.mode.toUpperCase();
  scoreEl.textContent = String(Math.round(state.score));
  stabilizedEl.textContent = String(state.stabilized);
  shieldEl.textContent = String(Math.max(0, state.shield));
  timeEl.textContent = `${Math.max(0, state.timeLeft).toFixed(1)}s`;
  coolantEl.textContent = `${Math.round(state.coolant)}`;
  coinsEl.textContent = String(Number(profileState?.coins || 0));
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  else document.exitFullscreen?.().catch(() => {});
}

function keyHandler(event) {
  if (event.code === 'ArrowUp' || event.code === 'KeyW') { event.preventDefault(); moveCursor(0, -1); return; }
  if (event.code === 'ArrowLeft' || event.code === 'KeyA') { event.preventDefault(); moveCursor(-1, 0); return; }
  if (event.code === 'ArrowDown' || event.code === 'KeyS') { event.preventDefault(); moveCursor(0, 1); return; }
  if (event.code === 'ArrowRight' || event.code === 'KeyD') { event.preventDefault(); moveCursor(1, 0); return; }
  if (event.code === 'Space' || event.code === 'Enter') { event.preventDefault(); stabilizeNode(); return; }
  if (event.code === 'KeyP') { event.preventDefault(); togglePause(); return; }
  if (event.code === 'KeyR') { event.preventDefault(); startGame(); return; }
  if (event.code === 'KeyF') { event.preventDefault(); toggleFullscreen(); }
}

function step(ms) {
  const steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  controlled = true;
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  syncHud();
  controlled = false;
}

function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!controlled) {
    update(dt);
    draw();
    syncHud();
  }
  raf = requestAnimationFrame(frame);
}

function wireControls() {
  document.getElementById('upBtn').addEventListener('click', () => moveCursor(0, -1));
  document.getElementById('leftBtn').addEventListener('click', () => moveCursor(-1, 0));
  document.getElementById('downBtn').addEventListener('click', () => moveCursor(0, 1));
  document.getElementById('rightBtn').addEventListener('click', () => moveCursor(1, 0));
  document.getElementById('stabilizeBtn').addEventListener('click', stabilizeNode);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
}

window.addEventListener('keydown', keyHandler);
wireControls();
window.advanceTime = (ms) => step(ms);
window.render_game_to_text = () => JSON.stringify({
  game: 'reactorrelay',
  mode: state.mode,
  coordinate_system: 'Canvas origin is top-left. Reactor grid starts at approximately (70,140). X grows right, Y grows down.',
  objective: {
    survive_seconds: TOTAL_SECONDS,
    prevent_meltdowns: true,
    shield_must_stay_above: 0,
  },
  resources: {
    elapsed_seconds: Number(state.elapsed.toFixed(3)),
    time_left_seconds: Number(state.timeLeft.toFixed(3)),
    score: Math.round(state.score),
    shield: state.shield,
    coolant: Number(state.coolant.toFixed(2)),
    stabilized_actions: state.stabilized,
    cursor: { x: state.cursorX, y: state.cursorY },
  },
  heat_grid: state.grid.map((row) => row.map((v) => Math.round(v))),
  critical_nodes: state.grid.flatMap((row, y) => row.map((v, x) => ({ x, y, heat: Math.round(v) }))).filter((n) => n.heat >= 72),
  recent_events: state.logs,
  controls: {
    move_cursor: 'WASD or Arrow keys or touch arrows',
    stabilize: 'Space or Enter or touch Stabilize',
    pause: 'P',
    restart: 'R',
    fullscreen: 'F',
  },
  result: state.result,
  coins: Number(profileState?.coins || 0),
});

resetState();
draw();
syncHud();
showOverlay('Reactor Relay', 'Overheated relay nodes are chaining into each other. Stabilize hot nodes and survive the storm timer.', 'Start Run', startGame);
raf = requestAnimationFrame((now) => { prev = now; frame(now); });
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
