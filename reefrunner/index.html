<style>
* { box-sizing: border-box; }
html, body {

  text-align: center;

}
.panel {

p { margin: 0 0 10px; color: #c6ddf8; font-size: clamp(13px, 2vw, 15px); line-height: 1.45; }
.row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

.hud {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #99ffe252;
  background: #062535f3;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  border-radius: 9px;
  border: 1px solid #ddf3ff30;
  background: #ffffff10;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #bdd8ea;
  font-size: 11px;
  letter-spacing: .05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b { font-size: clamp(14px, 2.1vw, 18px); line-height: 1.1; }
.warn b { color: #ffe39a; }
.bad b { color: #ff9aa8; }
.good b { color: #9bf0d3; }
.controls {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #99ffe252;
  background: #062535f3;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
}
.ctrl-btn {
  background: #0e6073;
  border-color: #c4ffec75;
}
@media (max-width: 900px) {
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const modeEl = document.getElementById('mode');
const scoreEl = document.getElementById('score');
const beaconsEl = document.getElementById('beacons');
const distanceEl = document.getElementById('distance');
const hullEl = document.getElementById('hull');
const oxygenEl = document.getElementById('oxygen');
const sonarEl = document.getElementById('sonar');
const flowEl = document.getElementById('flow');
const coinsEl = document.getElementById('coins');

const ROUTE_DISTANCE = 2400;
const BEACON_TARGET = 14;
const PLAYER_SPEED_X = 230;
const PLAYER_ACCEL_Y = 820;
const WATER_DRAG = 4.6;
const BASE_SCROLL_SPEED = 165;
const MAX_HULL = 100;
const MAX_OXYGEN = 100;
const MAX_SONAR = 100;
const PLAYER_RADIUS = 20;
const REEF_COUNT = 18;
const DRIFT_PARTICLE_COUNT = 42;
const SONAR_COST = 28;
const SONAR_RANGE = 330;
const SONAR_DURATION = 0.82;

const state = {
  mode: 'menu',
  result: null,
  elapsed: 0,
  distance: 0,
  score: 0,
  beacons: 0,
  hull: MAX_HULL,
  oxygen: MAX_OXYGEN,
  sonar: MAX_SONAR,
  flowLevel: 1,
  scrollSpeed: BASE_SCROLL_SPEED,
  input: { up: false, down: false, throttle: false, brake: false },
  player: {
    x: canvas.width * 0.22,
    y: canvas.height * 0.5,
    vx: 0,
    vy: 0,
    radius: PLAYER_RADIUS,
  },
  beaconsLive: [],
  gates: [],
  jellyfish: [],
  bubbles: [],
  reef: [],
  currentBands: [],
  particles: [],
  logs: [],
  idCounter: 0,
  spawnBeaconTimer: 0.75,
  spawnGateTimer: 1.25,
  spawnJellyTimer: 1.9,
  spawnBubbleTimer: 1.6,
  sonarPulse: 0,
  sonarCooldown: 0,
  damageCooldown: 0,
};

let raf = 0;
let prev = performance.now();
let controlled = false;

function randomRange(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function pushLog(type, data) {
  state.logs.unshift({
    t: Number(state.elapsed.toFixed(2)),
    type,
    ...data,
  });
  if (state.logs.length > 10) state.logs.length = 10;
}

function distanceBetween(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function circleRectHit(cx, cy, radius, rx, ry, rw, rh) {
  if (rw <= 0 || rh <= 0) return false;
  const nx = clamp(cx, rx, rx + rw);
  const ny = clamp(cy, ry, ry + rh);
  return Math.hypot(cx - nx, cy - ny) <= radius;
}

function addParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i += 1) {
    state.particles.push({
      x,
      y,
      vx: randomRange(-80, 80),
      vy: randomRange(-70, 45),
      life: randomRange(0.35, 0.8),
      size: randomRange(2, 5),
      color,
    });
  }
  if (state.particles.length > 90) state.particles.splice(0, state.particles.length - 90);
}

function createBeacon() {
  const id = `beacon-${state.idCounter += 1}`;
  return {
    id,
    x: canvas.width + randomRange(60, 220),
    y: randomRange(104, canvas.height - 126),
    radius: randomRange(12, 16),
    drift: randomRange(18, 42),
    phase: randomRange(0, Math.PI * 2),
    charged: false,
  };
}

function createGate() {
  const id = `gate-${state.idCounter += 1}`;
  const gapHeight = clamp(randomRange(202, 252) - state.flowLevel * 9, 166, 252);
  return {
    id,
    x: canvas.width + randomRange(80, 180),
    width: randomRange(56, 78),
    gapY: randomRange(190, canvas.height - 190),
    gapHeight,
    sway: randomRange(0, Math.PI * 2),
    passed: false,
    hit: false,
  };
}

function createJellyfish() {
  const id = `jelly-${state.idCounter += 1}`;
  return {
    id,
    x: canvas.width + randomRange(80, 240),
    y: randomRange(110, canvas.height - 130),
    vx: randomRange(24, 64),
    radius: randomRange(18, 27),
    phase: randomRange(0, Math.PI * 2),
    amp: randomRange(18, 42),
    stunned: 0,
  };
}

function createBubbleCache() {
  const id = `bubble-${state.idCounter += 1}`;
  return {
    id,
    x: canvas.width + randomRange(60, 210),
    y: randomRange(130, canvas.height - 112),
    radius: randomRange(12, 18),
    phase: randomRange(0, Math.PI * 2),
  };
}

function resetState() {
  state.mode = 'menu';
  state.result = null;
  state.elapsed = 0;
  state.distance = 0;
  state.score = 0;
  state.beacons = 0;
  state.hull = MAX_HULL;
  state.oxygen = MAX_OXYGEN;
  state.sonar = MAX_SONAR;
  state.flowLevel = 1;
  state.scrollSpeed = BASE_SCROLL_SPEED;
  state.input.up = false;
  state.input.down = false;
  state.input.throttle = false;
  state.input.brake = false;
  state.player.x = canvas.width * 0.22;
  state.player.y = canvas.height * 0.5;
  state.player.vx = 0;
  state.player.vy = 0;
  state.beaconsLive = [];
  state.gates = [];
  state.jellyfish = [];
  state.bubbles = [];
  state.logs = [];
  state.idCounter = 0;
  state.spawnBeaconTimer = 0.75;
  state.spawnGateTimer = 1.25;
  state.spawnJellyTimer = 1.9;
  state.spawnBubbleTimer = 1.6;
  state.sonarPulse = 0;
  state.sonarCooldown = 0;
  state.damageCooldown = 0;

  state.currentBands = [
    { y: canvas.height * 0.24, height: 54, direction: -1, strength: 44, phase: randomRange(0, Math.PI * 2) },
    { y: canvas.height * 0.5, height: 64, direction: 1, strength: 58, phase: randomRange(0, Math.PI * 2) },
    { y: canvas.height * 0.74, height: 50, direction: -1, strength: 38, phase: randomRange(0, Math.PI * 2) },
  ];

  state.reef = Array.from({ length: REEF_COUNT }, () => ({
    x: randomRange(0, canvas.width),
    baseY: canvas.height - randomRange(18, 68),
    width: randomRange(34, 78),
    height: randomRange(44, 150),
    speed: randomRange(12, 34),
    hue: randomRange(150, 184),
  }));

  state.particles = Array.from({ length: DRIFT_PARTICLE_COUNT }, () => ({
    x: randomRange(0, canvas.width),
    y: randomRange(0, canvas.height),
    vx: randomRange(-18, -6),
    vy: randomRange(-6, 6),
    life: 1,
    size: randomRange(1, 3),
    color: 'rgba(196,255,235,0.46)',
  }));
}

function hideOverlay() {
  overlay.classList.remove('show');
  overlay.innerHTML = '';
}

function showOverlay(title, body, buttonLabel, handler) {
  overlay.classList.add('show');
  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <div class="row">
        <button id="overlayButton" type="button">${buttonLabel}</button>
      </div>
    </div>
  `;
  document.getElementById('overlayButton').addEventListener('click', handler, { once: true });
}

function startGame() {
  resetState();
  state.mode = 'running';
  hideOverlay();
  try { rememberRecent('reefrunner'); } catch {}
  try {
    maybeUnlock({ anyPlay: true, reefrunner: { result: 'started', score: 0, beacons: 0, routeMeters: 0 } });
  } catch {}
  pushLog('dive_started', { beacon_target: BEACON_TARGET, route_meters: ROUTE_DISTANCE });
}

function finishGame(result) {
  if (state.mode === 'won' || state.mode === 'lost') return;
  state.mode = result;
  state.result = result;

  const coinsEarned = Math.max(6, Math.min(70, Math.round((state.score + state.beacons * 18 + state.distance / 18) / 16)));
  if (coinsEarned > 0) {
    try { addCoins(coinsEarned); } catch {}
  }

  try {
    maybeUnlock({
      anyPlay: true,
      reefrunner: {
        result,
        score: Math.round(state.score),
        beacons: state.beacons,
        routeMeters: Math.round(state.distance),
        hull: Number(state.hull.toFixed(2)),
        oxygen: Number(state.oxygen.toFixed(2)),
        flowLevel: state.flowLevel,
      },
    });
  } catch {}

  const win = result === 'won';
  const title = win ? 'Reef Route Mapped' : 'Skimmer Forced Up';
  const body = win
    ? `You recovered ${state.beacons} charged beacons and threaded the reef channel. Coins +${coinsEarned}.`
    : `Route ${Math.round(state.distance)}m, beacons ${state.beacons}/${BEACON_TARGET}, hull ${Math.max(0, state.hull).toFixed(0)}%, O2 ${Math.max(0, state.oxygen).toFixed(0)}%. Coins +${coinsEarned}.`;
  showOverlay(title, body, 'Dive Again', startGame);
}

function updateSpawns(dt) {
  state.spawnBeaconTimer -= dt;
  if (state.spawnBeaconTimer <= 0 && state.beaconsLive.length < 7) {
    state.beaconsLive.push(createBeacon());
    state.spawnBeaconTimer = randomRange(0.62, 1.18);
  }

  state.spawnGateTimer -= dt;
  if (state.spawnGateTimer <= 0 && state.gates.length < 4) {
    state.gates.push(createGate());
    state.spawnGateTimer = randomRange(1.2, 1.85);
  }

  state.spawnJellyTimer -= dt;
  if (state.spawnJellyTimer <= 0 && state.jellyfish.length < 5) {
    state.jellyfish.push(createJellyfish());
    state.spawnJellyTimer = randomRange(1.5, 2.6);
  }

  state.spawnBubbleTimer -= dt;
  if (state.spawnBubbleTimer <= 0 && state.bubbles.length < 4) {
    state.bubbles.push(createBubbleCache());
    state.spawnBubbleTimer = randomRange(1.6, 3.1);
  }
}

function updatePlayer(dt) {
  let xAxis = 0;
  if (state.input.brake) xAxis -= 1;
  if (state.input.throttle) xAxis += 1;
  state.player.vx = xAxis * PLAYER_SPEED_X;

  let yAxis = 0;
  if (state.input.up) yAxis -= 1;
  if (state.input.down) yAxis += 1;
  state.player.vy += yAxis * PLAYER_ACCEL_Y * dt;

  for (const band of state.currentBands) {
    const bandTop = band.y - band.height * 0.5;
    const bandBottom = band.y + band.height * 0.5;
    if (state.player.y >= bandTop && state.player.y <= bandBottom) {
      state.player.vy += band.direction * band.strength * dt;
    }
  }

  state.player.vy *= Math.max(0, 1 - WATER_DRAG * dt);
  state.player.vy = clamp(state.player.vy, -300, 300);
  state.player.x = clamp(state.player.x + state.player.vx * dt, 82, canvas.width * 0.48);
  state.player.y = clamp(state.player.y + state.player.vy * dt, 72, canvas.height - 64);

  if (state.player.y <= 72 || state.player.y >= canvas.height - 64) {
    state.hull = clamp(state.hull - dt * 5, 0, MAX_HULL);
    state.player.vy *= -0.35;
  }
}

function currentSonarRadius() {
  if (state.sonarPulse <= 0) return 0;
  return (1 - state.sonarPulse / SONAR_DURATION) * SONAR_RANGE;
}

function triggerSonar() {
  if (state.mode !== 'running') return;
  if (state.sonar < SONAR_COST || state.sonarCooldown > 0) {
    pushLog('sonar_empty', { sonar: Number(state.sonar.toFixed(1)) });
    return;
  }

  state.sonar = clamp(state.sonar - SONAR_COST, 0, MAX_SONAR);
  state.sonarPulse = SONAR_DURATION;
  state.sonarCooldown = 0.35;
  let charged = 0;
  let stunned = 0;

  for (const beacon of state.beaconsLive) {
    if (!beacon.charged && distanceBetween(beacon, state.player) <= SONAR_RANGE) {
      beacon.charged = true;
      charged += 1;
    }
  }

  for (const jelly of state.jellyfish) {
    if (distanceBetween(jelly, state.player) <= SONAR_RANGE) {
      jelly.stunned = Math.max(jelly.stunned, 2.4);
      stunned += 1;
    }
  }

  addParticles(state.player.x, state.player.y, 'rgba(124,240,255,0.95)', 14);
  pushLog('sonar_ping', { charged, stunned });
}

function updateBeacons(dt) {
  const sonarRadius = currentSonarRadius();

  for (let i = state.beaconsLive.length - 1; i >= 0; i -= 1) {
    const beacon = state.beaconsLive[i];
    beacon.phase += dt * 2.4;
    beacon.x -= state.scrollSpeed * (beacon.charged ? 0.82 : 0.96) * dt;
    beacon.y += Math.sin(beacon.phase) * beacon.drift * dt;
    beacon.y = clamp(beacon.y, 82, canvas.height - 82);

    if (!beacon.charged && sonarRadius > 0 && distanceBetween(beacon, state.player) <= sonarRadius + beacon.radius + 8) {
      beacon.charged = true;
      pushLog('beacon_charged', { id: beacon.id });
    }

    if (distanceBetween(beacon, state.player) <= beacon.radius + state.player.radius + 6) {
      state.beacons += 1;
      state.score += beacon.charged ? 95 : 54;
      state.oxygen = clamp(state.oxygen + (beacon.charged ? 4 : 1), 0, MAX_OXYGEN);
      state.beaconsLive.splice(i, 1);
      addParticles(beacon.x, beacon.y, beacon.charged ? 'rgba(138,255,231,0.95)' : 'rgba(255,224,126,0.88)', 10);
      pushLog('beacon_recovered', { total: state.beacons, charged: beacon.charged });
      continue;
    }

    if (beacon.x < -70) {
      state.beaconsLive.splice(i, 1);
    }
  }
}

function updateGates(dt) {
  const player = state.player;
  for (let i = state.gates.length - 1; i >= 0; i -= 1) {
    const gate = state.gates[i];
    gate.x -= state.scrollSpeed * dt;
    gate.gapY += Math.sin(state.elapsed * 1.45 + gate.sway) * 16 * dt;
    gate.gapY = clamp(gate.gapY, gate.gapHeight * 0.5 + 58, canvas.height - gate.gapHeight * 0.5 - 58);

    const topHeight = gate.gapY - gate.gapHeight * 0.5;
    const bottomY = gate.gapY + gate.gapHeight * 0.5;
    const hitTop = circleRectHit(player.x, player.y, player.radius, gate.x, 0, gate.width, topHeight);
    const hitBottom = circleRectHit(player.x, player.y, player.radius, gate.x, bottomY, gate.width, canvas.height - bottomY);

    if ((hitTop || hitBottom) && state.damageCooldown <= 0) {
      state.hull = clamp(state.hull - (16 + state.flowLevel * 1.8), 0, MAX_HULL);
      state.oxygen = clamp(state.oxygen - 6, 0, MAX_OXYGEN);
      state.damageCooldown = 0.72;
      state.player.x = clamp(state.player.x - 34, 82, canvas.width * 0.48);
      state.player.vy *= -0.7;
      gate.hit = true;
      addParticles(player.x, player.y, 'rgba(255,126,118,0.9)', 12);
      pushLog('coral_scrape', { hull: Number(state.hull.toFixed(1)) });
    }

    if (!gate.passed && gate.x + gate.width < player.x) {
      gate.passed = true;
      if (!gate.hit) state.score += 42;
      pushLog('gate_cleared', { clean: !gate.hit });
    }

    if (gate.x < -gate.width - 20) {
      state.gates.splice(i, 1);
    }
  }
}

function updateJellyfish(dt) {
  state.damageCooldown = Math.max(0, state.damageCooldown - dt);

  for (let i = state.jellyfish.length - 1; i >= 0; i -= 1) {
    const jelly = state.jellyfish[i];
    jelly.phase += dt * 3.1;
    jelly.stunned = Math.max(0, jelly.stunned - dt);
    const stunFactor = jelly.stunned > 0 ? 0.38 : 1;
    jelly.x -= (state.scrollSpeed * 0.64 + jelly.vx) * stunFactor * dt;
    jelly.y += Math.sin(jelly.phase) * jelly.amp * dt;
    jelly.y = clamp(jelly.y, 90, canvas.height - 92);

    if (distanceBetween(jelly, state.player) <= jelly.radius + state.player.radius) {
      if (jelly.stunned > 0) {
        state.score += 48;
        addParticles(jelly.x, jelly.y, 'rgba(148,232,255,0.92)', 12);
        state.jellyfish.splice(i, 1);
        pushLog('jelly_cleared', { score: Math.round(state.score) });
        continue;
      }

      if (state.damageCooldown <= 0) {
        state.hull = clamp(state.hull - (12 + state.flowLevel * 1.5), 0, MAX_HULL);
        state.oxygen = clamp(state.oxygen - 5, 0, MAX_OXYGEN);
        state.damageCooldown = 0.65;
        state.player.vy += state.player.y < jelly.y ? -120 : 120;
        addParticles(state.player.x, state.player.y, 'rgba(255,143,211,0.9)', 12);
        pushLog('jelly_sting', { hull: Number(state.hull.toFixed(1)) });
      }
    }

    if (jelly.x < -80) {
      state.jellyfish.splice(i, 1);
    }
  }
}

function updateBubbles(dt) {
  for (let i = state.bubbles.length - 1; i >= 0; i -= 1) {
    const bubble = state.bubbles[i];
    bubble.phase += dt * 3.5;
    bubble.x -= state.scrollSpeed * 0.76 * dt;
    bubble.y += (Math.sin(bubble.phase) * 22 - 18) * dt;

    if (distanceBetween(bubble, state.player) <= bubble.radius + state.player.radius + 6) {
      state.oxygen = clamp(state.oxygen + 16, 0, MAX_OXYGEN);
      state.score += 18;
      state.bubbles.splice(i, 1);
      addParticles(bubble.x, bubble.y, 'rgba(225,255,255,0.9)', 9);
      pushLog('oxygen_cache', { oxygen: Number(state.oxygen.toFixed(1)) });
      continue;
    }

    if (bubble.x < -50 || bubble.y < 30) {
      state.bubbles.splice(i, 1);
    }
  }
}

function updateWater(dt) {
  state.flowLevel = clamp(1 + Math.floor(state.distance / 520), 1, 5);
  const throttleBonus = state.input.throttle ? 72 : 0;
  const brakePenalty = state.input.brake ? -58 : 0;
  state.scrollSpeed = clamp(BASE_SCROLL_SPEED + throttleBonus + brakePenalty + state.flowLevel * 9, 92, 326);
  state.distance = Math.min(ROUTE_DISTANCE, state.distance + state.scrollSpeed * dt * 0.42);
  state.oxygen = clamp(state.oxygen - dt * (2.05 + state.flowLevel * 0.18 + (state.input.throttle ? 0.85 : 0)), 0, MAX_OXYGEN);
  state.sonar = clamp(state.sonar + dt * 18, 0, MAX_SONAR);
  state.sonarPulse = Math.max(0, state.sonarPulse - dt);
  state.sonarCooldown = Math.max(0, state.sonarCooldown - dt);
  state.score += dt * (2.2 + state.flowLevel * 0.35);

  for (const band of state.currentBands) {
    band.phase += dt * 1.2;
    band.y += Math.sin(band.phase) * 9 * dt;
    band.y = clamp(band.y, 88, canvas.height - 92);
  }

  for (const reef of state.reef) {
    reef.x -= (state.scrollSpeed * 0.24 + reef.speed) * dt;
    if (reef.x < -reef.width - 20) {
      reef.x = canvas.width + randomRange(20, 160);
      reef.baseY = canvas.height - randomRange(18, 68);
      reef.width = randomRange(34, 78);
      reef.height = randomRange(44, 150);
    }
  }

  for (const particle of state.particles) {
    particle.x += (particle.vx - state.scrollSpeed * 0.05) * dt;
    particle.y += particle.vy * dt + Math.sin(state.elapsed * 2 + particle.x * 0.01) * dt * 8;
    if (particle.x < -10) particle.x = canvas.width + randomRange(0, 80);
    if (particle.y < 0) particle.y = canvas.height;
    if (particle.y > canvas.height) particle.y = 0;
    particle.life = Math.max(0, particle.life - dt);
  }
}

function update(dt) {
  if (state.mode !== 'running') return;

  state.elapsed += dt;
  updateWater(dt);

  updateSpawns(dt);
  updatePlayer(dt);
  updateBeacons(dt);
  updateGates(dt);
  updateJellyfish(dt);
  updateBubbles(dt);

  if (state.hull <= 0 || state.oxygen <= 0) {
    finishGame('lost');
    return;
  }

  if (state.distance >= ROUTE_DISTANCE) {
    finishGame(state.beacons >= BEACON_TARGET ? 'won' : 'lost');
    return;
  }
}

function drawWater() {
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#07314d');
  g.addColorStop(0.46, '#07596a');
  g.addColorStop(1, '#0a7a59');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(180,255,232,0.16)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i += 1) {
    const y = 70 + i * 76 + Math.sin(state.elapsed * 0.9 + i) * 16;
    ctx.beginPath();
    for (let x = -80; x <= canvas.width + 80; x += 70) {
      const waveY = y + Math.sin((x + state.elapsed * 70) * 0.012 + i) * 8;
      if (x === -80) ctx.moveTo(x, waveY);
      else ctx.lineTo(x, waveY);
    }
    ctx.stroke();
  }

  for (const particle of state.particles) {
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBeacons() {
  for (const beacon of state.beaconsLive) {
    const pulse = 1 + Math.sin(state.elapsed * 7 + beacon.phase) * 0.12;
    const glow = ctx.createRadialGradient(beacon.x, beacon.y, 2, beacon.x, beacon.y, beacon.radius * (beacon.charged ? 4.4 : 2.5));
    glow.addColorStop(0, beacon.charged ? 'rgba(128,255,232,0.96)' : 'rgba(255,232,138,0.72)');
    glow.addColorStop(0.5, beacon.charged ? 'rgba(81,213,255,0.62)' : 'rgba(225,163,80,0.34)');
    glow.addColorStop(1, 'rgba(60,255,220,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(beacon.x, beacon.y, beacon.radius * (beacon.charged ? 4.4 : 2.5), 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(beacon.x, beacon.y);
    ctx.rotate(Math.PI * 0.25);
    ctx.fillStyle = beacon.charged ? '#8fffe9' : '#ffd777';
    ctx.strokeStyle = beacon.charged ? '#e8fffb' : '#fff0b6';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(-beacon.radius * pulse, -beacon.radius * pulse, beacon.radius * 2 * pulse, beacon.radius * 2 * pulse);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = beacon.charged ? 'rgba(232,255,251,0.84)' : 'rgba(255,240,182,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(beacon.x, beacon.y, beacon.radius + 9 + Math.sin(state.elapsed * 5 + beacon.phase) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawCurrentBands() {
  for (const band of state.currentBands) {
    const alpha = 0.08 + state.flowLevel * 0.018;
    ctx.fillStyle = `rgba(136,255,224,${alpha.toFixed(3)})`;
    ctx.fillRect(0, band.y - band.height * 0.5, canvas.width, band.height);
    ctx.fillStyle = 'rgba(230,255,249,0.26)';
    for (let x = -40; x < canvas.width + 60; x += 96) {
      const y = band.y + Math.sin(state.elapsed * 2 + x * 0.02 + band.phase) * 8;
      ctx.save();
      ctx.translate(x + ((state.elapsed * state.scrollSpeed * 0.18) % 96), y);
      ctx.scale(1, band.direction);
      ctx.beginPath();
      ctx.moveTo(-12, -5);
      ctx.lineTo(12, 0);
      ctx.lineTo(-12, 5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawCoralColumn(x, y, w, h, inverted, hit) {
  if (h <= 0) return;
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, hit ? '#ff9184' : '#ff795e');
  g.addColorStop(1, hit ? '#a8466c' : '#d54c77');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = 'rgba(255,211,199,0.48)';
  ctx.lineWidth = 5;
  const rootY = inverted ? y + h - 12 : y + 12;
  const tipY = inverted ? y + 16 : y + h - 16;
  for (let branch = 0; branch < 3; branch += 1) {
    const bx = x + w * (0.24 + branch * 0.24);
    ctx.beginPath();
    ctx.moveTo(bx, rootY);
    ctx.quadraticCurveTo(bx + Math.sin(branch + state.elapsed) * 14, (rootY + tipY) * 0.5, bx + (branch - 1) * 9, tipY);
    ctx.stroke();
  }
}

function drawGates() {
  for (const gate of state.gates) {
    const topHeight = gate.gapY - gate.gapHeight * 0.5;
    const bottomY = gate.gapY + gate.gapHeight * 0.5;
    drawCoralColumn(gate.x, 0, gate.width, topHeight, true, gate.hit);
    drawCoralColumn(gate.x, bottomY, gate.width, canvas.height - bottomY, false, gate.hit);

    ctx.strokeStyle = gate.hit ? 'rgba(255,194,184,0.7)' : 'rgba(160,255,222,0.42)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 12]);
    ctx.beginPath();
    ctx.moveTo(gate.x + gate.width * 0.5, topHeight + 10);
    ctx.lineTo(gate.x + gate.width * 0.5, bottomY - 10);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawJellyfish() {
  for (const jelly of state.jellyfish) {
    const stunned = jelly.stunned > 0;
    const bob = Math.sin(jelly.phase) * 4;
    ctx.save();
    ctx.translate(jelly.x, jelly.y + bob);

    const body = ctx.createRadialGradient(-5, -6, 3, 0, 0, jelly.radius * 1.4);
    body.addColorStop(0, stunned ? 'rgba(205,251,255,0.95)' : 'rgba(255,202,241,0.95)');
    body.addColorStop(1, stunned ? 'rgba(80,185,230,0.5)' : 'rgba(184,88,188,0.48)');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(0, -2, jelly.radius, Math.PI, 0);
    ctx.lineTo(jelly.radius, 4);
    ctx.quadraticCurveTo(0, jelly.radius * 0.65, -jelly.radius, 4);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = stunned ? 'rgba(210,252,255,0.78)' : 'rgba(255,211,247,0.76)';
    ctx.lineWidth = 3;
    for (let i = -2; i <= 2; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * jelly.radius * 0.28, 4);
      ctx.quadraticCurveTo(i * 8 + Math.sin(state.elapsed * 5 + i) * 6, jelly.radius * 0.9, i * 11, jelly.radius * 1.55);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawBubbles() {
  for (const bubble of state.bubbles) {
    ctx.strokeStyle = 'rgba(230,255,255,0.84)';
    ctx.fillStyle = 'rgba(230,255,255,0.16)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(bubble.x - bubble.radius * 0.28, bubble.y - bubble.radius * 0.28, bubble.radius * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.62)';
    ctx.fill();
  }
}

function drawPlayer() {
  const { x, y, vx, radius } = state.player;
  const pitch = clamp(state.player.vy / 260, -0.35, 0.35);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(pitch);

  ctx.fillStyle = 'rgba(16,31,43,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, 22, 44, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  const body = ctx.createLinearGradient(-40, -18, 42, 18);
  body.addColorStop(0, '#ffbf67');
  body.addColorStop(0.55, '#ffe08e');
  body.addColorStop(1, '#4bd7c2');
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.ellipse(0, 0, 43, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#dbfaff';
  ctx.beginPath();
  ctx.arc(15, -4, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#094659';
  ctx.beginPath();
  ctx.arc(16, -5, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#118b97';
  ctx.beginPath();
  ctx.moveTo(-39, 0);
  ctx.lineTo(-62, -15);
  ctx.lineTo(-58, 15);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(229,255,249,0.86)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-60, -14);
  ctx.lineTo(-72, -23 + Math.sin(state.elapsed * 13) * 4);
  ctx.moveTo(-60, 14);
  ctx.lineTo(-72, 23 - Math.sin(state.elapsed * 13) * 4);
  ctx.stroke();

  if (vx > 0 || state.input.throttle) {
    ctx.fillStyle = 'rgba(193,255,246,0.54)';
    ctx.beginPath();
    ctx.moveTo(-63, -9);
    ctx.lineTo(-96, 0);
    ctx.lineTo(-63, 9);
    ctx.closePath();
    ctx.fill();
  }

  if (state.damageCooldown > 0) {
    ctx.strokeStyle = 'rgba(255,152,169,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, radius + 22, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawSonarPulse() {
  if (state.sonarPulse <= 0) return;
  const radius = currentSonarRadius();
  const alpha = clamp(state.sonarPulse / SONAR_DURATION, 0, 1);
  ctx.strokeStyle = `rgba(130,247,255,${(0.18 + alpha * 0.48).toFixed(3)})`;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(state.player.x, state.player.y, radius, 0, Math.PI * 2);
  ctx.stroke();
}

function drawReefFloor() {
  ctx.fillStyle = '#0a3f34';
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  for (let x = 0; x <= canvas.width + 80; x += 80) {
    const y = canvas.height - 26 - Math.sin((x + state.elapsed * 48) * 0.015) * 8;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(canvas.width, canvas.height);
  ctx.closePath();
  ctx.fill();

  for (const reef of state.reef) {
    ctx.fillStyle = `hsla(${reef.hue}, 58%, 43%, 0.72)`;
    ctx.beginPath();
    ctx.moveTo(reef.x, reef.baseY);
    ctx.quadraticCurveTo(reef.x + reef.width * 0.28, reef.baseY - reef.height, reef.x + reef.width * 0.52, reef.baseY);
    ctx.quadraticCurveTo(reef.x + reef.width * 0.76, reef.baseY - reef.height * 0.72, reef.x + reef.width, reef.baseY);
    ctx.closePath();
    ctx.fill();
  }
}

function draw() {
  drawWater();
  drawCurrentBands();
  drawReefFloor();
  drawGates();
  drawBubbles();
  drawBeacons();
  drawJellyfish();
  drawSonarPulse();
  drawPlayer();
}

function syncHud() {
  modeEl.textContent = String(state.mode).toUpperCase();
  scoreEl.textContent = String(Math.round(state.score));
  beaconsEl.textContent = `${state.beacons}/${BEACON_TARGET}`;
  distanceEl.textContent = `${Math.round(state.distance)}m`;
  hullEl.textContent = `${Math.max(0, Math.round(state.hull))}%`;
  oxygenEl.textContent = `${Math.max(0, Math.round(state.oxygen))}%`;
  sonarEl.textContent = `${Math.round(state.sonar)}%`;
  flowEl.textContent = String(state.flowLevel);
  coinsEl.textContent = String(Number(profileState?.coins || 0));

  const routeChip = distanceEl.parentElement;
  const routeRatio = state.distance / ROUTE_DISTANCE;
  routeChip.classList.toggle('good', routeRatio >= 0.66);
  routeChip.classList.toggle('warn', routeRatio >= 0.35 && routeRatio < 0.66);
  routeChip.classList.toggle('bad', routeRatio < 0.35);

  const hullChip = hullEl.parentElement;
  hullChip.classList.toggle('good', state.hull >= 65);
  hullChip.classList.toggle('warn', state.hull < 65 && state.hull >= 35);
  hullChip.classList.toggle('bad', state.hull < 35);

  const oxygenChip = oxygenEl.parentElement;
  oxygenChip.classList.toggle('good', state.oxygen >= 65);
  oxygenChip.classList.toggle('warn', state.oxygen < 65 && state.oxygen >= 30);
  oxygenChip.classList.toggle('bad', state.oxygen < 30);
}

function togglePause() {
  if (state.mode === 'running') {
    state.mode = 'paused';
    showOverlay('Paused', 'Hold position in the reef current, then resume the beacon route.', 'Resume', () => {
      if (state.mode === 'paused') {
        state.mode = 'running';
        hideOverlay();
      }
    });
  } else if (state.mode === 'paused') {
    state.mode = 'running';
    hideOverlay();
  }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  else document.exitFullscreen?.().catch(() => {});
}

function onKeyDown(event) {
  const code = event.code;
  if (code === 'ArrowUp' || code === 'KeyW') { event.preventDefault(); state.input.up = true; return; }
  if (code === 'ArrowDown' || code === 'KeyS') { event.preventDefault(); state.input.down = true; return; }
  if (code === 'ArrowRight' || code === 'KeyD') { event.preventDefault(); state.input.throttle = true; return; }
  if (code === 'ArrowLeft' || code === 'KeyA') { event.preventDefault(); state.input.brake = true; return; }
  if (code === 'Space' || code === 'Enter') { event.preventDefault(); if (!event.repeat) triggerSonar(); return; }
  if (code === 'KeyP') { event.preventDefault(); togglePause(); return; }
  if (code === 'KeyR') { event.preventDefault(); startGame(); return; }
  if (code === 'KeyF') { event.preventDefault(); toggleFullscreen(); }
}

function onKeyUp(event) {
  const code = event.code;
  if (code === 'ArrowUp' || code === 'KeyW') { event.preventDefault(); state.input.up = false; return; }
  if (code === 'ArrowDown' || code === 'KeyS') { event.preventDefault(); state.input.down = false; return; }
  if (code === 'ArrowRight' || code === 'KeyD') { event.preventDefault(); state.input.throttle = false; return; }
  if (code === 'ArrowLeft' || code === 'KeyA') { event.preventDefault(); state.input.brake = false; }
}

function bindHoldButton(id, press, release = press) {
  const btn = document.getElementById(id);
  const down = (event) => { event.preventDefault(); press(); };
  const up = (event) => { event.preventDefault(); release(); };
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointercancel', up);
  btn.addEventListener('pointerleave', up);
}

function step(ms) {
  const steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  controlled = true;
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  syncHud();
  controlled = false;
}

function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!controlled) {
    update(dt);
    draw();
    syncHud();
  }
  raf = requestAnimationFrame(frame);
}

bindHoldButton('upBtn', () => { state.input.up = true; }, () => { state.input.up = false; });
bindHoldButton('downBtn', () => { state.input.down = true; }, () => { state.input.down = false; });
bindHoldButton('throttleBtn', () => { state.input.throttle = true; }, () => { state.input.throttle = false; });
bindHoldButton('brakeBtn', () => { state.input.brake = true; }, () => { state.input.brake = false; });
document.getElementById('sonarBtn').addEventListener('click', triggerSonar);
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('keyup', onKeyUp);

window.advanceTime = (ms) => step(ms);
window.render_game_to_text = () => JSON.stringify({
  game: 'reefrunner',
  mode: state.mode,
  coordinate_system: 'Canvas origin is top-left; +x moves right, +y moves down. All entities use pixel coordinates in this frame.',
  objective: {
    beacon_target: BEACON_TARGET,
    route_distance_meters: ROUTE_DISTANCE,
    keep_hull_and_oxygen_above_percent: 0,
  },
  resources: {
    elapsed_seconds: Number(state.elapsed.toFixed(3)),
    route_meters: Number(state.distance.toFixed(2)),
    score: Math.round(state.score),
    beacons_recovered: state.beacons,
    hull_percent: Number(state.hull.toFixed(2)),
    oxygen_percent: Number(state.oxygen.toFixed(2)),
    sonar_percent: Number(state.sonar.toFixed(2)),
    flow_level: state.flowLevel,
    scroll_speed: Number(state.scrollSpeed.toFixed(2)),
  },
  player: {
    x: Number(state.player.x.toFixed(2)),
    y: Number(state.player.y.toFixed(2)),
    vx: Number(state.player.vx.toFixed(2)),
    vy: Number(state.player.vy.toFixed(2)),
    radius: state.player.radius,
    inputs: { ...state.input },
  },
  beacons: state.beaconsLive.map((beacon) => ({
    id: beacon.id,
    x: Number(beacon.x.toFixed(2)),
    y: Number(beacon.y.toFixed(2)),
    radius: Number(beacon.radius.toFixed(2)),
    charged: beacon.charged,
  })),
  coral_gates: state.gates.map((gate) => ({
    id: gate.id,
    x: Number(gate.x.toFixed(2)),
    width: Number(gate.width.toFixed(2)),
    gap_y: Number(gate.gapY.toFixed(2)),
    gap_height: Number(gate.gapHeight.toFixed(2)),
    passed: gate.passed,
    hit: gate.hit,
  })),
  jellyfish: state.jellyfish.map((jelly) => ({
    id: jelly.id,
    x: Number(jelly.x.toFixed(2)),
    y: Number(jelly.y.toFixed(2)),
    radius: Number(jelly.radius.toFixed(2)),
    stunned_seconds: Number(jelly.stunned.toFixed(2)),
  })),
  oxygen_bubbles: state.bubbles.map((bubble) => ({
    id: bubble.id,
    x: Number(bubble.x.toFixed(2)),
    y: Number(bubble.y.toFixed(2)),
    radius: Number(bubble.radius.toFixed(2)),
  })),
  timers: {
    spawn_beacon_seconds: Number(state.spawnBeaconTimer.toFixed(3)),
    spawn_gate_seconds: Number(state.spawnGateTimer.toFixed(3)),
    spawn_jelly_seconds: Number(state.spawnJellyTimer.toFixed(3)),
    spawn_bubble_seconds: Number(state.spawnBubbleTimer.toFixed(3)),
    sonar_pulse_seconds: Number(state.sonarPulse.toFixed(3)),
    sonar_cooldown_seconds: Number(state.sonarCooldown.toFixed(3)),
    damage_cooldown_seconds: Number(state.damageCooldown.toFixed(3)),
  },
  recent_events: state.logs,
  controls: {
    steer_depth: 'W/S or Up/Down',
    throttle_brake: 'D/A or Right/Left',
    sonar: 'Space/Enter',
    pause: 'P',
    restart: 'R',
    fullscreen: 'F',
  },
  result: state.result,
  coins: Number(profileState?.coins || 0),
});

resetState();
draw();
syncHud();
showOverlay(
  'Reef Runner',
  'Pilot a reef skimmer through coral gates. Use W/S or Up/Down for depth, D/A to throttle or brake, and Space/Enter to ping sonar so beacons charge and jellyfish stun.',
  'Dive',
  startGame,
);
raf = requestAnimationFrame((now) => { prev = now; frame(now); });
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '../src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'reefrunner', gameName: 'Reef Runner' });
</script>
</body>
</html>
