  .clue-strip { min-height: 44px; padding: 7px 9px; }

  .keyboard { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 5px; }
  .keyboard button { min-height: 32px; font-size: 12px; }

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { mountGameFeedback } from '/src/feedback/embed.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = {
  mode: document.getElementById('modeText'),
  puzzle: document.getElementById('puzzleText'),
  time: document.getElementById('timeText'),
  hints: document.getElementById('hintText'),
  score: document.getElementById('scoreText'),
  coins: document.getElementById('coinsText'),
  clueLabel: document.getElementById('clueLabel'),
  clueText: document.getElementById('clueText'),
};
const buttons = {
  start: document.getElementById('startBtn'),
  prev: document.getElementById('prevBtn'),
  next: document.getElementById('nextBtn'),
  dir: document.getElementById('dirBtn'),
  check: document.getElementById('checkBtn'),
  hint: document.getElementById('hintBtn'),
  undo: document.getElementById('undoBtn'),
  pause: document.getElementById('pauseBtn'),
  restart: document.getElementById('restartBtn'),
  full: document.getElementById('fullBtn'),
};
const keyboard = document.getElementById('keyboard');

const PUZZLES = [
  {
    id: 'post-office',
    title: 'Post Office',
    rows: ['CARD', 'AREA', 'REAR', 'DART'],
    givens: [[0, 0], [1, 1]],
    clues: {
      CARD: 'Paper greeting or game piece',
      AREA: 'Amount of surface inside a shape',
      REAR: 'The back side',
      DART: 'Small pointed throw',
    },
  },
  {
    id: 'play-yard',
    title: 'Play Yard',
    rows: ['BALL', 'AREA', 'LEAD', 'LADY'],
    givens: [[0, 0], [2, 2]],
    clues: {
      BALL: 'Round toy used in many sports',
      AREA: 'A measured space',
      LEAD: 'To guide from the front',
      LADY: 'Polite word for a woman',
    },
  },
  {
    id: 'beach-log',
    title: 'Beach Log',
    rows: ['SAND', 'AREA', 'NEAT', 'DATA'],
    givens: [[0, 0], [3, 3]],
    clues: {
      SAND: 'Tiny grains on a beach',
      AREA: 'Space inside a border',
      NEAT: 'Tidy and orderly',
      DATA: 'Facts collected for study',
    },
  },
  {
    id: 'clock-shop',
    title: 'Clock Shop',
    rows: ['TIME', 'IRON', 'MOOD', 'ENDS'],
    givens: [[0, 0], [1, 1]],
    clues: {
      TIME: 'What clocks measure',
      IRON: 'Metal used for tools',
      MOOD: 'How someone feels',
      ENDS: 'Finishes',
    },
  },
  {
    id: 'camp-light',
    title: 'Camp Light',
    rows: ['FIRE', 'ICED', 'REED', 'EDEN'],
    givens: [[0, 0], [2, 2]],
    clues: {
      FIRE: 'Camp glow that gives heat',
      ICED: 'Served very cold',
      REED: 'Tall grass by water',
      EDEN: 'A perfect garden place',
    },
  },
];

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const game = {
  mode: 'menu',
  puzzleIndex: 0,
  puzzle: null,
  solution: [],
  grid: [],
  locked: [],
  clues: [],
  clueById: new Map(),
  cellMeta: [],
  selected: { row: 0, col: 0 },
  direction: 'across',
  elapsedMs: 0,
  hints: 0,
  checks: 0,
  score: 0,
  coinsEarned: 0,
  lastWinCoins: 0,
  lastAction: 'menu',
  message: 'Start a puzzle, fill the word square, and solve five minis.',
  history: [],
};
const view = { w: 1080, h: 680, dpr: 1 };
let layout = null;
let lastFrame = performance.now();

function makeGrid(rows, fill = '') {
  return rows.map((row) => row.split('').map((ch) => (ch === '#' ? '#' : fill)));
}

function cloneGrid(grid) {
  return grid.map((row) => row.slice());
}

function buildClues(puzzle) {
  const rows = puzzle.rows;
  const height = rows.length;
  const width = rows[0].length;
  const clues = [];
  const cellMeta = Array.from({ length: height }, () => (
    Array.from({ length: width }, () => ({ number: 0, across: '', down: '' }))
  ));
  let number = 1;

  for (let row = 0; row < height; row += 1) {
    for (let col = 0; col < width; col += 1) {
      if (rows[row][col] === '#') continue;
      const startsAcross = (col === 0 || rows[row][col - 1] === '#')
        && col + 1 < width
        && rows[row][col + 1] !== '#';
      const startsDown = (row === 0 || rows[row - 1][col] === '#')
        && row + 1 < height
        && rows[row + 1][col] !== '#';
      if (!startsAcross && !startsDown) continue;

      const clueNumber = number;
      number += 1;
      cellMeta[row][col].number = clueNumber;

      if (startsAcross) {
        const cells = [];
        let word = '';
        for (let c = col; c < width && rows[row][c] !== '#'; c += 1) {
          cells.push({ row, col: c });
          word += rows[row][c];
        }
        const id = `A${clueNumber}`;
        for (const cell of cells) cellMeta[cell.row][cell.col].across = id;
        clues.push({
          id,
          number: clueNumber,
          dir: 'across',
          cells,
          word,
          text: puzzle.clues[word] || `Fill ${word.length} letters`,
        });
      }

      if (startsDown) {
        const cells = [];
        let word = '';
        for (let r = row; r < height && rows[r][col] !== '#'; r += 1) {
          cells.push({ row: r, col });
          word += rows[r][col];
        }
        const id = `D${clueNumber}`;
        for (const cell of cells) cellMeta[cell.row][cell.col].down = id;
        clues.push({
          id,
          number: clueNumber,
          dir: 'down',
          cells,
          word,
          text: puzzle.clues[word] || `Fill ${word.length} letters`,
        });
      }
    }
  }

  return { clues, cellMeta };
}

function loadPuzzle(index, keepScore = true) {
  const puzzle = PUZZLES[((index % PUZZLES.length) + PUZZLES.length) % PUZZLES.length];
  const { clues, cellMeta } = buildClues(puzzle);
  game.puzzleIndex = PUZZLES.indexOf(puzzle);
  game.puzzle = puzzle;
  game.solution = puzzle.rows.map((row) => row.split(''));
  game.grid = makeGrid(puzzle.rows);
  game.locked = makeGrid(puzzle.rows, false);
  for (const [row, col] of puzzle.givens) {
    game.grid[row][col] = game.solution[row][col];
    game.locked[row][col] = true;
  }
  game.clues = clues;
  game.clueById = new Map(clues.map((clue) => [clue.id, clue]));
  game.cellMeta = cellMeta;
  game.selected = findFirstEditable() || { row: 0, col: 0 };
  game.direction = 'across';
  game.elapsedMs = 0;
  game.hints = 0;
  game.checks = 0;
  game.lastWinCoins = 0;
  game.history = [];
  game.mode = 'playing';
  game.message = `${puzzle.title}: fill every across and down clue.`;
  game.lastAction = 'start-puzzle';
  if (!keepScore) {
    game.score = 0;
    game.coinsEarned = 0;
  }
  rememberRecent('minicrossword');
  updateHud();
  render();
}

function startRun() {
  game.score = 0;
  game.coinsEarned = 0;
  loadPuzzle(0, true);
}

function pushHistory() {
  game.history.push({
    grid: cloneGrid(game.grid),
    selected: { ...game.selected },
    direction: game.direction,
    hints: game.hints,
    checks: game.checks,
  });
  if (game.history.length > 80) game.history.shift();
}

function undo() {
  if (game.mode !== 'playing' || !game.history.length) return;
  const snap = game.history.pop();
  game.grid = cloneGrid(snap.grid);
  game.selected = { ...snap.selected };
  game.direction = snap.direction;
  game.hints = snap.hints;
  game.checks = snap.checks;
  game.lastAction = 'undo';
  game.message = 'Last letter change undone.';
  updateHud();
  render();
}

function findFirstEditable() {
  for (let row = 0; row < game.solution.length; row += 1) {
    for (let col = 0; col < game.solution[row].length; col += 1) {
      if (game.solution[row][col] !== '#' && !game.locked[row][col]) return { row, col };
    }
  }
  return null;
}

function currentMeta() {
  return game.cellMeta[game.selected.row]?.[game.selected.col] || {};
}

function currentClue() {
  const meta = currentMeta();
  const preferred = meta[game.direction];
  const fallback = meta.across || meta.down || '';
  if (!preferred && fallback) {
    game.direction = meta.across ? 'across' : 'down';
  }
  return game.clueById.get(preferred || fallback) || game.clues[0] || null;
}

function selectCell(row, col, toggle = false) {
  if (game.mode !== 'playing' && game.mode !== 'won') return;
  if (!game.solution[row] || game.solution[row][col] === '#') return;
  const same = game.selected.row === row && game.selected.col === col;
  game.selected = { row, col };
  const meta = currentMeta();
  if (toggle && same && meta.across && meta.down) {
    game.direction = game.direction === 'across' ? 'down' : 'across';
  } else if (!meta[game.direction]) {
    game.direction = meta.across ? 'across' : 'down';
  }
  game.lastAction = `select-${row}-${col}`;
  updateHud();
  render();
}

function selectClue(clue) {
  if (!clue) return;
  game.direction = clue.dir;
  const preferred = clue.cells.find(({ row, col }) => !game.locked[row][col] && !isCellCorrect(row, col))
    || clue.cells.find(({ row, col }) => !game.locked[row][col])
    || clue.cells[0];
  selectCell(preferred.row, preferred.col, false);
}

function stepClue(delta) {
  if (!game.clues.length) return;
  const clue = currentClue();
  const sameDirection = game.clues.filter((item) => item.dir === game.direction);
  const list = sameDirection.length ? sameDirection : game.clues;
  const index = Math.max(0, list.findIndex((item) => item.id === clue?.id));
  const next = list[(index + delta + list.length) % list.length];
  selectClue(next);
}

function toggleDirection() {
  const meta = currentMeta();
  if (meta.across && meta.down) {
    game.direction = game.direction === 'across' ? 'down' : 'across';
  } else if (meta.across) {
    game.direction = 'across';
  } else if (meta.down) {
    game.direction = 'down';
  }
  game.lastAction = 'toggle-direction';
  updateHud();
  render();
}

function isCellCorrect(row, col) {
  if (game.solution[row][col] === '#') return true;
  return game.grid[row][col] === game.solution[row][col];
}

function inputLetter(letter) {
  if (game.mode !== 'playing') return;
  const normalized = String(letter || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 1);
  if (!normalized) return;
  const { row, col } = game.selected;
  if (game.locked[row][col]) {
    advanceInClue(1);
    return;
  }
  pushHistory();
  game.grid[row][col] = normalized;
  game.lastAction = `type-${normalized}`;
  if (isSolved()) {
    completePuzzle();
  } else {
    advanceInClue(1);
  }
  updateHud();
  render();
}

function deleteLetter() {
  if (game.mode !== 'playing') return;
  const { row, col } = game.selected;
  if (!game.locked[row][col] && game.grid[row][col]) {
    pushHistory();
    game.grid[row][col] = '';
  } else {
    advanceInClue(-1);
    const next = game.selected;
    if (!game.locked[next.row][next.col]) {
      pushHistory();
      game.grid[next.row][next.col] = '';
    }
  }
  game.lastAction = 'delete';
  updateHud();
  render();
}

function advanceInClue(delta) {
  const clue = currentClue();
  if (!clue) return;
  const index = clue.cells.findIndex((cell) => cell.row === game.selected.row && cell.col === game.selected.col);
  for (let offset = 1; offset <= clue.cells.length; offset += 1) {
    const next = clue.cells[index + (delta * offset)];
    if (!next) break;
    if (!game.locked[next.row][next.col]) {
      game.selected = { row: next.row, col: next.col };
      return;
    }
  }
  stepClue(delta > 0 ? 1 : -1);
}

function moveSelection(dr, dc) {
  if (game.mode !== 'playing') return;
  const height = game.solution.length;
  const width = game.solution[0].length;
  let row = game.selected.row;
  let col = game.selected.col;
  for (let i = 0; i < Math.max(height, width); i += 1) {
    row = (row + dr + height) % height;
    col = (col + dc + width) % width;
    if (game.solution[row][col] !== '#') {
      selectCell(row, col, false);
      return;
    }
  }
}

function isSolved() {
  for (let row = 0; row < game.solution.length; row += 1) {
    for (let col = 0; col < game.solution[row].length; col += 1) {
      if (game.solution[row][col] !== '#' && game.grid[row][col] !== game.solution[row][col]) {
        return false;
      }
    }
  }
  return true;
}

function checkPuzzle() {
  if (game.mode !== 'playing') return;
  game.checks += 1;
  let wrong = 0;
  let blanks = 0;
  for (let row = 0; row < game.solution.length; row += 1) {
    for (let col = 0; col < game.solution[row].length; col += 1) {
      if (game.solution[row][col] === '#') continue;
      if (!game.grid[row][col]) blanks += 1;
      else if (!isCellCorrect(row, col)) wrong += 1;
    }
  }
  if (!wrong && !blanks) {
    completePuzzle();
  } else {
    game.message = wrong
      ? `${wrong} letter${wrong === 1 ? '' : 's'} need another look.`
      : `${blanks} blank square${blanks === 1 ? '' : 's'} left.`;
    game.lastAction = 'check';
  }
  updateHud();
  render();
}

function hint() {
  if (game.mode !== 'playing') return;
  const clue = currentClue();
  const target = clue?.cells.find(({ row, col }) => !game.locked[row][col] && !isCellCorrect(row, col))
    || game.solution.flatMap((row, r) => row.map((_, c) => ({ row: r, col: c })))
      .find(({ row, col }) => game.solution[row][col] !== '#' && !game.locked[row][col] && !isCellCorrect(row, col));
  if (!target) return;
  pushHistory();
  game.grid[target.row][target.col] = game.solution[target.row][target.col];
  game.selected = { row: target.row, col: target.col };
  game.hints += 1;
  game.lastAction = 'hint';
  game.message = `Hint revealed row ${target.row + 1}, column ${target.col + 1}.`;
  if (isSolved()) completePuzzle();
  updateHud();
  render();
}

function completePuzzle() {
  if (game.mode !== 'playing') return;
  const seconds = Math.floor(game.elapsedMs / 1000);
  const cleanBonus = game.hints === 0 && game.checks <= 1 ? 60 : 0;
  const puzzleScore = Math.max(120, 330 - (seconds * 2) - (game.hints * 25) - (game.checks * 10) + cleanBonus);
  const coins = Math.max(6, Math.min(18, Math.floor(puzzleScore / 34)));
  game.score += puzzleScore;
  game.lastWinCoins = coins;
  game.coinsEarned += coins;
  addCoins(coins);
  if (game.puzzleIndex >= PUZZLES.length - 1) {
    game.mode = 'complete';
    game.message = `All five minis solved. Final score ${game.score}, coins earned ${game.coinsEarned}.`;
    game.lastAction = 'campaign-complete';
  } else {
    game.mode = 'won';
    game.message = `${game.puzzle.title} solved for ${puzzleScore} points and ${coins} coins.`;
    game.lastAction = 'puzzle-complete';
  }
}

function nextPuzzle() {
  if (game.mode === 'won') {
    loadPuzzle(game.puzzleIndex + 1, true);
  } else if (game.mode === 'complete' || game.mode === 'menu') {
    startRun();
  }
}

function restartPuzzle() {
  if (!game.puzzle) {
    startRun();
    return;
  }
  loadPuzzle(game.puzzleIndex, true);
  game.lastAction = 'restart';
}

function pauseToggle() {
  if (game.mode === 'playing') {
    game.mode = 'paused';
    game.message = 'Paused. Press resume to keep solving.';
  } else if (game.mode === 'paused') {
    game.mode = 'playing';
    game.message = `${game.puzzle.title}: back to the grid.`;
  }
  game.lastAction = 'pause-toggle';
  updateHud();
  render();
}

function formatTime(ms) {
  const total = Math.floor(ms / 1000);
  const min = Math.floor(total / 60);
  const sec = String(total % 60).padStart(2, '0');
  return `${min}:${sec}`;
}

function activeClueLabel(clue = currentClue()) {
  if (!clue) return 'Current clue';
  return `${clue.number} ${clue.dir.toUpperCase()}`;
}

function activeClueText(clue = currentClue()) {
  if (!clue) return game.message;
  return `${clue.text} (${clue.word.length})`;
}

function updateHud() {
  const clue = currentClue();
  hud.mode.textContent = game.mode.toUpperCase();
  hud.puzzle.textContent = `${game.puzzleIndex + 1} / ${PUZZLES.length}`;
  hud.time.textContent = formatTime(game.elapsedMs);
  hud.hints.textContent = String(game.hints);
  hud.score.textContent = String(game.score);
  hud.coins.textContent = String(profileState.coins);
  hud.clueLabel.textContent = activeClueLabel(clue);
  hud.clueText.textContent = game.mode === 'menu' ? game.message : activeClueText(clue);
  buttons.start.textContent = game.mode === 'won' ? 'Next' : (game.mode === 'complete' ? 'Play Again' : (game.mode === 'menu' ? 'Start' : 'New Run'));
  buttons.pause.textContent = game.mode === 'paused' ? 'Resume' : 'Pause';
  buttons.dir.textContent = game.direction === 'across' ? 'Across' : 'Down';
  const playable = game.mode === 'playing';
  buttons.prev.disabled = !playable;
  buttons.next.disabled = !playable;
  buttons.dir.disabled = !playable;
  buttons.check.disabled = !playable;
  buttons.hint.disabled = !playable;
  buttons.undo.disabled = !playable || !game.history.length;
  buttons.pause.disabled = !game.puzzle || game.mode === 'won' || game.mode === 'complete' || game.mode === 'menu';
  buttons.restart.disabled = !game.puzzle || game.mode === 'menu';
  keyboard.querySelectorAll('button').forEach((button) => {
    button.disabled = !playable;
  });
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  view.w = Math.max(320, rect.width);
  view.h = Math.max(240, rect.height);
  view.dpr = dpr;
  canvas.width = Math.round(view.w * dpr);
  canvas.height = Math.round(view.h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

function computeLayout() {
  const wide = view.w >= 760;
  const margin = wide ? 28 : 16;
  const top = wide ? 94 : 72;
  const boardSize = wide
    ? Math.min(view.h - 132, view.w * 0.45, 470)
    : Math.min(view.w - (margin * 2), view.h * 0.58, 330);
  const boardX = wide ? margin : (view.w - boardSize) / 2;
  const boardY = top;
  const clueX = wide ? boardX + boardSize + 26 : margin;
  const clueY = wide ? boardY : boardY + boardSize + 14;
  const clueW = wide ? view.w - clueX - margin : view.w - (margin * 2);
  const clueH = wide ? boardSize : Math.max(0, view.h - clueY - 16);
  return {
    wide,
    margin,
    boardX,
    boardY,
    boardSize,
    cell: boardSize / 4,
    clueX,
    clueY,
    clueW,
    clueH,
  };
}

function roundRect(x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function fillRoundRect(x, y, w, h, r, color) {
  roundRect(x, y, w, h, r);
  ctx.fillStyle = color;
  ctx.fill();
}

function strokeRoundRect(x, y, w, h, r, color, width = 1) {
  roundRect(x, y, w, h, r);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.stroke();
}

function wrapText(text, x, y, maxWidth, lineHeight, maxLines = 4) {
  const words = String(text).split(/\s+/);
  let line = '';
  let lines = 0;
  for (const word of words) {
    const trial = line ? `${line} ${word}` : word;
    if (ctx.measureText(trial).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      y += lineHeight;
      lines += 1;
      line = word;
      if (lines >= maxLines - 1) break;
    } else {
      line = trial;
    }
  }
  if (line && lines < maxLines) ctx.fillText(line, x, y);
  return y + lineHeight;
}

function drawBoard(l) {
  const n = game.solution.length || 4;
  const cell = l.boardSize / n;
  const clue = currentClue();
  const activeCells = new Set((clue?.cells || []).map((item) => `${item.row},${item.col}`));

  fillRoundRect(l.boardX - 10, l.boardY - 10, l.boardSize + 20, l.boardSize + 20, 8, '#ffffffde');
  strokeRoundRect(l.boardX - 10, l.boardY - 10, l.boardSize + 20, l.boardSize + 20, 8, '#9bd7c0', 2);

  for (let row = 0; row < n; row += 1) {
    for (let col = 0; col < n; col += 1) {
      const x = l.boardX + (col * cell);
      const y = l.boardY + (row * cell);
      const isSelected = game.selected.row === row && game.selected.col === col;
      const inClue = activeCells.has(`${row},${col}`);
      const locked = game.locked[row]?.[col];
      const letter = game.grid[row]?.[col] || '';
      const correct = letter && isCellCorrect(row, col);
      const wrong = letter && !correct && game.checks > 0;

      ctx.fillStyle = locked ? '#d8f0e5' : '#fbfffd';
      if (inClue) ctx.fillStyle = '#dff7ee';
      if (isSelected) ctx.fillStyle = '#f9d96d';
      if (wrong) ctx.fillStyle = '#ffd1c7';
      ctx.fillRect(x, y, cell, cell);
      ctx.strokeStyle = '#286550';
      ctx.lineWidth = Math.max(1, cell * 0.018);
      ctx.strokeRect(x, y, cell, cell);

      const meta = game.cellMeta[row]?.[col];
      if (meta?.number) {
        ctx.fillStyle = '#28705b';
        ctx.font = `800 ${Math.max(10, cell * 0.18)}px Inter, sans-serif`;
        ctx.fillText(String(meta.number), x + cell * 0.09, y + cell * 0.2);
      }

      if (letter) {
        ctx.fillStyle = locked ? '#28705b' : '#12261d';
        ctx.font = `900 ${Math.max(28, cell * 0.48)}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(letter, x + cell / 2, y + cell * 0.58);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }
    }
  }
}

function drawClueList(l) {
  const clue = currentClue();
  fillRoundRect(l.clueX, l.clueY, l.clueW, Math.max(90, l.clueH), 8, '#173f35');
  ctx.fillStyle = '#f8fffb';
  ctx.font = `900 ${l.wide ? 22 : 17}px Inter, sans-serif`;
  ctx.fillText(game.mode === 'menu' ? 'Mini Crossword' : game.puzzle.title, l.clueX + 16, l.clueY + 32);
  ctx.font = `700 ${l.wide ? 14 : 12}px Inter, sans-serif`;
  ctx.fillStyle = '#c3eadb';
  wrapText(game.message, l.clueX + 16, l.clueY + (l.wide ? 58 : 54), l.clueW - 32, l.wide ? 20 : 16, l.wide ? 3 : 2);

  if (game.mode === 'menu') {
    ctx.fillStyle = '#f3cf54';
    ctx.font = `900 ${l.wide ? 20 : 16}px Inter, sans-serif`;
    wrapText('Word-square mini puzzles: every row and column is a clue. Tap Start, type letters, and use hints when stuck.', l.clueX + 16, l.clueY + (l.wide ? 142 : 112), l.clueW - 32, l.wide ? 28 : 20, 5);
    return;
  }

  const yStart = l.clueY + (l.wide ? 126 : 94);
  const activeText = `${activeClueLabel(clue)}: ${activeClueText(clue)}`;
  fillRoundRect(l.clueX + 12, yStart - 24, l.clueW - 24, l.wide ? 54 : 44, 8, '#f9d96d');
  ctx.fillStyle = '#143126';
  ctx.font = `850 ${l.wide ? 16 : 13}px Inter, sans-serif`;
  wrapText(activeText, l.clueX + 24, yStart, l.clueW - 48, l.wide ? 20 : 16, 2);

  if (!l.wide) return;
  const across = game.clues.filter((item) => item.dir === 'across');
  const down = game.clues.filter((item) => item.dir === 'down');
  const colW = (l.clueW - 42) / 2;
  const lists = [
    { title: 'Across', items: across, x: l.clueX + 16 },
    { title: 'Down', items: down, x: l.clueX + 26 + colW },
  ];
  for (const list of lists) {
    let y = yStart + 78;
    ctx.fillStyle = '#c3eadb';
    ctx.font = '900 13px Inter, sans-serif';
    ctx.fillText(list.title, list.x, y);
    y += 21;
    for (const item of list.items) {
      const active = item.id === clue?.id;
      if (active) fillRoundRect(list.x - 6, y - 15, colW - 4, 24, 6, '#286550');
      ctx.fillStyle = active ? '#ffffff' : '#eafbf4';
      ctx.font = '750 12px Inter, sans-serif';
      const label = `${item.number}. ${item.text}`;
      ctx.fillText(label.length > 28 ? `${label.slice(0, 27)}...` : label, list.x, y);
      y += 25;
    }
  }
}

function render() {
  if (!ctx) return;
  layout = computeLayout();
  ctx.clearRect(0, 0, view.w, view.h);
  const bg = ctx.createLinearGradient(0, 0, view.w, view.h);
  bg.addColorStop(0, '#f8fffb');
  bg.addColorStop(1, '#cdebe2');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, view.w, view.h);

  ctx.fillStyle = '#143126';
  ctx.font = `950 ${layout.wide ? 34 : 24}px Inter, sans-serif`;
  ctx.fillText('Mini Crossword', layout.margin, layout.wide ? 46 : 34);
  ctx.fillStyle = '#28705b';
  ctx.font = `800 ${layout.wide ? 15 : 12}px Inter, sans-serif`;
  ctx.fillText(layout.wide ? 'Fill compact word-square crosswords. Rows and columns both count.' : 'Rows and columns both count.', layout.margin, layout.wide ? 72 : 55);

  drawBoard(layout);
  if (layout.wide || layout.clueH >= 90) {
    drawClueList(layout);
  }

  if (game.mode === 'paused' || game.mode === 'won' || game.mode === 'complete') {
    const w = Math.min(view.w - 36, layout.wide ? 470 : 330);
    const h = game.mode === 'complete' ? 156 : 132;
    const x = (view.w - w) / 2;
    const y = (view.h - h) / 2;
    fillRoundRect(x, y, w, h, 8, '#143126ed');
    strokeRoundRect(x, y, w, h, 8, '#f3cf54', 2);
    ctx.fillStyle = '#f8fffb';
    ctx.font = `950 ${layout.wide ? 26 : 20}px Inter, sans-serif`;
    ctx.fillText(game.mode === 'paused' ? 'Paused' : (game.mode === 'complete' ? 'Run Complete' : 'Solved'), x + 22, y + 38);
    ctx.font = `750 ${layout.wide ? 15 : 13}px Inter, sans-serif`;
    ctx.fillStyle = '#d9f7eb';
    wrapText(game.message, x + 22, y + 68, w - 44, layout.wide ? 22 : 18, 4);
  }
}

function canvasPoint(event) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: event.clientX - rect.left,
    y: event.clientY - rect.top,
  };
}

function handleCanvasPointer(event) {
  if (!layout) return;
  event.preventDefault();
  if (game.mode === 'menu') {
    startRun();
    return;
  }
  if (game.mode === 'won' || game.mode === 'complete') {
    nextPuzzle();
    return;
  }
  if (game.mode !== 'playing') return;
  const point = canvasPoint(event);
  const n = game.solution.length || 4;
  const cell = layout.boardSize / n;
  if (
    point.x >= layout.boardX
    && point.x <= layout.boardX + layout.boardSize
    && point.y >= layout.boardY
    && point.y <= layout.boardY + layout.boardSize
  ) {
    const col = Math.floor((point.x - layout.boardX) / cell);
    const row = Math.floor((point.y - layout.boardY) / cell);
    const same = game.selected.row === row && game.selected.col === col;
    selectCell(row, col, same);
  }
}

function step(ms) {
  if (game.mode === 'playing') {
    game.elapsedMs += Math.max(0, Math.min(500, Number(ms) || 0));
    updateHud();
  }
}

function frame(now) {
  step(now - lastFrame);
  lastFrame = now;
  render();
  requestAnimationFrame(frame);
}

function renderGameToText() {
  const clue = currentClue();
  const payload = {
    game: 'minicrossword',
    coordinate_system: 'grid origin top-left; row and col are zero-based; canvas origin top-left with x right and y down',
    mode: game.mode,
    puzzle: {
      index: game.puzzleIndex,
      total: PUZZLES.length,
      id: game.puzzle?.id || '',
      title: game.puzzle?.title || '',
    },
    selected: { ...game.selected, direction: game.direction },
    current_clue: clue ? {
      id: clue.id,
      number: clue.number,
      direction: clue.dir,
      text: clue.text,
      length: clue.word.length,
      cells: clue.cells,
    } : null,
    grid: game.grid.map((row) => row.map((ch) => ch || '.').join('')),
    locked: game.locked.map((row) => row.map((value) => (value ? '1' : '0')).join('')),
    clue_status: game.clues.map((item) => ({
      id: item.id,
      number: item.number,
      direction: item.dir,
      filled: item.cells.filter(({ row, col }) => Boolean(game.grid[row][col])).length,
      length: item.word.length,
      solved: item.cells.every(({ row, col }) => game.grid[row][col] === game.solution[row][col]),
    })),
    elapsed_seconds: Math.floor(game.elapsedMs / 1000),
    hints: game.hints,
    checks: game.checks,
    score: game.score,
    coins: profileState.coins,
    coins_earned_this_session: game.coinsEarned,
    last_win_coins: game.lastWinCoins,
    message: game.message,
    last_action: game.lastAction,
  };
  return JSON.stringify(payload);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

function buildKeyboard() {
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  for (const row of rows) {
    for (const letter of row) {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = letter;
      button.setAttribute('aria-label', `Type ${letter}`);
      button.addEventListener('click', () => inputLetter(letter));
      keyboard.append(button);
    }
  }
  const del = document.createElement('button');
  del.type = 'button';
  del.textContent = 'Del';
  del.className = 'wide';
  del.addEventListener('click', deleteLetter);
  keyboard.append(del);
}

buttons.start.addEventListener('click', () => {
  if (game.mode === 'won' || game.mode === 'complete') nextPuzzle();
  else startRun();
});
buttons.prev.addEventListener('click', () => stepClue(-1));
buttons.next.addEventListener('click', () => stepClue(1));
buttons.dir.addEventListener('click', toggleDirection);
buttons.check.addEventListener('click', checkPuzzle);
buttons.hint.addEventListener('click', hint);
buttons.undo.addEventListener('click', undo);
buttons.pause.addEventListener('click', pauseToggle);
buttons.restart.addEventListener('click', restartPuzzle);
buttons.full.addEventListener('click', toggleFullscreen);
canvas.addEventListener('pointerdown', handleCanvasPointer);
window.addEventListener('resize', resizeCanvas);
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('keydown', (event) => {
  if (event.altKey || event.ctrlKey || event.metaKey) return;
  const key = event.key;
  if (key.toLowerCase() === 'f' && game.mode !== 'playing') {
    event.preventDefault();
    toggleFullscreen();
  } else if (/^[a-z]$/i.test(key)) {
    event.preventDefault();
    inputLetter(key);
  } else if (key === 'Backspace' || key === 'Delete') {
    event.preventDefault();
    deleteLetter();
  } else if (key === 'ArrowLeft') {
    event.preventDefault();
    moveSelection(0, -1);
  } else if (key === 'ArrowRight') {
    event.preventDefault();
    moveSelection(0, 1);
  } else if (key === 'ArrowUp') {
    event.preventDefault();
    moveSelection(-1, 0);
  } else if (key === 'ArrowDown') {
    event.preventDefault();
    moveSelection(1, 0);
  } else if (key === 'Tab') {
    event.preventDefault();
    stepClue(event.shiftKey ? -1 : 1);
  } else if (key === ' ' || key === '/') {
    event.preventDefault();
    toggleDirection();
  } else if (key === 'Enter') {
    event.preventDefault();
    checkPuzzle();
  } else if (key === 'Escape') {
    event.preventDefault();
    pauseToggle();
  }
});

window.render_game_to_text = renderGameToText;
window.advanceTime = (ms = 16) => {
  step(ms);
  render();
  return renderGameToText();
};
window.__MINI_CROSSWORD_GAME__ = {
  getState: () => JSON.parse(renderGameToText()),
  start: startRun,
  solveCurrent: () => {
    if (game.mode === 'menu') startRun();
    for (let row = 0; row < game.solution.length; row += 1) {
      for (let col = 0; col < game.solution[row].length; col += 1) {
        if (game.solution[row][col] !== '#') game.grid[row][col] = game.solution[row][col];
      }
    }
    completePuzzle();
    updateHud();
    render();
  },
  fillCell: (row, col, letter) => {
    selectCell(row, col, false);
    inputLetter(letter);
  },
  nextPuzzle,
  selectCell,
  hint,
  check: checkPuzzle,
};

buildKeyboard();
updateHud();
resizeCanvas();
requestAnimationFrame(frame);
mountGameFeedback({ gameSlug: 'minicrossword', gameName: 'Mini Crossword' });
</script>
</body>
</html>
