<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
  color: #ecf8ff;
  background:
    radial-gradient(62% 46% at 24% 12%, #1f4e86 0%, transparent 64%),
    radial-gradient(50% 44% at 80% 84%, #7f2f8d 0%, transparent 64%),
    linear-gradient(180deg, #0a0f2f 0%, #1b1454 100%);
}
.back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 20;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  border-radius: 10px;
  border: 1px solid #ffffff45;
  padding: 8px 12px;
  background: #00000066;
}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 62px 10px 10px;
}
.wrap {
  width: min(96vw, 980px);
  aspect-ratio: 16 / 10;
  max-height: min(66dvh, 740px);
  position: relative;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 14px;
  border: 2px solid #a7fff38c;
  box-shadow: 0 18px 50px #000000af;
  background: linear-gradient(180deg, #192f64 0%, #241448 100%);
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.16s;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.panel {
  max-width: 700px;
  border-radius: 14px;
  border: 1px solid #abf9ff5e;
  background: #142b52ef;
  box-shadow: 0 14px 32px #00000080;
  padding: 16px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 4.2vw, 40px);
}
p {
  margin: 0 0 10px;
  color: #c8d8ff;
  font-size: clamp(13px, 2vw, 15px);
  line-height: 1.45;
}
.row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
button {
  border: 1px solid #a6fff36a;
  background: #1d8da5f5;
  color: #f0ffff;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 42px;
}
.hud {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #9cf7ff59;
  background: #10315ce8;
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  border-radius: 9px;
  border: 1px solid #a9faff44;
  background: #c5fbff12;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #bbc6ef;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b {
  font-size: clamp(14px, 2.1vw, 18px);
  line-height: 1.1;
}
.controls {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #9cf7ff59;
  background: #10315ce8;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
}
.ctrl-btn { background: #5a3da0; border-color: #95f8ff63; }
@media (max-width: 900px) {
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const modeEl = document.getElementById('mode');
const scoreEl = document.getElementById('score');
const matchedEl = document.getElementById('matched');
const integrityEl = document.getElementById('integrity');
const timeEl = document.getElementById('time');
const leaksEl = document.getElementById('leaks');
const coinsEl = document.getElementById('coins');

const GRID_COLS = 9;
const GRID_ROWS = 9;
const CELL = 60;
const GRID_LEFT = 320;
const GRID_TOP = 100;
const TOTAL_SECONDS = 95;
const TARGET_MATCHES = 28;
const START_INTEGRITY = 6;
const SPAWN_INTERVAL = 0.82;
const STEP_INTERVAL = 0.09;

const COLORS = [
  { key: 'cyan', color: '#74f4ff', glow: '#43d8ff' },
  { key: 'gold', color: '#ffd680', glow: '#f2b64e' },
  { key: 'magenta', color: '#ff95ee', glow: '#ff5fd6' },
  { key: 'lime', color: '#bffb8c', glow: '#8adf57' },
];

const ORIENTATIONS = ['/', '\\', '|', '-'];
const PRISM_COLS = [2, 4, 6];
const PRISM_ROWS = [2, 4, 6];

const state = {
  mode: 'menu',
  result: null,
  elapsed: 0,
  timeLeft: TOTAL_SECONDS,
  score: 0,
  matched: 0,
  integrity: START_INTEGRITY,
  leaks: 0,
  spawnTimer: 0,
  photons: [],
  prisms: [],
  cursorPX: 1,
  cursorPY: 1,
  logs: [],
};

let raf = 0;
let prev = performance.now();
let controlled = false;

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function showOverlay(title, body, buttonLabel, buttonAction) {
  overlay.classList.add('show');
  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <div class="row">
        <button id="overlayAction" type="button">${buttonLabel}</button>
      </div>
    </div>
  `;
  overlay.querySelector('#overlayAction')?.addEventListener('click', () => {
    overlay.classList.remove('show');
    buttonAction();
  }, { once: true });
}

function prismAt(col, row) {
  for (let i = 0; i < state.prisms.length; i += 1) {
    const p = state.prisms[i];
    if (p.col === col && p.row === row) return p;
  }
  return null;
}

function initPrisms() {
  state.prisms = [];
  for (let py = 0; py < PRISM_ROWS.length; py += 1) {
    for (let px = 0; px < PRISM_COLS.length; px += 1) {
      state.prisms.push({
        col: PRISM_COLS[px],
        row: PRISM_ROWS[py],
        o: Math.floor(Math.random() * ORIENTATIONS.length),
      });
    }
  }
}

function resetState() {
  state.mode = 'menu';
  state.result = null;
  state.elapsed = 0;
  state.timeLeft = TOTAL_SECONDS;
  state.score = 0;
  state.matched = 0;
  state.integrity = START_INTEGRITY;
  state.leaks = 0;
  state.spawnTimer = 0;
  state.photons = [];
  state.cursorPX = 1;
  state.cursorPY = 1;
  state.logs = ['Rotate prisms to route photons into matching bins.'];
  initPrisms();
}

function pushLog(line) {
  state.logs.unshift(line);
  if (state.logs.length > 4) state.logs.length = 4;
}

function spawnPhoton() {
  const colorIdx = Math.floor(Math.random() * COLORS.length);
  const spawnCol = Math.floor(Math.random() * GRID_COLS);
  state.photons.push({
    x: spawnCol,
    y: -0.5,
    dx: 0,
    dy: 1,
    colorIdx,
    progress: 0,
    ttl: 180,
  });
}

function startGame() {
  resetState();
  state.mode = 'running';
  try { rememberRecent('prismpipeline'); } catch {}
  try { maybeUnlock({ anyPlay: true, prismpipeline: { result: 'started', score: 0, matched: 0 } }); } catch {}
}

function finishGame(result) {
  if (state.mode === 'ended') return;
  state.mode = 'ended';
  state.result = result;
  const reward = Math.max(4, Math.floor(state.score / 260) + (result === 'won' ? 14 : 6));
  try {
    addCoins(reward);
    maybeUnlock({
      anyPlay: true,
      prismpipeline: {
        result,
        score: Math.round(state.score),
        matched: state.matched,
        leaks: state.leaks,
      },
    });
  } catch {}

  const message = result === 'won'
    ? `Pipeline stabilized with ${state.matched} matches. You earned ${reward} coins.`
    : `Containment failed after ${state.matched} matches. You still earned ${reward} coins.`;
  showOverlay('Run Complete', message, 'Play Again', startGame);
}

function bottomBinForX(x) {
  if (x <= 1) return 0;
  if (x <= 4) return 1;
  if (x <= 6) return 2;
  return 3;
}

function reflectPhoton(photon, prism) {
  const orientation = ORIENTATIONS[prism.o];
  const dx = photon.dx;
  const dy = photon.dy;

  if (orientation === '/') {
    photon.dx = -dy;
    photon.dy = -dx;
  } else if (orientation === '\\') {
    photon.dx = dy;
    photon.dy = dx;
  } else if (orientation === '|') {
    photon.dx = 0;
    photon.dy = dy === 0 ? 1 : Math.sign(dy);
  } else {
    photon.dy = 0;
    if (dx === 0) photon.dx = Math.random() < 0.5 ? -1 : 1;
    else photon.dx = Math.sign(dx);
  }

  if (photon.dx === 0 && photon.dy === 0) photon.dy = 1;
}

function rotateSelectedPrism() {
  if (state.mode !== 'running') return;
  const col = PRISM_COLS[state.cursorPX];
  const row = PRISM_ROWS[state.cursorPY];
  const prism = prismAt(col, row);
  if (!prism) return;
  prism.o = (prism.o + 1) % ORIENTATIONS.length;
}

function moveCursor(dx, dy) {
  state.cursorPX = clamp(state.cursorPX + dx, 0, PRISM_COLS.length - 1);
  state.cursorPY = clamp(state.cursorPY + dy, 0, PRISM_ROWS.length - 1);
}

function togglePause() {
  if (state.mode === 'running') state.mode = 'paused';
  else if (state.mode === 'paused') state.mode = 'running';
}

function update(dt) {
  if (state.mode !== 'running') return;

  state.elapsed += dt;
  state.timeLeft = Math.max(0, TOTAL_SECONDS - state.elapsed);

  state.spawnTimer += dt;
  while (state.spawnTimer >= SPAWN_INTERVAL) {
    state.spawnTimer -= SPAWN_INTERVAL;
    spawnPhoton();
  }

  for (let i = state.photons.length - 1; i >= 0; i -= 1) {
    const p = state.photons[i];
    p.progress += dt;
    let alive = true;

    while (alive && p.progress >= STEP_INTERVAL) {
      p.progress -= STEP_INTERVAL;
      p.ttl -= 1;

      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0) { p.x = 0; p.dx = 1; }
      if (p.x > GRID_COLS - 1) { p.x = GRID_COLS - 1; p.dx = -1; }

      const cellX = Math.round(p.x);
      const cellY = Math.round(p.y);
      if (cellY >= 0 && cellY < GRID_ROWS) {
        const prism = prismAt(cellX, cellY);
        if (prism) reflectPhoton(p, prism);
      }

      if (p.y >= GRID_ROWS - 0.2) {
        const bin = bottomBinForX(p.x);
        if (bin === p.colorIdx) {
          state.matched += 1;
          state.score += 52 + (state.matched % 5) * 8;
          pushLog(`Matched ${COLORS[p.colorIdx].key} photon.`);
        } else {
          state.integrity -= 1;
          state.leaks += 1;
          pushLog(`Leak: ${COLORS[p.colorIdx].key} photon to wrong bin.`);
        }
        alive = false;
      }

      if (p.ttl <= 0) {
        state.integrity -= 1;
        state.leaks += 1;
        pushLog('Leak: photon dissipated in pipeline.');
        alive = false;
      }
    }

    if (!alive) state.photons.splice(i, 1);
  }

  if (state.matched >= TARGET_MATCHES) {
    finishGame('won');
    return;
  }
  if (state.integrity <= 0) {
    finishGame('lost');
    return;
  }
  if (state.timeLeft <= 0) {
    finishGame(state.matched >= TARGET_MATCHES ? 'won' : 'lost');
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#214f86');
  grad.addColorStop(1, '#2b1558');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 80; i += 1) {
    const x = (i * 151) % canvas.width;
    const y = (i * 83) % canvas.height;
    const r = 1 + (i % 3) * 0.8;
    ctx.fillStyle = `rgba(170, 255, 247, ${0.08 + (i % 4) * 0.02})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGrid() {
  for (let y = 0; y < GRID_ROWS; y += 1) {
    for (let x = 0; x < GRID_COLS; x += 1) {
      const px = GRID_LEFT + x * CELL;
      const py = GRID_TOP + y * CELL;
      ctx.fillStyle = '#d0fff80d';
      ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
      ctx.strokeStyle = '#a9fff240';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
    }
  }
}

function drawPrisms() {
  for (let i = 0; i < state.prisms.length; i += 1) {
    const prism = state.prisms[i];
    const px = GRID_LEFT + prism.col * CELL;
    const py = GRID_TOP + prism.row * CELL;
    const selected = prism.col === PRISM_COLS[state.cursorPX] && prism.row === PRISM_ROWS[state.cursorPY];

    ctx.fillStyle = selected ? '#d0fff944' : '#e0cdff20';
    ctx.fillRect(px + 4, py + 4, CELL - 8, CELL - 8);
    ctx.strokeStyle = selected ? '#f3fff9' : '#98fff3b0';
    ctx.lineWidth = selected ? 3 : 2;
    ctx.strokeRect(px + 4, py + 4, CELL - 8, CELL - 8);

    ctx.strokeStyle = '#ffefff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    if (ORIENTATIONS[prism.o] === '/') {
      ctx.moveTo(px + 12, py + CELL - 12);
      ctx.lineTo(px + CELL - 12, py + 12);
    } else if (ORIENTATIONS[prism.o] === '\\') {
      ctx.moveTo(px + 12, py + 12);
      ctx.lineTo(px + CELL - 12, py + CELL - 12);
    } else if (ORIENTATIONS[prism.o] === '|') {
      ctx.moveTo(px + CELL / 2, py + 12);
      ctx.lineTo(px + CELL / 2, py + CELL - 12);
    } else {
      ctx.moveTo(px + 12, py + CELL / 2);
      ctx.lineTo(px + CELL - 12, py + CELL / 2);
    }
    ctx.stroke();
  }
}

function drawBins() {
  const y = GRID_TOP + GRID_ROWS * CELL + 8;
  const bins = [
    { x0: 0, x1: 1, colorIdx: 0 },
    { x0: 2, x1: 4, colorIdx: 1 },
    { x0: 5, x1: 6, colorIdx: 2 },
    { x0: 7, x1: 8, colorIdx: 3 },
  ];

  for (let i = 0; i < bins.length; i += 1) {
    const b = bins[i];
    const x = GRID_LEFT + b.x0 * CELL;
    const w = (b.x1 - b.x0 + 1) * CELL;
    const c = COLORS[b.colorIdx];
    ctx.fillStyle = `${c.color}33`;
    ctx.fillRect(x + 2, y, w - 4, 54);
    ctx.strokeStyle = `${c.color}cc`;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 2, y, w - 4, 54);
    ctx.fillStyle = '#eff5ff';
    ctx.font = '700 12px Trebuchet MS';
    ctx.textAlign = 'center';
    ctx.fillText(c.key.toUpperCase(), x + w / 2, y + 33);
  }
}

function drawPhotons() {
  for (let i = 0; i < state.photons.length; i += 1) {
    const photon = state.photons[i];
    const c = COLORS[photon.colorIdx];
    const x = GRID_LEFT + photon.x * CELL + CELL / 2;
    const y = GRID_TOP + photon.y * CELL + CELL / 2;

    ctx.fillStyle = `${c.glow}d5`;
    ctx.beginPath();
    ctx.arc(x, y, 11, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffffee';
    ctx.beginPath();
    ctx.arc(x - 2.5, y - 2.5, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSidebar() {
  const x = 948;
  const y = 120;
  ctx.fillStyle = 'rgba(16, 45, 83, 0.86)';
  ctx.fillRect(x, y, 292, 500);
  ctx.strokeStyle = 'rgba(156, 252, 255, 0.58)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 292, 500);

  ctx.fillStyle = '#e8ffff';
  ctx.font = '700 30px Trebuchet MS';
  ctx.textAlign = 'left';
  ctx.fillText('Prism Pipeline', x + 16, y + 42);

  ctx.fillStyle = '#caf3ff';
  ctx.font = '600 16px Trebuchet MS';
  ctx.fillText(`Goal: ${TARGET_MATCHES} matched photons`, x + 16, y + 72);
  ctx.fillText('Rotate prism clusters to steer each color.', x + 16, y + 94);

  ctx.fillStyle = '#dcf7ff';
  ctx.font = '700 14px Trebuchet MS';
  for (let i = 0; i < state.logs.length; i += 1) {
    ctx.fillText(`- ${state.logs[i]}`, x + 16, y + 138 + i * 24);
  }

  ctx.fillStyle = '#c4f8ff';
  ctx.font = '600 13px Trebuchet MS';
  ctx.fillText('Rotate: Space/Enter', x + 16, y + 446);
  ctx.fillText('Move prism selector: WASD/Arrows', x + 16, y + 468);
  ctx.fillText('P pause, R restart, F fullscreen', x + 16, y + 490);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawGrid();
  drawBins();
  drawPrisms();
  drawPhotons();
  drawSidebar();
}

function syncHud() {
  modeEl.textContent = state.mode.toUpperCase();
  scoreEl.textContent = String(Math.round(state.score));
  matchedEl.textContent = `${state.matched}/${TARGET_MATCHES}`;
  integrityEl.textContent = String(Math.max(0, state.integrity));
  timeEl.textContent = `${Math.max(0, state.timeLeft).toFixed(1)}s`;
  leaksEl.textContent = String(state.leaks);
  coinsEl.textContent = String(Number(profileState?.coins || 0));
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  else document.exitFullscreen?.().catch(() => {});
}

function keyHandler(event) {
  if (event.code === 'ArrowUp' || event.code === 'KeyW') { event.preventDefault(); moveCursor(0, -1); return; }
  if (event.code === 'ArrowLeft' || event.code === 'KeyA') { event.preventDefault(); moveCursor(-1, 0); return; }
  if (event.code === 'ArrowDown' || event.code === 'KeyS') { event.preventDefault(); moveCursor(0, 1); return; }
  if (event.code === 'ArrowRight' || event.code === 'KeyD') { event.preventDefault(); moveCursor(1, 0); return; }
  if (event.code === 'Space' || event.code === 'Enter') { event.preventDefault(); rotateSelectedPrism(); return; }
  if (event.code === 'KeyP') { event.preventDefault(); togglePause(); return; }
  if (event.code === 'KeyR') { event.preventDefault(); startGame(); return; }
  if (event.code === 'KeyF') { event.preventDefault(); toggleFullscreen(); }
}

function step(ms) {
  const steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  controlled = true;
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  syncHud();
  controlled = false;
}

function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!controlled) {
    update(dt);
    draw();
    syncHud();
  }
  raf = requestAnimationFrame(frame);
}

function wireControls() {
  document.getElementById('upBtn').addEventListener('click', () => moveCursor(0, -1));
  document.getElementById('leftBtn').addEventListener('click', () => moveCursor(-1, 0));
  document.getElementById('downBtn').addEventListener('click', () => moveCursor(0, 1));
  document.getElementById('rightBtn').addEventListener('click', () => moveCursor(1, 0));
  document.getElementById('rotateBtn').addEventListener('click', rotateSelectedPrism);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
}

window.addEventListener('keydown', keyHandler);
wireControls();
window.advanceTime = (ms) => step(ms);
window.render_game_to_text = () => JSON.stringify({
  game: 'prismpipeline',
  mode: state.mode,
  coordinate_system: 'Canvas origin is top-left. Photon grid starts around (320,100). X grows right, Y grows down.',
  objective: {
    matched_target: TARGET_MATCHES,
    survive_seconds: TOTAL_SECONDS,
    integrity_must_stay_above: 0,
  },
  resources: {
    elapsed_seconds: Number(state.elapsed.toFixed(3)),
    time_left_seconds: Number(state.timeLeft.toFixed(3)),
    score: Math.round(state.score),
    matched: state.matched,
    integrity: state.integrity,
    leaks: state.leaks,
    selector: { prism_col: PRISM_COLS[state.cursorPX], prism_row: PRISM_ROWS[state.cursorPY] },
  },
  prisms: state.prisms.map((p) => ({ col: p.col, row: p.row, orientation: ORIENTATIONS[p.o] })),
  photons: state.photons.map((p) => ({ x: Number(p.x.toFixed(2)), y: Number(p.y.toFixed(2)), dx: p.dx, dy: p.dy, color: COLORS[p.colorIdx].key, ttl: p.ttl })),
  bins: [
    { color: 'cyan', columns: [0, 1] },
    { color: 'gold', columns: [2, 4] },
    { color: 'magenta', columns: [5, 6] },
    { color: 'lime', columns: [7, 8] },
  ],
  recent_events: state.logs,
  controls: {
    move_selector: 'WASD or Arrow keys or touch arrows',
    rotate_prism: 'Space or Enter or touch Rotate Prism',
    pause: 'P',
    restart: 'R',
    fullscreen: 'F',
  },
  result: state.result,
  coins: Number(profileState?.coins || 0),
});

resetState();
draw();
syncHud();
showOverlay('Prism Pipeline', 'Rotate a 3x3 prism cluster to bend photons into matching collector bins before integrity collapses.', 'Start Run', startGame);
raf = requestAnimationFrame((now) => { prev = now; frame(now); });
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '../src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'prismpipeline', gameName: 'Prism Pipeline' });
</script>
</body>
</html>
