<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Changelog - Cade's Games</title>
  <meta name="description" content="Track feature updates, game additions, and release notes for Cade's Games.">
  <meta property="og:title" content="Changelog - Cade's Games">
  <meta property="og:description" content="Track feature updates, game additions, and release notes for Cade's Games.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://games.aiandsons.io/changelog">
  <meta property="og:image" content="https://games.aiandsons.io/assets/social-banner.png">
  <meta property="og:site_name" content="Cade's Games">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Changelog - Cade's Games">
  <meta name="twitter:description" content="Track feature updates, game additions, and release notes for Cade's Games.">
  <meta name="twitter:image" content="https://games.aiandsons.io/assets/social-banner.png">
  <link rel="canonical" href="https://games.aiandsons.io/changelog">
  <link rel="stylesheet" href="../src/styles/accessibility.css">
  <style>
    :root {
      --bg: #071223;
      --bg-soft: #0f2343;
      --card: rgba(9, 25, 49, 0.9);
      --text: #ecf5ff;
      --muted: #9bb4d1;
      --line: rgba(143, 196, 255, 0.34);
      --accent: #55c3ff;
      --accent-strong: #8de26f;
      --code-bg: rgba(30, 56, 91, 0.58);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "Avenir Next", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(114, 209, 255, 0.18), transparent 60%),
        radial-gradient(900px 500px at 95% -15%, rgba(140, 233, 130, 0.15), transparent 60%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 65%);
    }

    a {
      color: #9edaff;
    }

    .page {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 26px 18px 56px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px 20px;
      background: linear-gradient(140deg, rgba(22, 54, 97, 0.62), rgba(14, 31, 58, 0.9));
      box-shadow: 0 30px 60px -45px rgba(0, 0, 0, 0.75);
    }

    .eyebrow {
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 11px;
      color: var(--accent-strong);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.1;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 60ch;
    }

    .hero-links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.95rem;
    }

    .hero-links a {
      border: 1px solid rgba(158, 218, 255, 0.42);
      padding: 7px 12px;
      border-radius: 999px;
      text-decoration: none;
      transition: background-color 120ms ease, border-color 120ms ease;
    }

    .hero-links a:hover {
      background: rgba(158, 218, 255, 0.14);
      border-color: rgba(158, 218, 255, 0.85);
    }

    .changelog-feed {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .entry {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 16px 16px 18px;
    }

    .entry h2 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      line-height: 1.2;
    }

    .entry h3 {
      margin: 16px 0 8px;
      color: #cfe8ff;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .entry p {
      margin: 8px 0;
      line-height: 1.65;
      color: #dceafe;
    }

    .entry ul,
    .entry ol {
      margin: 8px 0 8px;
      padding-left: 1.35rem;
    }

    .entry li {
      margin: 0.4rem 0;
      line-height: 1.55;
      color: #dceafe;
    }

    .entry code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.88em;
      border: 1px solid rgba(138, 192, 255, 0.26);
      background: var(--code-bg);
      border-radius: 6px;
      padding: 0.08em 0.4em;
    }

    .entry pre {
      margin: 10px 0;
      overflow-x: auto;
      border: 1px solid rgba(138, 192, 255, 0.3);
      background: var(--code-bg);
      border-radius: 10px;
      padding: 12px;
      line-height: 1.45;
    }

    .entry hr {
      border: 0;
      border-top: 1px solid rgba(138, 192, 255, 0.25);
      margin: 14px 0;
    }

    .note {
      margin: 10px 0;
      border-left: 3px solid rgba(141, 226, 111, 0.72);
      padding: 7px 0 7px 12px;
      color: #d6ecc8;
    }

    .status,
    .loading {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(17, 37, 69, 0.86);
      padding: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px 14px 40px;
      }

      .hero {
        border-radius: 16px;
        padding: 18px 16px;
      }

      .entry {
        border-radius: 14px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Release History</p>
      <h1 id="changelogTitle">Changelog</h1>
      <p id="changelogSubtitle" class="subtitle">Track what changed in Cade's Games over time.</p>
      <div class="hero-links">
        <a href="/">Back to home</a>
        <a href="/CHANGELOG.md">View raw markdown</a>
      </div>
    </header>
    <section id="changelogContent" aria-live="polite">
      <p class="loading">Loading changelog...</p>
    </section>
  </main>
  <script type="module">
    import { loadAndApplyAccessibility } from '../src/core/accessibility.js';
    loadAndApplyAccessibility();
  </script>
  <script>
    (() => {
      const contentEl = document.getElementById('changelogContent');
      const titleEl = document.getElementById('changelogTitle');
      const subtitleEl = document.getElementById('changelogSubtitle');

      const isSafeHref = (href) => /^(https?:\/\/|mailto:|\/)/i.test(href);

      const appendInlineMarkdown = (target, source) => {
        const text = source || '';
        const tokenRegex = /(\[[^\]]+\]\([^)]+\)|`[^`]+`)/g;
        let index = 0;
        let match;
        while ((match = tokenRegex.exec(text)) !== null) {
          if (match.index > index) {
            target.append(document.createTextNode(text.slice(index, match.index)));
          }

          const token = match[0];
          if (token.startsWith('`')) {
            const code = document.createElement('code');
            code.textContent = token.slice(1, -1);
            target.append(code);
          } else {
            const parts = token.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
            if (parts) {
              const link = document.createElement('a');
              const label = parts[1];
              const href = parts[2].trim();
              if (isSafeHref(href)) {
                link.href = href;
                link.textContent = label;
                if (/^https?:\/\//i.test(href)) {
                  link.target = '_blank';
                  link.rel = 'noopener noreferrer';
                }
                target.append(link);
              } else {
                target.append(document.createTextNode(label));
              }
            } else {
              target.append(document.createTextNode(token));
            }
          }
          index = match.index + token.length;
        }

        if (index < text.length) {
          target.append(document.createTextNode(text.slice(index)));
        }
      };

      const renderMarkdown = (markdown) => {
        const lines = markdown.replace(/\r\n/g, '\n').split('\n');
        const feed = document.createElement('div');
        feed.className = 'changelog-feed';
        let currentSection = null;
        let paragraphBuffer = [];
        let listEl = null;
        let listType = '';
        let inCodeBlock = false;
        let codeBlockLines = [];
        let codeFenceLang = '';

        const sectionTarget = () => currentSection || feed;

        const flushParagraph = () => {
          if (!paragraphBuffer.length) return;
          const paragraph = document.createElement('p');
          appendInlineMarkdown(paragraph, paragraphBuffer.join(' '));
          sectionTarget().append(paragraph);
          paragraphBuffer = [];
        };

        const closeList = () => {
          listEl = null;
          listType = '';
        };

        const flushCodeBlock = () => {
          const pre = document.createElement('pre');
          const code = document.createElement('code');
          if (codeFenceLang) {
            code.setAttribute('data-lang', codeFenceLang);
          }
          code.textContent = codeBlockLines.join('\n');
          pre.append(code);
          sectionTarget().append(pre);
          codeBlockLines = [];
          codeFenceLang = '';
        };

        for (const line of lines) {
          const trimmed = line.trim();

          const fenceMatch = trimmed.match(/^```([a-zA-Z0-9_-]+)?$/);
          if (fenceMatch) {
            flushParagraph();
            closeList();
            if (!inCodeBlock) {
              inCodeBlock = true;
              codeFenceLang = fenceMatch[1] || '';
              codeBlockLines = [];
            } else {
              inCodeBlock = false;
              flushCodeBlock();
            }
            continue;
          }

          if (inCodeBlock) {
            codeBlockLines.push(line);
            continue;
          }

          if (!trimmed) {
            flushParagraph();
            closeList();
            continue;
          }

          if (/^\[[^\]]+\]:\s+/.test(trimmed)) {
            continue;
          }

          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeList();
            const level = heading[1].length;
            const headingText = heading[2].trim();

            if (level === 1) {
              titleEl.textContent = headingText;
              continue;
            }

            if (level === 2) {
              const section = document.createElement('section');
              section.className = 'entry';
              const h2 = document.createElement('h2');
              appendInlineMarkdown(h2, headingText);
              section.append(h2);
              feed.append(section);
              currentSection = section;
              continue;
            }

            const h3 = document.createElement('h3');
            appendInlineMarkdown(h3, headingText);
            sectionTarget().append(h3);
            continue;
          }

          if (/^---+$/.test(trimmed)) {
            flushParagraph();
            closeList();
            sectionTarget().append(document.createElement('hr'));
            continue;
          }

          const blockquote = line.match(/^\s*>\s?(.*)$/);
          if (blockquote) {
            flushParagraph();
            closeList();
            const note = document.createElement('p');
            note.className = 'note';
            appendInlineMarkdown(note, blockquote[1]);
            sectionTarget().append(note);
            continue;
          }

          const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
          const unordered = line.match(/^\s*[-*]\s+(.+)$/);
          if (ordered || unordered) {
            flushParagraph();
            const nextType = ordered ? 'ol' : 'ul';
            if (!listEl || listType !== nextType) {
              closeList();
              listType = nextType;
              listEl = document.createElement(nextType);
              sectionTarget().append(listEl);
            }
            const li = document.createElement('li');
            appendInlineMarkdown(li, (ordered || unordered)[1]);
            listEl.append(li);
            continue;
          }

          paragraphBuffer.push(trimmed);
        }

        flushParagraph();
        closeList();
        if (inCodeBlock && codeBlockLines.length) {
          flushCodeBlock();
        }

        if (!feed.childNodes.length) {
          const empty = document.createElement('p');
          empty.className = 'status';
          empty.textContent = 'No changelog entries were found in CHANGELOG.md yet.';
          contentEl.replaceChildren(empty);
          return;
        }

        const firstEntry = feed.querySelector('.entry h2');
        if (firstEntry) {
          subtitleEl.textContent = `Latest entry: ${firstEntry.textContent}`;
        }
        contentEl.replaceChildren(feed);
      };

      const renderError = () => {
        const status = document.createElement('p');
        status.className = 'status';
        status.textContent = 'Unable to load CHANGELOG.md right now. You can still open the raw markdown link above.';
        contentEl.replaceChildren(status);
      };

      fetch('/CHANGELOG.md', { cache: 'no-cache' })
        .then((response) => (response.ok ? response.text() : Promise.reject(new Error('Failed to fetch changelog'))))
        .then(renderMarkdown)
        .catch(renderError);
    })();
  </script>
</body>
</html>
