html, body {

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const hud = {
  mode: document.getElementById('mode'),
  level: document.getElementById('level'),
  match: document.getElementById('match'),
  time: document.getElementById('time'),
  errors: document.getElementById('errors'),
  brush: document.getElementById('brush'),
  score: document.getElementById('score'),
  coins: document.getElementById('coins'),
};

const W = canvas.width;
const H = canvas.height;
const COLORS = [
  { id: 1, name: 'Red', paint: '#e95d4e', dark: '#a93631' },
  { id: 2, name: 'Gold', paint: '#f1c75d', dark: '#ae7e24' },
  { id: 3, name: 'Teal', paint: '#39b8a5', dark: '#19756f' },
  { id: 4, name: 'Ink', paint: '#40577c', dark: '#20304d' },
];
const EMPTY_COLOR = '#f5ead7';
const GRID = {
  targetX: 92,
  targetY: 146,
  playX: 490,
  playY: 102,
  targetSize: 296,
  playSize: 440,
};
const ERROR_LIMIT = 8;

const rawLevels = [
  {
    name: 'Sun Tile',
    seconds: 92,
    pattern: [
      '001100',
      '022220',
      '123321',
      '123321',
      '022220',
      '001100',
    ],
  },
  {
    name: 'Harbor Flag',
    seconds: 86,
    pattern: [
      '330033',
      '332233',
      '322223',
      '311113',
      '331133',
      '330033',
    ],
  },
  {
    name: 'Circuit Bloom',
    seconds: 96,
    pattern: [
      '0040400',
      '0331330',
      '4321234',
      '0312130',
      '4321234',
      '0331330',
      '0040400',
    ],
  },
  {
    name: 'Signal Crest',
    seconds: 104,
    pattern: [
      '44000044',
      '43322334',
      '03211230',
      '02144120',
      '02144120',
      '03211230',
      '43322334',
      '44000044',
    ],
  },
  {
    name: 'Grand Mosaic',
    seconds: 112,
    pattern: [
      '00122100',
      '01422410',
      '14433441',
      '22311322',
      '22311322',
      '14433441',
      '01422410',
      '00122100',
    ],
  },
];

const levels = rawLevels.map((level) => ({
  ...level,
  target: level.pattern.map((row) => row.split('').map((cell) => Number(cell))),
}));

const state = {
  mode: 'menu',
  levelIndex: 0,
  board: [],
  cursor: { row: 0, col: 0 },
  selected: 1,
  timeLeft: 0,
  score: 0,
  combo: 0,
  mistakes: 0,
  hintsUsed: 0,
  cellsPainted: 0,
  perfectLevels: 0,
  coinsEarned: 0,
  result: null,
  logs: [],
  flashes: [],
  history: [],
};

let raf = 0;
let lastFrame = 0;
let controlled = false;
const keys = new Set();

function currentLevel() {
  return levels[state.levelIndex];
}

function gridSize() {
  return currentLevel().target.length;
}

function createBoard() {
  const size = gridSize();
  return Array.from({ length: size }, () => Array(size).fill(0));
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function log(message) {
  state.logs = [message, ...state.logs].slice(0, 7);
}

function resetLevel(keepScore = true) {
  const level = currentLevel();
  state.board = createBoard();
  state.cursor = { row: 0, col: 0 };
  state.timeLeft = level.seconds;
  state.combo = 0;
  state.mistakes = 0;
  state.hintsUsed = 0;
  state.cellsPainted = 0;
  state.result = null;
  state.flashes = [];
  state.history = [];
  if (!keepScore) {
    state.score = 0;
    state.perfectLevels = 0;
    state.coinsEarned = 0;
  }
  log(`Level ${state.levelIndex + 1}: ${level.name}`);
}

function resetGame(mode = 'menu') {
  state.levelIndex = 0;
  state.selected = 1;
  resetLevel(false);
  state.mode = mode;
  if (mode === 'playing') {
    rememberRecent('mosaicmatch');
  }
  updateHud();
  updateOverlay();
  draw();
}

function startGame() {
  resetGame('playing');
}

function pauseGame() {
  if (state.mode === 'playing') {
    state.mode = 'paused';
  } else if (state.mode === 'paused') {
    state.mode = 'playing';
  } else {
    startGame();
  }
  updateHud();
  updateOverlay();
  draw();
}

function setSelected(colorId) {
  state.selected = colorId;
  log(`Brush: ${colorName(colorId)}`);
  updateHud();
}

function colorName(id) {
  if (id === 0) return 'Erase';
  return COLORS.find((color) => color.id === id)?.name || 'Unknown';
}

function colorFor(id) {
  if (id === 0) return EMPTY_COLOR;
  return COLORS.find((color) => color.id === id)?.paint || EMPTY_COLOR;
}

function darkFor(id) {
  if (id === 0) return '#c9bca7';
  return COLORS.find((color) => color.id === id)?.dark || '#888';
}

function moveCursor(dr, dc) {
  const size = gridSize();
  state.cursor.row = clamp(state.cursor.row + dr, 0, size - 1);
  state.cursor.col = clamp(state.cursor.col + dc, 0, size - 1);
}

function boardCellRect(row, col) {
  const size = gridSize();
  const gap = 5;
  const cell = (GRID.playSize - gap * (size - 1)) / size;
  return {
    x: GRID.playX + col * (cell + gap),
    y: GRID.playY + row * (cell + gap),
    size: cell,
  };
}

function targetCellRect(row, col) {
  const size = gridSize();
  const gap = 4;
  const cell = (GRID.targetSize - gap * (size - 1)) / size;
  return {
    x: GRID.targetX + col * (cell + gap),
    y: GRID.targetY + row * (cell + gap),
    size: cell,
  };
}

function cellFromPoint(x, y, area = 'play') {
  const size = gridSize();
  for (let row = 0; row < size; row += 1) {
    for (let col = 0; col < size; col += 1) {
      const rect = area === 'play' ? boardCellRect(row, col) : targetCellRect(row, col);
      if (x >= rect.x && x <= rect.x + rect.size && y >= rect.y && y <= rect.y + rect.size) {
        return { row, col };
      }
    }
  }
  return null;
}

function pushFlash(row, col, color, label) {
  const rect = boardCellRect(row, col);
  state.flashes.push({
    x: rect.x + rect.size / 2,
    y: rect.y + rect.size / 2,
    color,
    label,
    age: 0,
  });
}

function paintCell(row = state.cursor.row, col = state.cursor.col, value = state.selected) {
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const previous = state.board[row][col];
  if (previous === value) return;
  const target = currentLevel().target[row][col];
  state.history.push({ row, col, previous, next: value });
  state.history = state.history.slice(-60);
  state.board[row][col] = value;
  state.cellsPainted += 1;

  if (value === target) {
    state.combo += 1;
    const points = 14 + Math.min(20, state.combo * 2);
    state.score += points;
    pushFlash(row, col, '#74e2a5', `+${points}`);
    log(`Matched row ${row + 1}, col ${col + 1}`);
  } else if (value === 0) {
    state.combo = 0;
    pushFlash(row, col, '#f4d6a3', 'Erase');
    log(`Cleared row ${row + 1}, col ${col + 1}`);
  } else {
    state.combo = 0;
    state.mistakes += 1;
    state.score = Math.max(0, state.score - 8);
    pushFlash(row, col, '#ff897e', 'Miss');
    log(`Mismatch row ${row + 1}, col ${col + 1}`);
  }

  if (state.mistakes >= ERROR_LIMIT) {
    finish(false, 'too_many_errors');
  } else {
    checkSolved();
  }
  updateHud();
  updateOverlay();
}

function undoPaint() {
  if (state.mode !== 'playing') return;
  const item = state.history.pop();
  if (!item) return;
  state.board[item.row][item.col] = item.previous;
  state.combo = 0;
  log(`Undo row ${item.row + 1}, col ${item.col + 1}`);
  updateHud();
  draw();
}

function revealHint() {
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const mismatches = mismatchCells();
  if (mismatches.length === 0) {
    checkSolved();
    return;
  }
  const item = mismatches[0];
  state.board[item.row][item.col] = item.target;
  state.hintsUsed += 1;
  state.combo = 0;
  state.score = Math.max(0, state.score - 18);
  pushFlash(item.row, item.col, '#ffe091', 'Hint');
  log(`Hint filled row ${item.row + 1}, col ${item.col + 1}`);
  checkSolved();
  updateHud();
  draw();
}

function mismatchCells() {
  const level = currentLevel();
  const cells = [];
  for (let row = 0; row < level.target.length; row += 1) {
    for (let col = 0; col < level.target[row].length; col += 1) {
      const target = level.target[row][col];
      if (state.board[row][col] !== target) {
        cells.push({ row, col, target, current: state.board[row][col] });
      }
    }
  }
  return cells;
}

function matchStats() {
  const level = currentLevel();
  let correct = 0;
  let filled = 0;
  let wrongFilled = 0;
  let total = 0;
  for (let row = 0; row < level.target.length; row += 1) {
    for (let col = 0; col < level.target[row].length; col += 1) {
      total += 1;
      const current = state.board[row][col];
      if (current !== 0) filled += 1;
      if (current === level.target[row][col]) {
        correct += 1;
      } else if (current !== 0) {
        wrongFilled += 1;
      }
    }
  }
  return {
    correct,
    total,
    filled,
    wrongFilled,
    percent: Math.round((correct / total) * 100),
  };
}

function checkSolved() {
  const stats = matchStats();
  if (stats.correct !== stats.total) return false;
  completeLevel();
  return true;
}

function completeLevel() {
  const timeBonus = Math.ceil(state.timeLeft) * 3;
  const accuracyBonus = Math.max(0, 140 - state.mistakes * 20 - state.hintsUsed * 28);
  state.score += timeBonus + accuracyBonus;
  if (state.mistakes === 0 && state.hintsUsed === 0) state.perfectLevels += 1;
  log(`Level clear: +${timeBonus + accuracyBonus}`);

  if (state.levelIndex < levels.length - 1) {
    state.levelIndex += 1;
    resetLevel(true);
  } else {
    finish(true, 'all_mosaics_matched');
  }
}

function finish(won, reason) {
  if (state.mode === 'won' || state.mode === 'lost') return;
  state.mode = won ? 'won' : 'lost';
  state.result = reason;
  if (won) {
    const coins = Math.max(12, Math.min(44, 12 + Math.floor(state.score / 420) + state.perfectLevels * 3));
    state.coinsEarned = coins;
    addCoins(coins);
    maybeUnlock({ anyPlay: true, mosaicmatch: { score: state.score, perfectLevels: state.perfectLevels } });
    log(`Run complete: ${coins} coins`);
  } else {
    maybeUnlock({ anyPlay: true, mosaicmatch: { score: state.score, perfectLevels: state.perfectLevels } });
    log(reason === 'time_expired' ? 'Timer expired' : 'Too many mismatches');
  }
  updateHud();
  updateOverlay();
}

function update(dt) {
  if (state.mode !== 'playing') {
    state.flashes.forEach((flash) => { flash.age += dt; });
    state.flashes = state.flashes.filter((flash) => flash.age < 0.9);
    return;
  }

  state.timeLeft = Math.max(0, state.timeLeft - dt);
  if (state.timeLeft <= 0) {
    finish(false, 'time_expired');
  }

  state.flashes.forEach((flash) => { flash.age += dt; });
  state.flashes = state.flashes.filter((flash) => flash.age < 0.9);
}

function drawRoundedRect(x, y, width, height, radius, fill, stroke = null) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawHeader();
  drawTarget();
  drawBoard();
  drawPalette();
  drawFlashes();
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, W, H);
  gradient.addColorStop(0, '#fff3d4');
  gradient.addColorStop(0.46, '#d2edf1');
  gradient.addColorStop(1, '#546f8d');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffffff5d';
  for (let i = 0; i < 22; i += 1) {
    const x = (i * 137 + 74) % W;
    const y = (i * 83 + 42) % H;
    ctx.beginPath();
    ctx.arc(x, y, 18 + (i % 5) * 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHeader() {
  const level = currentLevel();
  drawRoundedRect(40, 28, 980, 50, 14, '#142537d8', '#ffffff66');
  ctx.fillStyle = '#f9fcff';
  ctx.font = '900 25px Trebuchet MS, sans-serif';
  ctx.fillText('Mosaic Match', 64, 61);
  ctx.font = '800 16px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#cfe4ee';
  ctx.fillText(`${level.name} - Level ${state.levelIndex + 1} of ${levels.length}`, 282, 60);

  const stats = matchStats();
  const barX = 720;
  const barY = 43;
  const barW = 240;
  drawRoundedRect(barX, barY, barW, 16, 8, '#0f1d2b', '#ffffff38');
  drawRoundedRect(barX, barY, barW * (stats.percent / 100), 16, 8, '#74e2a5');
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 13px Trebuchet MS, sans-serif';
  ctx.fillText(`${stats.percent}% matched`, barX + 76, barY + 13);
}

function drawTarget() {
  drawRoundedRect(56, 104, 366, 430, 16, '#ffffffd6', '#ffffffa8');
  ctx.fillStyle = '#24334a';
  ctx.font = '900 22px Trebuchet MS, sans-serif';
  ctx.fillText('Target', 84, 134);
  ctx.font = '700 13px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#607086';
  ctx.fillText('Copy this pattern on the large board.', 174, 133);

  const target = currentLevel().target;
  for (let row = 0; row < target.length; row += 1) {
    for (let col = 0; col < target[row].length; col += 1) {
      const rect = targetCellRect(row, col);
      drawTile(rect.x, rect.y, rect.size, target[row][col], false, 0.55);
    }
  }

  drawRoundedRect(88, 468, 300, 40, 10, '#23344c', '#ffffff30');
  ctx.fillStyle = '#edf8fb';
  ctx.font = '800 14px Trebuchet MS, sans-serif';
  ctx.fillText('Arrows move  |  1-4 choose  |  Space paints', 106, 493);
}

function drawBoard() {
  drawRoundedRect(460, 92, 500, 502, 18, '#162536d8', '#ffffff8f');
  const size = gridSize();
  for (let row = 0; row < size; row += 1) {
    for (let col = 0; col < size; col += 1) {
      const rect = boardCellRect(row, col);
      const isCursor = row === state.cursor.row && col === state.cursor.col;
      const target = currentLevel().target[row][col];
      const current = state.board[row][col];
      const wrong = current !== 0 && current !== target;
      drawTile(rect.x, rect.y, rect.size, current, isCursor, 1, wrong);
    }
  }

  ctx.fillStyle = '#f5fbff';
  ctx.font = '900 16px Trebuchet MS, sans-serif';
  ctx.fillText(`Brush: ${colorName(state.selected)}`, 486, 572);
  ctx.fillStyle = '#c7d8e6';
  ctx.font = '800 13px Trebuchet MS, sans-serif';
  ctx.fillText('Click a tile to move the cursor, then paint with the selected brush.', 650, 572);
}

function drawTile(x, y, size, value, selected = false, scale = 1, wrong = false) {
  const pad = size * (1 - scale) / 2;
  drawRoundedRect(x + pad, y + pad, size - pad * 2, size - pad * 2, Math.max(6, size * 0.14), colorFor(value), darkFor(value));
  if (value !== 0) {
    const shine = ctx.createLinearGradient(x, y, x + size, y + size);
    shine.addColorStop(0, '#ffffff4c');
    shine.addColorStop(0.48, '#ffffff00');
    shine.addColorStop(1, '#00000016');
    ctx.fillStyle = shine;
    ctx.fillRect(x + pad + 3, y + pad + 3, size - pad * 2 - 6, size - pad * 2 - 6);
  }
  if (wrong) {
    ctx.strokeStyle = '#ffef75';
    ctx.lineWidth = 4;
    ctx.strokeRect(x + pad + 5, y + pad + 5, size - pad * 2 - 10, size - pad * 2 - 10);
  }
  if (selected) {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 5;
    ctx.strokeRect(x - 4, y - 4, size + 8, size + 8);
    ctx.strokeStyle = '#202b3d';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 8, y - 8, size + 16, size + 16);
  }
}

function drawPalette() {
  const x = 70;
  const y = 554;
  ctx.fillStyle = '#162536cc';
  drawRoundedRect(x - 18, y - 18, 340, 56, 12, '#162536cc', '#ffffff38');
  COLORS.forEach((color, index) => {
    const sx = x + index * 76;
    drawRoundedRect(sx, y, 44, 24, 8, color.paint, state.selected === color.id ? '#ffffff' : color.dark);
    ctx.fillStyle = state.selected === color.id ? '#ffffff' : '#d8e7ee';
    ctx.font = '900 12px Trebuchet MS, sans-serif';
    ctx.fillText(`${index + 1}`, sx + 18, y + 17);
  });
}

function drawFlashes() {
  for (const flash of state.flashes) {
    const alpha = Math.max(0, 1 - flash.age / 0.9);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = flash.color;
    ctx.font = '900 18px Trebuchet MS, sans-serif';
    ctx.fillText(flash.label, flash.x - 18, flash.y - 18 - flash.age * 26);
    ctx.globalAlpha = 1;
  }
}

function updateHud() {
  const stats = matchStats();
  hud.mode.textContent = state.mode.toUpperCase();
  hud.level.textContent = `${state.levelIndex + 1}/${levels.length}`;
  hud.match.textContent = `${stats.percent}%`;
  hud.time.textContent = `${Math.ceil(state.timeLeft)}s`;
  hud.errors.textContent = `${state.mistakes}/${ERROR_LIMIT}`;
  hud.brush.textContent = colorName(state.selected);
  hud.score.textContent = String(state.score);
  hud.coins.textContent = String(state.coinsEarned || profileState.coins || 0);
}

function updateOverlay() {
  const show = state.mode === 'menu' || state.mode === 'paused' || state.mode === 'won' || state.mode === 'lost';
  overlay.classList.toggle('show', show);
  if (!show) {
    overlay.innerHTML = '';
    return;
  }

  let title = 'Mosaic Match';
  let body = 'Copy each target pattern onto the large board. Use the palette, paint accurately, and finish every mosaic before time runs out.';
  let primary = 'Start';
  if (state.mode === 'paused') {
    title = 'Paused';
    body = 'Resume when ready.';
    primary = 'Resume';
  } else if (state.mode === 'won') {
    title = 'Gallery Complete';
    body = `Final score ${state.score}. Perfect levels ${state.perfectLevels}. Coins earned ${state.coinsEarned}.`;
    primary = 'Play Again';
  } else if (state.mode === 'lost') {
    title = state.result === 'time_expired' ? 'Out of Time' : 'Mosaic Cracked';
    body = `Score ${state.score}. Match ${matchStats().percent}%. Try again with fewer mismatches.`;
    primary = 'Retry';
  }

  overlay.innerHTML = `
    <div class="panel">
      <h1>${title}</h1>
      <p>${body}</p>
      <p>Desktop: arrows/WASD move, 1-4 choose colors, Space paints, Backspace erases, H hints, U undo, P pauses, F fullscreen.</p>
      <div class="row">
        <button id="overlayPrimary" type="button">${primary}</button>
        <button id="overlayPractice" type="button">Restart</button>
      </div>
    </div>
  `;
  document.getElementById('overlayPrimary').addEventListener('click', () => {
    if (state.mode === 'paused') pauseGame();
    else startGame();
  });
  document.getElementById('overlayPractice').addEventListener('click', () => resetGame('playing'));
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

function handleCanvasPointer(event) {
  event.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) * (canvas.width / rect.width);
  const y = (event.clientY - rect.top) * (canvas.height / rect.height);
  if (state.mode !== 'playing') {
    startGame();
    return;
  }
  const cell = cellFromPoint(x, y, 'play');
  if (cell) {
    state.cursor = cell;
    paintCell(cell.row, cell.col);
    return;
  }

  for (let i = 0; i < COLORS.length; i += 1) {
    const sx = 70 + i * 76;
    if (x >= sx && x <= sx + 44 && y >= 554 && y <= 578) {
      setSelected(COLORS[i].id);
      draw();
      return;
    }
  }
}

function bindButtons() {
  COLORS.forEach((color, index) => {
    const button = document.getElementById(`color${index}`);
    button.style.background = color.paint;
    button.addEventListener('click', () => setSelected(color.id));
  });
  document.getElementById('paintBtn').addEventListener('click', () => paintCell());
  document.getElementById('eraseBtn').addEventListener('click', () => {
    const previous = state.selected;
    state.selected = 0;
    paintCell();
    state.selected = previous;
  });
  document.getElementById('hintBtn').addEventListener('click', revealHint);
  document.getElementById('pauseBtn').addEventListener('click', pauseGame);
  document.getElementById('restartBtn').addEventListener('click', () => resetGame('playing'));
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
}

window.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown', ' ', 'spacebar'].includes(key)) event.preventDefault();
  if (key >= '1' && key <= '4') {
    setSelected(Number(key));
  } else if (key === 'arrowleft' || key === 'a') {
    moveCursor(0, -1);
  } else if (key === 'arrowright' || key === 'd') {
    moveCursor(0, 1);
  } else if (key === 'arrowup' || key === 'w') {
    moveCursor(-1, 0);
  } else if (key === 'arrowdown' || key === 's') {
    moveCursor(1, 0);
  } else if (key === ' ' || key === 'spacebar' || key === 'enter') {
    paintCell();
  } else if (key === 'backspace' || key === 'delete' || key === '0') {
    const previous = state.selected;
    state.selected = 0;
    paintCell();
    state.selected = previous;
  } else if (key === 'h') {
    revealHint();
  } else if (key === 'u') {
    undoPaint();
  } else if (key === 'p') {
    pauseGame();
  } else if (key === 'r') {
    resetGame('playing');
  } else if (key === 'f') {
    toggleFullscreen();
  }
  keys.add(key);
});

window.addEventListener('keyup', (event) => {
  keys.delete(event.key.toLowerCase());
});

canvas.addEventListener('pointerdown', handleCanvasPointer);

function frame(now) {
  if (!controlled) {
    const dt = Math.min(0.05, Math.max(0, (now - lastFrame) / 1000 || 0));
    update(dt);
    draw();
    updateHud();
  }
  lastFrame = now;
  raf = requestAnimationFrame(frame);
}

function renderGameToText() {
  const level = currentLevel();
  const visibleCells = [];
  for (let row = 0; row < level.target.length; row += 1) {
    for (let col = 0; col < level.target[row].length; col += 1) {
      visibleCells.push({
        row,
        col,
        target: level.target[row][col],
        current: state.board[row][col],
        correct: state.board[row][col] === level.target[row][col],
      });
    }
  }
  const stats = matchStats();
  return JSON.stringify({
    game: 'mosaicmatch',
    mode: state.mode,
    coordinate_system: 'Canvas origin is top-left. X increases right and Y increases down. Play grid top-left is (490,102).',
    objective: 'copy the target mosaic onto the larger play grid before time or mismatch limit runs out',
    level: {
      index: state.levelIndex + 1,
      total: levels.length,
      name: level.name,
      size: level.target.length,
    },
    cursor: {
      row: state.cursor.row,
      col: state.cursor.col,
      selected_color: state.selected,
      selected_name: colorName(state.selected),
    },
    resources: {
      time_left: Number(state.timeLeft.toFixed(2)),
      score: state.score,
      mistakes: state.mistakes,
      mistake_limit: ERROR_LIMIT,
      hints_used: state.hintsUsed,
      cells_painted: state.cellsPainted,
      combo: state.combo,
      perfect_levels: state.perfectLevels,
      coins_earned: state.coinsEarned,
      match_percent: stats.percent,
    },
    cells: visibleCells,
    recent_events: state.logs,
    result: state.result,
  });
}

window.render_game_to_text = renderGameToText;
window.advanceTime = (ms = 16.67) => {
  controlled = true;
  const steps = Math.max(1, Math.round(Number(ms || 0) / (1000 / 60)));
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  updateHud();
  updateOverlay();
  controlled = false;
  lastFrame = performance.now();
};
window.__CADE_FEEDBACK_CONTEXT__ = () => JSON.parse(renderGameToText());

bindButtons();
resetGame('menu');
draw();
updateHud();
updateOverlay();
raf = requestAnimationFrame((now) => {
  lastFrame = now;
  frame(now);
});
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '/src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'mosaicmatch', gameName: 'Mosaic Match' });
</script>
