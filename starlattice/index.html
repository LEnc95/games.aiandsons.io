<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
  color: #ecf8ff;
  background:
    radial-gradient(65% 50% at 20% 10%, #1f3d73 0%, transparent 65%),
    radial-gradient(55% 45% at 80% 85%, #3a1c5f 0%, transparent 68%),
    linear-gradient(180deg, #060a1e 0%, #0f1d3f 100%);
}
.back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 20;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  border-radius: 10px;
  border: 1px solid #ffffff45;
  padding: 8px 12px;
  background: #00000066;
}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 62px 10px 10px;
}
.wrap {
  width: min(96vw, 980px);
  aspect-ratio: 16 / 10;
  max-height: min(66dvh, 740px);
  position: relative;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 14px;
  border: 2px solid #a6c5ff80;
  box-shadow: 0 18px 50px #000000af;
  background: linear-gradient(180deg, #101a3c 0%, #17295a 100%);
}
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.16s;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.panel {
  max-width: 700px;
  border-radius: 14px;
  border: 1px solid #b9ceff48;
  background: #0b1742ef;
  box-shadow: 0 14px 32px #00000080;
  padding: 16px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 4.2vw, 40px);
}
p {
  margin: 0 0 10px;
  color: #c8d8ff;
  font-size: clamp(13px, 2vw, 15px);
  line-height: 1.45;
}
.row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
button {
  border: 1px solid #a4b8ff56;
  background: #293f8ef5;
  color: #eef3ff;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 42px;
}
.hud {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #a4b6ff52;
  background: #0b1742e8;
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}
.chip {
  border-radius: 9px;
  border: 1px solid #b3c0ff3e;
  background: #ffffff14;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 2px;
  padding: 4px;
}
.chip span {
  color: #bbc6ef;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1;
}
.chip b {
  font-size: clamp(14px, 2.1vw, 18px);
  line-height: 1.1;
}
.controls {
  width: min(96vw, 980px);
  border-radius: 12px;
  border: 1px solid #a4b6ff52;
  background: #0b1742e8;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 8px;
}
.ctrl-btn { background: #334a9b; border-color: #9baef066; }
@media (max-width: 900px) {
  .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .controls { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}

<script type="module">
import { addCoins, rememberRecent, state as profileState } from '/src/core/state.js';
import { maybeUnlock } from '/src/prog/achievements.js';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const modeEl = document.getElementById('mode');
const scoreEl = document.getElementById('score');
const deliveredEl = document.getElementById('delivered');
const shieldEl = document.getElementById('shield');
const timeEl = document.getElementById('time');
const comboEl = document.getElementById('combo');
const coinsEl = document.getElementById('coins');

const GRID_COLS = 8;
const GRID_ROWS = 8;
const CELL = 72;
const GRID_LEFT = 352;
const GRID_TOP = 120;
const TOTAL_SECONDS = 90;
const TARGET_DELIVERIES = 24;
const START_SHIELD = 5;
const SPAWN_INTERVAL = 1.05;
const STEP_INTERVAL = 0.16;

const COLORS = [
  { key: 'cyan', color: '#71f8ff', glow: '#45d7ff' },
  { key: 'gold', color: '#ffd978', glow: '#f0b34a' },
  { key: 'magenta', color: '#ff8feb', glow: '#ff5cd5' },
  { key: 'lime', color: '#bfff8a', glow: '#91dd5b' },
];

const state = {
  mode: 'menu',
  result: null,
  elapsed: 0,
  timeLeft: TOTAL_SECONDS,
  score: 0,
  delivered: 0,
  shield: START_SHIELD,
  combo: 0,
  spawnTimer: 0,
  cursorX: 3,
  cursorY: 3,
  board: [],
  pulses: [],
  logs: [],
};

let raf = 0;
let prev = performance.now();
let controlled = false;

function randInt(max) {
  return Math.floor(Math.random() * max);
}

function colorForColumn(col) {
  const bandSize = GRID_COLS / COLORS.length;
  return Math.max(0, Math.min(COLORS.length - 1, Math.floor(col / bandSize)));
}

function directionToDelta(dir) {
  if (dir === 'up') return { dx: 0, dy: -1 };
  if (dir === 'down') return { dx: 0, dy: 1 };
  if (dir === 'left') return { dx: -1, dy: 0 };
  return { dx: 1, dy: 0 };
}

function rotateByMirror(dir, tileType) {
  if (tileType === 1) {
    if (dir === 'up') return 'right';
    if (dir === 'right') return 'up';
    if (dir === 'down') return 'left';
    return 'down';
  }
  if (tileType === 2) {
    if (dir === 'up') return 'left';
    if (dir === 'left') return 'up';
    if (dir === 'down') return 'right';
    return 'down';
  }
  return dir;
}

function addLog(line) {
  state.logs.push(line);
  if (state.logs.length > 5) state.logs.shift();
}

function newBoard() {
  const board = [];
  for (let y = 0; y < GRID_ROWS; y += 1) {
    const row = [];
    for (let x = 0; x < GRID_COLS; x += 1) row.push(0);
    board.push(row);
  }
  return board;
}

function resetState() {
  state.mode = 'menu';
  state.result = null;
  state.elapsed = 0;
  state.timeLeft = TOTAL_SECONDS;
  state.score = 0;
  state.delivered = 0;
  state.shield = START_SHIELD;
  state.combo = 0;
  state.spawnTimer = 0;
  state.cursorX = 3;
  state.cursorY = 3;
  state.board = newBoard();
  state.pulses = [];
  state.logs = [];
}

function showOverlay(title, body, cta, onCta, secondary, onSecondary) {
  overlay.textContent = '';
  const panel = document.createElement('div');
  panel.className = 'panel';
  const h = document.createElement('h1');
  h.textContent = title;
  const p = document.createElement('p');
  p.textContent = body;
  panel.appendChild(h);
  panel.appendChild(p);
  const row = document.createElement('div');
  row.className = 'row';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = cta;
  btn.onclick = () => onCta?.();
  row.appendChild(btn);
  if (secondary && onSecondary) {
    const alt = document.createElement('button');
    alt.type = 'button';
    alt.textContent = secondary;
    alt.onclick = () => onSecondary();
    row.appendChild(alt);
  }
  panel.appendChild(row);
  overlay.appendChild(panel);
  overlay.classList.add('show');
}

function hideOverlay() {
  overlay.classList.remove('show');
  overlay.textContent = '';
}

function startGame() {
  resetState();
  state.mode = 'play';
  hideOverlay();
  addLog('Route each pulse to matching color docks.');
  try { rememberRecent('starlattice'); } catch {}
  try { maybeUnlock({ anyPlay: true, starlattice: { result: 'started', score: 0, delivered: 0 } }); } catch {}
}

function finishGame(result) {
  if (state.mode === 'won' || state.mode === 'lost') return;
  state.mode = result === 'won' ? 'won' : 'lost';
  state.result = result;

  const base = Math.floor(state.score / 150);
  const reward = result === 'won'
    ? Math.max(8, base + state.delivered + state.shield * 2)
    : Math.max(2, Math.floor(state.delivered / 2) + base);
  try { addCoins(reward); } catch {}
  try {
    maybeUnlock({
      anyPlay: true,
      starlattice: {
        result,
        score: Math.round(state.score),
        delivered: state.delivered,
        shield: state.shield,
      },
    });
  } catch {}

  if (result === 'won') {
    showOverlay(
      'Lattice Stable',
      `You delivered ${state.delivered}/${TARGET_DELIVERIES} pulses and earned ${reward} coins.`,
      'Play Again',
      startGame,
      'Back Home',
      () => { window.location.href = '/'; },
    );
  } else {
    showOverlay(
      'Lattice Failed',
      `Shield depleted with ${state.delivered}/${TARGET_DELIVERIES} deliveries. You still earned ${reward} coins.`,
      'Retry Run',
      startGame,
      'Back Home',
      () => { window.location.href = '/'; },
    );
  }
}

function spawnPulse() {
  const spawnCol = randInt(GRID_COLS);
  const colorIdx = randInt(COLORS.length);
  state.pulses.push({
    x: spawnCol,
    y: -1,
    dir: 'down',
    colorIdx,
    progress: 0,
  });
}

function applyPenalty(reason) {
  state.shield = Math.max(0, state.shield - 1);
  state.combo = 0;
  addLog(reason);
  if (state.shield <= 0) finishGame('lost');
}

function deliverPulse(column, colorIdx) {
  const required = colorForColumn(column);
  if (required === colorIdx) {
    state.delivered += 1;
    state.combo += 1;
    state.score += 110 + state.combo * 12;
    addLog(`Delivered ${COLORS[colorIdx].key} pulse. Combo x${state.combo}.`);
    if (state.delivered >= TARGET_DELIVERIES) finishGame('won');
  } else {
    applyPenalty(`Misdirected pulse at column ${column + 1}.`);
  }
}

function movePulse(pulse) {
  const delta = directionToDelta(pulse.dir);
  const nextX = pulse.x + delta.dx;
  const nextY = pulse.y + delta.dy;

  if (nextX < 0 || nextX >= GRID_COLS || nextY < -1) {
    applyPenalty('Pulse escaped the lattice edge.');
    return false;
  }
  if (nextY >= GRID_ROWS) {
    deliverPulse(nextX, pulse.colorIdx);
    return false;
  }

  pulse.x = nextX;
  pulse.y = nextY;
  if (nextY >= 0) {
    const tileType = state.board[nextY][nextX];
    pulse.dir = rotateByMirror(pulse.dir, tileType);
  }
  return true;
}

function update(dt) {
  if (state.mode !== 'play') return;

  state.elapsed += dt;
  state.timeLeft = Math.max(0, TOTAL_SECONDS - state.elapsed);
  state.spawnTimer += dt;

  while (state.spawnTimer >= SPAWN_INTERVAL) {
    state.spawnTimer -= SPAWN_INTERVAL;
    spawnPulse();
  }

  const nextPulses = [];
  for (let i = 0; i < state.pulses.length; i += 1) {
    const pulse = state.pulses[i];
    pulse.progress += dt;
    let alive = true;
    while (alive && pulse.progress >= STEP_INTERVAL) {
      pulse.progress -= STEP_INTERVAL;
      alive = movePulse(pulse);
    }
    if (alive) nextPulses.push(pulse);
  }
  state.pulses = nextPulses;

  if (state.timeLeft <= 0) {
    if (state.delivered >= TARGET_DELIVERIES) finishGame('won');
    else finishGame('lost');
  }
}

function cycleTile() {
  if (state.mode !== 'play') return;
  const current = state.board[state.cursorY][state.cursorX];
  const next = (current + 1) % 3;
  state.board[state.cursorY][state.cursorX] = next;
}

function moveCursor(dx, dy) {
  if (state.mode !== 'play') return;
  state.cursorX = Math.max(0, Math.min(GRID_COLS - 1, state.cursorX + dx));
  state.cursorY = Math.max(0, Math.min(GRID_ROWS - 1, state.cursorY + dy));
}

function togglePause() {
  if (state.mode === 'play') {
    state.mode = 'paused';
    showOverlay('Paused', 'Adjust mirror lanes, then continue routing starlight.', 'Resume', () => {
      state.mode = 'play';
      hideOverlay();
    }, 'Restart', startGame);
    return;
  }
  if (state.mode === 'paused') {
    state.mode = 'play';
    hideOverlay();
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#121b45');
  grad.addColorStop(1, '#1a2f6b');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 95; i += 1) {
    const seed = (i * 37) % 100;
    const x = ((i * 127.3) % canvas.width);
    const y = ((i * 61.9) % canvas.height);
    const a = 0.08 + (seed / 2000);
    ctx.fillStyle = `rgba(219, 232, 255, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, 1 + (seed % 2), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGrid() {
  ctx.save();
  ctx.translate(GRID_LEFT, GRID_TOP);

  for (let y = 0; y < GRID_ROWS; y += 1) {
    for (let x = 0; x < GRID_COLS; x += 1) {
      const px = x * CELL;
      const py = y * CELL;
      const tile = state.board[y][x];

      ctx.fillStyle = '#1b2d62';
      ctx.fillRect(px, py, CELL - 2, CELL - 2);

      if (tile) {
        ctx.strokeStyle = tile === 1 ? '#9fe4ff' : '#ffc3ff';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        if (tile === 1) {
          ctx.moveTo(px + 12, py + CELL - 14);
          ctx.lineTo(px + CELL - 14, py + 12);
        } else {
          ctx.moveTo(px + 12, py + 12);
          ctx.lineTo(px + CELL - 14, py + CELL - 14);
        }
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(198, 214, 255, 0.18)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px, py, CELL - 2, CELL - 2);
    }
  }

  const cx = state.cursorX * CELL;
  const cy = state.cursorY * CELL;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  ctx.strokeRect(cx + 2, cy + 2, CELL - 6, CELL - 6);
  ctx.restore();
}

function drawCollectors() {
  const y = GRID_TOP + GRID_ROWS * CELL + 10;
  const totalWidth = GRID_COLS * CELL;
  for (let i = 0; i < COLORS.length; i += 1) {
    const x = GRID_LEFT + i * (totalWidth / COLORS.length);
    const w = totalWidth / COLORS.length;
    const color = COLORS[i];
    ctx.fillStyle = `${color.color}55`;
    ctx.fillRect(x + 2, y, w - 4, 58);
    ctx.strokeStyle = `${color.color}cc`;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 2, y, w - 4, 58);
    ctx.fillStyle = '#ecf3ff';
    ctx.font = '700 14px Trebuchet MS';
    ctx.textAlign = 'center';
    ctx.fillText(color.key.toUpperCase(), x + w / 2, y + 36);
  }
}

function drawSpawns() {
  const y = GRID_TOP - 48;
  for (let x = 0; x < GRID_COLS; x += 1) {
    const centerX = GRID_LEFT + x * CELL + CELL / 2;
    const color = COLORS[colorForColumn(x)];
    ctx.fillStyle = `${color.color}66`;
    ctx.beginPath();
    ctx.arc(centerX, y, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function pulsePixel(pulse) {
  const x = GRID_LEFT + pulse.x * CELL + CELL / 2;
  const y = GRID_TOP + pulse.y * CELL + CELL / 2;
  return { x, y };
}

function drawPulses() {
  for (let i = 0; i < state.pulses.length; i += 1) {
    const pulse = state.pulses[i];
    const color = COLORS[pulse.colorIdx];
    const pos = pulsePixel(pulse);
    const alpha = pulse.y < 0 ? 0.5 : 1;
    ctx.fillStyle = `${color.glow}${alpha < 1 ? 'aa' : ''}`;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffffee';
    ctx.beginPath();
    ctx.arc(pos.x - 3, pos.y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSidebar() {
  const x = 968;
  const y = 124;
  ctx.fillStyle = 'rgba(11, 23, 66, 0.82)';
  ctx.fillRect(x, y, 270, 474);
  ctx.strokeStyle = 'rgba(179, 198, 255, 0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 270, 474);

  ctx.fillStyle = '#edf3ff';
  ctx.font = '700 30px Trebuchet MS';
  ctx.textAlign = 'left';
  ctx.fillText('Star Lattice', x + 18, y + 44);

  ctx.font = '600 16px Trebuchet MS';
  ctx.fillStyle = '#c7d6ff';
  ctx.fillText(`Goal: ${TARGET_DELIVERIES} matched pulses`, x + 18, y + 74);
  ctx.fillText('Build mirror routes before waves stack.', x + 18, y + 96);

  ctx.fillStyle = '#dbe7ff';
  ctx.font = '700 14px Trebuchet MS';
  const lines = state.logs.length ? state.logs : ['Use arrows/WASD to move cursor.', 'Press Space/Enter to cycle mirror tile.'];
  for (let i = 0; i < lines.length; i += 1) ctx.fillText(`- ${lines[i]}`, x + 18, y + 136 + i * 22);

  ctx.fillStyle = '#a8b9f7';
  ctx.font = '600 13px Trebuchet MS';
  ctx.fillText('Tile cycle: empty -> / -> \\', x + 18, y + 430);
  ctx.fillText('Keys: Move, Space, P, R, F', x + 18, y + 452);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawSpawns();
  drawGrid();
  drawCollectors();
  drawPulses();
  drawSidebar();
}

function syncHud() {
  modeEl.textContent = state.mode.toUpperCase();
  scoreEl.textContent = String(Math.round(state.score));
  deliveredEl.textContent = `${state.delivered}/${TARGET_DELIVERIES}`;
  shieldEl.textContent = String(Math.max(0, state.shield));
  timeEl.textContent = `${Math.max(0, state.timeLeft).toFixed(1)}s`;
  comboEl.textContent = String(state.combo);
  coinsEl.textContent = String(Number(profileState?.coins || 0));
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  else document.exitFullscreen?.().catch(() => {});
}

function keyHandler(event) {
  if (event.code === 'ArrowUp' || event.code === 'KeyW') { event.preventDefault(); moveCursor(0, -1); return; }
  if (event.code === 'ArrowLeft' || event.code === 'KeyA') { event.preventDefault(); moveCursor(-1, 0); return; }
  if (event.code === 'ArrowDown' || event.code === 'KeyS') { event.preventDefault(); moveCursor(0, 1); return; }
  if (event.code === 'ArrowRight' || event.code === 'KeyD') { event.preventDefault(); moveCursor(1, 0); return; }
  if (event.code === 'Space' || event.code === 'Enter') { event.preventDefault(); cycleTile(); return; }
  if (event.code === 'KeyP') { event.preventDefault(); togglePause(); return; }
  if (event.code === 'KeyR') { event.preventDefault(); startGame(); return; }
  if (event.code === 'KeyF') { event.preventDefault(); toggleFullscreen(); }
}

function step(ms) {
  const steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  controlled = true;
  for (let i = 0; i < steps; i += 1) update(1 / 60);
  draw();
  syncHud();
  controlled = false;
}

function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!controlled) {
    update(dt);
    draw();
    syncHud();
  }
  raf = requestAnimationFrame(frame);
}

function wireControls() {
  document.getElementById('upBtn').addEventListener('click', () => moveCursor(0, -1));
  document.getElementById('leftBtn').addEventListener('click', () => moveCursor(-1, 0));
  document.getElementById('downBtn').addEventListener('click', () => moveCursor(0, 1));
  document.getElementById('rightBtn').addEventListener('click', () => moveCursor(1, 0));
  document.getElementById('cycleBtn').addEventListener('click', cycleTile);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
}

window.addEventListener('keydown', keyHandler);
wireControls();
window.advanceTime = (ms) => step(ms);
window.render_game_to_text = () => JSON.stringify({
  game: 'starlattice',
  mode: state.mode,
  coordinate_system: 'Canvas origin is top-left in pixels. Grid starts near (352,120). X increases right, Y increases down.',
  objective: {
    matched_deliveries_target: TARGET_DELIVERIES,
    survive_seconds: TOTAL_SECONDS,
    shield_must_stay_above: 0,
  },
  resources: {
    elapsed_seconds: Number(state.elapsed.toFixed(3)),
    time_left_seconds: Number(state.timeLeft.toFixed(3)),
    score: Math.round(state.score),
    delivered: state.delivered,
    shield: state.shield,
    combo: state.combo,
    cursor: { x: state.cursorX, y: state.cursorY },
  },
  pulses: state.pulses.map((pulse) => ({
    grid_x: pulse.x,
    grid_y: pulse.y,
    direction: pulse.dir,
    color: COLORS[pulse.colorIdx].key,
  })),
  board: state.board.map((row) => row.map((tile) => (tile === 0 ? '.' : tile === 1 ? '/' : '\\'))),
  collector_bands: COLORS.map((entry, index) => ({
    color: entry.key,
    column_range: [index * 2, index * 2 + 1],
  })),
  recent_events: state.logs,
  controls: {
    move_cursor: 'WASD or Arrow keys or touch arrows',
    cycle_tile: 'Space or Enter or touch Cycle Tile',
    pause: 'P',
    restart: 'R',
    fullscreen: 'F',
  },
  result: state.result,
  coins: Number(profileState?.coins || 0),
});

resetState();
draw();
syncHud();
showOverlay('Star Lattice', 'Shape mirror routes and deliver color-matched starlight pulses before shields fail.', 'Start Run', startGame);
raf = requestAnimationFrame((now) => { prev = now; frame(now); });
window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
</script>
<script type="module">
import { mountGameFeedback } from '../src/feedback/embed.js';
mountGameFeedback({ gameSlug: 'starlattice', gameName: 'Star Lattice' });
</script>
</body>
</html>
