<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Whack-a-Mole Blitz - Play on Cade's Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    :root {
      --bg-1: #1f3c2a;
      --bg-2: #102318;
      --panel: #1f3f31;
      --panel-border: #4f8868;
      --text: #effff2;
      --muted: #c5e3cf;
      --accent: #ffd67d;
      --good: #9df2b4;
      --warn: #ffd091;
      --danger: #ff9f9f;
      --btn: #2f684d;
      --btn-border: #64a87f;
      --btn-active: #24523d;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(120% 120% at 14% 10%, #3b6d4f 0%, transparent 58%),
        radial-gradient(120% 120% at 82% 85%, #345b45 0%, transparent 52%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
    }
    .back-home {
      position: fixed;
      top: calc(env(safe-area-inset-top, 12px));
      left: calc(env(safe-area-inset-left, 12px));
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 9px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    .wrap {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 56px 10px 10px;
      padding-top: max(calc(env(safe-area-inset-top, 10px) + 52px), 60px);
      padding-bottom: calc(env(safe-area-inset-bottom, 10px) + 10px);
    }
    #canvasWrap {
      width: min(96vw, 900px);
      max-height: min(56dvh, 620px);
      aspect-ratio: 5 / 3;
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 14px;
      border: 2px solid #5da27b;
      background: #153225;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
      touch-action: none;
    }
    .hud {
      width: min(96vw, 900px);
      border: 1px solid rgba(165, 218, 182, 0.42);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(29, 58, 45, 0.95), rgba(18, 38, 29, 0.92));
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 7px;
    }
    .stat {
      min-height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(173, 220, 188, 0.35);
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 2px;
      padding: 4px;
    }
    .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1;
    }
    .value {
      font-weight: 800;
      font-size: clamp(16px, 2.6vw, 20px);
      line-height: 1;
    }
    .status {
      min-height: 1.2em;
      text-align: center;
      color: #dff8e8;
      font-weight: 600;
      font-size: clamp(13px, 2.1vw, 15px);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .btn {
      min-height: 40px;
      min-width: 100px;
      border-radius: 9px;
      border: 2px solid var(--btn-border);
      background: var(--btn);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn:active { background: var(--btn-active); }
    .btn.primary {
      background: var(--good);
      border-color: #c8fbda;
      color: #082518;
    }
    .btn.warn {
      background: var(--warn);
      border-color: #ffe0b4;
      color: #352008;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      align-items: stretch;
    }
    .ctrl {
      min-height: 40px;
      border-radius: 9px;
      border: 2px solid #69a786;
      background: #336f53;
      color: #f2fff6;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    .ctrl:active,
    .ctrl.active {
      background: #295942;
    }
    .ctrl.wide { grid-column: span 2; }
    .legend {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      #canvasWrap { max-height: min(46dvh, 430px); }
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .legend { display: none; }
    }
  </style>

<body>
  <a href="/" class="back-home" aria-label="Back to Home">&larr; Back</a>
  <main class="wrap">
    <div id="canvasWrap">
      <canvas id="game" width="900" height="540" aria-label="Whack-a-Mole board"></canvas>
    </div>
    <section class="hud">
      <div class="stats">
        <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
        <div class="stat"><span class="label">Best</span><span class="value" id="best">0</span></div>
        <div class="stat"><span class="label">Time</span><span class="value" id="time">60.0</span></div>
        <div class="stat"><span class="label">Streak</span><span class="value" id="streak">0</span></div>
        <div class="stat"><span class="label">Hits</span><span class="value" id="hits">0</span></div>
        <div class="stat"><span class="label">Coins</span><span class="value" id="coins">0</span></div>
      </div>
      <div class="status" id="statusLine">Tap moles quickly. Golden moles are bonus points, bombs are penalties.</div>
      <div class="button-row">
        <button class="btn primary" id="start-btn">START</button>
        <button class="btn" id="pause-btn">PAUSE</button>
        <button class="btn" id="restart-btn">RESTART</button>
        <button class="btn" id="fullscreen-btn">FULLSCREEN</button>
      </div>
      <div class="controls" aria-label="Touch controls">
        <button class="ctrl" data-hole="0">1</button>
        <button class="ctrl" data-hole="1">2</button>
        <button class="ctrl" data-hole="2">3</button>
        <button class="ctrl" data-hole="3">4</button>
        <button class="ctrl" data-hole="4">5</button>
        <button class="ctrl" data-hole="5">6</button>
        <button class="ctrl" data-hole="6">7</button>
        <button class="ctrl" data-hole="7">8</button>
        <button class="ctrl" data-hole="8">9</button>
        <button class="ctrl wide" id="select-prev-btn">SELECT PREV</button>
        <button class="ctrl wide" id="select-next-btn">SELECT NEXT</button>
        <button class="ctrl wide warn" id="whack-btn">WHACK SELECTED</button>
      </div>
      <p class="legend">Keyboard: Number keys 1-9 whack holes, arrows/WASD move selector, Space/Enter whack, P pause, R restart, F fullscreen.</p>
    </section>
  </main>

  <script type="module">
    import { addCoins, rememberRecent } from '../src/core/state.js';
    import { maybeUnlock } from '../src/prog/achievements.js';

    rememberRecent('whackamole');

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const timeEl = document.getElementById('time');
    const streakEl = document.getElementById('streak');
    const hitsEl = document.getElementById('hits');
    const coinsEl = document.getElementById('coins');
    const statusLineEl = document.getElementById('statusLine');

    const BEST_KEY = 'whackamole-best-score-v1';
    const ROUND_SECONDS = 60;
    const HOLE_RADIUS = 88;
    const holes = [];
    const W = canvas.width;
    const H = canvas.height;

    let rngSeed = (Date.now() >>> 0) || 123456789;
    let spawnTimer = 0;
    let lastTs = performance.now();
    let steppingExternally = false;

    const state = {
      mode: 'menu',
      score: 0,
      best: Number(localStorage.getItem(BEST_KEY) || '0'),
      timeLeft: ROUND_SECONDS,
      streak: 0,
      hits: 0,
      misses: 0,
      bombsHit: 0,
      coinsEarned: 0,
      selected: 4,
      message: 'Tap moles quickly. Golden moles are bonus points, bombs are penalties.',
      playedOnce: false,
      runSettled: false,
      pulse: 0,
      particles: [],
    };

    function setupHoles() {
      holes.length = 0;
      const spacingX = 255;
      const spacingY = 165;
      const startX = W * 0.5 - spacingX;
      const startY = H * 0.5 - spacingY * 0.75;
      for (let row = 0; row < 3; row += 1) {
        for (let col = 0; col < 3; col += 1) {
          holes.push({
            x: startX + col * spacingX,
            y: startY + row * spacingY,
            visible: false,
            type: 'normal',
            ttl: 0,
            rise: 0,
          });
        }
      }
    }

    function rand() {
      rngSeed = (rngSeed * 1664525 + 1013904223) >>> 0;
      return rngSeed / 4294967296;
    }

    function randomInt(maxExclusive) {
      return Math.floor(rand() * maxExclusive);
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function spawnInterval() {
      const progress = 1 - state.timeLeft / ROUND_SECONDS;
      return clamp(0.62 - progress * 0.33, 0.24, 0.62);
    }

    function chooseMoleType() {
      const roll = rand();
      if (roll < 0.12) return 'gold';
      if (roll > 0.88) return 'bomb';
      return 'normal';
    }

    function spawnMole() {
      const hidden = [];
      for (let i = 0; i < holes.length; i += 1) {
        if (!holes[i].visible) hidden.push(i);
      }
      if (!hidden.length) return;
      const idx = hidden[randomInt(hidden.length)];
      const hole = holes[idx];
      hole.visible = true;
      hole.type = chooseMoleType();
      const lifeBase = 0.86;
      const pace = 1 - state.timeLeft / ROUND_SECONDS;
      hole.ttl = clamp(lifeBase - pace * 0.38 + rand() * 0.2, 0.34, 1.06);
      hole.rise = 0;
    }

    function clearAllMoles() {
      for (const hole of holes) {
        hole.visible = false;
        hole.ttl = 0;
        hole.rise = 0;
      }
    }

    function awardCoins(amount) {
      const safe = Math.max(0, Math.floor(amount));
      if (!safe) return;
      if (typeof addCoins === 'function') addCoins(safe);
      state.coinsEarned += safe;
    }

    function settleRun() {
      if (state.runSettled) return;
      state.runSettled = true;
      state.mode = 'game_over';
      clearAllMoles();

      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(BEST_KEY, String(state.best));
      }

      const coins = clamp(Math.floor(state.score / 140) + Math.floor(state.hits / 14), 1, 14);
      awardCoins(coins);
      state.message = `Round complete: ${state.score} points, +${coins} coins.`;
      maybeUnlock({
        anyPlay: true,
        whackamole: {
          score: state.score,
          hits: state.hits,
          streak: state.streak,
          bombs: state.bombsHit,
        },
      });
    }

    function spawnParticles(x, y, color, count, speed = 160) {
      for (let i = 0; i < count; i += 1) {
        const ang = rand() * Math.PI * 2;
        const mag = speed * (0.35 + rand() * 0.7);
        state.particles.push({
          x,
          y,
          vx: Math.cos(ang) * mag,
          vy: Math.sin(ang) * mag,
          life: 0.18 + rand() * 0.28,
          maxLife: 0.18 + rand() * 0.28,
          color,
        });
      }
    }

    function applyScore(delta) {
      state.score = Math.max(0, state.score + delta);
    }

    function hitHole(index) {
      if (state.mode !== 'playing') return false;
      if (index < 0 || index >= holes.length) return false;
      state.selected = index;
      const hole = holes[index];

      if (!hole.visible) {
        state.misses += 1;
        state.streak = 0;
        applyScore(-5);
        state.message = 'Miss! Try to time your swings.';
        spawnParticles(hole.x, hole.y - 26, '#c1d8c8', 7, 90);
        return false;
      }

      hole.visible = false;
      hole.ttl = 0;
      hole.rise = 0;
      state.hits += 1;

      if (hole.type === 'bomb') {
        state.bombsHit += 1;
        state.streak = 0;
        applyScore(-35);
        state.message = 'Bomb mole! Big penalty.';
        spawnParticles(hole.x, hole.y - 50, '#ffb4a1', 16, 180);
        return true;
      }

      state.streak += 1;
      const streakBonus = Math.min(20, state.streak * 2);
      const base = hole.type === 'gold' ? 26 : 12;
      const gained = base + streakBonus;
      applyScore(gained);
      state.message = hole.type === 'gold'
        ? `Golden mole! +${gained} points.`
        : `Hit! +${gained} points.`;
      spawnParticles(hole.x, hole.y - 54, hole.type === 'gold' ? '#ffe08a' : '#9ff1b8', 14, 160);
      return true;
    }

    function startRound() {
      state.mode = 'playing';
      state.score = 0;
      state.timeLeft = ROUND_SECONDS;
      state.streak = 0;
      state.hits = 0;
      state.misses = 0;
      state.bombsHit = 0;
      state.coinsEarned = 0;
      state.runSettled = false;
      state.message = 'Whack quickly. Avoid bomb moles.';
      state.pulse = 0;
      state.particles = [];
      clearAllMoles();
      spawnTimer = 0.2;
      if (!state.playedOnce) {
        state.playedOnce = true;
        maybeUnlock({ anyPlay: true, whackamole: { score: 0, hits: 0, streak: 0, bombs: 0 } });
      }
    }

    function startOrResume() {
      if (state.mode === 'menu' || state.mode === 'game_over') {
        startRound();
        return;
      }
      if (state.mode === 'paused') {
        state.mode = 'playing';
        state.message = 'Back to whacking.';
      }
    }

    function togglePause() {
      if (state.mode === 'playing') {
        state.mode = 'paused';
        state.message = 'Paused.';
      } else if (state.mode === 'paused') {
        state.mode = 'playing';
        state.message = 'Back to whacking.';
      }
    }

    function restartRound() {
      state.mode = 'menu';
      state.message = 'Tap Start to begin a fresh round.';
      clearAllMoles();
      state.streak = 0;
      state.hits = 0;
      state.score = 0;
      state.timeLeft = ROUND_SECONDS;
      state.coinsEarned = 0;
      state.particles = [];
      state.runSettled = false;
    }

    function updateMoles(dt) {
      for (const hole of holes) {
        if (!hole.visible) continue;
        hole.ttl -= dt;
        hole.rise = clamp(hole.rise + dt * 7.5, 0, 1);
        if (hole.ttl <= 0) {
          hole.visible = false;
          hole.ttl = 0;
          hole.rise = 0;
          state.streak = 0;
        }
      }
    }

    function updateParticles(dt) {
      if (!state.particles.length) return;
      const next = [];
      for (const p of state.particles) {
        p.life -= dt;
        if (p.life <= 0) continue;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.95;
        p.vy *= 0.95;
        next.push(p);
      }
      state.particles = next;
    }

    function update(dt) {
      state.pulse += dt;
      updateParticles(dt);

      if (state.mode !== 'playing') return;

      state.timeLeft = Math.max(0, state.timeLeft - dt);
      spawnTimer -= dt;
      updateMoles(dt);

      const targetVisible = state.timeLeft > 40 ? 2 : state.timeLeft > 20 ? 3 : 4;
      let visibleCount = 0;
      for (const hole of holes) {
        if (hole.visible) visibleCount += 1;
      }

      while (visibleCount < targetVisible && spawnTimer <= 0) {
        spawnMole();
        visibleCount += 1;
        spawnTimer += spawnInterval();
      }

      if (state.timeLeft <= 0.001) {
        settleRun();
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#6fb96f');
      sky.addColorStop(0.54, '#5ea85d');
      sky.addColorStop(0.55, '#4f7f3f');
      sky.addColorStop(1, '#3a5d33');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < 12; i += 1) {
        const x = (i / 11) * W;
        const wobble = Math.sin(state.pulse * 0.9 + i) * 10;
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(x, 16 + wobble, 20, 48);
      }

      ctx.fillStyle = '#4f7f3f';
      ctx.fillRect(0, H * 0.58, W, H * 0.42);
    }

    function drawHole(hole, index) {
      const pulse = 0.55 + Math.sin(state.pulse * 5 + index * 0.8) * 0.08;
      const selected = state.selected === index;

      ctx.save();
      ctx.translate(hole.x, hole.y);

      ctx.fillStyle = selected ? 'rgba(255,235,163,0.45)' : `rgba(26, 44, 27, ${pulse})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, HOLE_RADIUS + (selected ? 12 : 0), 36 + (selected ? 5 : 0), 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = selected ? '#ffe2a1' : 'rgba(11, 19, 12, 0.5)';
      ctx.lineWidth = selected ? 4 : 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, HOLE_RADIUS + (selected ? 12 : 0), 36 + (selected ? 5 : 0), 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#27422d';
      ctx.beginPath();
      ctx.ellipse(0, -24, HOLE_RADIUS - 18, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawMole(hole) {
      if (!hole.visible) return;
      const rise = hole.rise;
      const bob = Math.sin(state.pulse * 7 + hole.x * 0.02) * 2.5;
      const y = hole.y - 32 - (1 - rise) * 62 + bob;
      const color = hole.type === 'gold' ? '#f0ba56' : hole.type === 'bomb' ? '#7b7f8b' : '#8a5a3c';

      ctx.save();
      ctx.translate(hole.x, y);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 46, 44, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f8f6ef';
      ctx.beginPath();
      ctx.arc(-13, -4, 8, 0, Math.PI * 2);
      ctx.arc(13, -4, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(-13, -4, 3.5, 0, Math.PI * 2);
      ctx.arc(13, -4, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = hole.type === 'bomb' ? '#ff9f9f' : '#2f1f19';
      ctx.beginPath();
      ctx.ellipse(0, 12, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      if (hole.type === 'gold') {
        ctx.fillStyle = 'rgba(255,239,180,0.72)';
        ctx.beginPath();
        ctx.arc(0, -18, 24, 0, Math.PI * 2);
        ctx.fill();
      }

      if (hole.type === 'bomb') {
        ctx.fillStyle = '#2b303c';
        ctx.beginPath();
        ctx.arc(0, -36, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#8ec6ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(6, -48);
        ctx.lineTo(18, -62);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      if (state.mode === 'playing') return;
      ctx.fillStyle = 'rgba(13, 24, 16, 0.56)';
      ctx.fillRect(0, H * 0.34, W, H * 0.32);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#f3fff4';
      ctx.font = '700 44px "Trebuchet MS", "Segoe UI", sans-serif';
      let title = 'WHACK-A-MOLE BLITZ';
      if (state.mode === 'paused') title = 'PAUSED';
      if (state.mode === 'game_over') title = 'ROUND OVER';
      ctx.fillText(title, W * 0.5, H * 0.47);

      ctx.fillStyle = '#dff7e5';
      ctx.font = '600 21px "Trebuchet MS", "Segoe UI", sans-serif';
      const subtitle = state.mode === 'menu'
        ? 'Press Start to begin'
        : state.mode === 'paused'
          ? 'Press Pause or Enter to resume'
          : `Final Score ${state.score} | Press Start to play again`;
      ctx.fillText(subtitle, W * 0.5, H * 0.56);
    }

    function render() {
      drawBackground();
      for (let i = 0; i < holes.length; i += 1) drawHole(holes[i], i);
      for (const hole of holes) drawMole(hole);
      drawParticles();
      drawOverlay();
    }

    function updateHud() {
      scoreEl.textContent = String(state.score);
      bestEl.textContent = String(state.best);
      timeEl.textContent = state.timeLeft.toFixed(1);
      streakEl.textContent = String(state.streak);
      hitsEl.textContent = String(state.hits);
      coinsEl.textContent = String(state.coinsEarned);
      statusLineEl.textContent = state.message;

      for (const btn of document.querySelectorAll('.ctrl[data-hole]')) {
        const idx = Number(btn.dataset.hole);
        btn.classList.toggle('active', idx === state.selected);
      }
    }

    function stepSimulation(ms) {
      const total = clamp(ms, 0, 4000) / 1000;
      let remain = total;
      const frame = 1 / 120;
      while (remain > 0) {
        const dt = Math.min(frame, remain);
        update(dt);
        remain -= dt;
      }
      updateHud();
      render();
    }

    function isEditableTarget(target) {
      if (!target || !(target instanceof HTMLElement)) return false;
      const tag = target.tagName;
      return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || target.isContentEditable;
    }

    function nextSelection(dir) {
      const row = Math.floor(state.selected / 3);
      const col = state.selected % 3;
      let nRow = row;
      let nCol = col;
      if (dir === 'left') nCol = (col + 2) % 3;
      else if (dir === 'right') nCol = (col + 1) % 3;
      else if (dir === 'up') nRow = (row + 2) % 3;
      else if (dir === 'down') nRow = (row + 1) % 3;
      state.selected = nRow * 3 + nCol;
    }

    function whackSelected() {
      if (state.mode === 'menu') startOrResume();
      if (state.mode === 'paused') return;
      hitHole(state.selected);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        canvas.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    canvas.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      if (state.mode === 'menu') startOrResume();
      if (state.mode !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;

      let bestIndex = -1;
      let bestDist = Number.POSITIVE_INFINITY;
      for (let i = 0; i < holes.length; i += 1) {
        const dx = x - holes[i].x;
        const dy = y - holes[i].y;
        const dist = Math.hypot(dx, dy * 2.2);
        if (dist < bestDist) {
          bestDist = dist;
          bestIndex = i;
        }
      }
      if (bestIndex >= 0 && bestDist <= 110) {
        hitHole(bestIndex);
      }
      updateHud();
      render();
    }, { passive: false });

    window.advanceTime = (ms) => {
      steppingExternally = true;
      stepSimulation(ms);
      steppingExternally = false;
    };

    window.render_game_to_text = () => {
      const visible = [];
      for (let i = 0; i < holes.length; i += 1) {
        const hole = holes[i];
        if (!hole.visible) continue;
        visible.push({
          index: i,
          x: Number(hole.x.toFixed(1)),
          y: Number(hole.y.toFixed(1)),
          type: hole.type,
          ttl_sec: Number(hole.ttl.toFixed(2)),
        });
      }
      const payload = {
        coordinate_system: {
          origin: 'top-left',
          x_axis: 'right',
          y_axis: 'down',
          units: 'pixels',
          canvas: { width: W, height: H },
        },
        mode: state.mode,
        score: state.score,
        best: state.best,
        time_left_sec: Number(state.timeLeft.toFixed(2)),
        streak: state.streak,
        hits: state.hits,
        misses: state.misses,
        bombs_hit: state.bombsHit,
        selected_hole: state.selected,
        visible_moles: visible,
        objective: 'Whack normal and golden moles, avoid bomb moles before the timer ends.',
      };
      return JSON.stringify(payload);
    };

    document.addEventListener('keydown', (event) => {
      if (isEditableTarget(event.target)) return;
      const code = event.code;

      if (code === 'Digit1') hitHole(0);
      else if (code === 'Digit2') hitHole(1);
      else if (code === 'Digit3') hitHole(2);
      else if (code === 'Digit4') hitHole(3);
      else if (code === 'Digit5') hitHole(4);
      else if (code === 'Digit6') hitHole(5);
      else if (code === 'Digit7') hitHole(6);
      else if (code === 'Digit8') hitHole(7);
      else if (code === 'Digit9') hitHole(8);
      else if (code === 'ArrowLeft' || code === 'KeyA') {
        event.preventDefault();
        nextSelection('left');
      } else if (code === 'ArrowRight' || code === 'KeyD') {
        event.preventDefault();
        nextSelection('right');
      } else if (code === 'ArrowUp' || code === 'KeyW') {
        event.preventDefault();
        nextSelection('up');
      } else if (code === 'ArrowDown' || code === 'KeyS') {
        event.preventDefault();
        nextSelection('down');
      } else if (code === 'Space' || code === 'Enter') {
        event.preventDefault();
        whackSelected();
      } else if (code === 'KeyP') {
        event.preventDefault();
        togglePause();
      } else if (code === 'KeyR') {
        event.preventDefault();
        restartRound();
      } else if (code === 'KeyF') {
        event.preventDefault();
        toggleFullscreen();
      } else if (code === 'Escape' && document.fullscreenElement) {
        document.exitFullscreen?.().catch(() => {});
      }

      updateHud();
      render();
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      startOrResume();
      updateHud();
      render();
    });
    document.getElementById('pause-btn').addEventListener('click', () => {
      togglePause();
      updateHud();
      render();
    });
    document.getElementById('restart-btn').addEventListener('click', () => {
      restartRound();
      updateHud();
      render();
    });
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      toggleFullscreen();
    });

    document.getElementById('select-prev-btn').addEventListener('click', () => {
      nextSelection('left');
      updateHud();
      render();
    });
    document.getElementById('select-next-btn').addEventListener('click', () => {
      nextSelection('right');
      updateHud();
      render();
    });
    document.getElementById('whack-btn').addEventListener('click', () => {
      whackSelected();
      updateHud();
      render();
    });

    for (const btn of document.querySelectorAll('.ctrl[data-hole]')) {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.hole);
        state.selected = idx;
        whackSelected();
        updateHud();
        render();
      });
    }

    window.addEventListener('blur', () => {
      if (state.mode === 'playing') {
        state.mode = 'paused';
        state.message = 'Paused.';
      }
      updateHud();
      render();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && state.mode === 'playing') {
        state.mode = 'paused';
        state.message = 'Paused.';
        updateHud();
        render();
      }
    });

    function loop(ts) {
      const dt = Math.min(0.05, (ts - lastTs) / 1000);
      lastTs = ts;
      if (!steppingExternally) {
        update(dt);
        updateHud();
        render();
      }
      requestAnimationFrame(loop);
    }

    setupHoles();
    restartRound();
    updateHud();
    render();
    requestAnimationFrame(loop);
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "whackamole", gameName: "Whack-a-Mole Blitz" });
  </script>
</body>
</html>
