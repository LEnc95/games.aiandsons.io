for(let row=0;row<6;row++)for(let col=0;col<6;col++){const x=left+col*cell,y=top+row*cell,value=game.cells[row][col];ctx.fillStyle=value===1?'#148fb8':'#edf9f5';ctx.fillRect(x,y,cell,cell);if(value===1){const water=ctx.createLinearGradient(0,y,0,y+cell);water.addColorStop(0,'#53d5e5');water.addColorStop(1,'#087aaa');ctx.fillStyle=water;ctx.fillRect(x+2,y+2,cell-4,cell-4);ctx.strokeStyle='#d9ffffa8';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+5,y+cell*.25);ctx.quadraticCurveTo(x+cell*.3,y+cell*.13,x+cell*.52,y+cell*.25);ctx.quadraticCurveTo(x+cell*.75,y+cell*.37,x+cell-5,y+cell*.22);ctx.stroke();ctx.fillStyle='#e9ffffaa';for(let i=0;i<2;i++){ctx.beginPath();ctx.arc(x+cell*(.28+i*.39),y+cell*(.65-i*.2),Math.max(2,cell*.045),0,Math.PI*2);ctx.fill()}}else if(value===2){ctx.strokeStyle='#687986';ctx.lineWidth=Math.max(3,cell*.06);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+cell*.32,y+cell*.32);ctx.lineTo(x+cell*.68,y+cell*.68);ctx.moveTo(x+cell*.68,y+cell*.32);ctx.lineTo(x+cell*.32,y+cell*.68);ctx.stroke()}}
ctx.strokeStyle='#8ab8b5';ctx.lineWidth=Math.max(1.2,cell*.025);for(let i=0;i<=6;i++){ctx.beginPath();ctx.moveTo(left,top+i*cell);ctx.lineTo(left+v.size,top+i*cell);ctx.stroke();ctx.beginPath();ctx.moveTo(left+i*cell,top);ctx.lineTo(left+i*cell,top+v.size);ctx.stroke()}
ctx.strokeStyle='#17364d';ctx.lineWidth=Math.max(4,cell*.075);ctx.lineCap='round';for(let row=0;row<6;row++)for(let col=0;col<6;col++){const id=b.layout[row][col],x=left+col*cell,y=top+row*cell;if(row===0||b.layout[row-1][col]!==id){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cell,y);ctx.stroke()}if(col===0||b.layout[row][col-1]!==id){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cell);ctx.stroke()}if(row===5||b.layout[row+1][col]!==id){ctx.beginPath();ctx.moveTo(x,y+cell);ctx.lineTo(x+cell,y+cell);ctx.stroke()}if(col===5||b.layout[row][col+1]!==id){ctx.beginPath();ctx.moveTo(x+cell,y);ctx.lineTo(x+cell,y+cell);ctx.stroke()}}
if(game.mode==='playing'){const x=left+game.focus.col*cell,y=top+game.focus.row*cell;ctx.strokeStyle='#ffd85a';ctx.lineWidth=Math.max(4,cell*.07);ctx.strokeRect(x+4,y+4,cell-8,cell-8)}ctx.restore()}
function overlay(title,lines,accent='#e4a637'){const v=view,w=Math.min(v.width*.82,680),h=Math.min(v.height*.55,340),x=(v.width-w)/2,y=(v.height-h)/2;ctx.fillStyle='#123149ad';ctx.fillRect(0,0,v.width,v.height);rounded(x,y,w,h,24);ctx.fillStyle='#fffdf2f5';ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=5;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#17364d';ctx.font=`900 ${Math.max(25,Math.min(46,w*.068))}px Inter,system-ui`;ctx.fillText(title,x+w/2,y+h*.23);ctx.font=`750 ${Math.max(13,Math.min(19,w*.028))}px Inter,system-ui`;lines.forEach((line,index)=>ctx.fillText(line,x+w/2,y+h*(.44+index*.145)))}
function render(){computeView();drawBackground();drawHeader();drawGrid();if(game.mode==='menu')overlay('AQUARIUM LOGIC',['Match every row and column water count.','Inside each outlined tank, water rises from the bottom.','Mark every cell Water or Dry, then press Check.']);else if(game.mode==='paused')overlay('TANKS PAUSED',['Puzzle time and bubbles are frozen.','Your markings are safe.','Press P or Pause to continue.']);else if(game.mode==='failed')overlay('OUT OF AIR',[game.status,'Your current markings remain visible.','Press R or Restart for fresh air.'],'#d66252');else if(game.mode==='level-complete')overlay('TANK BALANCED',[`${board().name} is perfectly filled.`,`${game.lastCoins} coins added to your collection.`,'Press Enter or Next tank.'],'#2d9b72');else if(game.mode==='won')overlay('REEF KEEPER',[`All five aquariums are balanced.`,`${game.coinsEarned} campaign coins earned.`,`Finished in ${formatTime(game.campaignMs)}.`],'#2d9b72');syncUi()}
function syncUi(){el.level.textContent=`${game.levelIndex+1} / ${BOARDS.length}`;el.filled.textContent=`${countWater()} / ${board().total}`;el.air.textContent=String(game.air);el.hint.textContent=String(game.hints);el.time.textContent=formatTime(game.elapsedMs);el.coins.textContent=String(profileState.coins||0);el.start.hidden=game.mode!=='menu';el.next.hidden=game.mode!=='level-complete';el.check.disabled=game.mode!=='playing';el.hintBtn.disabled=game.mode!=='playing'||game.hints<=0;el.undo.disabled=game.mode!=='playing'||!game.history.length;el.pause.disabled=!['playing','paused'].includes(game.mode);el.pause.textContent=game.mode==='paused'?'Resume':'Pause';el.tools.forEach(button=>{button.disabled=game.mode!=='playing';button.classList.toggle('selected',button.dataset.tool===game.selected)});el.live.textContent=game.status}
function canvasCell(event){const rect=canvas.getBoundingClientRect(),x=(event.clientX-rect.left)/rect.width*canvas.width,y=(event.clientY-rect.top)/rect.height*canvas.height,col=Math.floor((x-view.left)/view.cell),row=Math.floor((y-view.top)/view.cell);return{row,col}}
canvas.addEventListener('pointerdown',event=>{if(game.mode==='menu'){startCampaign();return}const cell=canvasCell(event);setCell(cell.row,cell.col,game.selected,'pointer');event.preventDefault()});
el.start.addEventListener('click',startCampaign);el.next.addEventListener('click',nextBoard);el.check.addEventListener('click',checkBoard);el.hintBtn.addEventListener('click',hint);el.undo.addEventListener('click',undo);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restart);el.full.addEventListener('click',toggleFullscreen);el.tools.forEach(button=>button.addEventListener('click',()=>selectTool(button.dataset.tool)));
document.addEventListener('keydown',event=>{const key=event.key.toLowerCase();if(['arrowup','arrowdown','arrowleft','arrowright'].includes(key)){event.preventDefault();if(key==='arrowup')moveFocus(-1,0);else if(key==='arrowdown')moveFocus(1,0);else if(key==='arrowleft')moveFocus(0,-1);else moveFocus(0,1);return}if(key==='w'){setCell(game.focus.row,game.focus.col,'water','keyboard');return}if(key==='x'){setCell(game.focus.row,game.focus.col,'dry','keyboard');return}if(key==='c'||key==='delete'||key==='backspace'){event.preventDefault();setCell(game.focus.row,game.focus.col,'clear','keyboard');return}if(key==='h'){hint();return}if(key==='u'){undo();return}if(key==='enter'){event.preventDefault();if(game.mode==='menu')startCampaign();else if(game.mode==='level-complete')nextBoard();else if(game.mode==='playing')checkBoard();return}if(key==='p'){togglePause();return}if(key==='r'){restart();return}if(key==='f'){toggleFullscreen();return}if(key==='escape'&&document.fullscreenElement)document.exitFullscreen?.()});
document.addEventListener('fullscreenchange',resizeCanvas);window.addEventListener('resize',resizeCanvas);
window.advanceTime=ms=>{manualUntil=performance.now()+160;let left=Math.max(0,Math.min(30000,Number(ms)||0));while(left>0){const step=Math.min(1000/60,left);update(step);left-=step}render()};
window.render_game_to_text=()=>{const counts=currentCounts();return JSON.stringify({coordinate_system:'6x6 grid; row 0/column 0 are top-left; rows increase down, columns increase right',mode:game.mode,paused_from:game.mode==='paused'?game.resumeMode:null,board:{name:board().name,index:game.levelIndex+1,total:BOARDS.length,row_clues:board().rows,column_clues:board().cols,regions:board().layout},cursor:game.focus,selected_tool:game.selected,cells:game.cells.map(row=>row.map(value=>value===1?'~':value===2?'x':'.').join('')),water_counts:{rows:counts.rows,columns:counts.cols,total:countWater(),target:board().total},marked:countMarked(),air:game.air,hints:game.hints,tank_violations:tankViolations(),elapsed_ms:Math.round(game.elapsedMs),campaign:{coins_earned:game.coinsEarned,completed_boards:game.levelIndex+(game.mode==='level-complete'||game.mode==='won'?1:0)},status:game.status,last_action:game.lastAction,controls:{move_cursor:'Arrow keys',mark_water:'W or Water tool',mark_dry:'X or Dry tool',clear:'C or Clear tool',check:'Enter',hint:'H',undo:'U',pause:'P',restart:'R',fullscreen:'F'}})};
window.__AQUARIUM_LOGIC_GAME__={getState:()=>game,getBoard:()=>board(),getView:()=>view,start:startCampaign,restart,nextBoard,selectTool,setCell,moveFocus,undo,hint,check:checkBoard,pause:togglePause,solveCurrent,failCurrent:()=>{while(game.mode==='playing')checkBoard();return game.mode},completeCampaign:()=>{while(game.mode!=='won'){if(game.mode==='level-complete')nextBoard();else if(game.mode==='playing'){solveCurrent();checkBoard()}else break}return game.mode}};
mountGameFeedback({gameSlug:'aquariumlogic',gameName:'Aquarium Logic'});
function frame(now){if(now>=manualUntil){const dt=Math.min(50,Math.max(0,now-lastFrame));update(dt);render()}lastFrame=now;requestAnimationFrame(frame)}
resizeCanvas();syncUi();requestAnimationFrame(frame);
</script>
