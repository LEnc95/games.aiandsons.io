function drawArrow(){const p=game.mode==='result'&&game.lastShot?{x:game.lastShot.hit.x,y:game.lastShot.hit.y,angle:0}:arrowPoint();if(!p)return;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle||0);ctx.strokeStyle='#4f2e20';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-42,0);ctx.lineTo(18,0);ctx.stroke();ctx.fillStyle='#d9e8e3';ctx.beginPath();ctx.moveTo(-35,0);ctx.lineTo(-49,-10);ctx.lineTo(-45,0);ctx.lineTo(-49,10);ctx.closePath();ctx.fill();ctx.fillStyle='#17364b';ctx.beginPath();ctx.moveTo(23,0);ctx.lineTo(12,-7);ctx.lineTo(12,7);ctx.closePath();ctx.fill();ctx.restore()}
function drawTopCard(v){ctx.save();roundRect(v.width*.035,v.height*.035,v.width*.36,v.height*.13,16);ctx.fillStyle='#fffdf1dc';ctx.fill();ctx.fillStyle='#17364b';ctx.textBaseline='middle';ctx.font=`900 ${Math.max(18,v.width*.023)}px Inter,system-ui`;ctx.fillText('WINDBOW TRIALS',v.width*.055,v.height*.076);ctx.font=`750 ${Math.max(12,v.width*.013)}px Inter,system-ui`;ctx.fillStyle='#31566b';ctx.fillText(game.status.slice(0,54),v.width*.055,v.height*.125);ctx.restore()}
function overlay(title,lines,accent='#f2b33f'){const v=view,w=Math.min(v.width*.72,690),h=Math.min(v.height*.57,350),x=(v.width-w)/2,y=(v.height-h)/2;ctx.save();ctx.fillStyle='#0c2638b8';ctx.fillRect(0,0,v.width,v.height);roundRect(x,y,w,h,24);ctx.fillStyle='#fffdf1f2';ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=5;ctx.stroke();ctx.textAlign='center';ctx.fillStyle='#17364b';ctx.font=`900 ${Math.max(28,Math.min(48,w*.072))}px Inter,system-ui`;ctx.fillText(title,x+w/2,y+h*.26);ctx.font=`750 ${Math.max(15,Math.min(22,w*.034))}px Inter,system-ui`;lines.forEach((line,i)=>ctx.fillText(line,x+w/2,y+h*(.47+i*.13)));ctx.restore()}
function render(){const v=computeView();drawBackground(v);drawTarget(v);drawBow(v);drawWind(v);drawCrosshair();drawArrow();drawTopCard(v);if(game.mode==='menu')overlay('WIND BOW TRIALS',['Aim with pointer, touch, arrows, or WASD.','Hold Space or Shoot; release to fire.','Read five winds. Score 95 from 15 arrows.']);else if(game.mode==='paused')overlay('RANGE PAUSED',['Target hidden while the trial waits.','Press P or Pause to resume.']);else if(game.mode==='round-summary')overlay(`ROUND ${game.round} COMPLETE`,[`${game.roundScore} points this round · ${game.score} total.`,game.score>=game.round*19?'On pace for the pin.':'A stronger round can recover.','Press Enter or Next round.']);else if(game.mode==='won')overlay('WINDBOW PIN EARNED',[`${game.score} points · target ${TARGET_SCORE}.`,`${game.lastCoins} coins awarded.`,'Press Restart for a new trial.'],'#4faf75');else if(game.mode==='lost')overlay('TRIAL COMPLETE',[`${game.score} points · target ${TARGET_SCORE}.`,`Needed ${TARGET_SCORE-game.score} more points.`,'Press Restart and bend the wind.'],'#d56750');syncUi()}
function syncUi(){el.round.textContent=`${game.round} / ${ROUNDS}`;el.arrow.textContent=`${game.arrowInRound} / ${ARROWS_PER_ROUND}`;el.score.textContent=`${game.score} / ${TARGET_SCORE}`;el.power.textContent=`${Math.round(game.power*100)}%`;el.wind.textContent=game.wind.label;el.coins.textContent=String(profileState.coins||0);el.start.hidden=game.mode!=='menu';el.continue.hidden=game.mode!=='round-summary';el.shoot.disabled=!['aiming','charging'].includes(game.mode);el.pause.disabled=!['aiming','charging','flight','result','paused'].includes(game.mode);el.pause.textContent=game.mode==='paused'?'Resume':'Pause';el.shoot.classList.toggle('charging',game.mode==='charging');el.shoot.textContent=game.mode==='charging'?'Release to fire':'Hold to shoot';el.live.textContent=game.status}
function pointerPosition(event){const rect=canvas.getBoundingClientRect();return{x:(event.clientX-rect.left)*canvas.width/rect.width,y:(event.clientY-rect.top)*canvas.height/rect.height}}
canvas.addEventListener('pointerdown',event=>{if(game.mode!=='aiming')return;pointerId=event.pointerId;canvas.setPointerCapture?.(pointerId);const p=pointerPosition(event);setAim(p.x,p.y,'pointer-aim');startCharge();event.preventDefault()});
canvas.addEventListener('pointermove',event=>{if(pointerId!==event.pointerId||game.mode!=='charging')return;const p=pointerPosition(event);setAim(p.x,p.y,'pointer-drag')});
canvas.addEventListener('pointerup',event=>{if(pointerId!==event.pointerId)return;pointerId=null;fire();event.preventDefault()});
canvas.addEventListener('pointercancel',()=>{pointerId=null;if(game.mode==='charging'){game.charging=false;game.mode='aiming';syncUi();render()}});
el.start.addEventListener('click',startCampaign);el.continue.addEventListener('click',nextRound);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restart);el.full.addEventListener('click',toggleFullscreen);el.center.addEventListener('click',()=>setAim(view.target.x,view.target.y,'center'));
document.querySelectorAll('[data-dx]').forEach(button=>button.addEventListener('click',()=>nudge(Number(button.dataset.dx),Number(button.dataset.dy))));
el.shoot.addEventListener('pointerdown',event=>{event.preventDefault();startCharge()});el.shoot.addEventListener('pointerup',event=>{event.preventDefault();fire()});el.shoot.addEventListener('pointercancel',()=>{if(game.mode==='charging')fire()});
document.addEventListener('keydown',event=>{const key=event.key.toLowerCase();if(['arrowleft','arrowright','arrowup','arrowdown',' ','w','a','s','d'].includes(key))event.preventDefault();if((key==='enter'||key===' ')&&game.mode==='menu'){startCampaign();return}if((key==='enter'||key==='n')&&game.mode==='round-summary'){nextRound();return}if(key==='p'){togglePause();return}if(key==='r'){restart();return}if(key==='f'){toggleFullscreen();return}if(key==='escape'&&document.fullscreenElement){document.exitFullscreen?.();return}if(game.mode!=='aiming'&&game.mode!=='charging')return;if(key==='arrowleft'||key==='a')nudge(-1,0);else if(key==='arrowright'||key==='d')nudge(1,0);else if(key==='arrowup'||key==='w')nudge(0,-1);else if(key==='arrowdown'||key==='s')nudge(0,1);else if(key===' '&&!event.repeat)startCharge()});
document.addEventListener('keyup',event=>{if(event.key===' '&&game.mode==='charging'){event.preventDefault();fire()}});
document.addEventListener('fullscreenchange',resizeCanvas);window.addEventListener('resize',resizeCanvas);

window.advanceTime=ms=>{manualUntil=performance.now()+120;let left=Math.max(0,Math.min(20000,Number(ms)||0));while(left>0){const step=Math.min(1000/60,left);update(step);left-=step}render()};
window.render_game_to_text=()=>JSON.stringify({coordinate_system:'canvas pixels; origin top-left; +x right, +y down',mode:game.mode,paused_from:game.mode==='paused'?game.resumeMode:null,range_bounds:{left:Math.round(view.bounds.left),right:Math.round(view.bounds.right),top:Math.round(view.bounds.top),bottom:Math.round(view.bounds.bottom)},target:{x:Math.round(view.target.x),y:Math.round(view.target.y),radius:Math.round(view.target.r),rings:[{max_ratio:.15,points:10},{max_ratio:.3,points:8},{max_ratio:.48,points:6},{max_ratio:.68,points:4},{max_ratio:.88,points:2}]},aim:{x:Math.round(game.aim.x),y:Math.round(game.aim.y)},wind:{x:game.wind.x,y:game.wind.y,label:game.wind.label,note:'positive x pushes right; positive y pushes down'},round:game.round,rounds:ROUNDS,arrow_in_round:game.arrowInRound,arrows_per_round:ARROWS_PER_ROUND,total_arrows:game.totalArrows,score:game.score,target_score:TARGET_SCORE,round_score:game.roundScore,power:Number(game.power.toFixed(3)),charging:game.charging,shot:game.arrow?{progress:Number((game.arrow.elapsed/game.arrow.duration).toFixed(3)),start:{x:Math.round(game.arrow.start.x),y:Math.round(game.arrow.start.y)},predicted_hit:{x:Math.round(game.arrow.end.x),y:Math.round(game.arrow.end.y)}}:null,last_shot:game.lastShot,elapsed_ms:Math.round(game.elapsedMs),status:game.status,last_action:game.lastAction,controls:{aim:'Pointer/touch or arrows/WASD',shoot:'Hold and release Space or Shoot',pause:'P',restart:'R',fullscreen:'F'}});
window.__WINDBOW_GAME__={getState:()=>game,getView:()=>view,start:startCampaign,nextRound,setAim,startCharge,fire,nudge,perfectAim:(power=1)=>{const d=driftFor(power);return{x:view.target.x-d.x,y:view.target.y-d.y}},prepareFinal:(outcome='win')=>{game.mode='aiming';game.round=ROUNDS;game.arrowInRound=ARROWS_PER_ROUND-1;game.totalArrows=ROUNDS*ARROWS_PER_ROUND-1;game.roundScore=0;game.wind=windForRound();game.arrow=null;game.lastShot=null;game.score=outcome==='win'?TARGET_SCORE-10:0;game.power=1;game.charging=false;const aim=outcome==='win'?window.__WINDBOW_GAME__.perfectAim(1):{x:view.bounds.left,y:view.bounds.top};setAim(aim.x,aim.y,'qa-final-setup');syncUi();render()}};
mountGameFeedback({gameSlug:'windbow',gameName:'Windbow Trials'});
function frame(now){if(now>=manualUntil){const dt=Math.min(50,Math.max(0,now-lastFrame));update(dt);render()}lastFrame=now;requestAnimationFrame(frame)}
resizeCanvas();syncUi();requestAnimationFrame(frame);
</script>
</body>
</html>
