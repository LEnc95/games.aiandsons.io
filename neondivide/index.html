<script type="module">
import { state as profileState, addCoins } from '/src/core/state.js';

const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const el={zone:document.getElementById('zoneLabel'),claimed:document.getElementById('claimedLabel'),shields:document.getElementById('shieldsLabel'),time:document.getElementById('timeLabel'),trail:document.getElementById('trailLabel'),coins:document.getElementById('coinsLabel'),start:document.getElementById('startBtn'),next:document.getElementById('nextBtn'),pause:document.getElementById('pauseBtn'),restart:document.getElementById('restartBtn'),full:document.getElementById('fullBtn'),live:document.getElementById('liveStatus')};
const LEVELS=[
  {name:'Sunset Grid',cols:24,rows:18,target:55,time:90000,enemies:[{x:16.3,y:9.4,vx:2.65,vy:2.1}]},
  {name:'Prism Current',cols:26,rows:18,target:60,time:85000,enemies:[{x:8.4,y:7.2,vx:2.8,vy:2.25},{x:18.8,y:11.6,vx:-2.4,vy:2.7}]},
  {name:'Aurora Split',cols:28,rows:20,target:65,time:80000,enemies:[{x:7.2,y:6.5,vx:2.95,vy:2.35},{x:19.5,y:7.8,vx:-2.6,vy:2.8},{x:14.2,y:14.1,vx:2.4,vy:-3.05}]},
];
const DIRS={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
const game={mode:'menu',resumeMode:'playing',levelIndex:0,grid:[],player:{x:12,y:0},safe:{x:12,y:0},trail:[],trailSet:new Set(),drawing:false,enemies:[],shields:3,claimed:0,timeLeft:LEVELS[0].time,elapsedMs:0,campaignMs:0,moveClock:0,moveDelay:82,lastDirection:null,keys:new Set(),rewardedLevels:new Set(),coinsEarned:0,lastCoins:0,captures:0,status:'Cut safe paths across the field and claim 55% without touching a spark.',lastAction:{type:'ready'},pulse:0,flash:0};
let view={width:canvas.width,height:canvas.height,cell:20,boardX:0,boardY:0,boardW:0,boardH:0},manualUntil=0,lastFrame=performance.now();

function level(){return LEVELS[game.levelIndex]}
function key(x,y){return `${x},${y}`}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function isInside(x,y){const l=level();return x>=0&&y>=0&&x<l.cols&&y<l.rows}
function isFilled(x,y){return isInside(x,y)&&game.grid[y][x]===1}
function resetGrid(){const l=level();game.grid=Array.from({length:l.rows},(_,y)=>Array.from({length:l.cols},(_,x)=>x===0||y===0||x===l.cols-1||y===l.rows-1?1:0))}
function cloneEnemies(){return level().enemies.map((enemy,index)=>({...enemy,id:index+1}))}
function claimedPercent(){const l=level();let filled=0,total=(l.cols-2)*(l.rows-2);for(let y=1;y<l.rows-1;y++)for(let x=1;x<l.cols-1;x++)if(game.grid[y][x]===1)filled++;return total?filled/total*100:0}
function clearInput(){game.keys.clear();game.moveClock=0}
function resetLevel(message=`${level().name} ready. Draw from one safe edge to another.`){const l=level();resetGrid();game.player={x:Math.floor(l.cols/2),y:0};game.safe={...game.player};game.trail=[];game.trailSet=new Set();game.drawing=false;game.enemies=cloneEnemies();game.shields=3;game.claimed=0;game.timeLeft=l.time;game.elapsedMs=0;game.moveClock=0;game.lastDirection=null;game.lastCoins=0;game.status=message;game.lastAction={type:'level-ready',level:game.levelIndex+1};clearInput();syncUi();render()}
function startCampaign(){game.levelIndex=0;game.rewardedLevels=new Set();game.coinsEarned=0;game.campaignMs=0;game.mode='playing';resetLevel('Zone one live. Leave the rim, close a path, and keep clear of the spark.');game.lastAction={type:'start',level:1};syncUi();render()}
function restart(){if(game.mode==='won'){startCampaign();game.status='Campaign restarted from zone one.';game.lastAction={type:'campaign-restart',level:1}}else{game.mode='playing';resetLevel(`${level().name} restarted.`);game.lastAction={type:'restart',level:game.levelIndex+1}}syncUi();render()}
function nextLevel(){if(game.mode!=='level-complete')return false;game.levelIndex++;game.mode='playing';resetLevel(`${level().name} live. More sparks, tighter target.`);game.lastAction={type:'next-level',level:game.levelIndex+1};syncUi();render();return true}
function awardLevel(final=false){if(game.rewardedLevels.has(game.levelIndex))return 0;const amount=7+game.levelIndex*3+(final?15:0);addCoins(amount);game.rewardedLevels.add(game.levelIndex);game.coinsEarned+=amount;return amount}
function finishLevel(){const final=game.levelIndex===LEVELS.length-1,coins=awardLevel(final);game.lastCoins=coins;game.mode=final?'won':'level-complete';game.status=final?`All three zones secured. ${coins} coins awarded.`:`${level().name} secured at ${Math.floor(game.claimed)}%. ${coins} coins awarded.`;game.lastAction={type:final?'campaign-win':'level-complete',level:game.levelIndex+1,claimed:Number(game.claimed.toFixed(1)),coins};clearInput();syncUi();render()}
function lose(reason){game.mode='lost';game.status=reason;game.lastAction={type:'campaign-loss',reason,level:game.levelIndex+1,claimed:Number(game.claimed.toFixed(1))};clearInput();syncUi();render()}
function crash(reason='A spark struck your live trail.'){for(const item of game.trail){if(isInside(item.x,item.y)&&game.grid[item.y][item.x]===2)game.grid[item.y][item.x]=0}game.trail=[];game.trailSet.clear();game.drawing=false;game.player={...game.safe};game.shields=Math.max(0,game.shields-1);game.flash=600;game.status=game.shields?`${reason} ${game.shields} shields remain.`:`${reason} No shields remain.`;game.lastAction={type:'trail-hit',reason,shields:game.shields,reset_to:{...game.safe}};clearInput();if(!game.shields)lose('The neon field overloaded. Restart the zone and try shorter cuts.');syncUi();render()}
function floodRegions(){const l=level(),seen=new Set(),enemyCells=new Set(game.enemies.map(e=>key(clamp(Math.round(e.x),0,l.cols-1),clamp(Math.round(e.y),0,l.rows-1))));let captured=0;for(let sy=1;sy<l.rows-1;sy++)for(let sx=1;sx<l.cols-1;sx++){if(game.grid[sy][sx]!==0||seen.has(key(sx,sy)))continue;const region=[],queue=[{x:sx,y:sy}];seen.add(key(sx,sy));let hasEnemy=false;for(let i=0;i<queue.length;i++){const p=queue[i];region.push(p);if(enemyCells.has(key(p.x,p.y)))hasEnemy=true;for(const d of Object.values(DIRS)){const nx=p.x+d.x,ny=p.y+d.y,k=key(nx,ny);if(nx<=0||ny<=0||nx>=l.cols-1||ny>=l.rows-1||game.grid[ny][nx]!==0||seen.has(k))continue;seen.add(k);queue.push({x:nx,y:ny})}}if(!hasEnemy){for(const p of region)game.grid[p.y][p.x]=1;captured+=region.length}}return captured}
function closeTrail(){const trailLength=game.trail.length;for(const item of game.trail)game.grid[item.y][item.x]=1;const captured=floodRegions();game.trail=[];game.trailSet.clear();game.drawing=false;game.safe={...game.player};game.captures++;game.claimed=claimedPercent();game.flash=260;game.status=`Cut sealed: ${trailLength} trail cells and ${captured} field cells claimed.`;game.lastAction={type:'capture',trail_cells:trailLength,field_cells:captured,claimed:Number(game.claimed.toFixed(1))};if(game.claimed+1e-6>=level().target)finishLevel();else{syncUi();render()}}
function stepPlayer(direction,source='keyboard'){if(game.mode!=='playing'||!DIRS[direction])return false;const d=DIRS[direction],nx=game.player.x+d.x,ny=game.player.y+d.y;if(!isInside(nx,ny)){game.lastAction={type:'boundary-block',direction,at:{...game.player}};return false}const targetKey=key(nx,ny),target=game.grid[ny][nx];if(game.drawing&&game.trailSet.has(targetKey)){crash('You crossed your own live trail.');return false}game.player={x:nx,y:ny};game.lastDirection=direction;if(game.drawing){if(target===1){game.lastAction={type:'trail-close',direction,source};closeTrail();return true}game.grid[ny][nx]=2;game.trail.push({x:nx,y:ny});game.trailSet.add(targetKey)}else if(target===1){game.safe={...game.player};game.lastAction={type:'safe-move',direction,source,player:{...game.player}}}else{game.drawing=true;game.grid[ny][nx]=2;game.trail=[{x:nx,y:ny}];game.trailSet=new Set([targetKey]);game.status='Trail live. Reach any claimed cell before a spark touches it.';game.lastAction={type:'trail-start',direction,source,player:{...game.player}}}syncUi();render();return true}
function chooseDirection(){for(const name of ['up','down','left','right'])if(game.keys.has(name))return name;return null}
function enemyBlocked(x,y){const l=level(),cx=clamp(Math.floor(x),0,l.cols-1),cy=clamp(Math.floor(y),0,l.rows-1);return x<1||y<1||x>l.cols-2||y>l.rows-2||game.grid[cy][cx]===1}
function updateEnemies(dt){for(const enemy of game.enemies){let nx=enemy.x+enemy.vx*dt,ny=enemy.y+enemy.vy*dt;if(enemyBlocked(nx,enemy.y)){enemy.vx*=-1;nx=enemy.x+enemy.vx*dt}if(enemyBlocked(enemy.x,ny)){enemy.vy*=-1;ny=enemy.y+enemy.vy*dt}enemy.x=clamp(nx,.8,level().cols-1.8);enemy.y=clamp(ny,.8,level().rows-1.8);const cellKey=key(Math.round(enemy.x),Math.round(enemy.y));if(game.drawing&&(game.trailSet.has(cellKey)||Math.hypot(enemy.x-game.player.x,enemy.y-game.player.y)<.64)){crash(`Spark ${enemy.id} struck your live trail.`);return}}}
function update(ms){const safe=Math.max(0,Math.min(5000,Number(ms)||0));game.pulse=(game.pulse+safe/650)%(Math.PI*2);game.flash=Math.max(0,game.flash-safe);if(game.mode!=='playing')return;game.elapsedMs+=safe;game.campaignMs+=safe;game.timeLeft=Math.max(0,game.timeLeft-safe);if(game.timeLeft<=0){lose('Time expired before the zone was secured.');return}updateEnemies(safe/1000);if(game.mode!=='playing')return;const direction=chooseDirection();if(direction){game.moveClock+=safe;while(game.moveClock>=game.moveDelay&&game.mode==='playing'){game.moveClock-=game.moveDelay;if(!stepPlayer(direction,'held-input'))break}}else game.moveClock=game.moveDelay;syncUi()}
function togglePause(){if(game.mode==='playing'){game.mode='paused';game.resumeMode='playing';game.status='Paused. The live field is frozen.';game.lastAction={type:'pause'};clearInput()}else if(game.mode==='paused'){game.mode='playing';game.status='Field resumed.';game.lastAction={type:'resume'}}syncUi();render()}
async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen?.();else await document.exitFullscreen?.()}catch(error){game.status='Fullscreen is unavailable in this browser.';game.lastAction={type:'fullscreen-error',message:String(error?.message||error)}}resizeCanvas()}
function computeView(){const l=level(),width=canvas.width,height=canvas.height,pad=Math.max(24,Math.min(width,height)*.055),top=Math.max(66,height*.105),availableW=width-pad*2,availableH=height-top-pad*.6,cell=Math.min(availableW/l.cols,availableH/l.rows),boardW=cell*l.cols,boardH=cell*l.rows;view={width,height,cell,boardW,boardH,boardX:(width-boardW)/2,boardY:top+(availableH-boardH)/2};return view}
function resizeCanvas(){const rect=canvas.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1),w=Math.max(320,Math.round(rect.width*dpr)),h=Math.max(280,Math.round(rect.height*dpr));if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h}computeView();render()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,Math.min(r,w/2,h/2))}
function drawBackground(){const v=view,g=ctx.createLinearGradient(0,0,0,v.height);g.addColorStop(0,'#b9e8e4');g.addColorStop(.5,'#e7efc8');g.addColorStop(1,'#f5d39a');ctx.fillStyle=g;ctx.fillRect(0,0,v.width,v.height);ctx.globalAlpha=.18;ctx.fillStyle='#177889';for(let i=0;i<11;i++){const x=(i*.117+.02)*v.width,y=v.height*(.13+.025*Math.sin(i*1.9));ctx.beginPath();ctx.arc(x,y,Math.max(12,v.width*.017),0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawHeader(){const v=view,w=Math.min(v.width*.75,650),h=Math.max(48,v.height*.075),x=(v.width-w)/2,y=Math.max(12,v.height*.023);ctx.save();roundRect(x,y,w,h,16);ctx.fillStyle='#fff9e9e8';ctx.fill();ctx.strokeStyle='#e0a73e';ctx.lineWidth=3;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#17324a';ctx.font=`900 ${Math.max(19,Math.min(31,v.width*.033))}px Inter,system-ui`;ctx.fillText(`NEON DIVIDE · ${level().name.toUpperCase()}`,v.width/2,y+h/2);ctx.restore()}
function drawGrid(){const v=view,l=level(),s=v.cell;ctx.save();ctx.shadowColor='#17324a45';ctx.shadowBlur=Math.max(13,s*.45);ctx.shadowOffsetY=Math.max(7,s*.18);roundRect(v.boardX-7,v.boardY-7,v.boardW+14,v.boardH+14,16);ctx.fillStyle='#f8fbdf';ctx.fill();ctx.shadowColor='transparent';for(let y=0;y<l.rows;y++)for(let x=0;x<l.cols;x++){const value=game.grid[y]?.[x]??0,px=v.boardX+x*s,py=v.boardY+y*s;if(value===1){const hue=168+((x+y)%4)*3;ctx.fillStyle=`hsl(${hue} 46% ${48+(x+y)%2*4}%)`}else if(value===2)ctx.fillStyle='#ff7769';else ctx.fillStyle=(x+y)%2?'#d9edf0':'#cce5e9';ctx.fillRect(px,py,s+.4,s+.4);ctx.strokeStyle=value===1?'#d3ffdd28':'#17566a16';ctx.lineWidth=Math.max(.5,s*.025);ctx.strokeRect(px,py,s,s)}ctx.strokeStyle='#17324a99';ctx.lineWidth=Math.max(2,s*.07);ctx.strokeRect(v.boardX,v.boardY,v.boardW,v.boardH);ctx.restore()}
function cellCenter(x,y){return{x:view.boardX+(x+.5)*view.cell,y:view.boardY+(y+.5)*view.cell}}
function drawTrail(){if(!game.trail.length)return;ctx.save();ctx.strokeStyle='#fff4a8';ctx.lineWidth=Math.max(3,view.cell*.26);ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();const start=cellCenter(game.safe.x,game.safe.y);ctx.moveTo(start.x,start.y);for(const item of game.trail){const p=cellCenter(item.x,item.y);ctx.lineTo(p.x,p.y)}ctx.stroke();ctx.strokeStyle='#df493f';ctx.lineWidth=Math.max(1.5,view.cell*.09);ctx.stroke();ctx.restore()}
function drawEnemies(){for(const enemy of game.enemies){const p=cellCenter(enemy.x-.5,enemy.y-.5),r=Math.max(7,view.cell*.42),spin=game.pulse+enemy.id;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(spin);ctx.shadowColor='#ff4d6d';ctx.shadowBlur=r*.9;ctx.fillStyle='#d93667';ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4,rr=i%2?r:r*.45;const x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.fill();ctx.fillStyle='#fff3a5';ctx.beginPath();ctx.arc(0,0,r*.28,0,Math.PI*2);ctx.fill();ctx.restore()}}
function drawPlayer(){const p=cellCenter(game.player.x,game.player.y),r=Math.max(7,view.cell*.38);ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor='#fff8a9';ctx.shadowBlur=r*.85;ctx.fillStyle=game.drawing?'#fff08a':'#ffffff';ctx.strokeStyle='#17324a';ctx.lineWidth=Math.max(2,r*.18);ctx.beginPath();ctx.arc(0,0,r*(1+.08*Math.sin(game.pulse*2)),0,Math.PI*2);ctx.fill();ctx.stroke();const d=DIRS[game.lastDirection]||{x:0,y:1};ctx.fillStyle='#17324a';ctx.beginPath();ctx.moveTo(d.x*r*.75,d.y*r*.75);ctx.lineTo(-d.y*r*.35,-d.x*r*.35);ctx.lineTo(d.y*r*.35,d.x*r*.35);ctx.closePath();ctx.fill();ctx.restore()}
function overlay(title,lines,accent='#e0a73e'){const v=view,w=Math.min(v.width*.78,700),h=Math.min(v.height*.56,365),x=(v.width-w)/2,y=(v.height-h)/2;ctx.save();ctx.fillStyle='#153046b8';ctx.fillRect(0,0,v.width,v.height);roundRect(x,y,w,h,24);ctx.fillStyle='#fffaf0f5';ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=5;ctx.stroke();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#17324a';ctx.font=`900 ${Math.max(26,Math.min(48,w*.07))}px Inter,system-ui`;ctx.fillText(title,x+w/2,y+h*.23);ctx.font=`750 ${Math.max(14,Math.min(21,w*.031))}px Inter,system-ui`;lines.forEach((line,index)=>ctx.fillText(line,x+w/2,y+h*(.43+index*.14)));ctx.restore()}
function render(){computeView();drawBackground();drawHeader();drawGrid();drawTrail();drawEnemies();drawPlayer();if(game.flash>0){ctx.fillStyle=`rgba(255,242,151,${Math.min(.32,game.flash/1000)})`;ctx.fillRect(0,0,view.width,view.height)}if(game.mode==='menu')overlay('NEON DIVIDE',['Leave the safe rim and cut across the open field.','Close each trail to claim spark-free territory.','Arrows / WASD move · P pause · F fullscreen.']);else if(game.mode==='paused')overlay('FIELD PAUSED',['Your trail and sparks are frozen.','Press P or Pause to continue.']);else if(game.mode==='level-complete')overlay('ZONE SECURED',[`${Math.floor(game.claimed)}% claimed with ${game.shields} shields left.`,`${game.lastCoins} coins awarded.`,'Press Enter or Next zone.'],'#3e9b75');else if(game.mode==='lost')overlay('FIELD OVERLOADED',[game.status,`${Math.floor(game.claimed)}% of ${level().target}% secured.`,'Press Restart to retry this zone.'],'#d85855');else if(game.mode==='won')overlay('ALL ZONES SECURED',[`${LEVELS.length} neon fields divided safely.`,`${game.coinsEarned} campaign coins earned.`,'Press Restart for a new campaign.'],'#3e9b75');syncUi()}
function formatTime(ms){const total=Math.ceil(Math.max(0,ms)/1000),m=Math.floor(total/60),s=String(total%60).padStart(2,'0');return`${m}:${s}`}
function syncUi(){el.zone.textContent=`${game.levelIndex+1} / ${LEVELS.length}`;el.claimed.textContent=`${Math.floor(game.claimed)} / ${level().target}%`;el.shields.textContent=String(game.shields);el.time.textContent=formatTime(game.timeLeft);el.trail.textContent=game.drawing?`${game.trail.length} live`:'Safe';el.coins.textContent=String(profileState.coins||0);el.start.hidden=game.mode!=='menu';el.next.hidden=game.mode!=='level-complete';el.pause.disabled=!['playing','paused'].includes(game.mode);el.pause.textContent=game.mode==='paused'?'Resume':'Pause';document.querySelectorAll('.move').forEach(button=>button.disabled=game.mode!=='playing');el.live.textContent=game.status}
function pressDirection(direction,down=true){if(!DIRS[direction])return;if(down){const alreadyHeld=game.keys.has(direction);game.keys.delete(direction);game.keys.add(direction);if(game.mode==='playing'&&!alreadyHeld){game.moveClock=0;stepPlayer(direction,'press')}}else game.keys.delete(direction)}
for(const button of document.querySelectorAll('[data-dir]')){const dir=button.dataset.dir;button.addEventListener('pointerdown',event=>{button.setPointerCapture?.(event.pointerId);pressDirection(dir,true);event.preventDefault()});for(const type of ['pointerup','pointercancel','pointerleave'])button.addEventListener(type,()=>pressDirection(dir,false))}
el.start.addEventListener('click',startCampaign);el.next.addEventListener('click',nextLevel);el.pause.addEventListener('click',togglePause);el.restart.addEventListener('click',restart);el.full.addEventListener('click',toggleFullscreen);
document.addEventListener('keydown',event=>{const raw=event.key.toLowerCase(),map={arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'},direction=map[raw];if(direction){event.preventDefault();if(!event.repeat)pressDirection(direction,true);return}if((raw==='enter'||raw===' ')&&game.mode==='menu'){event.preventDefault();startCampaign();return}if((raw==='enter'||raw==='n')&&game.mode==='level-complete'){event.preventDefault();nextLevel();return}if(raw==='p'){togglePause();return}if(raw==='r'){restart();return}if(raw==='f'){toggleFullscreen();return}if(raw==='escape'&&document.fullscreenElement)document.exitFullscreen?.()});
document.addEventListener('keyup',event=>{const map={arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'},direction=map[event.key.toLowerCase()];if(direction)pressDirection(direction,false)});window.addEventListener('blur',clearInput);document.addEventListener('visibilitychange',()=>{if(document.hidden)clearInput()});document.addEventListener('fullscreenchange',resizeCanvas);window.addEventListener('resize',resizeCanvas);

window.advanceTime=ms=>{manualUntil=performance.now()+140;let left=Math.max(0,Math.min(30000,Number(ms)||0));while(left>0){const step=Math.min(1000/60,left);update(step);left-=step}render()};
window.render_game_to_text=()=>JSON.stringify({coordinate_system:'grid cells; origin top-left; x increases right, y increases down',perspective:'single local player',network_state:'offline self-contained',mode:game.mode,paused_from:game.mode==='paused'?game.resumeMode:null,zone:{name:level().name,index:game.levelIndex+1,total:LEVELS.length,columns:level().cols,rows:level().rows,target_percent:level().target,claimed_percent:Number(game.claimed.toFixed(1))},player:{...game.player,safe_anchor:{...game.safe},drawing:game.drawing,shields:game.shields,last_direction:game.lastDirection},live_trail:game.trail.map(item=>({...item})),enemies:game.enemies.map(enemy=>({id:enemy.id,x:Number(enemy.x.toFixed(2)),y:Number(enemy.y.toFixed(2)),vx:Number(enemy.vx.toFixed(2)),vy:Number(enemy.vy.toFixed(2))})),time_remaining_ms:Math.round(game.timeLeft),elapsed_ms:Math.round(game.elapsedMs),captures:game.captures,coins_earned:game.coinsEarned,status:game.status,last_action:game.lastAction,controls:{move:'Arrows/WASD or on-screen direction pad',pause:'P',restart:'R',fullscreen:'F',continue:'Enter/N'}});
window.__NEON_DIVIDE_GAME__={getState:()=>game,getView:()=>view,start:startCampaign,restart,nextLevel,step:stepPlayer,crash:()=>crash('QA spark strike.'),expire:()=>{game.timeLeft=1;update(2);render();return game.mode},forceCapture:(percent=level().target)=>{for(let y=1;y<level().rows-1;y++)for(let x=1;x<level().cols-1;x++)game.grid[y][x]=0;const total=(level().cols-2)*(level().rows-2),count=Math.ceil(total*percent/100);for(let i=0;i<count;i++){const x=1+i%(level().cols-2),y=1+Math.floor(i/(level().cols-2));game.grid[y][x]=1}game.claimed=claimedPercent();game.lastAction={type:'qa-force-capture',claimed:Number(game.claimed.toFixed(1))};if(game.claimed>=level().target)finishLevel();else{syncUi();render()}return game.mode},completeCampaign:()=>{while(game.mode!=='won'){window.__NEON_DIVIDE_GAME__.forceCapture(level().target);if(game.mode==='level-complete')nextLevel();else if(game.mode!=='won')break}return game.mode},clearInput};
mountGameFeedback({gameSlug:'neondivide',gameName:'Neon Divide'});
function frame(now){if(now>=manualUntil){const dt=Math.min(50,Math.max(0,now-lastFrame));update(dt);render()}lastFrame=now;requestAnimationFrame(frame)}
resetGrid();resizeCanvas();syncUi();requestAnimationFrame(frame);
</script>
</body>
