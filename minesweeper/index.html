      html.scrollable-root { position:relative; height:auto; min-height:100%; overflow-y:auto; }
      body.scrollable { position:relative; min-height:100%; height:auto; overflow-y:auto; overflow-x:hidden; touch-action:pan-y; -webkit-overflow-scrolling:touch; }
      .wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; gap:clamp(8px, 2vh, 16px); padding:clamp(8px, 2vh, 16px); padding-top:env(safe-area-inset-top, clamp(8px, 2vh, 16px)); padding-bottom:env(safe-area-inset-bottom, clamp(8px, 2vh, 16px)); width:min(960px, 100%); margin:0 auto; }

      #board { display:grid; gap:var(--cell-gap); background:#0e1836; padding:var(--board-padding); border-radius:12px; border:2px solid var(--grid); margin:clamp(16px, 3vh, 24px) auto 0; width:min(var(--board-width, 9999px), calc(100vw - clamp(24px, 8vw, 64px))); max-width:100%; }
      .cell { width:var(--cell-size); height:var(--cell-size); display:flex; align-items:center; justify-content:center; background:var(--cell); border:2px solid var(--grid); border-radius:calc(var(--cell-size) * 0.22); cursor:pointer; user-select:none; font-weight:700; font-size:var(--cell-font-size); }
    .cell.revealed { background:#152750; border-color:#223660; cursor:default; }
    .cell.mine { background:#3a0f1a; border-color:#5a1f2a; color:#ffdede; }
    .cell.flag { color:var(--flag); }
    .cell.zero { color:#9fb3d6; }
    .n1{ color:#66c; } .n2{ color:#2a6; } .n3{ color:#c33; } .n4{ color:#36c; } .n5{ color:#a52; } .n6{ color:#399; } .n7{ color:#444; } .n8{ color:#777; }

      .hud { text-align:center; font-size:clamp(12px, 2vw, 16px); color:var(--muted); user-select:none; width:100%; max-width:min(95vw, 900px); }
    .stats { display:flex; justify-content:center; gap:24px; margin-top:4px; }
    .stats b { color:var(--fg); }
    .buttons { display:flex; gap:clamp(8px, 1.5vw, 12px); justify-content:center; flex-wrap:wrap; margin-top:clamp(8px, 1.5vh, 12px); }
    .btn { padding:clamp(10px, 2vw, 14px) clamp(16px, 3vw, 24px); background:#2a3a5f; border:2px solid #3a4a6f; border-radius:12px; color:var(--fg); font-size:clamp(13px, 2.2vw, 16px); font-weight:600; cursor:pointer; touch-action:manipulation; user-select:none; min-height:40px; transition:all 0.2s; }
    .btn:active { background:#3a4a7f; transform:scale(0.95); }
    .btn.primary { background:#5ad; border-color:#6be; color:#041e2e; }
    .btn.primary:active { background:#4bc; }

    @media (max-width: 768px) {
        #board { width:min(var(--board-width, 9999px), calc(100vw - clamp(20px, 8vw, 48px))); }
    }

  <script type="module">
    import { addCoins as addCoinsFn, rememberRecent } from '../src/core/state.js';
    window.addCoins = addCoinsFn;
    rememberRecent('minesweeper');
  </script>
  <script>
      let W=9,H=9,M=10; // width, height, mines
      let grid, revealed, flagged, started, over, timerId=null, startTs=0, flagMode=false, firstClick=true;

      const boardEl = document.getElementById('board');
      const minesLeftEl = document.getElementById('mines-left');
      const timerEl = document.getElementById('timer');
      const modeEl = document.getElementById('mode');
      const root = document.documentElement;
      const wrapEl = document.querySelector('.wrap');
      const hudEl = document.querySelector('.hud');
      let layoutRaf = 0;

      function scheduleLayout(){
        if (layoutRaf) cancelAnimationFrame(layoutRaf);
        layoutRaf = requestAnimationFrame(() => {
          layoutRaf = 0;
          applyResponsiveLayout();
        });
      }

      function applyResponsiveLayout(){
        if (!boardEl) return;

        const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 1024;
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 768;
        const hudHeight = hudEl ? hudEl.offsetHeight : 0;
        const wrapStyles = wrapEl ? getComputedStyle(wrapEl) : null;
        const paddingLeft = wrapStyles ? parseFloat(wrapStyles.paddingLeft) || 0 : 0;
        const paddingRight = wrapStyles ? parseFloat(wrapStyles.paddingRight) || 0 : 0;
        const wrapGap = wrapStyles ? parseFloat(wrapStyles.rowGap || wrapStyles.gap || '0') : 0;
        const sidePadding = paddingLeft + paddingRight;

        const availableWidth = Math.max(240, viewportWidth - sidePadding - 24);
        const availableHeight = viewportHeight - hudHeight - wrapGap - 96;

        let gapPx = 4;
        let padPx = 12;

        const computeSize = (gapVal, padVal) => {
          const widthTerm = (availableWidth - padVal * 2 - (W - 1) * gapVal) / W;
          const heightTerm = availableHeight > 0 ? (availableHeight - padVal * 2 - (H - 1) * gapVal) / H : Infinity;
          let candidate = Math.min(56, widthTerm, heightTerm);
          if (!Number.isFinite(candidate) || candidate <= 0) {
            candidate = Math.min(56, widthTerm);
          }
          if (!Number.isFinite(candidate) || candidate <= 0) {
            candidate = 36;
          }
          return candidate;
        };

        let cellSize = computeSize(gapPx, padPx);

        if (cellSize < 24) {
          gapPx = Math.max(2, Math.round(cellSize * 0.14));
          padPx = Math.max(8, Math.round(cellSize * 0.4));
          cellSize = computeSize(gapPx, padPx);
        }

        if (cellSize < 16) {
          gapPx = Math.max(1, Math.round(cellSize * 0.12));
          padPx = Math.max(6, Math.round(cellSize * 0.32));
          cellSize = computeSize(gapPx, padPx);
        }

        cellSize = Math.max(8, Math.min(56, cellSize));

        const boardWidth = W * cellSize + Math.max(0, W - 1) * gapPx + padPx * 2;
        const boardHeight = H * cellSize + Math.max(0, H - 1) * gapPx + padPx * 2;

        const needsScrollY = boardHeight + hudHeight + wrapGap + padPx + 48 > viewportHeight;
        const needsScrollX = boardWidth + sidePadding > viewportWidth;
        const enableScroll = needsScrollY || needsScrollX;

        document.body.classList.toggle('scrollable', enableScroll);
        document.documentElement.classList.toggle('scrollable-root', enableScroll);

        root.style.setProperty('--cell-size', `${cellSize}px`);
        root.style.setProperty('--cell-gap', `${gapPx}px`);
        root.style.setProperty('--board-padding', `${padPx}px`);
        root.style.setProperty('--cell-font-size', `${Math.max(12, Math.min(24, Math.round(cellSize * 0.55)))}px`);
        boardEl.style.setProperty('--board-width', `${boardWidth}px`);
      }

    function resetTimer(){ if (timerId) clearInterval(timerId); timerId=null; timerEl.textContent='0'; }
    function startTimer(){ startTs = Date.now(); timerId = setInterval(()=>{ timerEl.textContent = Math.floor((Date.now()-startTs)/1000); }, 1000); }

      function init(w=W,h=H,m=M){
      W=w; H=h; M=m; firstClick=true; over=false; started=false; resetTimer();
      grid = Array.from({length:H}, ()=> Array(W).fill(0));
      revealed = Array.from({length:H}, ()=> Array(W).fill(false));
      flagged = Array.from({length:H}, ()=> Array(W).fill(false));
      minesLeftEl.textContent = M;
      render();
        scheduleLayout();
    }

    function inBounds(x,y){ return x>=0 && x<W && y>=0 && y<H; }
    function neighbors(x,y){
      const ns=[]; for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++){ if (dx||dy){ const nx=x+dx, ny=y+dy; if (inBounds(nx,ny)) ns.push([nx,ny]); } }
      return ns;
    }

    function placeMines(sx,sy){
      // ensure first click (sx,sy) is safe including its neighbors
      const safe = new Set([[sx,sy], ...neighbors(sx,sy)].map(([x,y])=>`${x},${y}`));
      let placed=0; while(placed<M){
        const x = Math.floor(Math.random()*W), y = Math.floor(Math.random()*H);
        if (grid[y][x]===-1) continue; if (safe.has(`${x},${y}`)) continue;
        grid[y][x] = -1; placed++;
      }
      // compute numbers
      for (let y=0;y<H;y++) for (let x=0;x<W;x++){
        if (grid[y][x]===-1) continue;
        let c=0; for (const [nx,ny] of neighbors(x,y)) if (grid[ny][nx]===-1) c++;
        grid[y][x]=c;
      }
    }

    function reveal(x,y){
      if (over || revealed[y][x] || flagged[y][x]) return;
      if (!started){ started=true; startTimer(); }
      if (firstClick){ placeMines(x,y); firstClick=false; }
      revealed[y][x]=true;
      if (grid[y][x]===-1){
        // hit mine
        over=true; showAllMines(x,y); return;
      }
      // flood zeroes
      if (grid[y][x]===0){
        const q=[[x,y]]; const seen=new Set([`${x},${y}`]);
        while(q.length){
          const [cx,cy]=q.shift();
          for (const [nx,ny] of neighbors(cx,cy)){
            if (seen.has(`${nx},${ny}`)) continue;
            if (flagged[ny][nx]) continue;
            revealed[ny][nx]=true; seen.add(`${nx},${ny}`);
            if (grid[ny][nx]===0) q.push([nx,ny]);
          }
        }
      }
      checkWin();
      render();
    }

    function toggleFlag(x,y){
      if (over || revealed[y][x]) return;
      flagged[y][x] = !flagged[y][x];
      const flags = flagged.flat().filter(Boolean).length;
      minesLeftEl.textContent = Math.max(0, M - flags);
      renderCell(x,y);
    }

    function showAllMines(hx,hy){
      for (let y=0;y<H;y++) for (let x=0;x<W;x++){
        if (grid[y][x]===-1){ revealed[y][x]=true; }
      }
      render();
      // highlight the one that exploded
      const idx = hy*W + hx; const cell = boardEl.children[idx];
      if (cell){ cell.style.boxShadow = '0 0 0 2px #e55 inset'; }
    }

    function checkWin(){
      for (let y=0;y<H;y++) for (let x=0;x<W;x++){
        if (grid[y][x]!==-1 && !revealed[y][x]) return false;
      }
      over=true;
      // Award coins: boardCleared ? sizeBonus : 0
      const sizeBonus = Math.floor((W * H) / 10); // e.g., 9x9=81 -> 8 coins, 16x16=256 -> 25 coins
      if (sizeBonus > 0 && typeof addCoins === 'function') addCoins(sizeBonus);
      return true;
    }

      function render(){
        boardEl.style.gridTemplateColumns = `repeat(${W}, 1fr)`;
        boardEl.textContent='';
      for (let y=0;y<H;y++) for (let x=0;x<W;x++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x; cell.dataset.y = y;
        boardEl.appendChild(cell);
      }
        boardEl.oncontextmenu = e=>e.preventDefault();
        boardEl.onpointerdown = onPointerDown;
      renderAllCells();
        scheduleLayout();
    }

    function renderAllCells(){
      for (let y=0;y<H;y++) for (let x=0;x<W;x++) renderCell(x,y);
    }

    function renderCell(x,y){
      const idx = y*W + x; const el = boardEl.children[idx]; if (!el) return;
      el.className = 'cell';
      if (revealed[y][x]){
        el.classList.add('revealed');
        const v = grid[y][x];
        if (v===-1){ el.classList.add('mine'); el.textContent = '💣'; }
        else if (v===0){ el.classList.add('zero'); el.textContent = ''; }
        else { el.classList.add('n'+v); el.textContent = v; }
      } else {
        if (flagged[y][x]){ el.classList.add('flag'); el.textContent = '🚩'; }
        else { el.textContent = ''; }
      }
    }

    function posFromEvent(e){
      if (!(e.target && e.target.classList.contains('cell'))) return null;
      const x = +e.target.dataset.x, y = +e.target.dataset.y; return [x,y];
    }

    let pressTimer=null, pressedCell=null;
    function onPointerDown(e){
      const p = posFromEvent(e); if (!p) return; const [x,y]=p;
      if (e.button===2 || e.ctrlKey || e.altKey){ toggleFlag(x,y); return; }
      if (flagMode){ toggleFlag(x,y); return; }
      pressedCell = [x,y];
      pressTimer = setTimeout(()=>{ // long-press -> flag
        if (pressedCell){ toggleFlag(x,y); pressedCell=null; }
      }, 450);
      document.onpointerup = (ev)=>{
        clearTimeout(pressTimer); document.onpointerup=null;
        if (!pressedCell) return; // already flagged by long-press
        const q = posFromEvent(ev); if (!q) return; const [ux,uy]=q;
        if (ux===x && uy===y){ reveal(x,y); }
        pressedCell=null;
      };
    }

      document.getElementById('restart-btn').addEventListener('click', ()=> init(W,H,M));
    document.querySelectorAll('.preset').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.preset').forEach(b=>b.classList.remove('primary'));
        btn.classList.add('primary');
        init(+btn.dataset.w, +btn.dataset.h, +btn.dataset.m);
      });
    });

    addEventListener('keydown', (e)=>{
      if (e.code==='KeyR'){ init(W,H,M); }
      if (e.code==='KeyF'){ flagMode=!flagMode; modeEl.textContent = flagMode? 'Flag' : 'Reveal'; }
    });

      window.addEventListener('resize', scheduleLayout);
      window.addEventListener('orientationchange', () => setTimeout(scheduleLayout, 120));
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', scheduleLayout);
      }

    // Boot
    init(9,9,10);
      scheduleLayout();
  </script>
