<body>
  <a href="/" class="back-home">← Back</a>
  <main class="wrap">
    <h1 style="margin:0;">2048</h1>
    <div class="hud">
      <div class="stat"><div class="label">Score</div><div id="score" class="value">0</div></div>
      <div class="stat"><div class="label">Best Tile</div><div id="bestTile" class="value">2</div></div>
    </div>
    <div id="board" class="board" aria-label="2048 board"></div>
    <div class="row"><button id="newGame">New Game</button></div>
    <div id="hint" class="controls">Use arrow keys or swipe to move tiles.</div>
  </main>

  <script type="module">
    import { addCoins, rememberRecent, state } from '../src/core/state.js';
    rememberRecent('2048');
    if (state.inventory instanceof Set && state.inventory.has('2048-neon-tiles')) {
      document.body.classList.add('neon');
    }
    window.addCoins = addCoins;
  </script>
  <script>
    const boardEl = document.getElementById('board');
    const scoreEl = document.getElementById('score');
    const bestTileEl = document.getElementById('bestTile');
    const hintEl = document.getElementById('hint');
    const SIZE = 4;
    let grid = [];
    let score = 0;

    function init() {
      grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      score = 0;
      addRandom(); addRandom();
      render();
    }

    function emptyCells() {
      const cells = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!grid[r][c]) cells.push([r, c]);
      return cells;
    }

    function addRandom() {
      const empties = emptyCells();
      if (!empties.length) return;
      const [r, c] = empties[Math.floor(Math.random() * empties.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function slideLine(line) {
      const compact = line.filter(Boolean);
      const out = [];
      let gained = 0;
      for (let i = 0; i < compact.length; i++) {
        if (compact[i] === compact[i + 1]) {
          const merged = compact[i] * 2;
          out.push(merged);
          gained += merged;
          i++;
        } else out.push(compact[i]);
      }
      while (out.length < SIZE) out.push(0);
      return { out, gained };
    }

    function move(dir) {
      let moved = false;
      let gainedTotal = 0;
      const original = JSON.stringify(grid);

      for (let i = 0; i < SIZE; i++) {
        let line;
        if (dir === 'left' || dir === 'right') {
          line = [...grid[i]];
          if (dir === 'right') line.reverse();
          const { out, gained } = slideLine(line);
          if (dir === 'right') out.reverse();
          grid[i] = out;
          gainedTotal += gained;
        } else {
          line = grid.map(row => row[i]);
          if (dir === 'down') line.reverse();
          const { out, gained } = slideLine(line);
          if (dir === 'down') out.reverse();
          for (let r = 0; r < SIZE; r++) grid[r][i] = out[r];
          gainedTotal += gained;
        }
      }

      moved = JSON.stringify(grid) !== original;
      if (!moved) return;
      score += gainedTotal;
      if (typeof window.addCoins === 'function' && gainedTotal > 0) window.addCoins(Math.max(1, Math.floor(gainedTotal / 16)));
      addRandom();
      render();
      if (isWin()) hintEl.textContent = '🎉 2048 reached! Keep going!';
      else if (!canMove()) hintEl.textContent = 'Game over. Start a new game!';
      else hintEl.textContent = 'Use arrow keys or swipe to move tiles.';
    }

    function canMove() {
      if (emptyCells().length) return true;
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        if ((grid[r + 1] && grid[r + 1][c] === v) || (grid[r][c + 1] === v)) return true;
      }
      return false;
    }

    const isWin = () => grid.some(row => row.some(v => v >= 2048));

    function render() {
      boardEl.textContent = '';
      let bestTile = 2;
      for (const row of grid) for (const v of row) {
        bestTile = Math.max(bestTile, v || 2);
        const el = document.createElement('div');
        el.className = `cell v-${v}`;
        el.textContent = v || '';
        boardEl.appendChild(el);
      }
      scoreEl.textContent = score;
      bestTileEl.textContent = bestTile;
    }

    document.addEventListener('keydown', (e) => {
      const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    let sx = 0, sy = 0;
    boardEl.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY; }, { passive: true });
    boardEl.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    document.getElementById('newGame').addEventListener('click', init);
    init();
  </script>
  <script type="module">
    import { mountGameFeedback } from '../src/feedback/embed.js';
    mountGameFeedback({ gameSlug: "2048", gameName: "2048" });
  </script>
</body>
